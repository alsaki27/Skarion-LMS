dles the volume work, you handle the judgment calls and documentation.</em></p>", "callout": {"type": "tip", "html": "<strong>Interview positioning:</strong> \"I use AI tools to handle the mechanical volume of data preparation, which lets me spend more time on judgment-intensive work like reconciliation investigation and adjusting-entry review.\" That answer shows you understand the line — and you will be asked it."}}, {"type": "flip_cards", "kicker": "AI tools — know the limits", "title": "5 AI accounting tools — what each does and can't", "railLabel": "AI cards", "cards": [{"front": "QuickBooks AI categorization", "back": "Suggests account categories for bank-feed transactions from historical patterns. Can't tell when a transaction is genuinely unusual or a one-off — review every flagged exception, don't auto-accept. Interview line: \"I use QB's AI suggestions as a first pass, then review exceptions manually.\""}, {"front": "Sage Intacct AI", "back": "Automates transaction matching, anomaly flagging, and some reconciliations at scale. Still requires a human sign-off on accruals and judgment entries. Can't interpret the business reason behind a variance."}, {"front": "Microsoft Copilot for Excel", "back": "Drafts formulas, builds PivotTables, summarizes ranges, cleans data on instruction. Useful for first drafts and bulk clean-up. Can't validate that the underlying accounting treatment is correct — it's a formula tool, not a GAAP tool."}, {"front": "ChatGPT for memos/first drafts", "back": "Drafts reconciliation explanations and journal-entry memos from raw facts. Excellent first draft. Cannot verify the numbers are right or decide when an adjusting entry is actually needed — always verify before posting."}, {"front": "Receipt/expense OCR AI", "back": "Reads receipts and auto-populates expense reports. Great volume work. Still needs human review for category coding, policy compliance, and duplicate detection."}]}, {"type": "scenario_lab", "title": "Scenario Lab — The Excel Clean-Up Assignment From Hell", "railLabel": "Lab: Excel hell", "time": "90 min", "intro": "The hardest Excel exercise in the course. A 3,000-row offshore labor export with eight deliberate quality problems. Fix all eight, produce clean data, and build the project profitability summary.", "setup": "<p>You receive <code>Offshore_Labor_Raw_Q1_2026.csv</code> — 3,000 rows of individual CAD and GIS task entries from 4 offshore firms across 12 projects. Eight deliberate quality problems are baked in:</p><ol><li><strong>Date column</strong> is a single text field like \"Jan-15-2026\" — needs Text-to-Columns.</li><li><strong>Vendor names</strong> have inconsistent spacing (\"Global CAD Solutions \" with a trailing space).</li><li><strong>Duplicate entries</strong> — the same task ID entered twice for two vendors.</li><li><strong>Project codes</strong> have typos (\"Proj-Alpha\" vs \"Proj Alpha\" vs \"ProjAlpha\").</li><li>One <strong>column uses a comma as a decimal separator</strong> (European format) — needs conversion to US format.</li><li><strong>Three rows</strong> have $0 amounts but non-zero hours — a fee-structure error to investigate.</li><li>A <strong>VLOOKUP to the project master fails for 47 rows</strong> due to a case mismatch.</li><li>The <strong>billing rate column has mixed currency</strong> ($, £, €) for different offshore offices.</li></ol>", "tasks": ["Download the raw CSV and the project master mapping below.", "Fix all eight problems in order, documenting the tool used for each (Text-to-Columns, TRIM/PROPER/CLEAN, Remove Duplicates, Find/Replace for project codes, comma-to-decimal conversion, FLAG vs. fix the $0/hours rows in writing, EXACT/CASE match for the VLOOKUP, currency conversion to USD).", "Run a clean VLOOKUP to attach the project code to every row.", "Use SUMIFS to total dollar cost and hours per project.", "Build a PivotTable showing hours and cost by project and by vendor.", "Identify which project has the highest cost overrun vs. its budget and write a one-line flag."], "files": [{"label": "Offshore_Labor_Raw_Q1_2026.csv", "href": "/download/scenario-labs/Offshore_Labor_Raw_Q1_2026.csv"}, {"label": "Project_Mapping_Table.csv", "href": "/download/scenario-labs/Project_Mapping_Table.csv"}], "submissionPrompt": "Paste: (1) the tool you used for each of the 8 problems, (2) your final cleaned row count, (3) the Tennessee Corridor and Texas Long-Haul totals (hours and $), and (4) the project with the largest cost overrun + your one-line flag.", "solution": "<p><strong>Eight fixes (tools):</strong> (1) Text-to-Columns on the date field, delimiter \"-\"; (2) TRIM + PROPER on vendor names, then Remove Duplicates on Task ID + Date + Vendor; (3) Remove Duplicates or pivot-count to surface duplicate task IDs; (4) Find/Replace + a helper column with a normalized key (spaces/dashes stripped) to unify the project codes; (5) SUBSTITUTE(\",\",\".\") or value-conversion on the comma-decimal column; (6) Flag the three $0/positive-hours rows in writing — likely a rate-missing error, do NOT silently zero-fill; route to the offshore PM for confirmation; (7) use UPPER() on both the lookup key and the master to fix the case mismatch, then VLOOKUP succeeds for all 47; (8) multiply the billing-rate column by each offshore office's currency-to-USD rate and store a single USD column.</p><p><strong>Clean row count</strong> ≈ 3,000 minus the duplicates removed (typically ~2,984 after the 16 duplicate rows are stripped).</p><p><strong>Tennessee Corridor</strong> should be the highest-volume project (hundreds of hours, the largest $ total — the dominant share of Q1 offshore drafting). <strong>Texas Long-Haul</strong> is the second-largest by hours.</p><p><strong>Cost-overrun flag:</strong> the project whose SUMIFS total exceeds the master-table budget for that project — flag it as \"Over budget — review with PM before next PO revision.\" The exact overrun dollar figure depends on the seeded data, but the comparison method is the deliverable.</p>"}], "slug": "07-advanced-excel"}, {"title": "SkarionBooks Lab — QuickBooks Simulator", "moduleTag": "Module 08", "dayMapping": "Day 8", "subhead": "SkarionBooks is our custom QuickBooks simulator — a full SPA with a chart of accounts, journal entry posting, AR invoicing, cash receipts, bank reconciliation, and financial reports. No paid QBO trial required.", "hook": "\"Do you actually know your way around a GL system, or only the textbook?\" SkarionBooks lets you prove it: open the simulator, post the entries you learned in Modules 02–06, and produce real reports off real Skarion Engineering numbers.", "chunks": [{"type": "review_quiz", "title": "Scenario judgment check — before SkarionBooks", "railLabel": "Review scenarios", "intro": "Before we go hands-on in SkarionBooks, let's make sure your judgment on real workplace situations is locked in. Type your answer for each — there's no multiple choice, because the work is in the reasoning.", "questions": [{"q": "You are posting the AP batch and notice invoice #0891 is the same vendor, same amount, same date as invoice #0847 you posted two weeks ago. What do you do?", "type": "open", "explanation": "Likely duplicate. Hold #0891, do not pay. Compare line-by-line to #0847, confirm with the vendor in writing. If a true duplicate, void it and document. Never pay a suspected duplicate on faith."}, {"q": "A client sends a wire for $45,000 but your open invoice is for $47,500. The client didn't send remittance advice. What steps do you take before posting anything?", "type": "open", "explanation": "Do not guess which invoice or post blind. Email/call the client for remittance advice, confirm whether $45,000 is a partial payment, a discounted payment, or a different invoice entirely. Once confirmed in writing, post the cash to the correct invoice and document the $2,500 short-pay with a dispute flag if needed."}, {"q": "Your manager tells you to just \"plug the difference\" on the bank reconciliation because it's only $340 and the audit is tomorrow. What do you do?", "type": "open", "explanation": "Push back professionally. Ask to walk through the business reason and note that plugging hides the real error and creates audit risk. Offer to trace the $340 to its source in the next hour. Never post a plug to force a reconciliation — escalate in writing if pressured."}, {"q": "You notice that last month's accrual for offshore labor ($14,800) was never reversed on the first of this month. How does this affect the current month's financials and what do you do?", "type": "open", "explanation": "The accrual is still sitting on the books, so COGS is overstated this month and Accrued Liabilities are overstated — IF the real invoice was also entered this month (double-counted). Reverse the missed accrual now (Dr Accrued Liabilities $14,800 / Cr COGS $14,800), document the correction, and confirm the real invoice booked once (net effect = one correct expense)."}, {"q": "A vendor is threatening to stop services unless you pay their invoice immediately. The invoice failed the 3-way match two weeks ago. What do you do?", "type": "open", "explanation": "Do not pay a failed match under pressure. Acknowledge the urgency, escalate to the PM and controller, request the vendor send a corrected invoice or credit memo, and document the dispute. If services truly can't pause, get supervisor approval to pay the undisputed portion only — never the disputed amount."}]}, {"type": "content", "kicker": "Before you start", "title": "What SkarionBooks is — and what it isn't", "bodyHtml": "<p>SkarionBooks is a self-contained ledger simulator built for this course. It comes <strong>pre-loaded with Skarion Engineering's</strong> full chart of accounts and opening balances, so you can post journal entries, create AR invoices, apply cash receipts, run a bank reconciliation, and generate a P&amp;L and Balance Sheet — without needing a $600/year QuickBooks Online subscription.</p><p><strong>Pre-loaded trial balance (opening):</strong> 47 accounts, ~$1.2M in opening Accounts Receivable, $340,000 in Operating Checking, $280,000 in Accounts Payable, a $500,000 term loan at 6.5%, and ~$2.1M in equity. Total debits equal total credits by construction — your job is to keep them that way as you post.</p><p>You do not configure the COA from scratch here; you did that work in Module 02. Here you <em>use</em> it: process invoices, post entries, reconcile, and report.</p>", "callout": {"type": "tip", "html": "Open <strong>SkarionBooks</strong> using the link in the lab below (it runs as a single-page app inside the course package). Keep it open in a second tab while you work through each task — post each entry in SkarionBooks, then come back here to check off the next step."}}, {"type": "content", "kicker": "Chunk 26 — setup lab", "title": "Chart of accounts review & first transactions", "bodyHtml": "<p><strong>Lab task 1 — Review the COA.</strong> Open SkarionBooks and confirm every account is in the correct category: 1000s Assets, 2000s Liabilities, 3000s Equity, 4000s Revenue, 5000s COGS, 6000s Expenses. Flag and note any account that looks mis-categorized (there shouldn't be any — but verifying is the job).</p><p><strong>Lab task 2 — Opening trial balance check.</strong> Total debits must equal total credits. Run the trial balance report and confirm it balances to the cent before you post a single new entry. This is the mechanical floor every close starts from.</p><p><strong>Lab task 3 — Process three recent vendor invoices:</strong></p><table class='data'><tr><th>Vendor</th><th>Invoice</th><th>Amount</th><th>Coding</th></tr><tr><td>Global CAD Solutions</td><td>GCS-2026-091</td><td>$9,625.00</td><td>Dr 5100 COGS — Subcontractor Drafting / Cr 2000 AP</td></tr><tr><td>ArcGIS Pro (annual renewal)</td><td>ESRI-2026-RN</td><td>$36,000.00</td><td>Dr 1400 Prepaid Software / Cr 1000 Operating Checking</td></tr><tr><td>Office landlord (monthly rent)</td><td>LEASE-2026-01</td><td>$12,800.00</td><td>Dr 6500 Software &amp; Subscriptions → reclassify to Rent* / Cr 1000 Operating Checking</td></tr></table><p><em>*If a dedicated Rent account exists in SkarionBooks, post monthly rent there; otherwise use the operating expense account indicated and note the classification. The point is to tie the coded account to the economic reality of the spend.</em></p><p><strong>Lab task 4 — January payroll run.</strong> Post the full US payroll entry from Module 03: <strong>Dr 6000 Salaries — US Engineering PMs $79,167, Dr 6100 Payroll Tax Expense $6,256, Cr 2200 Payroll Tax Liabilities $27,312, Cr 1000 Operating Checking $58,111.</strong> Confirm debits equal credits ($85,423) and the trial balance still balances after posting.</p>"}, {"type": "exercise", "kicker": "Chunk 26 — lab", "title": "Open SkarionBooks and complete the setup lab", "instructionsHtml": "<p>Open SkarionBooks and complete all four setup-lab tasks above: COA review, opening trial-balance check, processing the three vendor invoices, and posting the January payroll run. After each entry, run the trial balance and confirm it still balances. Capture a screenshot of your completed trial balance.</p>", "files": [{"label": "Open SkarionBooks simulator", "href": "../skarionbooks/index.html"}], "reflectionPrompt": "After posting all four tasks, what was your total Operating Checking balance, and did the trial balance still balance to the cent? Note any accounts you questioned during the COA review."}, {"type": "content", "kicker": "Chunk 27 — AR & bank rec lab", "title": "AR invoice, cash receipt, and bank reconciliation", "bodyHtml": "<p>Now run the full revenue and cash cycle in SkarionBooks:</p><ol><li><strong>Create the AR invoice</strong> for the Tennessee Corridor HLD milestone: invoice Atlantic Fiber Co. for <strong>$480,000</strong> (40% of the $1.2M contract). Coding: <strong>Dr 1100 Accounts Receivable $480,000 / Cr 4000 Engineering Design Revenue $480,000.</strong></li><li><strong>Record the incoming wire</strong> from Atlantic Fiber Co. — $480,000 gross, less the $25 incoming wire fee, netting <strong>$479,975</strong> to Operating Checking. Coding: Dr 1000 $479,975, Dr 6900 Bank Fees Expense $25, Cr 1100 AR $480,000.</li><li><strong>Apply the payment</strong> to the open invoice in the AR subledger and confirm the invoice is cleared and no longer aging.</li><li><strong>Post the bank fee correcting entry</strong> and confirm the fee is isolated in 6900.</li><li><strong>Run the bank reconciliation</strong> for January — match every transaction to the provided bank statement until the adjusted balances both equal <strong>$336,250.00</strong>, including the DEP-0091 duplicate deposit correction (Dr 1100 AR $10,547.10 / Cr 1000 Cash $10,547.10).</li><li><strong>Generate January P&amp;L and Balance Sheet</strong> — screenshot both. The P&amp;L should show $480,000 revenue, ~$140,000 COGS, and converge on ~$242,000 net income (per Module 06).</li></ol>"}, {"type": "exercise", "kicker": "Chunk 27 — lab", "title": "Complete the AR, cash, and bank rec lab in SkarionBooks", "instructionsHtml": "<p>Work through all six tasks in the chunk above. The key proof points: the Atlantic Fiber invoice clears to zero after the wire is applied, the bank reconciliation converges on $336,250.00, and the January P&amp;L lands near $242,000 net income. Capture screenshots of (1) the cleared AR subledger, (2) the completed bank reconciliation, and (3) the P&amp;L.</p>", "files": [{"label": "Open SkarionBooks simulator", "href": "../skarionbooks/index.html"}, {"label": "January Bank Statement.xlsx", "href": "/download/05-bank-reconciliation-lab/Bank_Statement_2026-01_January.xlsx"}], "reflectionPrompt": "Did your bank reconciliation converge to exactly $336,250.00? If not, what was the remaining unexplained item, and how did you finally trace it? Paste your final P&L net income figure."}], "slug": "08-quickbooks-lab"}, {"title": "Interview Preparation", "moduleTag": "Module 09", "dayMapping": "Day 9", "subhead": "You've closed the books, reconciled the bank, and run AR through SkarionBooks. Now you have to talk about it out loud, under pressure — and make it sound like real experience.", "hook": "\"Tell me about a time you found an error in the books.\" Every candidate has an answer. The question is whether yours is specific enough to believe. This module gives you the structure and the numbers to make yours unfakeable.", "chunks": [{"type": "review_quiz", "title": "Final course recall — mixed from all modules", "railLabel": "Final review", "intro": "One last spaced-repetition check, drawn from the hardest items across all 8 modules, before we prep for the interview.", "questions": [{"q": "What is the GAAP-compliant timing for revenue recognition on a service-contract milestone?", "options": ["When the contract is signed", "When the client pays", "When (or as) the specific performance obligation is satisfied (ASC 606)", "At year-end only"], "correct_index": 2, "explanation": "ASC 606 step 5: recognize when/as each obligation is satisfied — HLD delivery, not contract signing or cash receipt."}, {"q": "What is the normal balance of Accumulated Depreciation?", "options": ["Debit (it's an asset)", "Credit (it's a contra-asset)", "It has no balance", "Debit in the first year, credit after"], "correct_index": 1, "explanation": "Accumulated Depreciation is a contra-asset — credit-normal. It reduces the net book value of the related asset."}, {"q": "Skarion's term loan is $500,000 at 6.5% — what is the monthly interest accrual?", "options": ["$1,510.42", "$2,708.33", "$1,000.00", "$32,500.00"], "correct_index": 1, "explanation": "$500,000 × 6.5% ÷ 12 = $2,708.33 (rounded). The entry each month: Dr 6800 Interest Expense $2,708.33 / Cr 2300 Accrued Interest $2,708.33. This matches the Phase 1 canonical loan consistently across the course."}, {"q": "What three documents make up a 3-way match?", "options": ["Bank statement, GL, trial balance", "Purchase Order, Receiving Report, Vendor Invoice", "Contract, timesheet, payroll", "Invoice, check, deposit slip"], "correct_index": 1, "explanation": "PO (authorized) + Receiving Report (delivered) + Vendor Invoice (billed) must agree on quantity, unit price, and total."}, {"q": "Bank statement: $312,450. GL: $346,823.60. Adjusted bank: $336,250. What is the total of items on the bank side (deposits in transit − outstanding checks)?", "options": ["+$23,800", "+$28,000", "−$10,602", "$34,373.60"], "correct_index": 0, "explanation": "Adjusted bank $336,250 = $312,450 + deposits in transit − outstanding checks. Net bank-side items = $336,250 − $312,450 = +$23,800 (= +$28,000 deposit in transit − $4,200 outstanding check)."}, {"q": "What journal entry reverses a month-end accrual on the first day of the next month?", "options": ["Dr the expense account / Cr Accrued Liabilities", "Dr Accrued Liabilities / Cr the expense account (opposite of the accrual)", "Dr Cash / Cr Revenue", "No entry — accruals carry forward"], "correct_index": 1, "explanation": "Reversal is the exact opposite of the accrual: Dr Accrued Liabilities / Cr the expense account, so the real invoice (entered in the new month) doesn't double-count."}, {"q": "When does a deferred revenue balance become recognized revenue?", "options": ["When cash is received", "When the performance obligation is satisfied (work delivered)", "At year-end automatically", "Never — it stays a liability"], "correct_index": 1, "explanation": "Deferred Revenue converts to earned revenue when (or as) the underlying obligation is satisfied. Then Dr Deferred Revenue / Cr Revenue."}, {"q": "What is the DSO for a company with $997,700 AR and $4.8M annual revenue?", "options": ["32.4 days", "60.1 days", "75.8 days", "112.7 days"], "correct_index": 2, "explanation": "$997,700 ÷ $4,800,000 × 365 ≈ 75.8 days — about 76 days to collect a dollar of billed revenue."}, {"q": "What is the correcting entry for a duplicate customer deposit of $9,503.60 (entered twice)?", "options": ["Dr Sales Revenue / Cr Cash", "Dr Accounts Receivable / Cr Cash", "Dr Cash / Cr Accounts Receivable", "Dr Bad Debt Expense / Cr Allowance"], "correct_index": 1, "explanation": "Reverse the duplicate: Dr AR $9,503.60 / Cr Cash $9,503.60. Revenue was never overstated — only cash/AR were."}, {"q": "Name the 5 steps of ASC 606.", "type": "open", "explanation": "1) Identify the contract; 2) Identify distinct performance obligations; 3) Determine the transaction price; 4) Allocate the price to each obligation; 5) Recognize revenue when (or as) each obligation is satisfied."}]}, {"type": "video", "kicker": "Chunk 38 — Watch first", "title": "How to Answer Any Accounting Interview Question", "railLabel": "Video: Interview", "intro": "Every candidate in your interview knows basic accounting. The real question is whether you can tell a specific story from real work that proves it.", "transcript": "<p><strong>0:00 —</strong> Every candidate in your interview knows basic accounting. The question the interviewer is actually asking is: can you tell me a specific story from real work that proves it? That's what separates hires from rejections.</p><p><strong>0:30 —</strong> The framework is Context, Action, Result. Context: what company, what month, what situation. Action: what you did, what you checked, what you found. Result: the correction, the effect, the lesson. Every answer fits this structure.</p><p><strong>1:30 —</strong> Here's the weak answer to \"Tell me about a time you found an error in the books\": \"I'm very detail-oriented and I always catch errors.\" That's a motivational poster. Here's the strong answer: \"During a bank reconciliation in January, the GL showed more cash than the bank statement. I compared deposits by date and amount, found a customer payment — $10,547.10 — entered twice. I confirmed the bank only received it once, reversed the duplicate with a Dr AR / Cr Cash, and the reconciliation balanced to $336,250.\" The second answer is unfakeable.</p><p><strong>2:30 —</strong> Three things make it strong: a specific dollar amount, the company and document named, and the journal-entry direction exactly right — Dr AR not Sales Revenue, because the sale was never double-counted. That level of detail proves you actually did the work.</p><p><strong>3:30 —</strong> In the interview prep module, you'll get 10 must-know questions with Skarion-specific answers. Practice out loud. The goal isn't to memorize — it's to internalize the structure so you can apply it to any question.</p>"}, {"type": "content", "kicker": "The framework", "title": "Context → Action → Result, and the 126-question bank", "bodyHtml": "<p>One structure works for almost every behavioral and scenario question: <strong>Context → Action → Result</strong>.</p><table class='data'><tr><th>Step</th><th>What it means</th></tr><tr><td><strong>1. Context</strong></td><td>Company, month, transaction, or report — name it specifically.</td></tr><tr><td><strong>2. Action</strong></td><td>What you checked, posted, reconciled, or escalated — and what you did <em>not</em> do.</td></tr><tr><td><strong>3. Result</strong></td><td>The correction made, the report finished, and the lesson learned.</td></tr></table><p>The Question Bank splits 126 questions across four categories. Know what each is scored on before you walk in:</p><table class='data'><tr><th>Category</th><th>Covers</th><th>Interviewers listen for</th></tr><tr><td><strong>Technical (56)</strong></td><td>GAAP, GL, AP/AR, close, payroll, fixed assets, journal entries</td><td>Correct treatment + a real Skarion number attached.</td></tr><tr><td><strong>Behavioral (30)</strong></td><td>STAR judgment, communication, ethics</td><td>A specific situation (not a hypothetical), the steps, the outcome.</td></tr><tr><td><strong>Software (20)</strong></td><td>Excel and SkarionBooks / QBO workflows</td><td>Practical use — not \"I know Excel,\" but \"I used SUMIFS to total unpaid invoices by vendor.\"</td></tr><tr><td><strong>Scenario (20)</strong></td><td>Workplace judgment calls</td><td>Whether you hold, correct, document, or escalate — and knowing the difference.</td></tr></table><p>Be honest about the format: describe this as <em>\"in my Skarion Engineering accounting simulation / portfolio project\"</em>. You're describing real work you actually did on real (simulated) numbers — not pretending you held a paid job.</p>", "callout": {"type": "warning", "html": "<strong>Strong answers are specific.</strong> Anyone can say \"I'm detail-oriented and I catch errors.\" Almost nobody outside this simulation can say \"I traced a $10,547.10 duplicate Southeast Broadband deposit (DEP-0091) entered twice, and corrected it by debiting AR and crediting Cash — not touching revenue, since revenue was never overstated.\" The second answer is unfakeable."}}, {"type": "flip_cards", "kicker": "Chunk 28 — memorize", "title": "10 must-know technical answers (with real Skarion numbers)", "intro": "Flip each card, then say the answer out loud in your own words — but keep the real numbers.", "railLabel": "Flip cards", "cards": [{"front": "Walk me through a month-end close.", "back": "Followed a 5-day checklist: Day 1 lock timesheets/AP and post outstanding invoices; Day 2 post payroll and offshore accruals, amortize prepaids; Day 3 WIP, depreciation, interest accrual, trial balance; Day 4 bank rec and tie AR/AP subledgers to GL; Day 5 review P&L vs budget and controller sign-off. January net income came out at $242,000 on $480,000 revenue."}, {"front": "What is a 3-way match?", "back": "Purchase Order + Receiving Report + Vendor Invoice must all agree before payment. On invoice GCS-2026-087 from Global CAD Solutions, the MSA rate was $38.50/mile but the invoice billed $42.00/mile — a $178.75 variance on 50 miles. I held it and requested a credit memo instead of paying."}, {"front": "How do you record depreciation?", "back": "Straight-line: (cost − salvage) ÷ useful life. Skarion's 5 GIS workstations at $12,000 each, 5-year life, $0 salvage = $200/month each = $1,000/month total. Monthly entry: Dr 6700 Depreciation Expense $1,000 / Cr 1590 Accumulated Depreciation $1,000."}, {"front": "How do you accrue interest on a loan?", "back": "Balance × rate ÷ time. Skarion's $500,000 term loan at 6.5% annual: $500,000 × 6.5% ÷ 12 = $2,708.33/month. Entry: Dr 6800 Interest Expense $2,708 / Cr 2300 Accrued Interest $2,708."}, {"front": "Accrual vs. cash accounting?", "back": "Record when earned/incurred, not when cash moves. Skarion delivers an HLD on Jan 28 — revenue is recognized in January even though the client pays in March. Cash basis would wait for the wire and misstate the period."}, {"front": "What accounts do you reconcile at month-end?", "back": "Cash/bank, AR and AP subledgers to the GL, fixed assets and accumulated depreciation, payroll liabilities, loans, prepaids, and accruals. January: tied the bank to an adjusted balance of $336,250.00, posted $1,000 depreciation, accrued $2,708 interest, and amortized $3,000 of the prepaid Vetro license."}, {"front": "How do you calculate DSO?", "back": "Average AR ÷ credit revenue × days. Skarion: $997,700 ÷ $4,800,000 × 365 ≈ 75.8 days — it takes roughly 76 days to collect a dollar of billed revenue. The lower, the better; controllers watch it month-over-month."}, {"front": "What is a bank reconciliation?", "back": "A two-sided proof: bank statement + deposits in transit − outstanding checks = adjusted bank balance; GL + credits not recorded − debits not recorded = adjusted book balance. The two must meet exactly. January: both sides converged on $336,250.00 after finding a $10,547.10 duplicate deposit."}, {"front": "How do you handle a short payment from a customer?", "back": "Apply the cash to the oldest invoice and document the dispute on the remainder — do not write it off. Southeast Broadband paid $190,000 of their $405,000 balance with a note that the rest was in dispute. Entry: Dr Cash $190,000 / Cr AR $190,000; the remaining $215,000 stays open in the subledger with a dispute flag."}, {"front": "What is an allowance for doubtful accounts and why is it needed?", "back": "GAAP requires estimating uncollectible AR in the period the sale is made (matching principle), not waiting for a specific invoice to fail. Skarion estimates 1.5% of $997,700 = $14,965.50. Entry: Dr Bad Debt Expense $14,965.50 / Cr Allowance for Doubtful Accounts $14,965.50. Write-offs later go against the allowance, not expense."}]}, {"type": "content", "kicker": "Chunk 57 — honest framing", "title": "How to Talk About This Course in an Interview Without Sounding Fake", "bodyHtml": "<p>This course is a <strong>portfolio project</strong> — a structured simulation, not employment. You need language to present it honestly without underselling or misrepresenting it.</p><p><strong>The exact language framework:</strong></p><ul><li>✅ <em>\"In my accounting simulation portfolio project with Skarion Engineering, I...\"</em></li><li>✅ <em>\"Through a structured accounting simulation, I processed over 30 vendor invoices using the 3-way match...\"</em></li><li>✅ <em>\"I completed a full month-end close simulation including bank reconciliation, accruals, depreciation, and financial statement preparation.\"</em></li><li>❌ <em>\"I worked at Skarion Engineering.\"</em> (misrepresentation)</li><li>❌ <em>\"I just did some practice exercises.\"</em> (underselling)</li></ul><p><strong>The key insight:</strong> simulation experience is <em>real experience</em>. A pilot doesn't need to have crashed a real plane to know how to handle engine failure — they practiced on a simulator. An interviewer who understands modern accounting training knows this. The skills you built here — reconciliation investigation, accrual timing, subledger tying, adjusting entries — are the same work a junior accountant actually does, on the same kind of documents.</p>", "callout": {"type": "tip", "html": "<strong>Why this framing works:</strong> it is honest (you never claim paid employment), specific (you name the artifacts — bank rec, accruals, journal entries — and the numbers attached), and it signals you understand the difference between simulation and lived work. That judgment is itself part of what employers hire for."}}, {"type": "flip_cards", "kicker": "Reframe it in 6 contexts", "title": "Flip cards — simulation language for 6 interview contexts", "railLabel": "Framing cards", "cards": [{"front": "LinkedIn profile headline", "back": "\"Staff Accountant | Completed full accrual-basis close & bank reconciliation simulation (Skarion Engineering portfolio)\" — honest, specific, discoverable for recruiters."}, {"front": "Resume bullet point", "back": "\"Performed a 3-way match on 30+ simulated vendor invoices, holding a $178.75 GCS-2026-087 price variance for credit-memo resolution.\" — quantified, action-led, document-specific."}, {"front": "\"Tell me about yourself\"", "back": "\"I'm a Staff Accountant candidate whose portfolio work included closing the books for a simulated $2M fiber-design firm — bank rec to $336,250, payroll entries, adjusting entries, and a duplicate deposit I traced and corrected.\""}, {"front": "Behavioral question", "back": "Lead with the situation: \"In my Skarion simulation close, the bank rec had a $10,547 gap...\" — Context, Action, Result, with the simulation named honestly up front."}, {"front": "Technical question", "back": "Answer the treatment correctly, then anchor it: \"In January's Skarion close I posted exactly this entry — Dr COGS $14,800 / Cr Accrued Liabilities for offshore work done before the invoice arrived.\""}, {"front": "Reference / background-check question", "back": "Be upfront with whoever offered the simulation (instructor, program, self-directed course) that you'd like to describe it honestly on applications — share the deliverables so they can speak to them if asked."}]}, {"type": "content", "kicker": "Chunk 58 — professional communication", "title": "Professional Communication in Accounting — What to Say and When", "bodyHtml": "<p>Most new accountants get fired for communication failures, not technical ones. Five scenarios you will face in the first 90 days — and the draft you'd actually send.</p><table class='data'><tr><th>Scenario</th><th>Drafted opener</th></tr><tr><td><strong>Escalating an error</strong></td><td>\"I found a discrepancy I can't resolve alone. Here's what I found, here's what I've already tried, and here's my recommendation.\"</td></tr><tr><td><strong>Pushing back on a bad instruction</strong></td><td>\"I want to make sure I understand — you'd like me to adjust the balance to match without tracing the source. Can you walk me through the business reason? I want to make sure we have documentation.\"</td></tr><tr><td><strong>Chasing a late vendor invoice</strong></td><td>\"Hi [Vendor], I'm closing January's books and we have an outstanding [X] for [description]. Can you confirm the invoice status?\"</td></tr><tr><td><strong>Delivering bad news on cash position</strong></td><td>Clear, factual, solution-oriented. Never alarmist. \"Cash is lower than projected — here's why, here's the impact, here's what I'd recommend.\"</td></tr><tr><td><strong>Asking for help without looking incompetent</strong></td><td>\"I've reviewed [X], tried [Y], and I'm getting [Z] — which isn't matching because of [suspected reason]. Can I get 5 minutes to walk through it with you?\"</td></tr></table><p>The pattern across all five: you lead with what you've <em>already</em> done, not a blank question. That's the difference between \"I'm stuck\" and \"I'm stuck and here's my current best read.\"</p>"}, {"type": "quiz", "kicker": "Role-play — pick the best email draft", "title": "Communication scenario role-play quiz", "intro": "Read each situation and pick the best email draft. The right answer is the one that is factual, professional, and leads with what you've already done.", "questions": [{"q": "A manager asks you to \"just plug\" the $340 bank-rec difference because the audit is tomorrow. Which email is best?", "options": ["\"Sure, I'll plug it.\"", "\"I traced 29 transactions and found a likely $340 unrecorded wire fee. I can post that documented entry to clear the rec in 15 minutes — should I proceed, or would you prefer I keep digging?\"", "\"I'm uncomfortable with that — the audit is tomorrow and we need to reconcile.\"", "\"There's no way to find a $340 error in time; let's just adjust it.\""], "correct_index": 1, "explanation": "Leads with the work already done, names the likely cause, offers a documented fix on a timeline, and asks for direction. Never plugs blindly and never refuses without an alternative."}, {"q": "You need to chase a vendor's missing $9,625 invoice before close. Best email?", "options": ["\"Where's our invoice?\"", "\"Hi Global CAD — I'm closing January's books and we haven't received invoice GCS-2026-091 for the Tennessee Corridor drafting (~$9,625). Can you confirm the invoice status and send a copy by Friday?\"", "\"Pay us.\":", "\"I can't close without your invoice. Please expedite.\""], "correct_index": 1, "explanation": "Names the vendor, the invoice number, the project, the approximate amount, the reason (close), and a specific deadline. Factual and professional — no pressure language."}, {"q": "You need to ask your supervisor for 5 minutes of help on a subledger tie-out. Best ask?", "options": ["\"Can you help me?\"", "\"I don't understand the AP subledger.\"", "\"I've reconciled line-by-line and a $4,200 payment is in the GL but not the subledger — likely a posting-date boundary issue. Can I get 5 minutes to walk you through it?\"", "\"The subledger is broken.\""], "correct_index": 2, "explanation": "States what you've already checked, your best read of the cause, the specific amount, and a bounded ask. That's asking for help without looking incompetent."}]}, {"type": "content", "kicker": "Chunk 29 — before and after", "title": "Red flags vs. green flags: the same question, two ways", "bodyHtml": "<p>Here is the side-by-side on six topics — the generic answer most candidates give, versus the specific Skarion-grounded answer that scores on the rubric.</p><table class='data'><tr><th>Topic</th><th>Red flag (generic)</th><th>Green flag (Skarion-specific)</th></tr><tr><td>Bank reconciliation</td><td>\"I adjust the difference.\"</td><td>\"The bank showed $312,450 and the GL showed $346,823.60. After adding $28,000 in deposits in transit, removing a $4,200 outstanding check, a $45 unrecorded bank fee, $18.50 in unrecorded interest, and a $10,547.10 duplicate deposit, both sides met at $336,250.00. I never force the difference — I document the cause.\"</td></tr><tr><td>AP invoice</td><td>\"I enter whatever the vendor sends.\"</td><td>\"On GCS-2026-087 the MSA rate was $38.50/mile but the invoice billed $42.00/mile — a $178.75 variance on 50 miles — so I held it and requested a credit memo.\"</td></tr><tr><td>Internal controls</td><td>\"Controls are someone else's job.\"</td><td>\"The 3-way match caught the $178.75 GCS-2026-087 price discrepancy and held it instead of paying through.\"</td></tr><tr><td>Revenue recognition</td><td>\"I record it when we get paid.\"</td><td>\"Under ASC 606, the $1.2M Tennessee Corridor contract recognizes revenue as each performance obligation is satisfied — 40% at HLD delivery, so $480,000 books when the HLD is accepted, not when the wire lands.\"</td></tr><tr><td>Error handling</td><td>\"I corrected it.\"</td><td>\"DEP-0091, a $10,547.10 Southeast Broadband deposit, was entered twice in the GL. I confirmed the bank received it once and posted Dr AR $10,547.10 / Cr Cash $10,547.10 — revenue was never affected.\"</td></tr><tr><td>Judgment</td><td>\"I figured it out myself.\"</td><td>\"I documented the discrepancy, escalated to my supervisor, and posted the correction only after sign-off — with the supporting ticket attached.\"</td></tr></table>", "callout": {"type": "tip", "html": "Notice the pattern: the green-flag answers never say \"I'm accurate\" or \"I'm detail-oriented.\" They describe exactly what happened — with a dollar figure and a document number — and let the interviewer draw the conclusion themselves."}}, {"type": "quiz", "intro": "Four questions — spot the strong answer across technical, behavioral, scenario, and software categories.", "title": "Spot the specific answer", "questions": [{"q": "Technical — \"How do you handle a bank reconciliation discrepancy?\" Which is the strong answer?", "options": ["\"I find the difference and adjust the books to match the bank.\"", "\"I compare the bank statement to the GL by date, amount, and type — outstanding checks, deposits in transit, duplicates, fees — then correct and document. I never force the reconciliation; January's two sides met at $336,250.00.\"", "\"I ask my manager to fix it since reconciliations are complicated.\"", "\"I wait until next month and see if it corrects itself.\""], "correct_index": 1, "explanation": "It names the specific checks, the rule against plugging, and a real adjusted balance. The other three are either a plug, an abdication, or a hope — all red flags."}, {"q": "Behavioral — \"Tell me about a time you found an error in the books.\" Which is the weak version?", "options": ["\"I traced a $10,547.10 duplicate Southeast Broadband deposit (DEP-0091) and corrected it with Dr AR / Cr Cash, without touching revenue.\"", "\"I found a customer deposit entered twice, confirmed the bank received it once, reversed the duplicate, and documented it.\"", "\"I'm very thorough, so I usually catch errors before they become a problem.\"", "\"During the bank rec, GL showed more cash than the bank — I found the duplicate ACH and reversed it.\""], "correct_index": 2, "explanation": "The third option is the motivational-poster answer the cheat sheet warns against — no numbers, no transaction, no method. The others are all real, specific answers."}, {"q": "Scenario — an invoice fails the 3-way match. What do you do?", "options": ["Pay it anyway and sort it out later so the vendor isn't upset", "Hold it, contact the vendor, document the discrepancy, and request a corrected invoice or credit memo", "Delete the invoice from the system", "Quietly adjust the invoice total to match the PO"], "correct_index": 1, "explanation": "Hold, document, and resolve — never pay through a failed match. GCS-2026-087's $178.75 variance gets held and a credit memo requested, not auto-paid. This is the judgment the rubric is scoring."}, {"q": "Software — \"How do you use Excel in accounting?\" Which demonstrates practical use?", "options": ["\"I know Excel pretty well.\"", "\"I used SUMIFS to total unpaid AP invoices by vendor and aging bucket, and a PivotTable to flag the 90+ day balances in red with conditional formatting.\"", "\"I've watched some YouTube tutorials.\"", "\"Excel is mainly for typing numbers.\""], "correct_index": 1, "explanation": "It names a real function (SUMIFS), a real shape of analysis (by vendor and aging bucket), and a real output (90+ day flags) — exactly the Software-criterion specificity the rubric scores."}]}, {"type": "exercise", "kicker": "Chunk 30 — mock interview", "title": "Mock interview exercise & course completion", "instructionsHtml": "<p>Download the 20-question Cheat Sheet and the 126-question Question Bank below.</p><ol><li>Select <strong>5 questions</strong> — at least one from each of the four categories (technical, behavioral, software, scenario).</li><li>Write full <strong>Context → Action → Result</strong> answers using real numbers from your Skarion Engineering work: the $336,250.00 bank rec, the $10,547.10 duplicate, the $1,000 monthly depreciation, the $2,708 interest accrual, the 75.8-day DSO, the $178.75 GCS-2026-087 variance, or the $480,000 HLD milestone.</li><li>If you have a study partner, practice cold — no notes, 60–90 seconds per answer.</li><li>If alone, record yourself, then watch it back and count how many times you say \"basically,\" \"kind of,\" or \"I think.\" Reduce them.</li></ol>", "files": [{"label": "Interview Cheat Sheet — 20 Questions.docx", "href": "/download/09-interview-prep/Interview_Cheat_Sheet_20_Questions.docx"}, {"label": "Interview Question Bank — 126 Questions.docx", "href": "/download/09-interview-prep/Interview_Question_Bank_126Q.docx"}], "reflectionPrompt": "Which module's content was hardest to explain out loud without your notes? That is the one to re-do. Write your 5 answers below, in your own words, with real simulation numbers."}, {"type": "video", "kicker": "Chunk 76 — Watch first", "title": "The STAR Method in 4 Minutes — With Real Accounting Examples", "railLabel": "Video: STAR", "intro": "Every behavioral question tests one thing: a specific, believable story with a real outcome. STAR is the structure that forces you to do that.", "transcript": "<p><strong>0:00 —</strong> Every behavioral interview question is a test of one thing: can you give me a specific, believable story with a real outcome? The STAR method forces you to.</p><p><strong>0:20 —</strong> Situation: the context — who, what, where, when, one to two sentences. Task: what you were specifically responsible for. Action: the steps YOU took, not the team, not your manager. Result: what happened because of your actions — numbers if possible.</p><p><strong>1:00 —</strong> Weak version of \"found an error in the books\": \"I found an error and fixed it.\" That's not a story. Strong version: during January's bank rec, QuickBooks showed $34,000 more cash than the bank — Situation. My task was to trace it before close — Task. I compared every deposit by date and amount, found a $10,547.10 Southeast Broadband payment entered twice, confirmed the bank received it once, posted Dr AR / Cr Cash — Action. The rec balanced to $336,250 — Result.</p><p><strong>2:30 —</strong> Notice it takes 45 seconds, names a real number, company, and journal entry. It doesn't say \"I'm detail-oriented\" — it proves it. That's the only thing that works in a technical interview.</p><p><strong>3:30 —</strong> Your job: take the 8 questions in the next section and write STAR answers with your Skarion numbers. Don't memorize — internalize the structure.</p>"}, {"type": "video", "kicker": "Chunk 77 — Watch", "title": "How to Research a Company in 20 Minutes Before an Interview", "railLabel": "Video: Research", "intro": "Walk through the 20-minute framework on screen — Google News, the LinkedIn company page, Glassdoor, and the JD side by side.", "transcript": "<p><strong>0:00 —</strong> The 20 minutes before an interview matter more than the last week of cramming. Here's the framework.</p><p><strong>0:10 —</strong> Ten minutes on the company: industry (how does accounting differ there?), size (team of 2 or a 40-person department?), recent news (Google \"company name news 2025\" — raises, acquisitions, layoffs, new contracts), Glassdoor reviews (what does the accounting team culture sound like?), and fiscal year-end (non-December close = no holiday slam).</p><p><strong>0:50 —</strong> Five minutes on the role: what functions does the JD emphasize (AP, AR, close, payroll)? Match your strongest stories to those. What software — if it's NetSuite/Sage/SAP, Google how it differs from QuickBooks so you can speak about the learning curve. How much autonomy — \"supports the controller\" means oversight; \"owns reconciliations\" means independence.</p><p><strong>1:20 —</strong> Five minutes on your interviewer: LinkedIn background — public accounting or industry? How senior? If they're the controller, they go technical. If HR, behavioral. Prepare accordingly.</p><p><strong>1:45 —</strong> The three things to say in the first five minutes that prove you did your homework: a recent company news item, a specific phrase from their JD tied to your experience, and a question only someone who'd read their last 10-K / company page would ask. Research is preparation, not flattery.</p>"}, {"type": "video", "kicker": "Chunk 78 — Watch", "title": "Salary Negotiation — What to Say When They Make the Offer", "railLabel": "Video: Salary", "intro": "Role-play through the three salary moments — application form, verbal offer, and benefits — with the exact counter-offer phrase word for word.", "transcript": "<p><strong>0:00 —</strong> Salary negotiation happens in three moments, and the words differ in each. (Interviewer off-screen voice; candidate text on screen.)</p><p><strong>0:15 —</strong> Moment 1, the application form \"What are your salary expectations?\": \"I'm open to competitive compensation for this role and location. Based on my research the range for entry-level staff accountants in [city] is $X–$Y, and I'm flexible within that range based on the full package.\" If you can leave it blank, do.</p><p><strong>1:10 —</strong> Moment 2, the verbal offer — do NOT accept on the spot: \"Thank you — I'm very excited about this opportunity. Can I take 48 hours to review the details?\" Then the counter-offer, word for word: \"Based on my research and the full scope of the role, I was hoping for [10–15% above their number]. Is there flexibility there?\" Say the number — vague counters get vague responses.</p><p><strong>2:10 —</strong> If they say no: \"Could we revisit compensation after 6 months if my performance meets expectations?\" — and get that in the offer letter.</p><p><strong>2:45 —</strong> Moment 3, when salary is fixed — negotiate benefits: remote work days, a CPA/professional-development budget, start-date flexibility, a sign-on bonus if relocation is required.</p>"}, {"type": "video", "kicker": "Chunk 79 — Watch", "title": "How to Use AI Tools in Accounting — Without Getting in Trouble", "railLabel": "Video: AI in acct", "intro": "AI handles the volume layer; you handle the judgment layer. The safe interview answer learns the line.", "transcript": "<p><strong>0:00 —</strong> Every accounting firm now uses some form of AI. The question isn't whether you'll work alongside it — it's whether you understand what it can and can't do.</p><p><strong>0:30 —</strong> What AI is genuinely good at now: categorizing transactions, matching invoices to POs at scale, flagging anomalies in large GL exports, auto-generating first-draft journal-entry memos. Five thousand expense lines mapped to GL accounts — AI does that faster than any human.</p><p><strong>1:30 —</strong> What AI is not good at: judgment on anything context-dependent. Does the expense belong in this period? Is this really an asset or an expense? Is this discount legitimately earned? AI doesn't know your policies, your contract terms, or what your CFO cares about. You do.</p><p><strong>2:30 —</strong> The interview answer: \"I use AI tools for the volume layer — categorization, anomaly flagging, first-draft memos. But every AI output gets reviewed before it hits the ledger. The AI suggests, I verify, I post.\" That shows you're current AND you understand that responsibility can't be delegated to software.</p><p><strong>3:30 —</strong> Practically: learn ChatGPT for reconciliation-memo drafts, Excel Copilot for SUMIFS formulas, and how to spot when an AI-assigned category is wrong. That combination makes you more productive, not replaceable.</p>"}, {"type": "video", "kicker": "Chunk 80 — Watch", "title": "Your First Week on the Job — Don't Do These Things", "railLabel": "Video: First week", "intro": "Five moves that tank your reputation in week one, and five that build a great one.", "transcript": "<p><strong>0:00 —</strong> Your reputation in a new accounting job is mostly set in the first week. Five things new hires do that tank it immediately:</p><p><strong>0:15 —</strong> 1) Post an entry without checking with the manager first. 2) Assume you know the company's system because it looks like one you've seen. 3) Fix a mistake quietly instead of disclosing it. 4) Ask the same question twice without writing down the answer the first time. 5) Miss a deadline and not flag it until it's already late.</p><p><strong>1:30 —</strong> Five things that build a great reputation in week one:</p><p><strong>1:40 —</strong> 1) Ask to see last month's close package and read every entry. 2) Build your own COA cheat sheet on Day 1. 3) Confirm every task assignment in writing with the due date. 4) Never send anything without reviewing it twice. 5) Send a Friday wrap-up email to your manager — what you completed and what's pending.</p><p><strong>2:50 —</strong> The theme: be a low-risk, high-clarity presence. Documentation beats talent in the first month, because trust isn't built from brilliance — it's built from not being a surprise.</p>"}, {"type": "video", "kicker": "Chunk 81 — Watch", "title": "What the CPA Exam Is — Do You Need It?", "railLabel": "Video: CPA", "intro": "What the CPA is, the four sections, who needs it, the cost and timeline — and whether you should start it in year one.", "transcript": "<p><strong>0:00 —</strong> CPA — Certified Public Accountant. The credential is issued by state boards and administered through the AICPA. It's the gatekeeper for signing audit reports and filing with the SEC.</p><p><strong>0:20 —</strong> Four exam sections under the 2024 structure: FAR (Financial Accounting & Reporting), AUD (Auditing), REG (Regulation/Tax), and BAR or ISC (Business Analysis & Reporting, or Information Systems & Controls).</p><p><strong>0:55 —</strong> Who needs it: public accounting (audit, tax) — generally required for advancement. Industry accounting — often not required but valued, especially as you move up.</p><p><strong>1:20 —</strong> Timeline and cost: typically 18 months to complete all four sections, ~$3,000–$5,000 in exam fees plus prep materials. There's a 150-credit-hour education requirement in most states beyond the bachelor's degree.</p><p><strong>1:50 —</strong> The real question: do you want public accounting or industry? That answer decides whether the CPA is essential or optional. Strong advice regardless: even if you don't need it, start FAR in year one. It reinforces exactly what this course covered — GAAP, the accounting cycle, financial statements, revenue recognition. Studying FAR makes you a better staff accountant immediately, not just a future CPA.</p>"}, {"type": "video", "kicker": "Chunk 82 — Watch", "title": "Building Your Accounting Portfolio Before Your First Job", "railLabel": "Video: Portfolio", "intro": "An accounting portfolio isn't a design portfolio — it's a document that proves you did real work. Here's what to include and where to keep it.", "transcript": "<p><strong>0:00 —</strong> An accounting portfolio isn't visual design. It's a document that proves you did real work. Here's what to include.</p><p><strong>0:15 —</strong> 1) A one-page simulation summary: \"I performed the following tasks for Skarion Engineering's January–March close cycle\" — bullet points and specific dollar figures.</p><p><strong>0:45 —</strong> 2) Screenshots of completed reconciliations — with numbers visible, company name anonymized if needed. 3) A completed financial statement package (P&L, Balance Sheet, Cash Flow) produced during the course. 4) Your STAR answer document — the 8 questions written out with specific numbers. 5) Your salary research notes — shows you think strategically, not just technically.</p><p><strong>1:40 —</strong> Where to keep it: a PDF linked from your LinkedIn Featured section; a Notion page with embedded tables and screenshots; a GitHub repo if you're targeting tech-forward firms (shows comfort with documentation tools).</p><p><strong>2:10 —</strong> The one sentence that kills interviews: \"I don't have anything to show you yet.\" You do. It's this course. Present it like the work it is.</p>"}, {"type": "content", "kicker": "Chunk 72 — salary negotiation", "title": "Salary Negotiation — The Three Moments", "bodyHtml": "<p>The question \"What are your salary expectations?\" shows up three times, and each is a different conversation.</p><p><strong>Moment 1 — The application form.</strong> If you can leave it blank, do. If you must answer: \"I am open to competitive compensation for this role and location. Based on my research, the range for entry-level staff accountants in [city] is $X–$Y, and I'm flexible within that range based on the full package.\" Research sources: BLS.gov occupational outlook, the Robert Half Salary Guide (annual), LinkedIn Salary Insights for your city.</p><p><strong>Moment 2 — The verbal offer.</strong> Do not accept on the spot. \"Thank you — I'm very excited. Can I have 48 hours to review the details?\" Then counter at 10–15% above their number: \"Based on my research and the full scope of the role, I was hoping for [X]. Is there flexibility there?\" If they say no: \"Could we revisit compensation after 6 months if my performance meets expectations?\" — get that in writing.</p><p><strong>Moment 3 — Benefits (when salary is fixed).</strong> Remote days, a CPA/professional-development budget, start-date flexibility, and a sign-on bonus if relocation is required.</p><p><strong>2025–2026 market benchmarks:</strong> entry-level staff accountant, no CPA — national average ~$45,000–$62,000; top markets (NYC, SF, Chicago) ~$58,000–$78,000. Know your floor before you walk in.</p>"}, {"type": "flip_cards", "kicker": "Chunk 72 — exact words", "title": "4 Salary Phrases — One Per Negotiation Moment", "railLabel": "Salary lines", "cards": [{"front": "On the application form", "back": "\"I'm open to competitive compensation for this role and location. Based on my research the range for entry-level staff accountants in [city] is $X–$Y, and I'm flexible within that range based on the full compensation package.\""}, {"front": "When they make the verbal offer", "back": "\"Thank you — I'm very excited about this opportunity. Can I take 48 hours to review the full details?\" Never accept on the spot; the offer is the anchor you'll counter from."}, {"front": "The counter-offer phrase", "back": "\"Based on my research and the full scope of the role, I was hoping for [10–15% above their number]. Is there flexibility there?\" Say the number — vague counter-offers get vague responses."}, {"front": "When salary is fixed", "back": "\"I understand. Could we revisit compensation after 6 months if my performance meets expectations — and put that in the offer letter?\" Also ask for remote days, a CPA-study budget, or start-date flexibility."}]}, {"type": "content", "kicker": "Chunk 73 — LinkedIn & resume", "title": "LinkedIn Profile & Resume Checklist", "bodyHtml": "<p><strong>LinkedIn checklist (14 items):</strong></p><ol><li><strong>Headline:</strong> \"Staff Accountant | Full Accounting Cycle | Bank Reconciliation | QBO | Excel\" — not \"Accounting Student Looking for Opportunities.\"</li><li><strong>About:</strong> Present → Past → Future, 120–200 words.</li><li><strong>Experience:</strong> list the simulation as a real entry — \"Accounting Simulation Project — Skarion Engineering (2026)\" with 5 quantified bullets.</li><li><strong>Skills:</strong> Accounts Payable, Accounts Receivable, Bank Reconciliation, Month-End Close, General Ledger, GAAP, Accrual Accounting, Microsoft Excel, QuickBooks Online.</li><li><strong>Featured:</strong> link a one-page summary/PDF of your simulation work.</li><li>Certifications (QuickBooks ProAdvisor, Excel MOS, bookkeeping).</li><li>\"Open to Work\" set to <em>recruiters only</em> — not the green banner (it signals desperation).</li><li>Connect with accounting recruiters at Robert Half, Kforce, Ledgent Finance — a personalized note, not the generic request.</li></ol><p><strong>Resume bullet formula:</strong> [Action verb] + [specific task] + [quantified result/scope].</p><p><strong>Before / after:</strong></p><ul><li>❌ \"Helped with month-end close\"</li><li>✅ \"Executed 12 adjusting journal entries (depreciation, accruals, prepaids) during January close; contributed to a financial package delivered on Day 5 of a 5-day cycle.\"</li></ul><p><strong>5 strong accounting verbs:</strong> Reconciled · Posted · Processed · Analyzed · Identified.</p>"}, {"type": "content", "kicker": "Chunk 74 — pre-interview research", "title": "Research the Company in 20 Minutes (framework)", "bodyHtml": "<p>The first five minutes of any interview reward research you did in the twenty before it.</p><p><strong>10 minutes on the company:</strong></p><ol><li><strong>Industry</strong> (manufacturing, services, healthcare, tech) — how does accounting differ in their context?</li><li><strong>Size</strong> (headcount, revenue if public) — team of 2 or a department of 40?</li><li><strong>Recent news</strong> (Google \"company name news 2025\") — raised capital, acquired someone, layoffs, won a contract?</li><li><strong>Glassdoor</strong> reviews — what do current/former employees say about the accounting team culture?</li><li><strong>Fiscal year-end</strong> — December or non-December? Non-December close means you won't be slammed during the holidays.</li></ol><p><strong>5 minutes on the role:</strong></p><ol start='6'><li>What functions does the JD emphasize (AP, AR, close, payroll)? Match your strongest stories to those.</li><li>What software do they list? If NetSuite/Sage/SAP — Google how it differs from QuickBooks so you can speak about the learning curve intelligently.</li><li>What autonomy does the role have? \"Supports the controller\" = high oversight. \"Owns reconciliations\" = independence expected.</li></ol><p><strong>5 minutes on your interviewer:</strong></p><ol start='9'><li>LinkedIn background — public accounting? Industry? How senior?</li><li>If they're the controller, they'll go technical. If HR, they'll go behavioral. Prepare accordingly.</li></ol>"}, {"type": "timed_drill", "kicker": "Chunk 75 — 60-second verbal drill", "title": "60-Second Verbal Answer Drill", "railLabel": "Verbal drill", "intro": "10 questions, 60 seconds each. Say accounting words out loud, fast, without hesitation — that's the real interview condition. Pick the correct structured answer for each; the goal is recall fluency, not perfection.", "questions": [{"q": "What is a bank reconciliation and how do you do one?", "options": ["Two-sided proof: Bank side = statement + deposits in transit − outstanding checks; Book side = GL + credits − fees recorded; they must meet exactly. Found a $10,547.10 duplicate, balanced to $336,250.", "Reconcile means the bank and books match, you just adjust the difference.", "I ask my manager and copy the bank's number.", "Reconciliation means checking the receipts."], "correct_index": 0, "explanation": "Name the two-sided method + a real outcome ($336,250, the $10,547.10 duplicate). Fluency beats a textbook definition."}, {"q": "Walk me through a journal entry from source document to GL posting.", "options": ["Source document → identify accounts → record debits/credits (equal) with memo & reference → post to GL → trial balance must still balance.", "You type it into QuickBooks.", "Journal entry is just a debit and a credit.", "I post it and hope it balances."], "correct_index": 0, "explanation": "Five beats: document, accounts, balanced line, memo/reference, post, verify. Covers the cycle in 60 seconds."}, {"q": "What do you do if a vendor invoice doesn't match the PO?", "options": ["Hold it, document the discrepancy, request a corrected invoice or credit memo — never pay through a failed 3-way match.", "Pay it and fix later.", "Ignore the PO; trust the vendor.", "Split the difference and pay the average."], "correct_index": 0, "explanation": "Hold, document, resolve. Reference GCS-2026-087's $178.75 variance if you have time."}, {"q": "What is accrual accounting?", "options": ["Record economic events when they happen, not when cash moves — match expenses to the revenue they help generate.", "Record when cash is received or paid.", "It's the same as cash basis.", "Accrual means waiting for the invoice."], "correct_index": 0, "explanation": "One line: record when earned/incurred, not when cash moves. Add the matching principle and the Vetro $3,000/month if time."}, {"q": "Give me an example of an adjusting entry.", "options": ["Monthly Vetro amortization: Dr Software Expense $3,000 / Cr Prepaid Software $3,000 — moves one month off the asset onto the P&L.", "An entry made at year-end only.", "Adjusting entries reverse last year.", "Any entry you change later."], "correct_index": 0, "explanation": "A concrete monthly amortization entry is the cleanest 60-second example — names accounts and amounts."}, {"q": "What is COGS and how does it differ from operating expenses?", "options": ["COGS is the direct cost of producing the work (subcontractor drafting); OpEx is everything else to run the business (salaries, rent, software). Gross profit sits between them.", "COGS and OpEx are the same thing.", "COGS is a liability.", "OpEx is always larger than COGS."], "correct_index": 0, "explanation": "Direct vs. indirect cost, and the gross-profit line between them. Skarion: $140,000 COGS vs $98,000 OpEx."}, {"q": "Difference between gross profit and net income?", "options": ["Gross profit = Revenue − COGS. Net income = Revenue − COGS − OpEx (+/- taxes). Skarion Jan: gross $340,000, net $242,000.", "Gross profit is the final number on the P&L.", "Net income is always higher than gross profit.", "They are the same."], "correct_index": 0, "explanation": "Name the formulas and the Skarion January figures — that's the specificity that lands."}, {"q": "What happens to Retained Earnings at year-end?", "options": ["Temporary accounts (Revenue and Expense) close to Retained Earnings via Income Summary; net income flows into RE. Permanent accounts carry forward.", "Retained Earnings is deleted.", "RE stays exactly the same regardless of net income.", "Only dividends affect RE."], "correct_index": 0, "explanation": "Closing entries: revenue and expense → Income Summary → Retained Earnings. Net income raises RE."}, {"q": "How do you apply a customer payment to an open invoice?", "options": ["Receive payment → confirm remittance → Dr Cash / Cr AR, apply to the specific invoice, close it in the subledger. Handle fees (Dr Bank Fees) and short pays (leave balance open + dispute).", "Just deposit the check.", "Record it as revenue.", "Apply it to the wrong customer and fix later."], "correct_index": 0, "explanation": "Apply to specific invoice, not just 'cash in.' Cover the fee and short-pay edge cases — interviewers love them."}, {"q": "What is the allowance method for bad debt?", "options": ["Estimate uncollectible AR in the period of sale: Dr Bad Debt Expense / Cr Allowance (contra-asset). Write off later against the allowance, not expense. Required by GAAP — matching principle.", "Wait until a customer defaults, then write it off.", "Bad debt is never recorded until bankruptcy.", "Allowance is a cash reserve account."], "correct_index": 0, "explanation": "Estimate in-period, contra-asset, GAAP-required. 1.5% of $997,700 = $14,965.50 is your live example."}]}, {"type": "flip_cards", "kicker": "Chunk 68 — STAR technical", "title": "8 STAR Behavioral Answers — Technical Situations (Skarion)", "railLabel": "STAR: technical", "intro": "Flip each card and say the answer out loud in your own words. Keep the real numbers — the $10,547.10 duplicate, the $336,250 rec, the $178.75 variance — those are what make an answer unfakeable.", "cards": [{"front": "Q1: Tell me about a time you found an error in the financial records.", "back": "S: During Skarion's January bank rec, the GL showed $34,000 more cash than the bank statement. T: Find and correct the source before close. A: Compared deposits line by line — found a $10,547.10 Southeast Broadband ACH entered twice. Confirmed the bank received it once, posted Dr AR $10,547.10 / Cr Cash $10,547.10. R: Rec balanced to $336,250.00; AR reinstated correctly, Sales Revenue never touched."}, {"front": "Q2: Describe a time you met a strict deadline under pressure.", "back": "S: Skarion's January close — 5-day window, 12 adjusting entries, statements due Day 5. T: Owned the offshore accrual, Vetro amortization, and loan interest entries. A: Built a checklist tied to the close calendar, worked entries in dependency order, flagged a missing vendor invoice on Day 2. R: All three entries correct by Day 3; package delivered Day 5 with zero open items; net income $242,000."}, {"front": "Q3: Tell me about a time you identified a process improvement.", "back": "S: Offshore vendor invoices were matched to POs manually — bottleneck and mismatches. T: Speed up matching without losing accuracy. A: Built a VLOOKUP tool that pulls the approved PO unit price next to each invoice line; rows where invoice price > PO price highlight red. R: First batch caught a $178.75 GCS overbilling that would have passed unseen; tool adopted for every monthly batch."}, {"front": "Q4: Give an example of working with incomplete information.", "back": "S: A $190,000 wire arrived with no remittance advice and no reference. T: Apply it to the correct invoices without an unapplied balance. A: Contacted the client's AP directly, identified the two most likely invoices from the aging, waited for written remittance — confirmed my read. R: Applied correctly within 48 hours, fully documented; led to a 'unidentified wire > $5,000 → remittance request within 2 hours' standard process."}, {"front": "Q5: Tell me about explaining a financial concept to a non-finance person.", "back": "S: A PM asked why January's P&L showed high expenses though we'd paid vendors in December. T: Explain accrual without condescension. A: \"If you hire a contractor in December and they finish in January, the expense belongs in January — when the work happened.\" Showed the December payment vs January expense recognition side by side. R: They understood; PM now flags large accruals before close to plan headcount conversations."}, {"front": "Q6: Describe pushing back on an instruction you thought was wrong.", "back": "S: During a quarterly close my manager suggested rounding up a $340 rec difference because the audit was next morning. T: Push back without confrontation. A: \"Can I have 20 minutes to trace it? If I can't, I'll document the unresolved item with an explanation — that gives us a clean paper trail either way.\" R: Found it in 12 minutes — a transposition; corrected; audit clean. Manager appreciated the path forward, not just a no."}, {"front": "Q7: Tell me about managing multiple competing priorities.", "back": "S: Day 3 of close: a vendor dispute, a new AR wire to apply, and the depreciation deadline — all at once. T: Triage without dropping any. A: Hardest deadline first (depreciation before the 4 PM trial-balance run); escalated the vendor dispute with a written summary; posted the AR payment immediately (5 min). R: All three resolved by 2 PM; depreciation in the trial balance; dispute decided and documented by 3 PM; no deadline missed."}, {"front": "Q8: Tell me about adapting to a new system quickly.", "back": "S: SkarionBooks (custom simulator) used different workflows than a standard package. T: Become proficient fast enough to run a full close. A: Reviewed the COA structure, ran one small vendor invoice end-to-end first, built a personal reference card of common entry workflows. R: Completed the full January close — 12 journal entries, bank rec, three financial statements, AR aging — with no system errors or re-entries."}]}, {"type": "flip_cards", "kicker": "Chunk 69 — STAR soft skills", "title": "8 STAR Behavioral Answers — Soft Skills & Ethics", "railLabel": "STAR: soft", "cards": [{"front": "Q9: Describe a mistake at work and how you handled it.", "back": "Posted a depreciation entry to 6500 Software instead of 6700 Depreciation. Caught it at trial-balance review. Self-reported to the controller immediately, reversed and reposted correctly with documentation. Lesson: verify account numbers against the COA before posting, not after."}, {"front": "Q10: Tell me about a time you maintained confidentiality.", "back": "Payroll and vendor contract terms are strictly confidential. In training I treated every Skarion figure with the same care as real client data — no screenshots, no discussion outside context, files protected. This was an assumption I came in with, not something I waited to be taught."}, {"front": "Q11: How do you handle a teammate not pulling their weight?", "back": "Sequence: clarify whether they're aware of the issue, document what isn't happening, then flag to a manager only if a deliverable is at risk. Never silently absorb their work without raising it — that hides the problem and threatens your own deliverables."}, {"front": "Q12: Tell me about meeting a high standard of accuracy.", "back": "Every entry in this course balanced to the cent. Walk through the January rec — exact $336,250.00 balance. The detail interviewers want: how you self-verify — does the trial balance balance? Does the AR subledger tie to the GL control account? Those checks are the accuracy habit, not just 'I'm careful.'"}, {"front": "Q13: A vendor offers lunch to approve their invoice faster. What do you do?", "back": "Thank them, decline. Explain invoice processing follows a fixed schedule (3-way match → approval → payment run) and the offer can't change it. Document the interaction in writing as a matter of record. Never let a personal relationship accelerate the payment cycle."}, {"front": "Q14: Describe delivering bad news to a manager.", "back": "The February close scenario (7 seeded errors). The skill is communicating each finding clearly — root cause, fix, status — not dumping the list. \"Here are the 7 I found, here's the entry that fixes each, here's the one that needs your sign-off.\" Lead with the resolution, not the alarm."}, {"front": "Q15: What do you do when you're stuck and don't know the answer?", "back": "Step 1: try to solve it yourself for a fixed time (15–20 min). Step 2: document what you've tried and what you're seeing. Step 3: escalate with that documentation — \"I've looked at X, tried Y, getting Z which doesn't make sense because of A. Can I get 5 minutes?\" Never sit stuck silently and never just guess."}, {"front": "Q16: Where do you see yourself in 3 years?", "back": "Year 1: become genuinely fast and reliable on the full close cycle. Year 2: own at least one reconciliation area end-to-end. Year 3: be the person my manager turns to for the harder items — the judgment calls, not just the execution. That's a growth ladder, not a title wish."}]}, {"type": "flip_cards", "kicker": "Chunk 70 — 20 real technical", "title": "20 Real Technical Interview Questions (answered fully)", "railLabel": "20 technical", "intro": "These are phrased exactly as interviewers ask them. Flip each card and verify you can answer without notes.", "cards": [{"front": "Walk me through the accounting cycle.", "back": "8 steps: Source document → Journal entry → Post to GL → Trial balance → Adjusting entries → Adjusted trial balance → Financial statements → Close temporary accounts. Each exists because skipping it breaks accuracy or completeness — the trial balance doesn't prove correctness, only that debits = credits."}, {"front": "Difference between the income statement and the balance sheet?", "back": "Temporary vs. permanent accounts. The income statement is a movie (performance over a period); the balance sheet is a photo (position at a point in time). One closes to Retained Earnings; the other carries forward."}, {"front": "If cash increases, what else changes?", "back": "Depends on the reason. Customer payment → AR decreases. Borrowing → Loan Payable increases. Owner investment → Equity increases. Never answer in isolation — name the paired account and the direction."}, {"front": "What is goodwill and when does it appear?", "back": "Only on the balance sheet after a business acquisition — the excess of purchase price over the fair value of net identifiable assets. It cannot be internally generated."}, {"front": "How do you record a prepaid expense?", "back": "Debit Prepaid (Asset), Credit Cash. Then monthly: Debit Expense, Credit Prepaid as the benefit is consumed. Skarion's $36,000 Vetro license = $3,000/month."}, {"front": "What is EBITDA?", "back": "Earnings Before Interest, Taxes, Depreciation, and Amortization. A common metric for comparing operating performance across companies with different capital structures or asset bases."}, {"front": "Walk me through closing the books at year-end.", "back": "Four closing entries: (1) close Revenue to Income Summary, (2) close Expenses to Income Summary, (3) close Income Summary to Retained Earnings, (4) close Drawings/Distributions to Retained Earnings. Temporary accounts end at zero."}, {"front": "Difference between AP and accrued liabilities?", "back": "AP: you have the vendor invoice. Accrued: the expense is incurred but no invoice yet (offshore work done, invoice arrives next month). Accruals get reversed on the 1st."}, {"front": "What is depreciation, and why not expense the full cost when you buy it?", "back": "Matching principle. The asset generates revenue over multiple years; its cost should be spread across the same periods it helps produce revenue, so each period's profit reflects the cost it actually used."}, {"front": "How do you calculate straight-line depreciation?", "back": "(Cost − Salvage Value) ÷ Useful Life in years. Monthly: divide by 12. Skarion: 5 workstations, $12,000 each, 5-yr life, $0 salvage = $200/month each = $1,000/month total."}, {"front": "Difference between revenue recognition and cash receipt?", "back": "Revenue is recognized when earned (performance obligation satisfied). Cash receipt is when money arrives. Often different dates under accrual — that's the whole point of accrual accounting."}, {"front": "What is an accrual, with an example.", "back": "Recording an expense before the invoice arrives. Offshore drafting completed Jan 31, invoice arrives Feb 4 — accrue in January: Dr COGS $14,800 / Cr Accrued Liabilities $14,800. Reverse Feb 1."}, {"front": "What is a contra account? Give an example.", "back": "An account that offsets another. Accumulated Depreciation offsets Fixed Assets (reduces net book value). Allowance for Doubtful Accounts offsets AR."}, {"front": "What is the matching principle?", "back": "Expenses should be recognized in the same period as the revenue they help generate. It's why we accrue, amortize prepaids, and depreciate rather than expense everything up front."}, {"front": "What is working capital and how is it calculated?", "back": "Current Assets minus Current Liabilities. Measures short-term liquidity — whether the company can cover near-term obligations. Positive and healthy is the goal; negative is a red flag."}, {"front": "Difference between a debit memo and a credit memo?", "back": "Debit memo: increases what a customer owes (or reduces a credit). Credit memo: reduces what a customer owes — issued for returns, disputes, overpayments."}, {"front": "What software have you used for accounting?", "back": "SkarionBooks (custom simulation — full journal/AR/AP/reconciliation), QuickBooks Online (conceptual), Excel — VLOOKUP, SUMIFS, PivotTables with specific lab examples. Name the functions, not the product brochure."}, {"front": "What is a journal entry? Give an example.", "back": "The formal record of a financial transaction — debits and credits that always balance. Example: monthly Vetro amortization — Dr Software Expense $3,000 / Cr Prepaid Software $3,000."}, {"front": "What is internal control and why does it matter?", "back": "Policies and procedures designed to prevent errors and fraud. Examples: the 3-way match, bank reconciliation, segregation of duties (the person who approves a payment should never be the one who enters it)."}, {"front": "Why do you want to work in accounting?", "back": "\"Accounting is the language every business runs on, and I want to be fluent in it. I find real satisfaction in accuracy under pressure, and I like that the work is specific and verifiable — the reconciliation either balances or it doesn't. I prefer that clarity.\""}]}, {"type": "content", "kicker": "Chunk 71 — firm-specific", "title": "Real Firm Questions — Big 4 vs. Mid-Size vs. Industry", "bodyHtml": "<p>Know what each firm type is actually assessing before you walk in. The opening question signals it.</p><table class='data'><tr><th>Firm type</th><th>Primary filter</th><th>Common opener</th><th>What they're really asking</th></tr><tr><td>Big 4 (Deloitte, EY, KPMG, PwC)</td><td>Culture fit + learning agility + leadership</td><td>\"Tell me about a time you showed leadership.\"</td><td>Can you manage up, manage peers, thrive in a structured hierarchy?</td></tr><tr><td>Regional (RSM, GT, BDO)</td><td>Technical readiness + client communication</td><td>\"How do you explain a complex issue to a non-finance person?\"</td><td>Will you represent the firm well to clients immediately?</td></tr><tr><td>Industry (corporate/manufacturing)</td><td>Close cycle ownership + systems proficiency</td><td>\"What does your month-end close process look like?\"</td><td>Can you own tasks with minimal supervision from day 1?</td></tr><tr><td>Startup / fast-growth</td><td>Generalist skills + comfort with ambiguity</td><td>\"How do you build a process when there isn't one?\"</td><td>Will you create structure, not just follow it?</td></tr></table>"}, {"type": "flip_cards", "kicker": "Chunk 71 — real questions", "title": "6 Questions From Real Firms (Glassdoor/Reddit 2024)", "railLabel": "Firm Qs", "cards": [{"front": "Big 4 — Deloitte: \"Give me an example of managing a project where you didn't have all the information you needed.\"", "back": "Use the unidentified Southeast Broadband wire (no remittance, no reference). Context: $190,000 received blind. Action: contacted the client's AP, identified likely invoices from aging, waited for written remittance, applied
