ble class='data'><tr><th>Category</th><th>What it covers</th><th>What interviewers listen for</th></tr><tr><td><strong>Technical (56 Qs)</strong></td><td>GAAP, GL, AP/AR, reconciliations, close, payroll, fixed assets, journal entries</td><td>Correct accounting treatment, no debit/credit or cash/accrual confusion, and a real Skarion number attached to the answer.</td></tr><tr><td><strong>Behavioral (30 Qs)</strong></td><td>STAR-style judgment, communication, ownership, ethics, organization</td><td>A specific situation (not a hypothetical), the steps taken, the outcome, and the lesson learned.</td></tr><tr><td><strong>Software (20 Qs)</strong></td><td>Excel (pivot tables, XLOOKUP, SUMIFS, conditional formatting), QuickBooks Online workflows</td><td>Practical accounting use of the tool — not \"I know Excel,\" but \"I used SUMIFS to total unpaid invoices by customer.\"</td></tr><tr><td><strong>Scenario (20 Qs)</strong></td><td>Workplace judgment calls — mismatched invoices, short payments, missing documents, ethical pressure</td><td>Whether you hold, correct, document, or escalate — and whether you know the difference between those four responses.</td></tr></table><p>The Question Bank's own scoring rubric names five things every strong answer needs: <strong>Accuracy, Specificity, Workflow, Judgment,</strong> and <strong>Communication</strong> — and it warns that weak answers \"sound memorized and generic\" while strong ones \"use a clear Skarion simulation example with numbers or documents.\"</p>", "callout": {"type": "warning", "html": "The rubric's coach note on Judgment: a weak answer \"posts adjustments without support or says they would guess.\" A strong answer knows when to hold, correct, document, or escalate — and never forces a number to make a reconciliation balance."}}, {"type": "content", "kicker": "Before and after", "title": "Red flags vs. green flags: the same question, two ways", "bodyHtml": "<p>The cheat sheet includes a \"say this / not this\" table. Here it is expanded with the real Skarion-grounded version pulled from the question bank, side by side with the generic version most candidates give.</p><table class='data'><tr><th>Topic</th><th>Red flag (generic)</th><th>Green flag (Skarion-specific)</th></tr><tr><td>Bank reconciliation</td><td>\"I adjust the difference.\"</td><td>\"The book balance started at $226,594.19; after removing a $9,503.60 duplicate deposit, adding back a $270.00 Valley Freight correction, removing a $45.00 bank fee, and adding $18.50 in interest, the adjusted balance was $217,334.09. I don't force the difference — I document the cause.\"</td></tr><tr><td>AP invoices</td><td>\"I enter whatever the vendor sends.\"</td><td>\"On invoice DAF-2601-014, the PO price was $38.00/unit but the invoice billed $39.50/unit — a $126.36 variance — so I held it instead of paying it.\"</td></tr><tr><td>Internal controls</td><td>\"Controls are someone else's job.\"</td><td>\"The 3-way match caught the $126.36 DAF-2601-014 price discrepancy and a missing PO on NOVA Packaging invoice NPC-2601-011 — both were held instead of paid.\"</td></tr></table>", "callout": {"type": "story", "html": "Notice the pattern: the green-flag answers never say \"I'm accurate\" or \"I'm detail-oriented.\" They just describe exactly what happened, with a dollar figure and a document number, and let the interviewer draw that conclusion themselves."}}, {"type": "quiz", "title": "Spot the specific answer", "questions": [{"q": "Question: \"How do you handle a bank reconciliation discrepancy?\" Which answer is the strong one?", "options": ["\"I just find the difference and adjust the books to match the bank.\"", "\"I compare the bank statement to the GL by date, amount, and type, look for outstanding checks, deposits in transit, duplicates, and fees, then correct the entry if needed, attach support, and document the adjustment. I don't force the reconciliation.\"", "\"I ask my manager to fix it since reconciliations are complicated.\"", "\"I wait until next month and see if it corrects itself.\""], "correct_index": 1, "explanation": "This is the cheat sheet's actual answer to Question 2. It names the specific things checked (outstanding checks, deposits in transit, duplicates, fees) and explicitly says it never plugs or forces the number."}, {"q": "Question: \"What is a 3-way match?\" Which answer would score higher on the rubric's 'Specificity' criterion?", "options": ["\"It's when you match three documents together before paying an invoice.\"", "\"On invoice DAF-2601-014 from Dominion Aluminum & Fasteners, the PO price was $38.00/unit but the invoice billed $39.50/unit — a $126.36 variance — so I held the invoice instead of paying it.\"", "\"It means being careful with vendor invoices.\"", "\"I've heard of it but haven't used it myself.\""], "correct_index": 1, "explanation": "This is the real answer from the Question Bank. It names the PO, the receiving report, and the invoice, then attaches a real transaction (DAF-2601-014) with the exact variance amount."}, {"q": "Question: \"Tell me about a time you found an error in the books.\" Which is the weak version?", "options": ["\"I found a customer deposit entered twice in QuickBooks. The bank reconciliation didn't balance, so I compared the bank statement to the cash receipts register by date and amount, found the duplicate, reversed it, and noted the correction.\"", "\"I'm very thorough, so I usually catch errors before they become a problem.\"", "\"During a bank reconciliation exercise, QuickBooks showed more cash than the bank statement. I found a duplicate ACH receipt, confirmed the bank only received it once, and reversed it.\"", "\"I traced a $9,503.60 duplicate Coastal Electric & Controls deposit entered twice in QuickBooks and corrected it with debit AR / credit Cash, without touching Sales Revenue.\""], "correct_index": 1, "explanation": "Option B is the motivational-poster answer the cheat sheet warns against — no numbers, no transaction, no method. The other three options are all real, specific Skarion answers from the source documents."}, {"q": "Question: \"What accounts do you reconcile during month-end?\" Which answer demonstrates the 'Workflow' criterion best?", "options": ["\"All the balance sheet accounts, basically.\"", "\"Cash, AR/AP subledgers to the GL, inventory, fixed assets, payroll liabilities, sales tax payable, loans, prepaids, and accruals — in January that meant tying the bank to $217,334.09, AR to $176,918.00, AP to $42,265.00, accumulated depreciation to the $5,208.10 monthly add, and accrued interest to $1,510.42.\"", "\"Whatever my manager tells me to check.\"", "\"I run the reports and see if anything looks off.\""], "correct_index": 1, "explanation": "This lists the full set of balance-sheet accounts AND ties each one to a real January figure — exactly what the rubric's Workflow and Specificity criteria are scoring for."}]}, {"type": "exercise", "title": "Run your own mock interview", "instructionsHtml": "<p>Download both source files below. Read through the 20 must-know questions in the Cheat Sheet and skim the 126-question bank for a few more from each category (technical, behavioral, software, scenario).</p><ol><li>Pick <strong>3 of the 20 must-know questions</strong> from the Cheat Sheet.</li><li>Answer each one <strong>in your own words</strong> — do not copy the sample answer verbatim.</li><li>Use the Context → Action → Result structure, and pull <strong>real numbers</strong> from the Skarion Manufacturing simulation files you've already worked with (the $217,334.09 bank balance, the $126.36 DAF-2601-014 variance, the $5,208.10 depreciation, or any figure from your own exercise work in earlier modules).</li><li>If you have a study partner, have them ask you the questions cold and time your answers — the rubric recommends 60–90 seconds per answer.</li></ol>", "files": [{"label": "Interview Cheat Sheet — 20 Questions.docx", "href": "/download/06-interview-preparation/Interview_Cheat_Sheet_20_Questions.docx"}, {"label": "Interview Question Bank — 126 Questions.docx", "href": "/download/06-interview-preparation/Interview_Question_Bank_126Q.docx"}], "reflectionPrompt": "Write out your 3 chosen questions and your Context → Action → Result answers, in your own words, using real simulation numbers. Which one felt hardest to make specific, and why?"}], "slug": "06-interview-preparation"}, {"title": "The Excel Toolkit", "moduleTag": "Module 07 · Skarion Manufacturing LLC", "moduleTitle": "The Excel Toolkit", "dayMapping": "Day 7 of the 10-day path", "subhead": "QuickBooks does the posting. Excel does the thinking. Every reconciliation, aging report, and dashboard you've built so far ran on five formulas repeated with discipline.", "hook": "\"What's your Excel level?\" is asked in nearly every accounting interview, and it isn't small talk — it's a filter. This module opens the hood on the templates you've already been using and shows you exactly why they work.", "chunks": [{"type": "content", "kicker": "Why it matters", "title": "QuickBooks runs the books. Excel runs the job search.", "bodyHtml": "<p>It would be easy to assume that once a company is on QuickBooks, Excel becomes optional. The market research behind this course says otherwise: <strong>roughly 90% of entry-level accounting and bookkeeping job postings analyzed for this course explicitly name Excel</strong> as a required or strongly preferred skill — more often than any specific accounting software, including QuickBooks itself.</p><p>The reason is structural, not nostalgic. QuickBooks is excellent at recording transactions and holding the single source of truth. It is clumsy at the analysis layer — aging buckets, multi-way variance tables, reconciliation workpapers, dashboards you can hand to a controller mid-meeting. That analysis layer is built in Excel, exported from QuickBooks or built alongside it, in nearly every small-to-midsize company's monthly close.</p><p>Every template in Modules 03 through 05 — the bank reconciliation, the AR and AP aging, the expense dashboard, the close checklist — is exactly that analysis layer. This module doesn't teach new tasks. It teaches you to read the formulas already doing the work, so you can explain them fluently in an interview and rebuild them from scratch on day one of a real job.</p>", "callout": {"type": "tip", "html": "<strong>Interview framing:</strong> when asked about your Excel level, don't say \"intermediate.\" Say what you can actually do: \"I've built SUMIFS-based aging reports, COUNTIFS-based reconciliation matching, and nested-IF bucket logic for a manufacturing company's monthly close.\" Specificity beats a self-rating every time."}}, {"type": "flip_cards", "title": "The 8 functions that run this entire course", "railLabel": "Flip cards", "cards": [{"front": "SUMIFS()", "back": "Adds up a range of numbers, but only the rows that match one or more conditions — e.g. every open invoice for one customer that also falls in the \"31-60\" bucket. It's the workhorse behind the aging reports and the expense dashboard's category-by-month tables."}, {"front": "COUNTIFS()", "back": "Counts rows that match one or more conditions, instead of summing them. The bank reconciliation template uses it to count how many times a transaction's match-key appears on the other sheet — zero means unmatched, one means matched, more than one flags a possible duplicate."}, {"front": "Nested IF()", "back": "Chains multiple true/false tests so a value falls into exactly one category. The AR and AP aging reports nest four IFs deep to sort each invoice into Current, 1-30, 31-60, 61-90, or 90+ days past due, based on a single days-past-due number."}, {"front": "VLOOKUP() / XLOOKUP()", "back": "Pulls a value from one table into another by matching on a shared key (like a customer name or invoice number). VLOOKUP is the classic, widely-supported version; XLOOKUP is the newer, more flexible successor increasingly requested in 2026 job postings."}, {"front": "TEXT() match-keys", "back": "Converts a date and amount into a single comparable text string, like \"20260102|4200.00\". Two systems that store dates or numbers slightly differently can't be matched directly — but their TEXT() versions can. This is the trick behind the bank reconciliation's auto-flagging."}, {"front": "MAX(0, ...)", "back": "Floors a calculation at zero so it never goes negative. Used to make sure an open invoice balance (Original Amount − Payments Received) never shows as a negative number if a customer overpays."}, {"front": "Conditional formatting", "back": "Automatically colors or highlights cells based on their value — red for \"Unmatched,\" yellow for \"Possible Duplicate,\" green for \"Matched.\" It turns a wall of numbers into something you can scan in three seconds, which is exactly what a controller needs during a close."}, {"front": "SUM() with ranges", "back": "The simplest function on this list, but the one that ties every reconciliation together — adding a full column or row of activity, like all of a month's bank transactions, to roll forward a beginning balance into an ending balance."}]}, {"type": "content", "kicker": "How it actually works", "title": "The bank reconciliation's auto-flagging trick, unpacked", "bodyHtml": "<p>Open <code>Template_01_Bank_Reconciliation_Worksheet.xlsx</code> and look at column G on both the <code>Bank_Import</code> and <code>GL_Import</code> sheets. Every row builds a <strong>match key</strong> with this formula:</p><p><code>=TEXT(A5,\"yyyymmdd\")&\"|\"&TEXT(ROUND(ABS(F5),2),\"0.00\")</code></p><p>In plain English: take the transaction date, format it as a plain 8-digit string like <code>20260102</code>, glue on a pipe character, then glue on the transaction's absolute dollar amount rounded to two decimals, like <code>4200.00</code>. The result is a single text string — <code>20260102|4200.00</code> — that represents \"this date, this amount,\" with no ambiguity about date formats, positive/negative signs, or floating-point rounding.</p><p>Once every row on both sheets has a match key, column H counts how many times that exact key shows up on the <em>other</em> sheet: <code>=COUNTIFS(GL_Import!$G$5:$G$45,G5)</code>. Column I then turns that count into a plain-English status: <code>=IF(H5=0,\"Unmatched\",IF(H5&gt;1,\"Possible Duplicate\",\"Matched\"))</code>. Zero hits means nothing on the other side matches — an outstanding check or a deposit in transit. More than one hit means the same date-and-amount combination appears more than once, which is exactly how the template catches the accidental duplicate GL entry <code>DEP-1001-DUP</code> in the sample data.</p><p>This is why the <code>Reconciliation</code> sheet needed a new line: <strong>\"Less: Duplicate Book Entries.\"</strong> The COUNTIFS logic correctly flagged the $4,200 duplicate receipt as \"Possible Duplicate,\" but flagging isn't correcting — a human still has to confirm it's a real duplicate (not a coincidence) and back it out of the adjusted book balance. Once that $4,200 duplicate is subtracted on row 16, the reconciliation difference on row 19 correctly lands at $0.00. The formulas find the problem; the accountant decides what to do about it.</p>", "callout": {"type": "story", "html": "<strong>Why not just match on amount alone?</strong> Because plenty of unrelated transactions share a dollar amount by coincidence — two different $2,190 payments to two different vendors, for instance. Combining date AND amount into one key makes false-positive matches far less likely, which is exactly the kind of design decision that separates a template someone can trust from one that just looks automated."}}, {"type": "content", "kicker": "How it actually works", "title": "The AR/AP aging bucket logic", "bodyHtml": "<p><code>Template_02_AR_Aging_Report.xlsx</code> and <code>Template_03_AP_Aging_Report.xlsx</code> share the same two-step logic. Step one, on the invoice detail sheet, calculates days past due: <code>=IF(H5=0,0,MAX(0,AR_Aging_Report!$B$4-E5))</code>. Read it right to left: take the report's \"As Of Date\" (cell B4) and subtract the invoice's due date (E5) — that's how many days overdue it is. Wrap it in <code>MAX(0, ...)</code> so an invoice that isn't due yet never shows a negative number of days past due. Wrap that in an outer <code>IF</code> so a fully-paid invoice (open balance H5 = 0) always shows 0 days, regardless of its due date.</p><p>Step two sorts that days-past-due number into a bucket with a nested IF chain: <code>=IF(H5=0,\"Paid\",IF(I5=0,\"Current\",IF(I5&lt;=30,\"1-30\",IF(I5&lt;=60,\"31-60\",IF(I5&lt;=90,\"61-90\",\"90+\")))))</code>. Each IF only fires if every test before it failed — so an invoice 45 days past due skips \"Paid,\" skips \"Current,\" skips \"1-30\" (45 is not ≤ 30), and lands on \"31-60\" (45 ≤ 60). Order matters here: the tests have to run from smallest to largest, or a 90-day-overdue invoice would incorrectly get caught by an earlier, looser test.</p><p>Once every invoice has a bucket label, the summary tables use SUMIFS twice: once to total each bucket across all customers (<code>=SUMIFS(Customer_Invoices!$H$5:$H$34,Customer_Invoices!$J$5:$J$34,A9)</code>), and once to build a customer-by-bucket grid that adds a second condition for the customer name. That's the same nested-IF-then-SUMIFS pattern doing double duty — sort first, then total by group.</p>"}, {"type": "quiz", "title": "Check your understanding", "questions": [{"q": "In the bank reconciliation's match key formula, =TEXT(A5,\"yyyymmdd\")&\"|\"&TEXT(ROUND(ABS(F5),2),\"0.00\"), why combine date AND amount instead of just matching on amount alone?", "options": ["Matching on amount alone is not technically possible in Excel", "Combining both makes coincidental matches between unrelated transactions far less likely", "TEXT() only works when two arguments are joined with an ampersand", "Dates must always be converted to text before they can be used in any formula"], "correct_index": 1, "explanation": "Two unrelated transactions can easily share a dollar amount by coincidence. Requiring the same date AND the same amount to match dramatically reduces false-positive matches."}, {"q": "In GL_Import, COUNTIFS(Bank_Import!$G$5:$G$45,G5) returns 2 for a transaction. What does that mean, and what should happen next?", "options": ["The transaction cleared twice as fast as normal — no action needed", "The match key appears twice on the Bank_Import sheet, so the row is flagged \"Possible Duplicate\" for a human to investigate", "There is a formula error and the sheet needs to be rebuilt", "The transaction should automatically be deleted from GL_Import"], "correct_index": 1, "explanation": "A count greater than 1 means the same date-and-amount match key shows up more than once on the other sheet. The formula flags it as a possible duplicate; it does not decide or correct anything — that judgment call, and the resulting adjustment, is the accountant's job."}, {"q": "An invoice is 61 days past its due date. Walking through =IF(H5=0,\"Paid\",IF(I5=0,\"Current\",IF(I5<=30,\"1-30\",IF(I5<=60,\"31-60\",IF(I5<=90,\"61-90\",\"90+\"))))), which bucket does it land in, and why?", "options": ["\"31-60\", because 61 is close enough to round down", "\"90+\", because the formula always defaults to the largest bucket", "\"61-90\", because it fails every earlier test (not paid, not current, not ≤30, not ≤60) until it reaches a test it passes (≤90)", "\"Current\", because the invoice was originally due on time"], "correct_index": 2, "explanation": "Nested IFs evaluate in order and stop at the first TRUE test. 61 fails the ≤30 and ≤60 checks but passes ≤90, so it lands in \"61-90\". The bucket order has to run smallest-to-largest for this logic to work correctly."}]}, {"type": "exercise", "title": "Run a full month's close on Skarion's own numbers", "instructionsHtml": "<p>You've already worked with pieces of Skarion Manufacturing LLC's data in earlier modules. Now put the full toolkit to work in one pass:</p><ol><li>Open the <strong>Bank Reconciliation Worksheet</strong> and confirm the adjusted bank and book balances tie out to $0.00 once the duplicate book entry is backed out on the \"Less: Duplicate Book Entries\" line.</li><li>Open the <strong>AR Aging</strong> and <strong>AP Aging</strong> reports and identify which customers and vendors have anything sitting in the 61-90 or 90+ buckets — these are the ones you'd flag to a controller first.</li><li>Open the <strong>Expense Analysis Dashboard</strong> and review the KPIs, the category-by-month and vendor-by-total SUMIFS tables, and all three embedded charts, including the newly added vendor chart.</li><li>Open the <strong>Month-End Close Checklist</strong> and walk all 30 tasks across the 15 functional areas, confirming the formula-driven status summary reflects a complete close.</li><li>Write a one-paragraph summary, as if handing it to a controller, of Skarion's month-end financial position: cash reconciliation status, AR/AP risk, and the top expense drivers.</li></ol>", "files": [{"label": "Bank Reconciliation Worksheet", "href": "/download/07-excel-toolkit/Template_01_Bank_Reconciliation_Worksheet.xlsx"}, {"label": "AR Aging Report", "href": "/download/07-excel-toolkit/Template_02_AR_Aging_Report.xlsx"}, {"label": "AP Aging Report", "href": "/download/07-excel-toolkit/Template_03_AP_Aging_Report.xlsx"}, {"label": "Expense Analysis Dashboard", "href": "/download/07-excel-toolkit/Template_04_Expense_Analysis_Dashboard.xlsx"}, {"label": "Month-End Close Checklist", "href": "/download/07-excel-toolkit/Template_05_Month_End_Close_Checklist.xlsx"}], "reflectionPrompt": "Which single formula pattern from this module — the TEXT() match-key, the nested-IF aging bucket, or the SUMIFS summary table — do you feel most confident explaining out loud in an interview, and which one needs more practice?"}, {"type": "content", "kicker": "Looking ahead", "title": "What these templates don't teach — and why that's your next move", "bodyHtml": "<p>Every table in this module's templates is built with SUMIFS, COUNTIFS, and nested IFs — functions that produce a \"pivot-style\" summary by writing out the logic explicitly, row by row and condition by condition. That's deliberate: it's the version of Excel every hiring manager can open and understand immediately, on any version of Excel, with zero setup.</p><p>But it's not the only way professionals summarize data. Native Excel <strong>PivotTables</strong> — and functions like <strong>XLOOKUP</strong> — do a lot of the same work with less manual formula-writing, and job postings are increasingly naming them by 2026, especially at larger companies with heavier reporting volume. XLOOKUP in particular is quickly replacing VLOOKUP as the expected lookup function in job descriptions, since it can search in either direction and handles missing matches more gracefully.</p>", "callout": {"type": "tip", "html": "<strong>Extension skill, not required for this course:</strong> once you're comfortable with the SUMIFS-based tables in these templates, it's worth practicing PivotTables and XLOOKUP on your own using this same Skarion data. They're not covered in these templates on purpose — but naming them specifically in an interview (\"I also build PivotTables and use XLOOKUP for lookups\") signals you're current with where Excel is headed, not just where it's been."}}], "slug": "07-excel-toolkit"}, {"title": "Payroll Fundamentals: Gross to Net", "moduleTag": "Module 08 · Skarion Manufacturing LLC", "moduleTitle": "Payroll Fundamentals", "dayMapping": "Day 5", "subhead": "Withholding, taxes, and the cost of employees.", "hook": "Skarion has 15 employees. When you run payroll, the amount of cash that leaves the bank is never the same as the wages you owe them. The difference is taxes, withholdings, and benefits. In this module, you will learn the mechanics of US Payroll and how to book the entries accurately.", "chunks": [{"type": "content", "kicker": "The basics", "title": "Gross Pay vs. Net Pay", "bodyHtml": "<p>When an employee earns $5,000 in a month, that is their <strong>Gross Pay</strong>. But they don't take home $5,000. Skarion is required by law to withhold taxes and deductions before writing the paycheck.</p><p>What gets withheld:</p><ul><li><strong>Federal Income Tax:</strong> Based on the employee's W-4.</li><li><strong>State Income Tax (Virginia):</strong> Based on state tax brackets.</li><li><strong>FICA (Social Security &amp; Medicare):</strong> 6.2% for Social Security and 1.45% for Medicare.</li><li><strong>Voluntary Deductions:</strong> 401(k) contributions, health insurance premiums.</li></ul><p>The amount left over after all these deductions is the <strong>Net Pay</strong>. This is the actual cash the employee receives.</p>", "callout": {"type": "tip", "html": "<p>Skarion doesn't get to keep the withheld money. It sits as a liability (2200 Payroll Liabilities) until Skarion remits it to the IRS and the state government.</p>"}}, {"type": "content", "kicker": "The employer side", "title": "Employer Payroll Taxes", "bodyHtml": "<p>Gross wages are not the only expense for the company. Skarion also has to pay <strong>Employer Payroll Taxes</strong> on top of the gross wages. These are entirely separate from what is withheld from the employee.</p><p>Employer Taxes Include:</p><ul><li><strong>FICA Match:</strong> Skarion must match the employee's 6.2% Social Security and 1.45% Medicare.</li><li><strong>FUTA (Federal Unemployment):</strong> Paid only by the employer.</li><li><strong>SUTA (State Unemployment):</strong> Paid only by the employer.</li></ul><p>These employer taxes are recorded as an expense (6310 Employer Payroll Taxes) and increase the total cost of having employees.</p>"}, {"type": "flip_cards", "title": "Payroll terminology", "railLabel": "Payroll Drill", "cards": [{"front": "Gross Wages", "back": "Total earnings of the employee before any taxes or deductions are removed. Recorded as an expense (6300 Wages)."}, {"front": "Net Pay", "back": "The actual cash paid to the employee. Calculated as Gross Wages minus all withholdings."}, {"front": "FICA", "back": "Federal Insurance Contributions Act. Includes Social Security (6.2%) and Medicare (1.45%). Both the employee and the employer pay this."}, {"front": "FUTA / SUTA", "back": "Federal and State Unemployment Tax. This is an employer-only expense."}, {"front": "Form W-4", "back": "Filled out by the employee to let the employer know how much Federal Income Tax to withhold from their paycheck."}, {"front": "Payroll Liabilities", "back": "The balance sheet account (2200) where all withheld taxes and employer taxes sit until they are paid to the government."}]}, {"type": "content", "kicker": "Skarion in action", "title": "Booking the Payroll Run", "bodyHtml": "<p>Let's look at Skarion's first semi-monthly payroll run in January.</p><p>The total gross wages for all 15 employees is <strong>$33,916.67</strong>. The total net pay (cash to employees) is <strong>$24,414.85</strong>. The difference of $9,501.82 consists of federal tax, state tax, FICA, and benefits withholdings.</p><p>When we book this entry, we debit Wage Expense for the full gross amount, credit Cash for the net pay, and credit Payroll Liabilities for the withholdings.</p>", "callout": {"type": "warning", "html": "<p>Never debit Wage Expense for just the Net Pay! Wage Expense must always reflect the full Gross Wages. The difference is recorded as a liability.</p>"}}, {"type": "quiz", "title": "Test your payroll knowledge", "questions": [{"q": "Which of the following taxes is paid by BOTH the employee (via withholding) and the employer (via matching)?", "options": ["FUTA (Unemployment Tax)", "Federal Income Tax", "FICA (Social Security and Medicare)", "State Income Tax"], "correct_index": 2, "explanation": "Both the employer and the employee pay 6.2% for Social Security and 1.45% for Medicare (FICA)."}, {"q": "An employee has gross wages of $4,000. Total withholdings are $1,000. What is the correct journal entry to record this?", "options": ["Debit Wages Expense $3,000, Credit Cash $3,000", "Debit Wages Expense $4,000, Credit Cash $3,000, Credit Payroll Liabilities $1,000", "Debit Wages Expense $4,000, Credit Cash $4,000", "Debit Cash $3,000, Debit Payroll Liabilities $1,000, Credit Wages Expense $4,000"], "correct_index": 1, "explanation": "Wages Expense is always debited for the full gross amount ($4,000). Cash is credited for the net pay ($3,000). The withholdings are credited to Payroll Liabilities ($1,000)."}]}, {"type": "journal_entry_builder", "title": "Record the employer taxes", "scenarioHtml": "<p>After booking the gross wages and net pay for the January 15th payroll run, you must also record Skarion's portion of the employer payroll taxes. The total employer FICA match, FUTA, and SUTA for this run equals <strong>$3,001.63</strong>.</p><p>Record the journal entry for these employer taxes. Remember, this is an expense to the company, and the money hasn't been sent to the government yet.</p>", "startRows": 2, "accounts": ["1000 Operating Checking", "2200 Payroll Liabilities", "6300 Wages", "6310 Employer Payroll Taxes"], "solution": [{"account": "6310 Employer Payroll Taxes", "side": "debit", "amount": 3001.63}, {"account": "2200 Payroll Liabilities", "side": "credit", "amount": 3001.63}]}, {"type": "exercise", "title": "Review the US Payroll Basics", "instructionsHtml": "<p>Download and review the US Payroll Basics for Accountants reference sheet. This document explains the current tax rates and how to handle the W-4 and W-2 forms.</p><ul><li>Understand the difference between W-2 employees and 1099 contractors.</li><li>Review the current FICA rates and limits.</li><li>Understand the timeline for remitting payroll taxes to the IRS.</li></ul>", "files": [{"label": "US Payroll Basics for Accountants", "href": "/download/08-payroll-fundamentals/US_Payroll_Basics_for_Accountants.docx"}], "reflectionPrompt": "If an employee asks why their paycheck is lower than their stated salary, how would you explain the difference using the terms Gross Pay and Net Pay?"}], "slug": "08-payroll-fundamentals"}, {"title": "Month-End Close", "moduleTag": "Module 09 · Skarion Manufacturing LLC", "moduleTitle": "Month-End Close", "dayMapping": "Day 8 of the 10-day path", "subhead": "Every account you've reconciled, every invoice you've entered, every payroll run you've booked — month-end close is where it all gets pulled together, checked, and signed off. This is the module where you stop doing individual accounting tasks and start running an actual close.", "hook": "\"Walk me through your month-end close process.\" Every accounting interview asks some version of this question. Most candidates can name a step or two. You're about to be able to walk through all 15 — with a real close you actually ran.", "chunks": [{"type": "content", "kicker": "The concept", "title": "Why closing the books takes 3-5 days, not 3-5 minutes", "bodyHtml": "<p>QuickBooks can print a profit and loss statement in two seconds. So why do real companies take <strong>3 to 5 business days</strong> after month-end to actually close the books? Because printing a report and <em>trusting</em> a report are two different things.</p><p>Month-end close is the process of reviewing, reconciling, adjusting, and finalizing the books for a completed month, so that when the CEO or a lender looks at the numbers, those numbers are actually true:</p><ul><li><strong>Review</strong> — check that sales, bills, payments, payroll, and bank activity are all fully entered.</li><li><strong>Reconcile</strong> — compare the books to outside proof: bank statements, AR/AP aging, payroll reports, loan statements, fixed asset schedules.</li><li><strong>Adjust</strong> — post timing entries: accruals, prepaids, depreciation, payroll liabilities, interest.</li><li><strong>Finalize</strong> — prepare reports, save workpapers, get manager approval, and lock the period so prior numbers can't silently change.</li></ul><p>Skip any one of those four steps and the P&amp;L you hand the CEO is a guess wearing a suit. Skarion Manufacturing targets a 5-business-day close, because accuracy is worth more than speed — a fast close that's wrong just means restating everything next month.</p>", "callout": {"type": "tip", "html": "Interviewers ask about your close process because it reveals whether you understand accounting as a <em>system of proof</em>, not just data entry. \"I close the books in a day\" is not usually the answer they're hoping for."}}, {"type": "content", "kicker": "The framework", "title": "The 15 standard close steps", "bodyHtml": "<p>Skarion's close follows the same 15 steps used across small and mid-size companies. Learn this list — it's the backbone of every close interview question you'll get.</p><table class='data'><tr><th>#</th><th>Step</th><th>What it means</th></tr><tr><td>1</td><td>Confirm cutoff</td><td>Transactions land in the correct month — January expenses stay in January even if paid in February.</td></tr><tr><td>2</td><td>Collect source documents</td><td>Bank statements, credit card statements, invoices, payroll reports, loan statements, inventory records.</td></tr><tr><td>3</td><td>Record sales and AR</td><td>All customer invoices, sales receipts, credit memos, and payments — review unapplied cash.</td></tr><tr><td>4</td><td>Record vendor bills and AP</td><td>All vendor bills, expense reports, recurring expenses, and vendor credits.</td></tr><tr><td>5</td><td>Record cash activity</td><td>Deposits, checks, ACH, wires, bank fees, interest income, transfers, loan payments.</td></tr><tr><td>6</td><td>Reconcile bank accounts</td><td>Match bank statement activity to the GL — find outstanding checks, deposits in transit, duplicates.</td></tr><tr><td>7</td><td>Reconcile credit cards</td><td>Match card charges and payments to the GL, confirm receipts are attached.</td></tr><tr><td>8</td><td>Reconcile AR aging to GL</td><td>The AR aging total must equal the AR balance on the balance sheet.</td></tr><tr><td>9</td><td>Reconcile AP aging to GL</td><td>The AP aging total must equal the AP balance on the balance sheet.</td></tr><tr><td>10</td><td>Review inventory and COGS</td><td>Check purchases, usage, ending inventory, and cost of goods sold against the physical count.</td></tr><tr><td>11</td><td>Record payroll and liabilities</td><td>Gross wages, withholdings, employer taxes, benefit deductions, net pay.</td></tr><tr><td>12</td><td>Update fixed assets and depreciation</td><td>New assets, disposals, monthly depreciation, reconcile the fixed asset schedule to the GL.</td></tr><tr><td>13</td><td>Record accruals and prepaids</td><td>Expenses incurred but not billed yet, and amortized prepaid items.</td></tr><tr><td>14</td><td>Review financials and variances</td><td>Trial balance, P&amp;L, balance sheet, cash flow — explain unusual changes.</td></tr><tr><td>15</td><td>Finalize, approve, and lock</td><td>Save workpapers, prepare the management report, get approval, lock the period.</td></tr></table><p>Mapped to a calendar: Day 1 is transaction entry, Day 2 is reconciliation, Day 3 is adjusting entries, Day 4 is review, Day 5 is finalize and lock.</p>"}, {"type": "flip_cards", "title": "Close concepts — know them cold", "railLabel": "Flip cards", "cards": [{"front": "Accrual", "back": "Recording an expense or revenue in the period it was incurred or earned, even though cash hasn't moved yet. Example: a utility bill for services used in January but not received until February gets accrued in January."}, {"front": "Prepaid amortization", "back": "Spreading the cost of something paid in advance (annual insurance, annual software) across the months it covers, instead of expensing it all at once."}, {"front": "Unearned revenue", "back": "Cash received before the work is done or the product is delivered — it sits as a liability until it's actually earned, then it moves to revenue."}, {"front": "Soft close vs. hard close", "back": "A soft close is fast and uses estimates for small items — good for internal monthly reporting. A hard close fully reconciles every major account, posts every adjustment, and locks the period — required for quarter-end, year-end, audits, and loan reporting."}, {"front": "Trial balance", "back": "A listing of every GL account and its balance, used to confirm total debits equal total credits before financial statements are produced."}, {"front": "Adjusting entries", "back": "Journal entries posted at period-end to correct timing — depreciation, accruals, prepaids, payroll liabilities, interest — so the books reflect economic reality, not just cash movement."}, {"front": "Locking the period", "back": "Once a close is approved, the accounting system prevents further changes to that month's transactions without manager override — protects prior-period numbers from silent edits."}]}, {"type": "content", "kicker": "The real close", "title": "How January actually closed at Skarion", "bodyHtml": "<p>Here's what really happened during Skarion's January close, using the actual bank reconciliation.</p><p>The book balance per QuickBooks was <strong>$226,594.19</strong>. But that number was wrong — and Day 2 of the close (reconcile cash) is exactly where the problem surfaced. Working the bank rec turned up four separate issues:</p><table class='data'><tr><th>Adjustment</th><th>Amount</th></tr><tr><td>Book balance per QuickBooks</td><td>$226,594.19</td></tr><tr><td>Less: duplicate Coastal Electric deposit</td><td>&minus;$9,503.60</td></tr><tr><td>Add: Valley Freight payment correction ($2,410 entered, $2,140 cleared)</td><td>+$270.00</td></tr><tr><td>Less: bank service fee missing from QuickBooks</td><td>&minus;$45.00</td></tr><tr><td>Add: bank interest missing from QuickBooks</td><td>+$18.50</td></tr><tr><td><strong>Adjusted book balance</strong></td><td><strong>$217,334.09</strong></td></tr></table><p>The bank side, worked independently from the statement, landed on the exact same number: $211,161.25 statement balance, plus a $6,612.84 deposit in transit (Manassas Telecom), minus a $440.00 outstanding ADP payment, equals <strong>$217,334.09</strong>. Both sides met in the middle — that's how you know the reconciliation is right.</p><p>The biggest item was the duplicate deposit: a Coastal Electric payment had been entered into QuickBooks twice, which incorrectly cleared that customer's invoice a second time. Revenue was never overstated — the receivable was just erased by mistake. The fix reinstated it: <strong>Debit 1100 Accounts Receivable $9,503.60 / Credit 1000 Operating Checking $9,503.60.</strong></p>", "callout": {"type": "story", "html": "Notice what this proves: the close isn't paperwork for its own sake. Without Day 2's bank reconciliation, Skarion's books would have overstated cash by $9,503.60 — an error large enough to matter to a lender or the CEO — and nobody would have caught it until the money didn't show up somewhere later."}}, {"type": "quiz", "title": "Check your understanding", "questions": [{"q": "Skarion's book balance per QuickBooks was $226,594.19, but the adjusted book balance came out to $217,334.09. What was the single largest adjustment causing that gap?", "options": ["The missing bank interest of $18.50", "The duplicate Coastal Electric deposit of $9,503.60", "The missing bank service fee of $45.00", "The Valley Freight correction of $270.00"], "correct_index": 1, "explanation": "The duplicate deposit was by far the largest item, at $9,503.60 — it dwarfed the fee, interest, and freight corrections combined."}, {"q": "The bank statement showed $211,161.25. After adding the deposit in transit and subtracting the outstanding ACH payment, what did the adjusted bank balance equal?", "options": ["$211,161.25", "$226,594.19", "$217,334.09", "$217,774.09"], "correct_index": 2, "explanation": "$211,161.25 + $6,612.84 (deposit in transit) − $440.00 (outstanding ADP payment) = $217,334.09 — matching the adjusted book balance exactly."}, {"q": "Which day of Skarion's 5-day close calendar is when the duplicate deposit would normally be caught?", "options": ["Day 1 — transaction entry", "Day 2 — reconcile cash and subledgers", "Day 4 — review reports and variances", "Day 5 — finalize and lock"], "correct_index": 1, "explanation": "Bank reconciliation happens on Day 2. That's exactly when comparing the GL to the bank statement surfaces timing differences and errors like duplicate deposits."}, {"q": "Why doesn't the duplicate Coastal Electric deposit mean revenue was overstated?", "options": ["Because duplicate deposits never affect revenue, only cash", "Because the duplicate entry cleared the same invoice twice, which erased the receivable rather than creating new revenue", "Because Coastal Electric's invoice was never actually recorded", "Because sales tax absorbed the difference"], "correct_index": 1, "explanation": "The original invoice already recorded the revenue correctly. The duplicate deposit just applied a second cash receipt against the same invoice, wiping out the receivable balance incorrectly — the fix reinstates AR, it doesn't touch revenue."}]}, {"type": "journal_entry_builder", "title": "Post January's depreciation entry", "scenarioHtml": "<p>Step 12 of the close is updating fixed assets and depreciation. Skarion's fixed asset schedule covers 10 assets — CNC brake press, laser cutter, forklift, delivery van, air compressor system, office furniture, computers, QA testing station, warehouse pallet racking, and a label printer/packaging line. Combined, January's straight-line monthly depreciation across all 10 assets totals <strong>$5,208.10</strong>. Post the adjusting entry.</p>", "startRows": 2, "accounts": ["6700 Depreciation Expense", "1590 Accumulated Depreciation", "1000 Operating Checking", "6800 Interest Expense", "2300 Accrued Interest Payable"], "solution": [{"account": "6700 Depreciation Expense", "side": "debit", "amount": 5208.1}, {"account": "1590 Accumulated Depreciation", "side": "credit", "amount": 5208.1}]}, {"type": "exercise", "title": "Run Skarion's month-end close checklist", "instructionsHtml": "<p>Download the Month-End Close Playbook below. Using the 18-row sample checklist (C-01 through C-18) as your template, complete a close checklist for Skarion's January close:</p><ol><li>For each of the 18 tasks, mark a status (Not Started, In Progress, Waiting, Complete, or Reviewed) as if you were the staff accountant running this close.</li><li>For the bank reconciliation task (C-06), note the real result: adjusted book and bank balances both equal $217,334.09, driven mainly by the $9,503.60 duplicate Coastal Electric deposit.</li><li>For the fixed assets task (C-12), note the depreciation entry: $5,208.10 across 10 assets.</li><li>Identify which tasks would move faster under a soft close versus which absolutely require a hard close.</li></ol><p>Then write a one-page <strong>January Financial Summary memo</strong> for the CEO — the same deliverable Skarion's staff accountant would submit on Day 5. Cover: net sales, gross profit and margin, ending AR and AP, the bank reconciliation result, and any issues you'd flag for follow-up.</p>", "files": [{"label": "Month-End Close Playbook.docx", "href": "/download/09-month-end-close/Month_End_Close_Playbook.docx"}], "reflectionPrompt": "Write your January Financial Summary memo for the CEO: what were the headline numbers, what went wrong during the close, and what would you fix before February?"}], "slug": "09-month-end-close"}];</script>
<script>/* Minimal SCORM 1.2 wrapper. Finds the LMS API in a parent/opener window (standard SCORM
   discovery algorithm); no-ops safely when run standalone outside an LMS (e.g. local preview). */
(function (global) {
  "use strict";

  function findAPI(win) {
    var attempts = 0;
    while (win && !win.API && win.parent && win.parent !== win && attempts < 10) {
      win = win.parent;
      attempts++;
    }
    return win && win.API ? win.API : null;
  }

  function locateAPI() {
    var api = findAPI(window);
    if (!api && window.opener) api = findAPI(window.opener);
    return api;
  }

  var SCORM = {
    api: null,
    initialized: false,
    standalone: true,

    init: function () {
      this.api = locateAPI();
      if (this.api) {
        var ok = this.api.LMSInitialize("");
        this.initialized = ok === "true" || ok === true;
        this.standalone = !this.initialized;
      } else {
        this.standalone = true;
      }
      return this.initialized;
    },

    setValue: function (key, value) {
      if (this.initialized && this.api) this.api.LMSSetValue(key, String(value));
    },

    getValue: function (key) {
      if (this.initialized && this.api) return this.api.LMSGetValue(key);
      return "";
    },

    commit: function () {
      if (this.initialized && this.api) this.api.LMSCommit("");
    },

    setProgress: function (fraction) {
      // SCORM 1.2 has no native progress-measure field; store it as a suspend_data breadcrumb.
      this.setValue("cmi.core.lesson_location", String(Math.round(fraction * 100)));
      this.commit();
    },

    recordScore: function (raw, max) {
      max = max || 100;
      this.setValue("cmi.core.score.raw", raw);
      this.setValue("cmi.core.score.min", 0);
      this.setValue("cmi.core.score.max", max);
      this.commit();
    },

    complete: function (passed) {
      this.setValue("cmi.core.lesson_status", passed === false ? "failed" : "completed");
      this.commit();
    },

    finish: function () {
      if (this.initialized && this.api) {
        this.commit();
        this.api.LMSFinish("");
      }
    },
  };

  global.SkarionSCORM = SCORM;
})(window);
</script>
<script>/* Skarion Course Engine — master lesson player.

(function () {
  "use strict";

  var state = { mod: 0, current: 0, quizScores: {}, jeSolved: {} };
  var chunks = []; // {id, el, dotEl, kind, requiresAction}
  var CATALOG = window.COURSE_CATALOG || [];
  var LESSON = null;

  function $(sel, root) { return (root || document).querySelector(sel); }
  function $all(sel, root) { return Array.from((root || document).querySelectorAll(sel)); }

  function init() {
    window.SkarionSCORM.init();
    buildSidebar();
    loadModule(0);
    window.addEventListener("keydown", function (e) {
      if (e.target.tagName === "TEXTAREA" || e.target.tagName === "SELECT" || e.target.tagName === "INPUT") return;
      if (e.key === "ArrowRight") next();
      if (e.key === "ArrowLeft") prev();
    });
  }

  function buildSidebar() {
    var nav = $("#sidebar-nav");
    nav.innerHTML = "";
    CATALOG.forEach(function(mod, modIdx) {
      var modEl = document.createElement("div");
      modEl.className = "sb-mod";
      modEl.dataset.idx = modIdx;
      
      var title = document.createElement("div");
      title.className = "sb-mod-title";
      title.innerHTML = "<span>" + esc(mod.title) + "</span>";
      title.addEventListener("click", function() { loadModule(modIdx); });
      modEl.appendChild(title);
      
      var chunkList = document.createElement("ul");
      chunkList.className = "sb-chunks";
      
      var introLi = document.createElement("li");
      introLi.className = "sb-chunk";
      introLi.textContent = "Start";
      introLi.addEventListener("click", function() { if (state.mod !== modIdx) loadModule(modIdx); goTo(0); });
      chunkList.appendChild(introLi);
      
      mod.chunks.forEach(function(c, cIdx) {
        var li = document.createElement("li");
        li.className = "sb-chunk";
        li.textContent = shortLabel(c.title, cIdx + 1);
        li.addEventListener("click", function() { if (state.mod !== modIdx) loadModule(modIdx); goTo(cIdx + 1); });
        chunkList.appendChild(li);
      });
      
      modEl.appendChild(chunkList);
      nav.appendChild(modEl);
    });
  }

  function updateSidebarUI() {
    $all(".sb-mod").forEach(function(el, i) {
      el.classList.toggle("active", i === state.mod);
      var cEls = $all(".sb-chunk", el);
      cEls.forEach(function(cEl, ci) {
        cEl.classList.toggle("active", i === state.mod && ci === state.current);
      });
    });
  }

  function loadModule(modIdx) {
    if (modIdx < 0 || modIdx >= CATALOG.length) return;
    state.mod = modIdx;
    state.current = 0;
    LESSON = CATALOG[modIdx];
    
    // reset module-level tracking
    chunks = [];
    $("#stage-inner").innerHTML = "";
    $("#chunk-rail").innerHTML = "";
    
    $("#module-tag").textContent = LESSON.moduleTag || "Module " + (modIdx + 1);
    $("#module-title").textContent = LESSON.title;

    var rail = $("#chunk-rail");
    var stage = $("#stage-inner");

    chunks.push(makeScreen("intro", "Start", renderIntro(), false));
    LESSON.chunks.forEach(function (c, i) {
      var requiresAction = c.type === "quiz" || c.type === "journal_entry_builder";
      chunks.push(makeScreen("c" + i, c.railLabel || shortLabel(c.title, i + 1), renderChunk(c, i), requiresAction));
    });
    chunks.push(makeScreen("done", "Done", renderComplete(), false));

    chunks.forEach(function (ch) {
      stage.appendChild(ch.el);
      rail.appendChild(ch.dotEl);
    });

    goTo(0);
  }

  function shortLabel(title, n) {
    if (!title) return "Step " + n;
    return title.length > 18 ? title.slice(0, 16) + "…" : title;
  }

  function makeScreen(id, railLabel, innerHtml, requiresAction) {
    var el = document.createElement("div");
    el.className = "screen";
    el.dataset.id = id;
    el.innerHTML = innerHtml;

    var dot = document.createElement("button");
    dot.className = "chunk-dot";
    dot.textContent = railLabel;
    dot.addEventListener("click", function () { goTo(chunks.findIndex(function (c) { return c.id === id; })); });

    return { id: id, el: el, dotEl: dot, requiresAction: requiresAction, satisfied: !requiresAction };
  }

  function renderIntro() {
    var L = LESSON;
    return (
      '<div class="hero-eyebrow">' + esc(L.moduleTag || "") + " · " + esc(L.dayMapping || "") + '</div>' +
      '<h1 class="hero-title">' + esc(L.title) + "</h1>" +
      '<p class="hero-sub">' + esc(L.subhead) + "</p>" +
      (L.hook ? '<div class="hero-hook">' + esc(L.hook) + "</div>" : "")
    );
  }

  function renderComplete() {
    return (
      '<div class="center-screen">' +
      '<div class="complete-badge">✓</div>' +
      '<h1 class="hero-title" style="text-align:center;">Module complete</h1>' +
      '<p class="hero-sub" style="text-align:center;">' + esc(LESSON.title) + " is done. You can move to the next module.</p>" +
      '<button class="nav-btn primary" style="margin-top:20px;" onclick="SkarionPlayer.nextModule()">Go to next module →</button>' +
      "</div>"
    );
  }

  function renderChunk(c, idx) {
    switch (c.type) {
      case "content": return renderContent(c);
      case "flip_cards": return renderFlipCards(c, idx);
      case "quiz": return renderQuiz(c, idx);
      case "journal_entry_builder": return renderJE(c, idx);
      case "exercise": return renderExercise(c);
      default: return "<p>Unknown chunk type.</p>";
    }
  }

  function renderContent(c) {
    var html = '<div class="chunk-kicker">' + esc(c.kicker || "Learn") + "</div>";
    html += '<h2 class="chunk-title">' + esc(c.title) + "</h2>";
    html += '<div class="prose">' + c.bodyHtml + "</div>";
    if (c.callout) {
      var icons = { tip: "💡", warning: "⚠️", story: "📎", danger: "🚫" };
      html += '<div class="callout ' + c.callout.type + '"><span class="icon">' + (icons[c.callout.type] || "•") + '</span><div>' + c.callout.html + "</div></div>";
    }
    return html;
  }

  function renderFlipCards(c, idx) {
    var html = '<div class="chunk-kicker">Quick check</div><h2 class="chunk-title">' + esc(c.title) + "</h2>";
    if (c.intro) html += '<p class="prose">' + esc(c.intro) + "</p>";
    html += '<div class="flip-grid">';
    c.cards.forEach(function (card, i) {
      html += '<div class="flip-card" onclick="this.classList.toggle(\'flipped\')">' +
        '<div class="flip-inner">' +
        '<div class="flip-face flip-front">' + esc(card.front) + "</div>" +
        '<div class="flip-face flip-back">' + esc(card.back) + "</div>" +
        "</div></div>";
    });
    html += "</div>";
    return html;
  }

  function renderQuiz(c, idx) {
    var html = '<div class="chunk-kicker">Knowledge check</div><h2 class="chunk-title">' + esc(c.title) + "</h2>";
    c.questions.forEach(function (q, qi) {
      html += '<div class="quiz-q" data-qi="' + qi + '">';
      html += '<div class="quiz-q-text">' + (qi + 1) + ". " + esc(q.q) + "</div>";
      html += '<div class="quiz-opts">';
      q.options.forEach(function (opt, oi) {
        html += '<button type="button" class="quiz-opt" onclick="SkarionPlayer.answerQuiz(' + idx + "," + qi + "," + oi + ')">' + esc(opt) + "</button>";
      });
      html += "</div>";
      html += '<div class="quiz-explain" id="explain-' + idx + "-" + qi + '">' + esc(q.explanation || "") + "</div>";
      html += "</div>";
    });
    html += '<div class="quiz-score-banner" id="score-' + idx + '"></div>';
    return html;
  }

  function renderJE(c, idx) {
    var html = '<div class="chunk-kicker">Practice: journal entry</div><h2 class="chunk-title">' + esc(c.title) + "</h2>";
    html += '<div class="je-scenario">' + c.scenarioHtml + "</div>";
    html += '<table class="je-table" id="je-table-' + idx + '"><thead><tr><th style="width:45%">Account</th><th style="width:25%">Debit</th><th style="width:25%">Credit</th><th></th></tr></thead><tbody>';
    var startRows = c.startRows || 2;
    for (var r = 0; r < startRows; r++) html += jeRowHtml(c, idx);
    html += "</tbody></table>";
    html += '<button type="button" class="je-add-row" onclick="SkarionPlayer.addJERow(' + idx + ')">+ Add line</button><br>';
    html += '<button type="button" class="je-check-btn" onclick="SkarionPlayer.checkJE(' + idx + ',' + JSON.stringify(c.solution).replace(/"/g, "&quot;") + ')">Check my entry</button>';
    html += '<div class="je-feedback" id="je-feedback-' + idx + '"></div>';
    return html;
  }

  function jeRowHtml(c, idx) {
    var opts = c.accounts.map(function (a) { return "<option>" + esc(a) + "</option>"; }).join("");
    return '<tr class="je-row"><td><select><option value="">— choose account —</option>' + opts + "</select></td>" +
      '<td><input type="number" step="0.01" placeholder="0.00"></td>' +
      '<td><input type="number" step="0.01" placeholder="0.00"></td>' +
      '<td></td></tr>';
  }

  function renderExercise(c) {
    var html = '<div class="chunk-kicker">Hands-on exercise</div><h2 class="chunk-title">' + esc(c.title) + "</h2>";
    html += '<div class="exercise-card">';
    html += '<div class="prose">' + c.instructionsHtml + "</div>";
    if (c.files && c.files.length) {
      html += '<div class="exercise-files">';
      c.files.forEach(function (f) {
        html += '<a class="file-chip" href="' + esc(f.href) + '" target="_blank" rel="noopener">📄 ' + esc(f.label) + "</a>";
      });
      html += "</div>";
    }
    if (c.reflectionPrompt) {
      html += '<div class="reflection-box"><label class="chunk-kicker" style="margin-top:14px;">' + esc(c.reflectionPrompt) + '</label><textarea placeholder="Type your notes here (saved locally in this browser only)"></textarea></div>';
    }
    html += "</div>";
    return html;
  }

  function esc(s) {
    if (s == null) return "";
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  // ---------- Interaction handlers ----------
  window.SkarionPlayer = {
    answerQuiz: function (chunkIdx, qi, oi) {
      var qDef = LESSON.chunks[chunkIdx].questions[qi];
      var qEl = $('.quiz-q[data-qi="' + qi + '"]', chunks[chunkIdx + 1].el);
      var buttons = $all(".quiz-opt", qEl);
      buttons.forEach(function (b, i) {
        b.disabled = true;
        if (i === qDef.correct_index) b.classList.add("correct");
        else if (i === oi) b.classList.add("incorrect");
      });
      $("#explain-" + chunkIdx + "-" + qi).classList.add("show");

      state.quizScores[chunkIdx] = state.quizScores[chunkIdx] || {};
      state.quizScores[chunkIdx][qi] = oi === qDef.correct_index;

      var total = LESSON.chunks[chunkIdx].questions.length;
      var answered = Object.keys(state.quizScores[chunkIdx]).length;
      if (answered === total) {
        var correct = Object.values(state.quizScores[chunkIdx]).filter(Boolean).length;
        var banner = $("#score-" + chunkIdx);
        banner.textContent = "Score: " + correct + " / " + total + (correct === total ? " — nice work." : " — review the explanations above.");
        banner.classList.add("show");
        chunks[chunkIdx + 1].satisfied = true;
        updateNav();
      }
    },

    addJERow: function (chunkIdx) {
      var c = LESSON.chunks[chunkIdx];
      var tbody = $("#je-table-" + chunkIdx + " tbody");
      var tmp = document.createElement("tbody");
      tmp.innerHTML = jeRowHtml(c, chunkIdx);
      tbody.appendChild(tmp.firstElementChild);
    },

    checkJE: function (chunkIdx, solution) {
      var rows = $all("#je-table-" + chunkIdx + " tbody tr");
      var entries = [];
      rows.forEach(function (r) {
        var sel = r.querySelector("select").value;
        var debit = parseFloat(r.querySelector("td:nth-child(2) input").value) || 0;
        var credit = parseFloat(r.querySelector("td:nth-child(3) input").value) || 0;
        if (sel && (debit || credit)) entries.push({ account: sel, debit: debit, credit: credit });
      });

      var totalDebit = entries.reduce(function (s, e) { return s + e.debit; }, 0);
      var totalCredit = entries.reduce(function (s, e) { return s + e.credit; }, 0);
      var balanced = Math.abs(totalDebit - totalCredit) < 0.01 && totalDebit > 0;

      function matches(sol) {
        return sol.every(function (line) {
          return entries.some(function (e) {
            return e.account === line.account &&
              ((line.side === "debit" && Math.abs(e.debit - line.amount) < 0.01 && e.credit === 0) ||
               (line.side === "credit" && Math.abs(e.credit - line.amount) < 0.01 && e.debit === 0));
          });
        }) && entries.length === sol.length;
      }

      var correct = balanced && matches(solution);
      var fb = $("#je-feedback-" + chunkIdx);
      fb.className = "je-feedback show " + (correct ? "correct" : "incorrect");
      if (correct) {
        fb.innerHTML = "✅ <strong>Correct.</strong> Debits and credits balance ($" + totalDebit.toFixed(2) + ") and the accounts match the expected entry.";
      } else if (!balanced) {
        fb.innerHTML = "⚠️ Debits ($" + totalDebit.toFixed(2) + ") and credits ($" + totalCredit.toFixed(2) + ") don't balance yet. Every journal entry needs total debits = total credits.";
      } else {
        fb.innerHTML = "❌ Debits and credits balance, but the accounts or amounts don't match the expected entry. Re-read the scenario and try again.";
      }
      if (correct) {
        state.jeSolved[chunkIdx] = true;
        chunks[chunkIdx + 1].satisfied = true;
        updateNav();
      }
    },

    nextModule: function() {
      if (state.mod < CATALOG.length - 1) {
        loadModule(state.mod + 1);
      }
    }
  };

  // ---------- Navigation ----------
  function goTo(i) {
    if (i < 0 || i >= chunks.length) return;
    state.current = i;
    chunks.forEach(function (c, idx) { c.el.classList.toggle("active", idx === i); });
    updateRail();
    updateProgress();
    updateNav();
    updateSidebarUI();
    $("#stage").scrollTop = 0;
    
    // Overall progress approximation across modules
    var globalPct = ((state.mod + (i / chunks.length)) / CATALOG.length);
    window.SkarionSCORM.setProgress(globalPct);
    if (state.mod === CATALOG.length - 1 && i === chunks.length - 1) {
      window.SkarionSCORM.complete(true);
    }
  }

  function updateRail() {
    chunks.forEach(function (c, idx) {
      c.dotEl.classList.toggle("active", idx === state.current);
      c.dotEl.classList.toggle("done", idx < state.current);
    });
  }

  function updateProgress() {
    var pct = Math.round((state.current / (chunks.length - 1)) * 100);
    $("#progress-fill").style.width = pct + "%";
    $("#progress-label").textContent = pct + "%";
  }

  function updateNav() {
    var atEnd = state.current === chunks.length - 1;
    var atStart = state.current === 0;
    var cur = chunks[state.current];
    $("#nav-prev").disabled = atStart;
    $("#nav-next").disabled = atEnd || !cur.satisfied;
    if (atEnd) {
      $("#nav-next").textContent = (state.mod === CATALOG.length - 1) ? "Finished Course" : "Done with module";
      $("#nav-next").disabled = (state.mod === CATALOG.length - 1);
    } else {
      $("#nav-next").textContent = (cur.satisfied === false ? "Complete this step to continue" : (state.current === chunks.length - 2 ? "Finish module →" : "Continue →"));
    }
  }

  function next() { if (!$("#nav-next").disabled) { if (state.current === chunks.length - 1) { window.SkarionPlayer.nextModule(); } else { goTo(state.current + 1); } } }
  function prev() { if (!$("#nav-prev").disabled) goTo(state.current - 1); }

  document.addEventListener("DOMContentLoaded", function () {
    init();
    $("#nav-next").addEventListener("click", next);
    $("#nav-prev").addEventListener("click", prev);
  });
})();
</script>
</body>
</html>
