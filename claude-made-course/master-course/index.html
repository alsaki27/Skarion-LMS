l><li><strong>Wire 1 — $215,000</strong> with a note: \"Payment for Invoice SE-2026-004\"</li><li><strong>Wire 2 — $100,000</strong> with no remittance advice and no reference number</li><li><strong>Wire 3 — $89,750</strong> with a note: \"Final payment less $250 wire processing fee\"</li></ul>", "tasks": ["Wire 1: identify the invoice, confirm the payment clears SE-2026-004 exactly, and post Dr Cash $215,000 / Cr AR $215,000.", "Wire 2: no remittance advice — before posting anything, confirm with Southeast Broadband which invoice it applies to and document the chase. Assume it applies to SE-2026-005 (the older open invoice) only after written confirmation.", "Wire 3: confirm the short-pay reason. Wire 3 is 28 days after SE-2026-005's invoice date (inside the Net 30 window but after any early-pay discount period under 2/10 Net 30). State whether the $250 short-pay (a claimed wire processing fee) is valid under the terms, and how to handle it.", "Reconcile all three: total paid vs. total owed. Note the remaining short payment and open a dispute with a documented reason (no valid early-pay discount was earned within the 10-day window).", "Post the journal entries for all three wires, including any discount taken as a contra-revenue or expense as the policy dictates, and the documented short-pay balance remaining in AR."], "submissionPrompt": "Paste your three journal entries, your remittance-advice chase note for Wire 2, your discount-validity conclusion for Wire 3, and the remaining AR short-pay with the dispute documentation you'd file.", "solution": "<p><strong>Wire 1 ($215,000, SE-2026-004):</strong> Dr 1000 Operating Checking $215,000 / Cr 1100 Accounts Receivable $215,000. SE-2026-004 is fully cleared.</p><p><strong>Wire 2 ($100,000, no remittance):</strong> Do NOT post blind. Email the customer: \"We received a $100,000 wire on [date] with no reference — please confirm which invoice it applies to.\" After written confirmation it applies to SE-2026-005: Dr 1000 Cash $100,000 / Cr 1100 AR $100,000 (partial payment against SE-2026-005; remaining $90,000 stays open).</p><p><strong>Wire 3 ($89,750, SE-2026-005 remainder):</strong> Terms are 2/10 Net 30 — the 2% discount is only valid if paid within 10 days of invoice. At 28 days the early-pay discount is <em>not</em> valid, so no discount should be deducted. The $250 short-pay is the customer's <em>claimed wire processing fee</em>, not a contractually earned discount. The full $90,000 remains owed on SE-2026-005; $89,750 was received, so $250 is a short payment.</p><p><strong>Short-pay = $250 (claimed wire fee, not a valid discount).</strong> Post the cash received and document the dispute; do <em>not</em> book a discount: Dr 1000 Cash $89,750 / Cr 1100 AR $89,750. The remaining $250 stays open in the AR subledger with a dispute flag — follow up in writing and request the $250 remittance. A wire fee is the customer's cost unless your contract specifically allows them to pass it on; never silently write off a disputed short payment without manager approval.</p><p><strong>Total reconciled:</strong> $215,000 + $100,000 + $89,750 = $404,750 collected of $405,000 owed; $250 disputed short-pay remains open and documented.</p>"}], "slug": "04-ar-and-billing"}, {"title": "Bank Reconciliation & Cash Posting", "moduleTag": "Module 05", "dayMapping": "Day 5", "subhead": "Why the bank balance and the book balance never match on day one, how cash posting actually clears open AR, and the methodical hunt for the real errors hiding inside the timing differences.", "hook": "\"Walk me through a bank reconciliation.\" After this module your answer is not generic — it names the two-sided method, the $336,250 adjusted balance, and the duplicate deposit you traced and corrected. That is the answer that gets the offer.", "chunks": [{"type": "review_quiz", "title": "Recall check — Modules 01–03 (spaced repetition)", "railLabel": "Review 1-3", "intro": "Before we start Bank Reconciliation, let's make sure AP, payroll, and the accounting cycle are locked in.", "questions": [{"q": "What are the three documents required for a 3-way match?", "options": ["Invoice, check, deposit slip", "Purchase Order, Receiving Report, Vendor Invoice", "Contract, timesheet, payroll register", "Bank statement, GL, trial balance"], "correct_index": 1, "explanation": "PO (authorized), Receiving Report (delivered), and Vendor Invoice (billed) must all agree on quantity, unit price, and total."}, {"q": "Skarion's $79,167 gross payroll has $21,056 of employee withholdings and $6,256 of employer taxes. What is the net pay credit to Cash?", "options": ["$79,167", "$58,895", "$58,111", "$73,167"], "correct_index": 2, "explanation": "$79,167 gross − $21,056 withheld = $58,111 net pay. Employer taxes are a separate debit to expense, not taken out of the employee's gross."}, {"q": "What is the journal entry to accrue $14,800 of offshore drafting labor at month-end (invoice not yet received)?", "options": ["Dr Accounts Payable / Cr Cash", "Dr COGS — Subcontractor Drafting / Cr Accrued Liabilities", "Dr Prepaid Software / Cr Cash", "No entry until the invoice arrives"], "correct_index": 1, "explanation": "Expense belongs in the period incurred: Dr COGS $14,800 / Cr Accrued Liabilities $14,800. Reverse on the first day of the next period."}, {"q": "What is the difference between Accounts Payable and Accrued Liabilities?", "options": ["They are the same account", "AP is backed by a vendor invoice; accruals are for incurred-but-unbilled amounts", "AP is an asset; accruals are expenses", "Accruals only apply to payroll"], "correct_index": 1, "explanation": "AP is a documented vendor obligation (you have the invoice). Accrued liabilities are estimated obligations where the invoice has not yet arrived."}, {"q": "Where on the balance sheet does Accounts Receivable appear?", "options": ["Current Liabilities", "Long-term Assets", "Current Assets", "Equity"], "correct_index": 2, "explanation": "AR is a current asset — expected to convert to cash within one year (within terms, typically 30–45 days)."}, {"q": "A vendor invoices at $42.00/mile. Your PO and MSA rate were $38.50/mile. What do you do?", "options": ["Pay it and adjust the MSA later", "Hold it, document the discrepancy, and request a credit memo", "Split the difference and pay $40.25", "Pay the PO price and ignore the invoice"], "correct_index": 1, "explanation": "Never pay through a failed match. Hold the invoice, contact the vendor, document, and request a credit memo for the variance."}, {"q": "What account is debited when you record employer FICA tax expense?", "options": ["6000 Salaries — US Engineering PMs", "6100 Payroll Tax Expense", "2200 Payroll Tax Liabilities", "1000 Operating Checking"], "correct_index": 1, "explanation": "Employer taxes are the company's own expense — Dr 6100 Payroll Tax Expense. 2200 is the liability side (credit), to be remitted later."}, {"q": "How does a payroll entry affect the accounting equation (Assets = Liabilities + Equity)?", "options": ["Assets up, Liabilities up", "Assets down, Liabilities up, Equity down (expense recognized)", "Assets up, Equity up", "No effect — payroll is below the line"], "correct_index": 1, "explanation": "Cash (asset) is credited down, withheld amounts create/raise liabilities, and the salary expense reduces equity through net income. The equation still balances exactly."}]}, {"type": "video", "kicker": "Chunk 35 — Watch first", "title": "How Bank Reconciliation Actually Works — The Two-Sided Method", "railLabel": "Video: Bank rec", "intro": "'Walk me through a bank reconciliation' is the most common technical question in entry-level accounting interviews. After this, you'll have a real answer with a real dollar amount.", "transcript": "<p><strong>0:00 —</strong> \"Walk me through a bank reconciliation.\" This is the most common technical question in entry-level accounting interviews. After this video, you will have a real answer with a real dollar amount — not a textbook definition.</p><p><strong>0:30 —</strong> A bank reconciliation proves your books and the bank's records show the same true cash balance, after accounting for timing differences. The bank doesn't know about the check you wrote yesterday. Your books don't know about the $18.50 of interest the bank credited this morning. These are not errors — they are expected.</p><p><strong>1:30 —</strong> The method, both directions. Bank side: start with the ending balance, add deposits in transit, subtract outstanding checks, that's the adjusted bank balance. Book side: start with the GL balance, add bank credits not yet recorded, subtract bank fees not yet recorded, that's the adjusted book balance. These two adjusted numbers must be identical. If they aren't, there is a real error — and finding it is the job.</p><p><strong>3:00 —</strong> In Skarion's January reconciliation, the bank showed $312,450 and the books showed $346,823.60. Four items were timing differences, and one was a real error: a $10,547.10 customer deposit had been entered twice in the GL. The correcting entry: debit Accounts Receivable, credit Cash. The reconciliation then balanced to exactly $336,250.</p><p><strong>4:00 —</strong> Notice we did not debit Sales Revenue — the sale was never overstated. We only debit AR, because the cash side was overstated. Details like that make an interviewer actually believe you.</p><p><strong>4:30 —</strong> In the lab, you will reconcile three months of Skarion's bank statements. Each one has a seeded error. Find it, fix it, document it.</p>"}, {"type": "content", "kicker": "The concept", "title": "Why the bank balance and the book balance almost never match — and shouldn't", "bodyHtml": "<p>At any given moment, your books and the bank's records are usually out of sync — and that is <em>normal</em>. The differences are <strong>timing differences</strong>, not errors:</p><ul><li><strong>Deposits in transit</strong> — you recorded a customer payment, but it has not hit the bank yet.</li><li><strong>Outstanding checks</strong> — you wrote and recorded a check, but the vendor hasn't cashed it yet.</li><li><strong>Bank fees and interest credits</strong> — the bank moved money you haven't booked yet.</li></ul><p>The job of reconciliation is to prove that, once you adjust for timing, the <strong>adjusted bank balance</strong> and the <strong>adjusted book balance</strong> are <em>exactly</em> equal. If they are not equal after timing adjustments, there is a <em>real</em> error — a duplicate, a transposition, a missing transaction — and you do not touch the books until you find it.</p><p><strong>Skarion January scenario:</strong> the bank statement shows $312,450 and the GL shows $301,848. The $10,602 gap is not one thing — it is four timing differences plus one real error. Reconciliation is how you separate the innocent timing from the actual mistake.</p>"}, {"type": "content", "kicker": "The method", "title": "The two-sided reconciliation", "bodyHtml": "<p>Every reconciliation works from both directions and they have to meet in the middle:</p><table class='data'><tr><th>From the bank side</th><th>From the book side</th></tr><tr><td>Ending balance per bank statement</td><td>Ending balance per your ledger (GL)</td></tr><tr><td>+ Deposits in transit</td><td>+ Bank credits not yet recorded (interest, etc.)</td></tr><tr><td>− Outstanding checks</td><td>− Bank debits not yet recorded (fees, NSF, etc.)</td></tr><tr><td>− Real errors found on the bank side</td><td>− Real errors found on the book side (duplicate deposits, transpositions)</td></tr><tr><td>= <strong>Adjusted bank balance</strong></td><td>= <strong>Adjusted book balance</strong></td></tr></table><p><strong>The required result:</strong> adjusted bank balance = adjusted book balance — always, exactly, to the cent. If they do not equal after all timing adjustments are applied, there is a mistake still on the table. Find it <em>before</em> you post a single correcting entry.</p>", "callout": {"type": "warning", "html": "<strong>Never force the books to match the bank.</strong> Changing a GL number to equal the bank statement is how errors get buried and fraud gets hidden. The whole point is to <em>explain</em> every cent of the difference, not erase it."}}, {"type": "content", "kicker": "Cash posting", "title": "Applying client payments to open AR", "bodyHtml": "<p>Cash posting is the act of matching incoming cash receipts to <em>specific</em> open AR invoices and clearing them in the subledger. It is not automatic — clients pay late, partially, combine multiple invoices in one wire, or deduct disputed amounts without telling you.</p><p><strong>The cash posting workflow:</strong></p><ol><li><strong>Receive bank notification</strong> of the incoming wire (e.g. $480,000 from Atlantic Fiber Co.).</li><li><strong>Open the AR subledger</strong> and identify the open invoice(s) that match the remittance.</li><li><strong>Confirm remittance advice</strong> from the client — chase it if they didn't send one. Never guess which invoice a payment belongs to.</li><li><strong>Post the receipt</strong>: Debit Cash / Credit AR — and close the specific invoice in the subledger so it stops aging.</li><li><strong>If the amount doesn't exactly match:</strong> document the short payment, open a dispute ticket, or credit the difference with manager approval. Never silently write off the gap.</li></ol>"}, {"type": "journal_entry_builder", "kicker": "Skarion JE builder — wire + bank fee", "title": "Post a customer wire with an incoming wire fee", "railLabel": "JE: wire receipt", "scenarioHtml": "<p>Atlantic Fiber Co. wires <strong>$480,000</strong> to settle their open HLD invoice. The bank charges a <strong>$25</strong> incoming wire fee, so the net deposit posted to Operating Checking is <strong>$479,975</strong>. Record the cash in, the fee to expense, and the clearance of the full $480,000 receivable.</p>", "startRows": 3, "accounts": ["1000 - Operating Checking", "1100 - Accounts Receivable", "2500 - Deferred Revenue", "6900 - Bank Fees Expense", "6800 - Interest Expense"], "solution": [{"account": "1000 - Operating Checking", "side": "debit", "amount": 479975.0}, {"account": "6900 - Bank Fees Expense", "side": "debit", "amount": 25.0}, {"account": "1100 - Accounts Receivable", "side": "credit", "amount": 480000.0}]}, {"type": "journal_entry_builder", "kicker": "Skarion JE builder — partial payment", "title": "Apply a partial / disputed payment", "railLabel": "JE: partial pay", "scenarioHtml": "<p>Southeast Broadband wires only <strong>$190,000</strong> of their $405,000 balance with a note that the remainder is \"in dispute.\" Apply the cash to their oldest invoice and clear that much of the receivable. The disputed remainder stays open in the AR subledger with a dispute flag — it is not written off.</p>", "startRows": 2, "accounts": ["1000 - Operating Checking", "1100 - Accounts Receivable", "1200 - Allowance for Doubtful Accounts", "4000 - Engineering Design Revenue"], "solution": [{"account": "1000 - Operating Checking", "side": "debit", "amount": 190000.0}, {"account": "1100 - Accounts Receivable", "side": "credit", "amount": 190000.0}]}, {"type": "journal_entry_builder", "kicker": "Skarion JE builder — NSF check", "title": "A customer check bounces — reinstate the receivable", "railLabel": "JE: NSF", "scenarioHtml": "<p>TeleCom Builders sends a <strong>$50,000</strong> check, which is recorded in the books. The check bounces. The bank reverses the $50,000 deposit and charges a <strong>$35</strong> NSF fee. Reinstate the receivable (the customer owes us again) and record the fee the bank charged us.</p>", "startRows": 3, "accounts": ["1000 - Operating Checking", "1100 - Accounts Receivable", "6900 - Bank Fees Expense", "2500 - Deferred Revenue"], "solution": [{"account": "1100 - Accounts Receivable", "side": "debit", "amount": 50000.0}, {"account": "6900 - Bank Fees Expense", "side": "debit", "amount": 35.0}, {"account": "1000 - Operating Checking", "side": "credit", "amount": 50035.0}]}, {"type": "flip_cards", "kicker": "Know them cold", "title": "The six most common reconciliation problems", "railLabel": "Flip cards", "cards": [{"front": "Duplicate deposit", "back": "The same customer payment is entered in the GL twice. Fix: Debit Accounts Receivable / Credit Cash to reverse the duplicate and reinstate the receivable. Skarion found DEP-0091 ($10,547.10) duplicated."}, {"front": "Outstanding check", "back": "A check written and recorded in the books that the vendor hasn't cashed yet. Subtract it from the bank side — it simply hasn't cleared. Skarion: check #2847 to Global CAD for $4,200."}, {"front": "Amount transposition", "back": "The book entry doesn't match what cleared. Rent recorded as $12,750 but the check cleared at $12,800 — a $50 correcting entry is required on the book side."}, {"front": "Bank fee not recorded", "back": "A monthly service charge, wire fee, or NSF fee hit the bank but was never entered in the books. Book it on the book side: Debit Bank Fees / Credit Cash."}, {"front": "Deposit in transit", "back": "A last-day deposit recorded in the books that has not posted to the bank statement yet. Add it to the bank side — it will appear next month."}, {"front": "Fraudulent transaction", "back": "An unauthorized ACH debit. Flag immediately, file a bank dispute within the allowed window, and post Debit Due from Bank (or AR) / Credit Cash while the investigation runs."}]}, {"type": "content", "kicker": "The worked example", "title": "Skarion January reconciliation — finding the real error", "bodyHtml": "<p>Here is the actual January reconciliation, worked both directions. This is the example you'll reference in interviews.</p><p><strong>Bank side:</strong></p><table class='data'><tr><th>Bank side</th><th>Amount</th></tr><tr><td>Bank statement ending balance</td><td>$312,450.00</td></tr><tr><td>+ Deposits in transit (Dec 31 receipt)</td><td>+$28,000.00</td></tr><tr><td>− Outstanding check #2847 (Global CAD)</td><td>−$4,200.00</td></tr><tr><td>= Adjusted bank balance</td><td><strong>$336,250.00</strong></td></tr></table><p><strong>Book side:</strong></p><table class='data'><tr><th>Book side</th><th>Amount</th></tr><tr><td>GL balance</td><td>$346,823.60</td></tr><tr><td>− Unrecorded bank fee</td><td>−$45.00</td></tr><tr><td>+ Unrecorded interest</td><td>+$18.50</td></tr><tr><td>− Duplicate deposit (DEP-0091, Southeast Broadband)</td><td>−$10,547.10</td></tr><tr><td>= Adjusted book balance</td><td><strong>$336,250.00</strong> ✓</td></tr></table><p>Both sides meet at <strong>$336,250.00</strong> — exactly. The duplicate deposit was the real error hiding inside the timing differences. Now post three correcting entries on the book side.</p>"}, {"type": "journal_entry_builder", "kicker": "Correcting entry — duplicate", "title": "Correct the DEP-0091 duplicate deposit", "railLabel": "JE: dup deposit", "scenarioHtml": "<p>Customer deposit <strong>DEP-0091</strong> ($10,547.10 from Southeast Broadband) was entered twice in the GL. Reverse the duplicate and reinstate the receivable — revenue was never overstated, only cash and AR were.</p>", "startRows": 2, "accounts": ["1000 - Operating Checking", "1100 - Accounts Receivable", "4000 - Engineering Design Revenue", "6900 - Bank Fees Expense"], "solution": [{"account": "1100 - Accounts Receivable", "side": "debit", "amount": 10547.1}, {"account": "1000 - Operating Checking", "side": "credit", "amount": 10547.1}]}, {"type": "journal_entry_builder", "kicker": "Correcting entry — bank fee", "title": "Book the unrecorded monthly bank fee", "railLabel": "JE: bank fee", "scenarioHtml": "<p>The bank charged a <strong>$45.00</strong> monthly service fee that was never entered in the books. Record the expense and the corresponding reduction in cash.</p>", "startRows": 2, "accounts": ["1000 - Operating Checking", "6900 - Bank Fees Expense", "6800 - Interest Expense", "1100 - Accounts Receivable"], "solution": [{"account": "6900 - Bank Fees Expense", "side": "debit", "amount": 45.0}, {"account": "1000 - Operating Checking", "side": "credit", "amount": 45.0}]}, {"type": "journal_entry_builder", "kicker": "Correcting entry — interest", "title": "Book the unrecorded interest credit", "railLabel": "JE: interest", "scenarioHtml": "<p>The bank credited <strong>$18.50</strong> of interest income on the operating account that was never recorded in the books. Cash increases and Interest Income is recognized.</p>", "startRows": 2, "accounts": ["1000 - Operating Checking", "6900 - Bank Fees Expense", "4300 - Interest Income", "1100 - Accounts Receivable"], "solution": [{"account": "1000 - Operating Checking", "side": "debit", "amount": 18.5}, {"account": "4300 - Interest Income", "side": "credit", "amount": 18.5}]}, {"type": "quiz", "intro": "Four bank-rec questions, the kind that come up in interviews and in the real first month of the job.", "title": "Bank reconciliation quiz", "questions": [{"q": "A client wires $240,000. Your bank charges a $35 incoming wire fee. What is the net debit to Cash (the amount that actually lands in the operating account)?", "options": ["$240,000", "$239,965", "$240,035", "$35"], "correct_index": 1, "explanation": "Net cash landing is $240,000 − $35 = $239,965. The full entry: Debit Cash $239,965, Debit Bank Fees $35, Credit AR $240,000. The gross receivable is cleared; the fee is booked to its own expense line."}, {"q": "A check written to an offshore contractor on January 28th has not cleared by January 31st. Which side of the reconciliation is it on?", "options": ["Add it to the book side", "Subtract it from the bank side as an outstanding check", "Add it to the bank side as a deposit in transit", "Ignore it — it cleared the books already"], "correct_index": 1, "explanation": "It is in your books but not yet on the bank statement — a classic outstanding check. Subtract it from the bank statement balance when computing the adjusted bank balance."}, {"q": "The adjusted bank balance is $336,250 and the adjusted book balance is $336,290. What is true?", "options": ["Reconciliation is complete — close enough", "There is still a $40 unexplained error to find before touching the books", "Post a $40 plug entry to make them equal", "The bank owes you $40"], "correct_index": 1, "explanation": "After all timing adjustments they must be exactly equal. A $40 remaining gap means a real error is still undiscovered — keep tracing source transactions until the gap is fully explained."}, {"q": "Skarion finds a $10,547.10 duplicate deposit in the GL. What is the correcting entry?", "options": ["Debit Cash / Credit AR", "Debit AR / Credit Cash", "Debit Revenue / Credit Cash", "No entry — reverse next month"], "correct_index": 1, "explanation": "The duplicate over-credited Cash and over-credited AR. Reverse it: Debit AR (reinstate the receivable), Credit Cash (remove the duplicate). Revenue was never affected."}]}, {"type": "spreadsheet_lab", "kicker": "Chunk 62 — Live in-browser lab", "title": "Bank Reconciliation Worksheet — January (live Excel)", "railLabel": "Live rec", "scenarioHtml": "<p>Fill in the two-sided reconciliation below directly in the spreadsheet. The shaded <strong>Ending Balance per Bank Statement</strong> and <strong>Ending Balance per GL</strong> cells are given and locked. Enter the deposits in transit, outstanding checks, unrecorded items, and both <strong>adjusted balances</strong>. Then post the two correcting journal entries below the grid. The lab turns green only when both adjusted balances equal <strong>$336,250.00</strong> and the journal entries balance.</p>", "columns": [{"title": "Reconciliation Item", "type": "text", "width": 320, "readOnly": true}, {"title": "Bank Side ($)", "type": "numeric", "width": 130, "mask": "#,##0.00", "readOnly": false}, {"title": "Book Side ($)", "type": "numeric", "width": 130, "mask": "#,##0.00", "readOnly": false}], "data": [["Bank Statement ending balance", 312450.0, null], ["+ Deposits in transit (Dec 31 receipt)", null, null], ["− Outstanding check #2847 (Global CAD)", null, null], ["= Adjusted Bank Balance", null, null], ["", null, null], ["Ending Balance per GL", null, 346823.6], ["+ Unrecorded interest credit", null, null], ["− Unrecorded bank fee", null, null], ["− Duplicate deposit DEP-0091 (SE Broadband)", null, null], ["= Adjusted Book Balance", null, null]], "lockedCells": ["A1", "A2", "A3", "A4", "A6", "A7", "A8", "A9", "A10", "B1", "C6"], "targetCells": {"B4": 336250.0, "C10": 336250.0}, "requireBothSidesEqual": true, "successMessage": "✅ Both sides balance at $336,250.00 — January reconciliation complete. Filed.", "errorMessage": "❌ The two sides don't match $336,250.00 yet. Bank side: +$28,000 deposit in transit − $4,200 outstanding check. Book side: +$18.50 interest − $45 fee − $10,547.10 duplicate.", "journalSection": {"label": "Correcting journal entries (book side)", "rows": 4, "accounts": ["1100 Accounts Receivable", "1000 Operating Checking", "6900 Bank Fees Expense", "4300 Interest Income", "4000 Engineering Design Revenue"], "solution": [{"account": "1100 Accounts Receivable", "side": "debit", "amount": 10547.1}, {"account": "1000 Operating Checking", "side": "credit", "amount": 10547.1}, {"account": "6900 Bank Fees Expense", "side": "debit", "amount": 45.0}, {"account": "1000 Operating Checking", "side": "credit", "amount": 45.0}, {"account": "1000 Operating Checking", "side": "debit", "amount": 18.5}, {"account": "4300 Interest Income", "side": "credit", "amount": 18.5}]}}, {"type": "exercise", "kicker": "Hands-on lab", "title": "Excel bank reconciliation lab — three months", "instructionsHtml": "<p>Download the bank statement workbooks below and the Excel reconciliation template (Template 01). Each statement has a Bank Statement tab, a GL Cash register, and a Reconciliation Worksheet. For each month:</p><ol><li>Match every transaction between the bank statement and the register.</li><li>Identify the seeded problems (duplicates, wrong amounts, outstanding checks, unrecorded fees — January has 4 items to find and 2 correcting entries).</li><li>Complete the two-sided worksheet until the adjusted balances are <strong>exactly $336,250.00</strong> for January.</li></ol><p>Watch the labels — the March worksheet has one duplicate that is a duplicated <em>debit</em>, unlike January's duplicated credit.</p>", "files": [{"label": "January Bank Statement.xlsx", "href": "/download/05-bank-reconciliation-lab/Bank_Statement_2026-01_January.xlsx"}, {"label": "February Bank Statement.xlsx", "href": "/download/05-bank-reconciliation-lab/Bank_Statement_2026-02_February.xlsx"}, {"label": "March Bank Statement.xlsx", "href": "/download/05-bank-reconciliation-lab/Bank_Statement_2026-03_March.xlsx"}, {"label": "Template 01 — Bank Rec Worksheet.xlsx", "href": "/download/07-excel-toolkit/Template_01_Bank_Rec.xlsx"}], "reflectionPrompt": "Write your January reconciliation memo: what were the four items, how did you find the duplicate, and what were your two correcting entries?"}, {"type": "scenario_lab", "title": "Scenario Lab — The NSF Check That Started a Collections Problem", "railLabel": "Lab: NSF", "time": "45 min", "intro": "A customer's $50,000 check bounces, then the customer goes silent. Reinstate the receivable, rethink the bad-debt allowance, write the collections memo, and post the eventual partial-recovery entry.", "setup": "<p>TeleCom Builders sent a <strong>$50,000</strong> check in March, which the bank deposited and a bookkeeper applied to invoice <strong>TC-2026-011</strong>. Two weeks later the bank reverses the deposit — <strong>NSF</strong> — and charges a <strong>$35</strong> NSF fee. TeleCom Builders has gone silent. After this reversal, TeleCom's full open AR is <strong>$162,700</strong> across three invoices.</p>", "tasks": ["Post the NSF reversal: reinstate the $50,000 receivable and record the $35 fee the bank charged (Dr AR $50,000 + Dr Bank Fees $35 / Cr Cash $50,035).", "Review TeleCom's full AR aging ($162,700 across 3 invoices) and decide whether the bad-debt allowance should be increased. With a silent customer and $162,700 outstanding, justify a higher estimate (e.g. raise the allowance to target ~30% of the TeleCom balance).", "Post the adjusted allowance entry — increase Bad Debt Expense and Allowance for Doubtful Accounts to cover the now riskier TeleCom balance.", "Write the collections memo: the ordered steps you would take (dunning letter → account-manager call → formal demand → consider collection agency / write-off).", "Six months later TeleCom pays an $80,000 settlement. Post the recovery (reverse the relevant portion of the write-off) and the write-off of any remaining uncollectible balance."], "submissionPrompt": "Paste the NSF reversal entry, your adjusted allowance entry with the new % and dollar figure, your collections memo, and the eventual settlement recovery + write-off entries.", "solution": "<p><strong>1. NSF reversal:</strong> Dr 1100 Accounts Receivable $50,000 + Dr 6900 Bank Fees Expense $35 / Cr 1000 Operating Checking $50,035. TeleCom owes the $50,000 again.</p><p><strong>2. Allowance review:</strong> TeleCom is silent with $162,700 outstanding — well past 90 days. Estimate ~30% now uncollectible on TeleCom = $48,810. If the current TeleCom allowance is less than that, top it up.</p><p><strong>3. Adjusted allowance entry</strong> (assume prior TeleCom-targeted allowance was ~$14,965 general; increase to $48,810 TeleCom-specific): Dr 6720 Bad Debt Expense $33,845 (= $48,810 − $14,965) / Cr 1200 Allowance for Doubtful Accounts $33,845. Document the basis: NSF event + customer silence + aging.</p><p><strong>4. Collections memo:</strong> (a) Send formal dunning letter citing invoice numbers and the NSF date, demanding payment within 10 business days; (b) Account manager calls TeleCom's AP directly, logs the call; (c) If no response in 15 days, send formal demand letter and place the account on credit hold; (d) After 30 days with no payment plan, engage a collection agency or write off the remaining balance with controller approval. Document every step with date stamps.</p><p><strong>5. Settlement recovery:</strong> Assume the full $162,700 was previously written off. First reverse the $80,000 portion being recovered: Dr 1100 AR $80,000 / Cr 1200 Allowance for Doubtful Accounts $80,000 (this reinstates the receivable for the amount that will actually be collected). Then record the cash receipt: Dr 1000 Cash $80,000 / Cr 1100 AR $80,000 (clear the reinstated invoice). The net effect of the two entries is Dr Cash $80,000 / Cr Allowance $80,000 — the recovery flows back through the allowance (matching principle), not through revenue. The remaining $82,700 stays written off against the allowance and is never recovered.</p>"}], "slug": "05-bank-reconciliation-lab"}, {"title": "Month-End Close & Financial Statements", "moduleTag": "Module 06", "dayMapping": "Day 6", "subhead": "The five-day close calendar that turns a month of transactions into auditable financial statements, the adjusting entries that make accruals honest, and the three statements that roll up the result.", "hook": "\"Walk me through a month-end close.\" The interview answer is the five-day timeline, the four types of adjusting entries, and the $242,000 January net income that comes out the other side. This module is that entire walkthrough.", "chunks": [{"type": "review_quiz", "title": "Recall check — Modules 01–04 (spaced repetition)", "railLabel": "Review 1-4", "intro": "Before we start Month-End Close, let's make sure AR, billing, and the earlier modules are locked in.", "questions": [{"q": "Under ASC 606, which of the 5 steps triggers revenue recognition?", "options": ["Identify the contract", "Identify distinct performance obligations", "Determine the transaction price", "Recognize revenue when/as each obligation is satisfied"], "correct_index": 3, "explanation": "Revenue is recognized at step 5 — when (or as) each distinct performance obligation is satisfied. The contract and price steps set it up; satisfaction books it."}, {"q": "A client prepays $120,000 before work begins. What is credited?", "options": ["Engineering Design Revenue", "Accounts Receivable", "Deferred Revenue (a liability)", "Unbilled AR (WIP)"], "correct_index": 2, "explanation": "Cash received before the obligation is satisfied is a liability — Deferred Revenue. It becomes revenue only when the work is delivered."}, {"q": "Skarion writes off TeleCom Builders' $112,700 balance. What is the journal entry?", "options": ["Dr Bad Debt Expense / Cr AR", "Dr Allowance for Doubtful Accounts / Cr Accounts Receivable", "Dr Allowance / Cr Bad Debt Expense", "Dr AR / Cr Cash"], "correct_index": 1, "explanation": "Write-off goes against the existing allowance: Dr Allowance / Cr AR. Bad Debt Expense was already recorded when the allowance was established — it is not touched at write-off."}, {"q": "What is Days Sales Outstanding (DSO) and how is it calculated?", "options": ["Average AR ÷ Credit Revenue × Days", "Net Income ÷ Revenue × Days", "COGS ÷ Revenue × 365", "Cash ÷ Revenue × 365"], "correct_index": 0, "explanation": "DSO = Average AR ÷ Credit Revenue × Days. Skarion: $997,700 ÷ $4.8M × 365 ≈ 75.8 days. Lower is better; controllers watch it month over month."}, {"q": "What is the difference between Unbilled AR (WIP) and regular AR?", "options": ["They are the same account", "WIP is work performed but not yet billable; AR is invoiced and awaiting payment", "WIP is a liability; AR is an asset", "Regular AR relates to completed contracts only"], "correct_index": 1, "explanation": "WIP/Unbilled AR captures value created before a billing milestone triggers (percentage-of-completion). Regular AR is an invoice already cut and awaiting cash."}, {"q": "What is the allowance for doubtful accounts and why is it required by GAAP?", "options": ["A cash reserve set aside for bad customers", "A contra-asset estimating uncollectible AR in the period of sale (matching principle)", "An expense recorded only when an invoice defaults", "A liability for disputed invoices"], "correct_index": 1, "explanation": "The allowance is a contra-asset that reduces net AR. GAAP requires estimating uncollectible AR in the period the sale is made — the matching principle."}, {"q": "A customer pays $190,000 of a $405,000 balance and disputes the rest. What do you record?", "options": ["Write off the entire $405,000", "Dr Cash $190,000 / Cr AR $190,000; leave $215,000 open with a dispute flag (no write-off)", "Dr Cash $190,000 / Cr Revenue $190,000", "Hold the $190,000 in a suspense account until the dispute is resolved"], "correct_index": 1, "explanation": "Apply the cash to the oldest invoice and document the dispute on the remainder — never silently write off a disputed balance. The remaining $215,000 stays open in the subledger."}, {"q": "What is the two-sided bank reconciliation method?", "options": ["Match the bank to the GL line by line and post the difference", "Adjusted bank balance = statement + deposits in transit − outstanding checks must equal adjusted book balance = GL + credits − debits not recorded", "Force the GL to equal the bank statement", "Only reconcile assets, not liabilities"], "correct_index": 1, "explanation": "Both sides adjust for timing, then must meet exactly. Adjusted bank = statement + deposits in transit − outstanding checks; adjusted book = GL + unrecorded credits − unrecorded debits. Equal, or there's a real error."}]}, {"type": "video", "kicker": "Chunk 36 — Watch first", "title": "What Happens During Month-End Close — A Real Close, Step by Step", "railLabel": "Video: Close", "intro": "Month-end close is when accounting stops being data entry and becomes a high-stakes deadline operation. Everything in the right order, on the right day, nothing skipped.", "transcript": "<p><strong>0:00 —</strong> Month-end close is when accounting stops being an ongoing data-entry job and becomes a high-stakes deadline operation. Everything has to be done in the right order, on the right day, and nothing can be skipped.</p><p><strong>0:30 —</strong> Here is Skarion's five-day close schedule. Day one: lock all timesheets and AP — any invoice not entered by 5 PM goes into next month. Day two: post payroll, employer taxes, and all offshore contractor accruals. Day three: calculate WIP, post depreciation, post the loan interest accrual. Day four: bank reconciliation, tie the AR subledger to the GL, tie the AP subledger to the GL. Day five: review the P&amp;L against budget, produce the financial package, get controller sign-off.</p><p><strong>2:00 —</strong> The hardest part for a services firm is the adjusting entries — entries for things that happened but haven't been invoiced yet. Your offshore drafting team worked 400 hours in January. The invoice won't arrive until February 4th. But the expense belongs in January. So on January 31st, you accrue it: debit COGS Subcontractors $14,800, credit Accrued Liabilities $14,800.</p><p><strong>3:00 —</strong> Then on February 1st, you reverse that accrual. When the invoice actually arrives on the 4th, you post it normally. The reversal ensures the expense doesn't get double-counted.</p><p><strong>4:00 —</strong> The close playbook in your course materials lists every entry you need to post during Skarion's January close. Work through it in SkarionBooks — the right order, the right amounts, every one.</p>"}, {"type": "content", "kicker": "Why it exists", "title": "The month-end close process", "bodyHtml": "<p>Month-end close exists because financial statements are produced <em>once per period</em>, and they must be accurate, complete, and timely. Incomplete or wrong statements lead to bad decisions, missed covenants, and audit findings. The close is governed by a <strong>close checklist</strong> in which every task has an owner, a due date, a status, and supporting documentation.</p><p>The discipline that makes a close work: lock the prior period once it is closed so late entries can't silently change history, and tie every subledger (AR, AP, payroll) back to the GL control account before you declare the period done.</p>", "callout": {"type": "tip", "html": "<strong>Hard close vs. soft close.</strong> A <em>hard close</em> locks the period permanently — no further entries except through a formal adjustment in the next period. A <em>soft close</em> leaves the period open for corrections up to the audit, usually for recurring accrual estimates. Public companies essentially always hard-close; private mid-size firms like Skarion typically soft-close then hard-close at year-end."}}, {"type": "content", "kicker": "The calendar", "title": "Skarion's 5-day close timeline", "bodyHtml": "<p>This is the actual five-day calendar Skarion runs to close January. Memorize the rhythm — it is what most mid-size services firms look like:</p><table class='data'><tr><th>Day</th><th>Date</th><th>Focus</th></tr><tr><td>Day 1</td><td>Feb 1</td><td>Lock timesheets, lock AP, generate AP aging, post all outstanding invoices.</td></tr><tr><td>Day 2</td><td>Feb 2</td><td>Post payroll entry and employer taxes, book all offshore contractor accruals, amortize prepaids.</td></tr><tr><td>Day 3</td><td>Feb 3</td><td>Calculate WIP, post depreciation, post loan interest accrual, run trial balance.</td></tr><tr><td>Day 4</td><td>Feb 4</td><td>Bank reconciliation, tie AR subledger to GL, tie AP subledger to GL.</td></tr><tr><td>Day 5</td><td>Feb 5</td><td>Review P&amp;L vs. prior month and budget, produce financial statement package, controller sign-off.</td></tr></table><p>Notice the order: cut off the inputs (timesheets, AP, invoices) first, post the accruals and adjustments second, prove the balances tie third, then produce and review statements. You cannot build statements on a trial balance that hasn't been tied.</p>"}, {"type": "timeline", "title": "The 5-day close, step by step", "steps": [{"title": "Day 1 — Lock & post", "desc": "Lock timesheets and AP. Generate the AP aging. Post every outstanding invoice so the period's revenue and liabilities are complete."}, {"title": "Day 2 — People cost", "desc": "Post the payroll entry and employer taxes. Accrue offshore contractor work done but not yet invoiced. Amortize prepaids for the month."}, {"title": "Day 3 — Adjustments", "desc": "Calculate WIP revenue. Post depreciation. Accrue loan interest. Run the unadjusted trial balance."}, {"title": "Day 4 — Tie & reconcile", "desc": "Bank reconciliation. Tie AR subledger total to GL account 1100. Tie AP subledger total to GL account 2000."}, {"title": "Day 5 — Report & sign-off", "desc": "Review P&L vs prior month and budget. Produce the financial statement package. Controller signs off and the period is closed."}]}, {"type": "content", "kicker": "The heart of close", "title": "Adjusting entries — and the four types", "bodyHtml": "<p>Adjusting entries exist because the accrual principle requires recording things that have happened but generated no paperwork yet. They are why the close takes five days instead of one. There are exactly four types:</p><table class='data'><tr><th>Type</th><th>Skarion example</th></tr><tr><td><strong>Accrued Revenues</strong></td><td>Engineers spent 400 hours on an HLD that is 60% complete and not yet billable — book Unbilled AR (WIP) and revenue.</td></tr><tr><td><strong>Accrued Expenses</strong></td><td>Offshore drafting done Jan 31, invoice not arriving until Feb 4 — accrue COGS now.</td></tr><tr><td><strong>Deferred Revenues</strong></td><td>Client prepaid $120,000; deliver the work and release it from Deferred Revenue to earned revenue.</td></tr><tr><td><strong>Deferred Expenses</strong></td><td>$36,000 prepaid Vetro license amortized $3,000/month to Software Expense.</td></tr></table>"}, {"type": "journal_entry_builder", "kicker": "Adjusting entry 1 — accrued expense", "title": "Accrue offshore drafting done but not yet invoiced", "railLabel": "JE: accrue GCS", "scenarioHtml": "<p>Global CAD Solutions finished <strong>$14,800</strong> of drafting on January 31st. The invoice arrives February 4th. Under accrual accounting the expense belongs in January. Accrue it now (reverse it on Feb 1 before the real invoice is entered).</p>", "startRows": 2, "accounts": ["2000 - Accounts Payable", "2400 - Accrued Liabilities", "5100 - COGS — Subcontractor Drafting", "1000 - Operating Checking"], "solution": [{"account": "5100 - COGS — Subcontractor Drafting", "side": "debit", "amount": 14800.0}, {"account": "2400 - Accrued Liabilities", "side": "credit", "amount": 14800.0}]}, {"type": "journal_entry_builder", "kicker": "Adjusting entry 2 — prepaid amortization", "title": "Amortize the Vetro license for January", "railLabel": "JE: amortize", "scenarioHtml": "<p>The <strong>$36,000</strong> Vetro FiberMap license was paid July 1st and recorded as Prepaid Software. 12-month straight-line amortization = <strong>$3,000/month</strong>. Record January's amortization: move $3,000 from the Prepaid asset into Software Expense.</p>", "startRows": 2, "accounts": ["1400 - Prepaid Software Licenses", "6500 - Software & Subscriptions", "5200 - COGS — Software Allocated to Projects", "1000 - Operating Checking"], "solution": [{"account": "6500 - Software & Subscriptions", "side": "debit", "amount": 3000.0}, {"account": "1400 - Prepaid Software Licenses", "side": "credit", "amount": 3000.0}]}, {"type": "journal_entry_builder", "kicker": "Adjusting entry 3 — depreciation", "title": "Post monthly straight-line depreciation", "railLabel": "JE: depreciation", "scenarioHtml": "<p>Skarion capitalizes 5 GIS workstations at <strong>$12,000 each</strong> ($60,000 total), 5-year useful life, $0 salvage. Straight-line depreciation = <strong>$1,000/month total</strong> ($200/month each). Record January's depreciation.</p>", "startRows": 2, "accounts": ["1500 - GIS Servers & Workstations", "1590 - Accumulated Depreciation", "6700 - Depreciation Expense", "1400 - Prepaid Software Licenses"], "solution": [{"account": "6700 - Depreciation Expense", "side": "debit", "amount": 1000.0}, {"account": "1590 - Accumulated Depreciation", "side": "credit", "amount": 1000.0}]}, {"type": "journal_entry_builder", "kicker": "Adjusting entry 4 — loan interest", "title": "Accrue January loan interest", "railLabel": "JE: interest", "scenarioHtml": "<p>Skarion carries a <strong>$500,000</strong> term loan at <strong>6.5%</strong> annual interest. January's accrued interest = $500,000 × 6.5% ÷ 12 = <strong>$2,708.33</strong>. Accrue the interest (it has been incurred even though the cash payment is later).</p>", "startRows": 2, "accounts": ["6800 - Interest Expense", "2300 - Accrued Interest", "1000 - Operating Checking", "2000 - Accounts Payable"], "solution": [{"account": "6800 - Interest Expense", "side": "debit", "amount": 2708.33}, {"account": "2300 - Accrued Interest", "side": "credit", "amount": 2708.33}]}, {"type": "journal_entry_builder", "kicker": "Adjusting entry 5 — WIP revenue", "title": "Recognize unbilled WIP revenue", "railLabel": "JE: WIP", "scenarioHtml": "<p>Engineers spent <strong>400 hours</strong> on an HLD in January at a blended rate of <strong>$85/hr</strong> = $34,000 of work. The HLD is <strong>60% complete</strong> and not yet billable. Under the percentage-of-completion method, recognize the earned-but-unbilled portion: Dr Unbilled AR (WIP) $34,000 / Cr Engineering Design Revenue $34,000.</p>", "startRows": 2, "accounts": ["1200 - Unbilled AR (WIP)", "1100 - Accounts Receivable", "4000 - Engineering Design Revenue", "2500 - Deferred Revenue"], "solution": [{"account": "1200 - Unbilled AR (WIP)", "side": "debit", "amount": 34000.0}, {"account": "4000 - Engineering Design Revenue", "side": "credit", "amount": 34000.0}]}, {"type": "content", "kicker": "The deliverable", "title": "The three core financial statements", "bodyHtml": "<p>Once adjustments are posted and the adjusted trial balance balances, it rolls up into the three statements management actually reads:</p><p><strong>1. Income Statement</strong> — Revenue − COGS − Operating Expenses = Net Income. Skarion January: <strong>$480,000 revenue − $140,000 COGS − $98,000 OpEx = $242,000 Net Income.</strong> This is performance over a period.</p><p><strong>2. Balance Sheet</strong> — Assets = Liabilities + Equity. A snapshot of financial position at a point in time (e.g. January 31). Every adjusting entry from the close flows here: prepaid amortization, depreciation, accruals, WIP.</p><p><strong>3. Cash Flow Statement</strong> — three sections: <em>Operating</em> (cash from running the business), <em>Investing</em> (capex, asset purchases), and <em>Financing</em> (loans, equity, distributions). Critically: <strong>a profitable business can run out of cash</strong> if AR isn't collected. The cash flow statement is where that gap becomes visible.</p><p><strong>Key ratios at month-end:</strong></p><table class='data'><tr><th>Ratio</th><th>Formula</th><th>Skarion Jan</th></tr><tr><td>Gross margin %</td><td>(Revenue − COGS) ÷ Revenue</td><td>($480K − $140K) ÷ $480K = <strong>70.8%</strong></td></tr><tr><td>Operating margin %</td><td>(Revenue − COGS − OpEx) ÷ Revenue</td><td>$242K ÷ $480K = <strong>50.4%</strong></td></tr><tr><td>Current ratio</td><td>Current Assets ÷ Current Liabilities</td><td>cash &amp; AR heavy — liquidity check</td></tr><tr><td>DSO</td><td>Average AR ÷ Credit Revenue × 365</td><td>$997,700 ÷ $4.8M × 365 = <strong>75.8 days</strong></td></tr></table>"}, {"type": "quiz", "intro": "Four close and financial-statement questions, the exact ones that come up in entry-level interviews.", "title": "Month-end close & financial statements quiz", "questions": [{"q": "What is the purpose of a closing entry at year-end?", "options": ["To zero out permanent (Asset/Liability/Equity) accounts", "To close temporary (Revenue/Expense) accounts to Retained Earnings so the new year starts clean", "To delete all transactions from the period", "To prepare tax returns only"], "correct_index": 1, "explanation": "Closing entries reset temporary accounts (Revenue and Expense) to zero by transferring their balances to Retained Earnings. Permanent accounts carry forward; the next period starts with empty revenue/expense accounts."}, {"q": "Skarion's January revenue is $480,000. COGS is $140,000. What is the gross profit margin?", "options": ["29.2%", "50.4%", "70.8%", "242,000"], "correct_index": 2, "explanation": "Gross profit = $480,000 − $140,000 = $340,000. Margin = $340,000 ÷ $480,000 = 70.8%. (50.4% would be operating margin after also subtracting $98,000 OpEx.)"}, {"q": "Which financial statement shows whether the company can pay its bills next month (liquidity)?", "options": ["Income Statement", "Balance Sheet", "Cash Flow Statement", "Trial Balance"], "correct_index": 1, "explanation": "Liquidity is a snapshot question — answered by the Balance Sheet, specifically the Current Assets vs Current Liabilities comparison (the Current Ratio). The income statement is performance over time; the cash flow statement is cash movement."}, {"q": "Skarion is profitable but running low on cash. Which statement reveals why?", "options": ["Income Statement", "Balance Sheet", "Cash Flow Statement", "Statement of Retained Earnings"], "correct_index": 2, "explanation": "The Cash Flow Statement reconciles profit to cash. If cash is falling despite profit, the answer is almost always in Operations — usually uncollected AR (or growing inventory/prepaids). The Cash Flow Statement makes the gap visible."}]}, {"type": "scenario_lab", "title": "Scenario Lab — The Month Where Everything Went Wrong", "railLabel": "Lab: Feb close", "time": "75 min", "intro": "Skarion's February close has seven compounding errors seeded in the data. Find and fix all seven before the trial balance balances.", "setup": "<p>Download the February data workbook below. It contains an <strong>Instructions</strong> tab, a <strong>Raw Data</strong> tab (the unadjusted February trial balance + transactions), a <strong>Candidate Trial Balance</strong> tab, and a <strong>Corrections Log</strong> tab. Seven problems are baked in:</p><ol><li><strong>Payroll understated</strong> — February gross was $82,450 (overtime month) but was posted at $79,167. Understated by $3,283.</li><li><strong>Vetro prepaid amortization skipped</strong> — $3,000 of monthly Software Expense and the corresponding reduction in Prepaid Software never recorded.</li><li><strong>January offshore accrual never reversed</strong> — the $14,800 January accrual was not reversed on Feb 1, so it still sits on the books.</li><li><strong>Cash posted to the wrong customer</strong> — a $215,000 customer wire was credited to Southeast Broadband instead of Atlantic Fiber Co.</li><li><strong>Depreciation typo</strong> — posted at $1,200 instead of the correct $1,000 (a $200 over). Less wrong-direction; still a correction.</li><li><strong>Bank fee unrecorded</strong> — the $45 February monthly bank service charge never hit the books.</li><li><strong>Prepaid insurance forgotten</strong> — a policy paid in January ($1,800/quarter = $600/month) has never been amortized.</li></ol>", "tasks": ["Open the workbook and identify each of the seven problems by tracing Raw Data against expectations.", "Post each correction in the Corrections Log tab with: Problem, Journal Entry, and Dollar Impact.", "Recompute the corrected February trial balance — total debits must equal total credits.", "Write a one-page close memo for the controller summarizing the seven fixes and any that needed supervisor escalation (the cash-to-wrong-customer error requires it)."], "files": [{"label": "February_Close_Errors.xlsx", "href": "/download/scenario-labs/February_Close_Errors.xlsx"}], "submissionPrompt": "Paste your seven correcting journal entries (with amounts) and your corrected trial balance totals (total debits = total credits). Note any entry that required supervisor escalation.", "solution": "<p><strong>Corrections:</strong></p><ol><li>Dr 6000 Salaries — US Engineering PMs $3,283 / Cr 2200 Payroll Tax Liabilities (recompute the employer-tax side proportionally) — or simplest: Dr Salaries $3,283 / Cr 2200 Payroll Tax Liabilities $260 & Cr 1000 Checking $3,023 for the extra net+tax. Document the overtime.</li><li>Dr 6500 Software &amp; Subscriptions $3,000 / Cr 1400 Prepaid Software Licenses $3,000 — the skipped amortization.</li><li>Dr 2400 Accrued Liabilities $14,800 / Cr 5100 COGS — Subcontractor Drafting $14,800 — reverse the January accrual so the real invoice (entered normally in February) doesn't double-count.</li><li>Dr 1100 Accounts Receivable — Southeast Broadband $215,000 / Cr 1100 Accounts Receivable — Atlantic Fiber Co. $215,000 — net-zero to total AR, but corrects whose subledger it belongs in. Escalate to supervisor for sign-off.</li><li>Dr 1590 Accumulated Depreciation $200 / Cr 6700 Depreciation Expense $200 — back out the $200 over.</li><li>Dr 6900 Bank Fees Expense $45 / Cr 1000 Operating Checking $45 — book the unrecorded fee.</li><li>Dr 6500 Software &amp; Subscriptions (or dedicated Insurance Expense) $600 / Cr 1400 Prepaid (or Prepaid Insurance asset) $600 — record February's amortization of the prepaid insurance.</li></ol><p><strong>Net effect:</strong> each entry is balanced, total debits equal total credits, and the corrected February trial balance ties. The cash-to-wrong-customer and the un-reversed accrual are the two that needed documented escalation.</p>"}, {"type": "scenario_lab", "title": "Scenario Lab — Fixed Assets: Capitalize or Expense?", "railLabel": "Lab: capex", "time": "45 min", "intro": "Five Q1 purchases — classify each as capital expenditure or operating expense, justify the call using the capitalization threshold, post the entries, and build the depreciation schedule.", "setup": "<p>Skarion makes five purchases in Q1. For each, decide capitalize (asset + depreciate) vs. expense immediately. The IRS de minimis safe harbor threshold is $2,500 per item (or $5,000 with audited financials). Apply judgment using both threshold and useful life.</p><table class='data'><tr><th>Purchase</th><th>Amount</th><th>Notes</th></tr><tr><td>5 new GIS workstations</td><td>$14,500 each</td><td>5-year useful life, $500 salvage each</td></tr><tr><td>Annual ArcGIS Pro license renewal</td><td>$8,000</td><td>12-month benefit</td></tr><tr><td>Desk chairs for engineering office</td><td>$3,200</td><td>Single cost; office furniture</td></tr><tr><td>Server rack for GIS database hosting</td><td>$22,000</td><td>7-year useful life, $0 salvage</td></tr><tr><td>Repair of existing server (fan replacement)</td><td>$450</td><td>Restores function, no improvement</td></tr></table>", "tasks": ["Classify each purchase as capitalize or expense, and justify using the de minimis threshold and the useful-life / betterment tests.", "Post the journal entry for each purchase.", "Build the first-year depreciation schedule for each capitalized asset (straight-line; for assets bought mid-period, apply half-month convention or full-month per the policy you choose — state it).", "Explain the one purchase that is a repair, not a betterment, and why it is expensed regardless of dollar amount."], "submissionPrompt": "Paste your five classification calls with justifications, the five journal entries, and the first-year depreciation schedule with monthly and annual amounts.", "solution": "<p><strong>1. 5 GIS workstations @ $14,500 each = $72,500:</strong> Capitalize. Well above $2,500, 5-year useful life. Entry: Dr 1500 GIS Servers &amp; Workstations $72,500 / Cr 1000 Operating Checking $72,500. Depreciation (straight-line, $500 salvage each → $14,000 depreciable × 5 = $70,000 / 5 yrs / 12 = $1,166.67/month total; first year ~$14,000).</p><p><strong>2. Annual ArcGIS Pro $8,000:</strong> Capitalize as <em>prepaid</em> (intangible/subscription asset), not depreciate. Entry: Dr 1400 Prepaid Software Licenses $8,000 / Cr 1000 Operating Checking $8,000. Amortize $666.67/month ($8,000/12) to 6500 Software Expense over 12 months.</p><p><strong>3. Desk chairs $3,200:</strong> This is the judgment call. Above the $2,500 de minimis safe harbor, so technically must be capitalized — BUT many firms have a higher internally-set capitalization threshold (often $5,000) for furniture. The defensible answer: <em>capitalize under the strict IRS safe harbor</em>, depreciate over ~5 years; or expense under an audit-supported $5,000 internal threshold if documented. State the policy you'd follow.</p><p><strong>4. Server rack $22,000:</strong> Capitalize. 7-year life, $0 salvage. Entry: Dr 1500 GIS Servers &amp; Workstations $22,000 / Cr 1000 $22,000. Depreciation $22,000 / 7 / 12 = $261.90/month; first year ~$3,143.</p><p><strong>5. Server fan repair $450:</strong> <em>Expense, regardless of amount.</em> A repair restores existing function without improving the asset — it is never capitalized under the betterment test. Below the safe harbor too. Entry: Dr 6500 Software &amp; Subscriptions (or Repairs &amp; Maintenance) $450 / Cr 1000 $450.</p>"}, {"type": "scenario_lab", "title": "Scenario Lab — Year-End and the Closing Entries", "railLabel": "Lab: year-end", "time": "60 min", "intro": "Year-end: post the closing entries that zero out every temporary account and roll net income into Retained Earnings, then verify the post-closing trial balance.", "setup": "<p>You are given Skarion's December 31 adjusted trial balance. All monthly closes were done correctly. Now post the closing entries to zero out every temporary account and roll net income into Retained Earnings.</p>", "tasks": ["Identify every temporary account (all revenue and expense accounts) on the December 31 trial balance.", "Calculate Skarion's net income for the year (total revenue − total expenses).", "Post the four closing entries: (a) close Revenue accounts to Income Summary; (b) close Expense accounts to Income Summary; (c) close Income Summary to Retained Earnings; (d) close any Drawings/Distributions to Retained Earnings if applicable.", "Verify the post-closing trial balance — only permanent accounts (Assets, Liabilities, Equity) remain with balances.", "Confirm Assets = Liabilities + Updated Equity after the close."], "submissionPrompt": "Paste the four closing entries with account names and amounts, your net income figure, and confirm Assets = Liabilities + Equity post-close (paste the totals).", "solution": "<p><strong>Net income for the year</strong> ≈ annual revenue − annual COGS − annual OpEx (per the monthly pattern, ~$242,000/month net in the Jan example scaled across the year ≈ material annual figure — use the actual Dec 31 trial balance totals).</p><p><strong>Closing entries:</strong></p><ol><li><em>Close Revenue to Income Summary:</em> Dr 4000 Engineering Design Revenue [annual total] / Dr 4100 Permitting Services Revenue [annual total] / Cr <em>Income Summary</em> [sum].</li><li><em>Close Expenses to Income Summary:</em> Dr <em>Income Summary</em> [sum of all expense accounts: 5100, 5200, 6000, 6100, 6400, 6500, 6700, 6800, 6900, 6720] / Cr each expense account [its annual total].</li><li><em>Close Income Summary to Retained Earnings:</em> If net income is positive (credits exceeded debits on Income Summary): Dr Income Summary [net income] / Cr 3100 Retained Earnings [net income]. If a loss, reverse.</li><li><em>Close Drawings/Distributions</em> (if the owner took a distribution): Dr 3000 Owner's Equity (or 3100 Retained Earnings) [distribution] / Cr 1000 Operating Checking [distribution].</li></ol><p><strong>Post-closing verification:</strong> only 1000s/1100s/1200s/1400/1500/1590/2000s/3000s remain with balances; all 4000s and 5000s–6999 are zero. Total assets = total liabilities + updated equity — still balances to the cent.</p>"}, {"type": "scenario_lab", "title": "Scenario Lab — Build the Financial Statement Package", "railLabel": "Lab: statements", "time": "60 min", "intro": "Using the January adjusted trial balance, build the three core financial statements from scratch in Excel and write a 3-sentence CFO memo.", "setup": "<p>Use the January adjusted trial balance from Chunk 23 (the month-end close). Build the three core financial statements in Excel using the financial statement package template below:</p><ol><li><strong>Income Statement:</strong> Revenue → COGS → Gross Profit → Operating Expenses → Net Income. Calculate Gross Margin % and Operating Margin %.</li><li><strong>Balance Sheet:</strong> Current Assets, Long-Term Assets, Current Liabilities, Long-Term Liabilities, Equity. Verify Assets = Liabilities + Equity.</li><li><strong>Cash Flow Statement (simplified indirect method):</strong> Start with Net Income, adjust for non-cash items (depreciation), change in working capital (AR, AP), investing activities (any capex), financing activities (loan repayment / distributions).</li></ol>", "tasks": ["Download the financial statement package template and the January adjusted trial balance figures (from the month-end close module).", "Build the Income Statement with sections and the two margin ratios (target: Gross Margin ~70.8%, Operating Margin ~50.4% for January per Chunk 23).", "Build the Balance Sheet and confirm Assets = Liabilities + Equity on the bottom line.", "Build the simplified indirect Cash Flow Statement and reconcile the ending cash to the bank rec's adjusted balance ($336,250).", "Write a 3-sentence CFO memo: what happened financially in January, what concerns you, and what to watch in February."], "files": [{"label": "Template 06 — Financial Statement Package.xlsx", "href": "/download/07-excel-toolkit/Template_06_Financial_Statement_Package.xlsx"}], "submissionPrompt": "Paste your three statement bottom lines (Net Income, Total Assets = Total Liabilities + Equity, ending Cash), your two margin ratios, your Cash Flow reconciliation to $336,250 ending cash, and your 3-sentence CFO memo.", "solution": "<p><strong>Income Statement (January):</strong> Revenue $480,000 − COGS $140,000 = <strong>Gross Profit $340,000 (70.8%)</strong> − Operating Expenses $98,000 = <strong>Net Income $242,000 (50.4%)</strong>.</p><p><strong>Balance Sheet (Jan 31):</strong> Total Assets (Cash ~$336,250 + AR ~$997,700 + Prepaids + Workstations net of depreciation + others) = Total Liabilities (AP + Accrued Liabilities + Loan Payable + Deferred Revenue) + Equity (Owner's + Retained Earnings raised by $242,000 net income). Confirms Assets = Liabilities + Equity.</p><p><strong>Cash Flow (indirect, simplified):</strong> Net Income $242,000 + Depreciation $1,000 (add back non-cash) + changes in working capital (increase in AR −$480,000 from HLD invoice, decrease in AP, etc.) + Investing (no capex in Jan) + Financing (loan interest accrual is non-cash) = reconciles <strong>ending Cash to the bank rec's $336,250</strong>. If it doesn't tie, the discrepancy is in the working-capital changes — trace each AR/AP movement.</p><p><strong>CFO memo template:</strong> \"January delivered $242,000 of net income on $480,000 of revenue, with strong 70.8% gross margins. My concern is cash — DSO is ~76 days and $112,700 of TeleCom Builders AR is overdue. In February, watch TeleCom collections and the $215,000 Southeast Broadband dispute.\"</p>"}], "slug": "06-month-end-close"}, {"title": "Advanced Excel Toolkit", "moduleTag": "Module 07", "dayMapping": "Day 7", "subhead": "The Excel skills that separate accountants who survive month-end from accountants who drown in it — data cleaning, lookups, conditional summing, PivotTables, and Power Query.", "hook": "\"What's the first thing you do with a 5,000-row payroll export?\" The wrong answer is \"start vouching.\" The right answer is \"clean it.\" Raw exports from payroll, bank feeds, and offshore timesheet apps are always messy, and cleaning is an accounting skill, not an IT one.", "chunks": [{"type": "timed_drill", "title": "Timed speed drill — 10 journal entries, 60 seconds each", "railLabel": "Drill", "intro": "Full mixed recall under pressure. 60 seconds per entry. Recall fast — your brain needs to retrieve journal entries without notes.", "questions": [{"q": "Record a $7,200 offshore drafting invoice (no cash yet).", "options": ["Dr 5100 COGS — Subcontractor Drafting / Cr 2000 Accounts Payable", "Dr 2000 Accounts Payable / Cr 5100 COGS", "Dr 1000 Cash / Cr 4000 Revenue", "Dr 4000 Revenue / Cr 1100 AR"], "correct_index": 0, "explanation": "Expense + liability: Dr COGS $7,200 / Cr AP $7,200. Cash untouched until payment."}, {"q": "Record a $36,000 annual software license payment (capitalize).", "options": ["Dr 6500 Software Expense / Cr 1000 Cash", "Dr 1400 Prepaid Software / Cr 1000 Operating Checking", "Dr 1000 Cash / Cr 1400 Prepaid", "Dr 5000 COGS / Cr 2000 AP"], "correct_index": 1, "explanation": "Capitalize as prepaid: Dr 1400 $36,000 / Cr 1000 $36,000. Expense it monthly later via amortization."}, {"q": "Post January depreciation for 5 workstations @ $200/month each (total $1,000).", "options": ["Dr 1590 Accumulated Depreciation / Cr 6700 Depreciation Expense", "Dr 6700 Depreciation Expense / Cr 1590 Accumulated Depreciation", "Dr 1500 Workstations / Cr 1000 Cash", "Dr 6700 / Cr 1400"], "correct_index": 1, "explanation": "Dr 6700 Depreciation Expense $1,000 / Cr 1590 Accumulated Depreciation $1,000."}, {"q": "Accrue January loan interest: $500K loan @ 6.5%.", "options": ["Dr 6800 Interest Expense $2,708 / Cr 2300 Accrued Interest $2,708", "Dr 2300 / Cr 1000 Cash", "Dr 6800 / Cr 1000", "Dr 1000 / Cr 6800"], "correct_index": 0, "explanation": "$500,000 × 6.5% ÷ 12 = $2,708.33. Dr Interest Expense / Cr Accrued Interest."}, {"q": "Record the month-end amortization of Prepaid Software for one month ($3,000).", "options": ["Dr 6500 Software & Subscriptions / Cr 1400 Prepaid Software", "Dr 1400 / Cr 6500", "Dr 6500 / Cr 1000", "Dr 1400 / Cr 1000"], "correct_index": 0, "explanation": "Dr 6500 Software Expense $3,000 / Cr 1400 Prepaid Software $3,000 — move one month's benefit off the asset onto the P&L."}, {"q": "Correct a duplicate $9,503.60 customer deposit (entered twice).", "options": ["Dr 1100 AR / Cr 1000 Cash", "Dr 1000 Cash / Cr 1100 AR", "Dr 4000 Revenue / Cr 1000", "Dr 1100 AR / Cr 4000 Revenue"], "correct_index": 0, "explanation": "Reverse the duplicate: Dr AR $9,503.60 / Cr Cash $9,503.60. Revenue was never overstated — only cash/AR were."}, {"q": "Record a $480,000 AR invoice issued to Atlantic Fiber for an HLD milestone.", "options": ["Dr 1100 AR $480,000 / Cr 4000 Engineering Design Revenue $480,000", "Dr 4000 / Cr 1100", "Dr 1000 / Cr 1100", "Dr 2500 Deferred / Cr 4000"], "correct_index": 0, "explanation": "Dr AR / Cr Revenue — performance obligation satisfied at HLD milestone. No cash yet."}, {"q": "Record Atlantic Fiber's wire payment of $479,975 (after $25 bank fee).", "options": ["Dr 1000 Cash $479,975 + Dr 6900 Bank Fees $25 / Cr 1100 AR $480,000", "Dr 1000 $480,000 / Cr 1100 $480,000", "Dr 1100 / Cr 1000 $480,000", "Dr 1000 $479,975 / Cr 1100 $479,975"], "correct_index": 0, "explanation": "Net cash $479,975 debited, $25 fee to expense, full $480,000 AR credited and cleared."}, {"q": "Write off TeleCom Builders' $112,700 AR (against existing allowance).", "options": ["Dr 1200 Allowance / Cr 1100 AR $112,700", "Dr 6720 Bad Debt Expense / Cr 1100 AR", "Dr 1100 AR / Cr 1200 Allowance", "Dr 1100 / Cr 1000"], "correct_index": 0, "explanation": "Dr Allowance / Cr AR. Expense was already booked when the allowance was established — not touched at write-off."}, {"q": "Establish the bad debt allowance for 1.5% of $997,700 AR.", "options": ["Dr 6720 Bad Debt Expense $14,965.50 / Cr 1200 Allowance $14,965.50", "Dr 1200 / Cr 6720", "Dr 1100 AR / Cr 1200", "Dr 6720 / Cr 1100"], "correct_index": 0, "explanation": "1.5% × $997,700 = $14,965.50. Dr Bad Debt Expense / Cr Allowance for Doubtful Accounts."}]}, {"type": "video", "kicker": "Chunk 37 — Watch first", "title": "Excel for Accountants — The 3 Functions That Do 80% of the Work", "railLabel": "Video: Excel 3", "intro": "If you can only learn three Excel functions before your first accounting job, learn these: VLOOKUP, SUMIFS, and PivotTables.", "transcript": "<p><strong>0:00 —</strong> If you can only learn three Excel functions before your first accounting job, learn these: VLOOKUP, SUMIFS, and PivotTables. Everything else is optional. These three handle 80% of the real work you will actually do.</p><p><strong>0:30 —</strong> VLOOKUP — or its modern replacement XLOOKUP — is how you match data from two tables. The most common accounting use: a 3,000-row expense report and a separate table of GL account numbers. VLOOKUP pulls the GL number into the right row automatically. Without it, you do that manually for 3,000 rows.</p><p><strong>1:30 —</strong> SUMIFS adds up numbers that meet multiple conditions at once. \"Give me total COGS for Tennessee Corridor, in January, from Global CAD Solutions.\" That's a SUMIFS with three criteria. Syntax: SUMIFS(sum range, criteria range 1, criteria 1, criteria range 2, criteria 2...).</p><p><strong>2:30 —</strong> PivotTables summarize large data sets fastest. Project Code to rows, Vendor Name to columns, Amount to values — in 10 seconds you have a summary that would take an hour of formulas.</p><p><strong>3:30 —</strong> In the Excel lab, raw offshore drafting data — 1,200 rows. Tag project codes with VLOOKUP. Sum by project with SUMIFS. Present with a PivotTable. All three.</p>"}, {"type": "content", "kicker": "Chunk 24 — data cleaning & lookups", "title": "Data cleaning, VLOOKUP/XLOOKUP, and SUMIFS", "bodyHtml": "<p>Clean data is the accountant's first problem. Raw exports arrive with combined date-description fields, inconsistent vendor names, trailing spaces, and stray characters. Before any analysis you standardize the data.</p><p><strong>The skill set, with Skarion data:</strong></p><table class='data'><tr><th>Tool</th><th>What it does</th><th>Skarion use</th></tr><tr><td><strong>Text-to-Columns</strong></td><td>Splits a combined field (e.g. \"2026-01-14 Atlantic Fiber wire\") on a delimiter into separate columns.</td><td>Cleaning bank-export CSVs where date and description share one cell.</td></tr><tr><td><strong>TRIM / PROPER / CLEAN</strong></td><td>Removes extra spaces, fixes capitalization, strips non-printable characters.</td><td>Standardizing \"GLOBAL CAD SOLUTIONS LTD.\" vs \"Global Cad Solutions\" so SUMIFS actually matches.</td></tr><tr><td><strong>VLOOKUP / XLOOKUP</strong></td><td>Pull a matching value from a master table.</td><td>Matching 3,000 rows of offshore labor hours to project codes in a master table.</td></tr><tr><td><strong>SUMIFS</strong></td><td>Sum a range across multiple conditions (project + date + vendor).</td><td>Totaling COGS for the Tennessee Corridor for January across all vendors.</td></tr><tr><td><strong>IF / IFS</strong></td><td>Flag rows that meet a rule.</td><td>Flagging offshore invoices where the unit price exceeds the MSA rate of $38.50/mile.</td></tr><tr><td><strong>Conditional Formatting</strong></td><td>Color cells that meet a rule, automatically.</td><td>Highlighting 90+ day AR balances ($34,200 of TeleCom Builders) in red.</td></tr></table>"}, {"type": "exercise", "kicker": "Lab 1", "title": "The messy offshore timesheet export", "instructionsHtml": "<p>Download the raw export below — a <strong>1,200-row CSV</strong> of individual CAD and GIS drafting tasks from 3 offshore firms across 8 projects, including the Tennessee Corridor build.</p><ol><li><strong>Text-to-Columns</strong> to split the combined date/description field.</li><li><strong>TRIM/PROPER/CLEAN</strong> to standardize vendor names so they match the master project table.</li><li><strong>XLOOKUP or VLOOKUP</strong> to attach the correct Project Code to every row from the project mapping table.</li><li><strong>SUMIFS</strong> to compute total drafting labor cost per project.</li><li>Deliverable: report the <strong>total Tennessee Corridor drafting cost</strong> for the month.</li></ol>", "files": [{"label": "Raw_Drafting_Labor.csv", "href": "/download/scenario-labs/Raw_Drafting_Labor.csv"}, {"label": "Project_Mapping_Table.csv", "href": "/download/scenario-labs/Project_Mapping_Table.csv"}], "reflectionPrompt": "What was the total drafting cost for the Tennessee Corridor project? Which vendor had the largest share, and did any invoices exceed the $38.50/mile MSA rate?"}, {"type": "content", "kicker": "Chunk 25 — PivotTables & Power Query", "title": "PivotTables, Power Query, and Excel interview questions", "bodyHtml": "<p><strong>PivotTables</strong> are the fastest way to summarize 10,000 rows. Drag-and-drop grouping, summing, and filtering by date/project/vendor — no formulas required. For month-end, a PivotTable turns a raw transaction export into an AP aging view in minutes.</p><p><strong>Power Query (Get &amp; Transform)</strong> automates the monthly cleanup so you are not manually running Text-to-Columns every close. You build the transformation once; each month you refresh and the cleaned dataset lands in your model. This is how real close cycles stop being manual.</p><p><strong>Lab 2 — AP Aging PivotTable:</strong> a raw AP transaction export with <strong>800 rows, 6 vendors, 4 months of invoices</strong>. Build a PivotTable showing outstanding AP by vendor Aging bucket (0–30, 31–60, 61–90, 90+), then identify which vendor carries the most overdue balance and assess the risk.</p>"}, {"type": "exercise", "kicker": "Lab 2", "title": "AP Aging PivotTable lab", "instructionsHtml": "<p>Download the raw AP transaction export below and build an AP aging PivotTable.</p><ol><li>Load the export into a PivotTable with <strong>Vendor</strong> on rows and an <strong>aging bucket</strong> (0–30, 31–60, 61–90, 90+) on columns, summing the outstanding invoice balance.</li><li>Add <strong>conditional formatting</strong> so the 90+ day buckets highlight in red.</li><li>Identify the vendor with the largest 90+ day balance and write a one-line risk assessment for the controller.</li></ol>", "files": [{"label": "Template 03 — AP Aging.xlsx", "href": "/download/07-excel-toolkit/Template_03_AP_Aging.xlsx"}], "reflectionPrompt": "Which vendor carried the most overdue (90+ day) balance, and what is the dollar amount and the collection risk you'd flag to the controller?"}, {"type": "flip_cards", "kicker": "Quick check", "title": "8 Excel interview questions — and real answers", "railLabel": "Flip cards", "cards": [{"front": "VLOOKUP vs. XLOOKUP?", "back": "XLOOKUP defaults to an exact match (no trailing FALSE), can look left of the lookup column, and can return arrays. VLOOKUP is older, can only look right, and silently returns approximate matches if you forget the FALSE."}, {"front": "How do you handle #N/A in VLOOKUP?", "back": "Wrap with IFERROR or IFNA: =IFERROR(VLOOKUP(...), 0) or =IFNA(VLOOKUP(...), \"no match\"). Decide whether a missing match should be zero (sum-safe) or flagged."}, {"front": "When use SUMIFS over a PivotTable?", "back": "When the result needs to feed another formula live, or land in a fixed template cell a controller reads. PivotTables are great for exploration; SUMIFS is great for repeatable, formula-driven reports."}, {"front": "How do you lock a cell reference?", "back": "$A$1 locks both column and row (absolute); A1 locks neither (relative); $A1 locks column only, A$1 locks row only (mixed). Toggle with F4."}, {"front": "What is a named range and when is it useful?", "back": "A readable alias for a cell or range, e.g. MSA_Rate for a single cell. Useful in formulas that many people read =IF(UnitPrice>MSA_Rate,\"HOLD\"). Self-documenting and survives row insertions if defined dynamically."}, {"front": "How do you compare two lists to find missing values?", "back": "XLOOKUP for each item in list A against list B — #N/A means missing. Or COUNTIF(range, value) = 0. Filter the #N/As to see exactly what's in one list but not the other."}, {"front": "What does Power Query do that manual cleaning doesn't?", "back": "It records the transformation steps and replays them on refresh — so a monthly Text-to-Columns + TRIM + lookup pipeline runs every month with one click, not a manual rebuild. It is the difference between cleaning data and automating the cleaning."}, {"front": "How do you prevent someone editing your formula columns?", "back": "Lock the cells (Format Cells > Protection > Locked), then protect the sheet (Review > Protect Sheet). Locking alone does nothing until sheet protection is turned on."}]}, {"type": "quiz", "intro": "A quick check on the Excel skills you'll be tested on in interviews and on day one.", "title": "Excel knowledge check", "questions": [{"q": "Why is XLOOKUP generally preferred over VLOOKUP in modern accounting?", "options": ["It looks cooler", "It defaults to an exact match and can return values to the left of the lookup column", "It uses less memory than VLOOKUP", "It automatically builds PivotTables"], "correct_index": 1, "explanation": "XLOOKUP defaults to exact match (no trailing FALSE argument) and can return arrays to the left of the lookup value. VLOOKUP can only look right and silently returns approximate matches if you omit FALSE."}, {"q": "You need the total COGS for the Tennessee Corridor project across all vendors for January. Which function do you reach for?", "options": ["VLOOKUP", "SUMIFS", "TRIM", "PROPER"], "correct_index": 1, "explanation": "SUMIFS sums a range across multiple conditions — here project = Tennessee Corridor AND month = January AND category = COGS. That multi-condition summing is exactly what SUMIFS is for."}, {"q": "Which cell reference locks the column but lets the row change as you fill down?", "options": ["$A$1", "A1", "$A1", "A$1"], "correct_index": 2, "explanation": "$A1 locks the column (the $ before A) but lets the row adjust as the formula is filled down. Toggle reference types with F4."}, {"q": "What is the single biggest advantage of Power Query over manual data cleaning?", "options": ["It runs faster on large files", "It records transformation steps and replays them on refresh, so monthly cleanup is one click", "It writes the journal entries for you", "It replaces the need for PivotTables"], "correct_index": 1, "explanation": "Power Query captures your cleanup steps and replays them every month on refresh — turning a manual Text-to-Columns + TRIM + lookup routine into a repeatable, automated pipeline. That automation is the whole point."}]}, {"type": "content", "kicker": "Chunk 59 — AI in accounting", "title": "AI Tools in Modern Accounting — What's Real, What's Hype", "bodyHtml": "<p>AI tools have moved from marketing into actual accounting workflows in 2025–2026. Knowing where they genuinely help — and where they don't — is now a real interview topic.</p><p><strong>What AI is good at now:</strong></p><ul><li>Categorizing transactions (QuickBooks' AI suggestions, Sage Intacct's AI features)</li><li>Matching invoices to POs at scale</li><li>Flagging anomalies in large datasets (duplicate-looking amounts, out-of-pattern vendors)</li><li>Auto-populating expense reports from receipt images</li><li>Drafting first-pass reconciliation explanations and journal entry memos (with ChatGPT/Copilot)</li></ul><p><strong>What AI is not good at:</strong></p><ul><li>Exercising accounting judgment — when to hold, correct, document, or escalate</li><li>Catching context-dependent fraud (a transaction that looks normal but isn't, given the business relationship)</li><li>GAAP compliance decisions that require reading the contract and the business intent</li><li>Signing off. <em>AI does not sign off. You do.</em></li></ul><p><strong>Tools worth knowing:</strong> Sage Intacct's AI features, QuickBooks AI categorization, Microsoft Copilot for Excel, ChatGPT for first-draft memos. The safe position for a junior accountant: <em>AI han
