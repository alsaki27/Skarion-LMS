<script>window.COURSE_CATALOG = [{"title": "The Accounting Profession — Reality vs. The Textbook", "moduleTag": "Module 01", "dayMapping": "Day 1", "subhead": "What separates candidates who get hired from candidates who get generic rejections — and why the gap has nothing to do with GPA.", "hook": "\"Tell me about yourself.\" You're about to hear what makes a candidate sound credible in the first 60 seconds — and what instantly flags them as a textbook memorizer who has never touched a real set of books.", "chunks": [{"type": "video", "kicker": "Chunk 31 — Watch first", "title": "Why Accounting Exists", "railLabel": "Video: Why", "intro": "Watch this 3-minute opener before anything else. The deliverable of accounting is trust — not journal entries.", "transcript": "<p><strong>0:00 —</strong> Every business decision — every hire, every loan, every expansion — is made based on numbers. Your job is to make sure those numbers are right.</p><p><strong>0:10 —</strong> Accounting isn't about debits and credits. It's about trust. A bank lends $500,000 based on a balance sheet you prepared. A CEO decides whether to hire ten more engineers based on a P&amp;L you closed. If your numbers are wrong, real people are hurt by real decisions.</p><p><strong>0:35 —</strong> This is why accounting jobs — even entry-level ones — require precision under pressure. And it's why every company, from a two-person startup to a Fortune 500, has someone who does exactly what you're about to learn.</p><p><strong>1:20 —</strong> In this course, you are the Staff Accountant for Skarion Engineering — a $2M Virginia fiber-design firm. You are not reading about accounting. You are doing it. Real invoices, real bank statements, real discrepancies that need to be found and fixed.</p><p><strong>2:00 —</strong> By the end of this course you will be able to say — truthfully — that you closed the books for a real company, reconciled bank statements, caught a $10,547 duplicate deposit, and ran a full payroll entry. That is not theory. That is experience.</p><p><strong>2:40 —</strong> Let's get started. Module 1: The Accounting Profession — what it actually is, and what employers are actually looking for.</p>"}, {"type": "content", "kicker": "The reality", "title": "What accounting actually is — and why your professor probably wasn't clear about it", "bodyHtml": "<p>Accounting is the discipline of <strong>measuring economic activity and communicating it to decision-makers</strong>. The core deliverable isn't journal entries — it's <em>trust</em>. A CFO, a bank, an auditor, or a board of directors has to be able to trust the numbers you produce. Your entire career is built on whether people trust the financials you prepare.</p><p>That sounds philosophical until you understand the practical implications:</p><ul><li>A misclassified expense can cost a company millions in tax overpayments.</li><li>An AR balance that isn't collected on time kills cash flow.</li><li>A payroll entry that's off by one decimal point lands in an employment tribunal.</li><li>A bank reconciliation that isn't done properly is fraud waiting to happen.</li></ul><p>This is why accounting jobs — even entry-level ones — pay well and demand precision. The job isn't hard because the math is complex. It's hard because being consistently right under pressure, with incomplete information and tight deadlines, is genuinely difficult.</p>", "callout": {"type": "tip", "html": "<strong>The hiring manager's first filter:</strong> Do they understand what accounting <em>is for</em>? Or do they just know how to record journal entries? The best answer to \"Tell me about yourself\" names the purpose of the function, not just the tasks."}}, {"type": "content", "kicker": "The foundation", "title": "GAAP, accrual accounting, and why cash basis is almost always wrong for a real business", "bodyHtml": "<p><strong>Generally Accepted Accounting Principles (GAAP)</strong> are the rulebook. In the US, virtually all businesses above a certain size — and all public companies — are required to follow them. GAAP is written and maintained by the Financial Accounting Standards Board (FASB).</p><p>The single most important GAAP concept is the <strong>accrual basis of accounting</strong>, and it works on one principle: <em>record economic events when they happen, not when cash moves</em>.</p><table class='data'><tr><th>Scenario</th><th>Cash Basis records when...</th><th>Accrual Basis records when...</th></tr><tr><td>Client signs a contract and we deliver 300 miles of fiber design</td><td>Client wires the payment (often 60 days later)</td><td>We deliver the work and send the invoice (today)</td></tr><tr><td>We receive a vendor invoice for offshore drafting labor</td><td>We cut the check or wire the payment</td><td>We receive the invoice and the liability exists</td></tr><tr><td>We pay 12 months of software licenses upfront in January</td><td>The whole $48,000 hits expense in January</td><td>$4,000/month is expensed over 12 months (Prepaid)</td></tr></table><p>Accrual accounting gives a <em>true picture</em> of the business's financial health. Cash basis is misleading — a company can look profitable on a cash basis while actually bleeding money on accrual, and vice versa. Staff accountants who don't understand this difference get flagged immediately in interviews.</p>"}, {"type": "timeline", "title": "The Career Ladder — From Staff Accountant to Controller", "steps": [{"title": "Staff Accountant", "desc": "Journal entries, bank recs, AP/AR processing. Learning the workflow and building trust. 0–3 years."}, {"title": "Senior Accountant", "desc": "Owns month-end close, accruals, fixed assets. Reviews junior work. 3–6 years."}, {"title": "Accounting Manager", "desc": "Manages the team, improves processes, owns the trial balance. 6–10 years."}, {"title": "Controller", "desc": "Oversees all accounting operations, owns financial reporting, interfaces with external auditors and the CFO. 10+ years."}, {"title": "CFO", "desc": "Strategic financial leadership. Has usually passed through the audit world or built deep FP&A experience alongside accounting."}]}, {"type": "content", "kicker": "The first 90 days", "title": "What an entry-level accounting job actually looks like, week by week", "bodyHtml": "<p>Most entry-level candidates have no idea what they're walking into. Here is what a typical Staff Accountant's first three months look like at a mid-size professional services firm like Skarion Engineering:</p><table class='data'><tr><th>Week</th><th>Focus</th><th>You will be expected to...</th></tr><tr><td>1–2</td><td>Orientation & shadow</td><td>Understand the Chart of Accounts, read the accounting policies, shadow month-end close.</td></tr><tr><td>3–4</td><td>AP processing</td><td>Enter vendor invoices, match POs, flag discrepancies, process payment runs.</td></tr><tr><td>5–8</td><td>AR and cash</td><td>Apply customer payments, chase overdue invoices, assist with bank reconciliation.</td></tr><tr><td>9–12</td><td>Month-end participation</td><td>Post assigned journal entries (depreciation, prepaids, accruals), contribute to the reconciliation package.</td></tr></table><p>By month three, the people who thrive are the ones who understand the <em>why</em> behind every entry — not just the mechanics of how to post it. That is what this course is designed to give you.</p>", "callout": {"type": "warning", "html": "The fastest way to get fired in your first 90 days: <strong>posting an adjusting entry without manager approval and supporting documentation.</strong> Every adjustment needs a ticket, an email chain, or a supervisor's sign-off. Never post based on your own judgment alone, no matter how obvious the fix seems."}}, {"type": "flip_cards", "title": "Accounting vocabulary — the words that separate entry-level from experienced", "railLabel": "Core Vocabulary", "cards": [{"front": "General Ledger (GL)", "back": "The master record of all financial transactions. Every journal entry flows into the GL. When someone says 'pull it from the GL,' they mean look up the actual transaction history for a specific account."}, {"front": "Chart of Accounts (COA)", "back": "The numbered list of every account the company uses. Assets start with 1000, Liabilities with 2000, Equity with 3000, Revenue with 4000, Expenses with 5000-6999. Every company's COA is slightly different — learn yours on day one."}, {"front": "Trial Balance", "back": "A report showing all accounts and their balances at a point in time. Debits must equal credits. Running a trial balance is one of the first things you do during month-end close to confirm nothing is out of balance."}, {"front": "Subledger", "back": "A detailed record that feeds into the GL. AR has a subledger (one line per invoice per customer). AP has a subledger (one line per invoice per vendor). The subledger total must match the GL account balance — this is called 'tying the subledger.'"}, {"front": "Accrual", "back": "An entry to record an expense or revenue that has been earned or incurred but not yet invoiced or paid. Example: your offshore draftsmen worked 2,000 hours in January that won't be invoiced until February — you still accrue the expense in January."}, {"front": "Prepaid Expense", "back": "Cash paid now for something that benefits a future period. If you pay $48,000 for an annual ArcGIS license in January, you debit Prepaid Software $48,000 and credit Cash. Then each month you expense $4,000 as the benefit is consumed."}, {"front": "Cutoff", "back": "The accounting principle that transactions must be recorded in the correct period. A purchase on January 31st belongs in January — not February. Cutoff errors are one of the most common reasons financial statements are restated."}, {"front": "Materiality", "back": "A threshold concept: errors below a certain size (often 5% of net income or a fixed dollar amount set by the company) may not require correction. An auditor's definition of material is usually different from a controller's — learn what threshold your employer uses."}]}, {"type": "quiz", "intro": "This is a calibration quiz. Nail it and you already have a head start. Miss it and you now know exactly what to focus on.", "title": "Reality Check — How much do you actually know?", "questions": [{"q": "Skarion Engineering delivers a 500-mile High-Level Design (HLD) package to a client on January 28th. The client pays on March 15th. Under accrual accounting, when is the revenue recognized?", "options": ["March 15th — when cash is received", "January 28th — when the service is delivered", "February 28th — at month-end", "When the client signs the contract in December"], "correct_index": 1, "explanation": "Accrual accounting records revenue when it's earned — meaning when the performance obligation is satisfied. Skarion delivered the HLD package on January 28th, so that is when revenue is recognized, regardless of when the client pays."}, {"q": "What is the difference between a debit and a credit in accounting?", "options": ["Debits are always good, credits are always bad", "Debits increase assets and expenses; credits increase liabilities, equity, and revenue", "Debits go on the right side of the T-account; credits go on the left", "Debits reduce the balance; credits increase it"], "correct_index": 1, "explanation": "The most important rule in accounting: Debits increase Assets and Expenses. Credits increase Liabilities, Equity, and Revenue. There is no 'good' or 'bad' — just the normal balance of each account type."}, {"q": "A staff accountant notices a $4,200 variance between the AP subledger and the GL account 2000. What is the correct first step?", "options": ["Post a manual journal entry to make them match", "Delete the oldest invoice to reduce the balance", "Investigate the source of the discrepancy before making any adjustment", "Assume it's a system error and ignore it"], "correct_index": 2, "explanation": "Never force a reconciliation. Always trace the discrepancy to its source transaction first. The correct process: pull both reports, sort by date, and identify what transaction exists in one and not the other."}]}], "slug": "01-intro-and-market"}, {"title": "The Accounting Cycle & Journal Entries", "moduleTag": "Module 02", "dayMapping": "Day 2", "subhead": "The equation that governs every entry ever made, the chart of accounts that organizes them, and the cycle that turns raw transactions into auditable financial statements.", "hook": "\"Post this journal entry.\" A real controller does not hand you a pre-filled form. They hand you a vendor invoice and expect you to know which accounts move, in which direction, and why. This module is the entire reason that expectation exists.", "chunks": [{"type": "video", "kicker": "Chunk 32 — Watch first", "title": "Accrual vs. Cash — The Most Important Concept in Accounting", "railLabel": "Video: Accrual", "intro": "If you only understand one thing from this course, make it this: accounting records economic events when they happen — not when cash moves.", "transcript": "<p><strong>0:00 —</strong> If you only understand one thing from this course, make it this: accounting records economic events when they happen — not when cash moves.</p><p><strong>0:20 —</strong> Here is a real example. Skarion completes a 500-mile HLD package and delivers it to Atlantic Fiber Co. on January 28th. Atlantic Fiber doesn't pay until March 15th. Under cash accounting, we record $480,000 of revenue in March. Under accrual accounting — which is what GAAP requires — we record $480,000 in January, the day we delivered the work.</p><p><strong>1:10 —</strong> Why does this matter? Because cash accounting lies. You could have a wildly profitable January in reality — you delivered millions of dollars of work — but your cash basis P&amp;L shows almost nothing because no one paid you yet. Investors, banks, and your own CFO can't make good decisions from that.</p><p><strong>2:00 —</strong> The flip side is also true. If you prepay $36,000 for your annual Vetro license on July 1st, that is not a $36,000 expense in July. That benefits your entire year. So accrual accounting says: record $3,000 per month as expense, for twelve months. The rest sits on your balance sheet as a Prepaid Asset until you've consumed it.</p><p><strong>3:00 —</strong> This is called the matching principle — match your expenses to the revenue they helped generate. And it is the foundation of every adjusting entry you will ever make during month-end close.</p>"}, {"type": "content", "kicker": "The constraint", "title": "The accounting equation and the T-account", "bodyHtml": "<p><strong>Assets = Liabilities + Equity</strong> is not a formula to memorize for a test. It is a constraint that governs every single entry ever posted in every company on earth. The day you make a journal entry that violates it, your books are wrong — and a trial balance will tell you only minutes later.</p><p>Every account lives in a <strong>ledger</strong>, and the visual representation of a single account's activity is a <strong>T-account</strong>: debits on the left, credits on the right. Which side increases the balance depends on the account's type:</p><table class='data'><tr><th>Account type</th><th>Normal balance</th><th>Increase with</th></tr><tr><td>Assets</td><td>Debit</td><td>Debit (left)</td></tr><tr><td>Expenses</td><td>Debit</td><td>Debit (left)</td></tr><tr><td>Liabilities</td><td>Credit</td><td>Credit (right)</td></tr><tr><td>Equity</td><td>Credit</td><td>Credit (right)</td></tr><tr><td>Revenue</td><td>Credit</td><td>Credit (right)</td></tr></table><p><strong>Skarion's five largest asset accounts</strong> on the balance sheet are: <em>1000 Operating Checking</em>, <em>1100 Accounts Receivable</em>, <em>1400 Prepaid Software Licenses</em> (ArcGIS Pro, Vetro FiberMap), <em>1500 GIS Servers &amp; Workstations</em>, and the <em>Security Deposit on office space</em> held by the landlord. Every one of those accounts increases with a debit.</p>", "callout": {"type": "warning", "html": "<strong>Stop thinking \"debit = good.\"</strong> Debits are <em>directional</em>, not evaluative. A debit to Cash is good. A debit to Accounts Receivable means a customer owes you more (also fine). A debit to Salary Expense means you owe your staff more money (less fine). The side tells you the direction of movement, not whether the business is winning."}}, {"type": "video", "kicker": "Chunk 33 — Watch first", "title": "How to Read a Chart of Accounts in 5 Minutes", "railLabel": "Video: COA", "intro": "The Chart of Accounts is the master list of every bucket money can go into. If you don't understand it, you can't do the job.", "transcript": "<p><strong>0:00 —</strong> The Chart of Accounts is the master list of every bucket that money can go into at a company. Every journal entry, every financial statement, every report — all of it traces back to this list.</p><p><strong>0:25 —</strong> Here is the pattern that never changes: accounts starting with 1 are Assets — things the company owns. 2s are Liabilities — things the company owes. 3s are Equity. 4s are Revenue. And 5 through 6 are Expenses. This numbering is not arbitrary — it maps directly to the accounting equation.</p><p><strong>1:15 —</strong> Let me show you Skarion Engineering's actual Chart of Accounts... [walks through 1000 Operating Checking, 1200 Unbilled AR (WIP), 2100 Accrued Wages, 5100 COGS — Subcontractor Drafting, explaining each]. Notice 1200 is an asset even though nothing's been billed yet — that's WIP, work already performed but not yet invoiced.</p><p><strong>2:30 —</strong> One thing interviewers always ask: what's the difference between a temporary and a permanent account? Permanent accounts — Assets, Liabilities, Equity — carry their balance forward year after year. Temporary accounts — Revenue and Expenses — get zeroed out at year-end and their net balance flows into Retained Earnings.</p><p><strong>3:15 —</strong> In the next section, you will do a drag-and-drop exercise with Skarion's actual transactions. Let's see if you can classify them correctly.</p>"}, {"type": "content", "kicker": "The map", "title": "Chart of Accounts deep dive", "bodyHtml": "<p>A <strong>Chart of Accounts (COA)</strong> is the numbered list of every account the company uses. The numbering is convention, not fashion: 1000s are Assets, 2000s are Liabilities, 3000s are Equity, 4000s are Revenue, and 5000–6999 are Expenses (including COGS). Every company's COA is slightly different — learn yours on day one, then never invent accounts on your own.</p><p><strong>Skarion Engineering's actual COA (the one you will use all course):</strong></p><table class='data'><tr><th>Code</th><th>Account</th><th>Type</th></tr><tr><td>1000</td><td>Operating Checking</td><td>Asset</td></tr><tr><td>1100</td><td>Accounts Receivable</td><td>Asset</td></tr><tr><td>1200</td><td>Unbilled AR (WIP)</td><td>Asset</td></tr><tr><td>1400</td><td>Prepaid Software Licenses</td><td>Asset</td></tr><tr><td>1500</td><td>GIS Servers &amp; Workstations</td><td>Asset</td></tr><tr><td>1590</td><td>Accumulated Depreciation</td><td>contra-Asset</td></tr><tr><td>2000</td><td>Accounts Payable</td><td>Liability</td></tr><tr><td>2100</td><td>Accrued Wages</td><td>Liability</td></tr><tr><td>2200</td><td>Payroll Tax Liabilities</td><td>Liability</td></tr><tr><td>2300</td><td>Accrued Interest</td><td>Liability</td></tr><tr><td>2500</td><td>Deferred Revenue</td><td>Liability</td></tr><tr><td>3000</td><td>Owner's Equity</td><td>Equity</td></tr><tr><td>3100</td><td>Retained Earnings</td><td>Equity</td></tr><tr><td>4000</td><td>Engineering Design Revenue</td><td>Revenue</td></tr><tr><td>4100</td><td>Permitting Services Revenue</td><td>Revenue</td></tr><tr><td>5100</td><td>COGS — Subcontractor Drafting</td><td>Expense</td></tr><tr><td>5200</td><td>COGS — Software Allocated to Projects</td><td>Expense</td></tr><tr><td>6000</td><td>Salaries — US Engineering PMs</td><td>Expense</td></tr><tr><td>6100</td><td>Payroll Tax Expense</td><td>Expense</td></tr><tr><td>6400</td><td>Travel &amp; Field Expense</td><td>Expense</td></tr><tr><td>6500</td><td>Software &amp; Subscriptions</td><td>Expense</td></tr><tr><td>6700</td><td>Depreciation Expense</td><td>Expense</td></tr><tr><td>6800</td><td>Interest Expense</td><td>Expense</td></tr></table><p>Memorize the structure: that block of five-digit numbers in the database is not chaos, it is a balance sheet and an income statement waiting to be rolled up.</p>"}, {"type": "drag_and_drop", "kicker": "Classification lab", "title": "Classify the transaction into the correct account", "instruction": "Drag each Skarion Engineering transaction into the account bucket it should be posted to. Getting this right is the single skill that separates a real staff accountant from someone who memorized the textbook.", "items": [{"draggable": "Wire from Atlantic Fiber pays an open invoice", "target": "1100 Accounts Receivable"}, {"draggable": "Prepaid Vetro license amortized for the month", "target": "1400 Prepaid Software Licenses"}, {"draggable": "Global CAD Solutions invoice for offshore drafting", "target": "2000 Accounts Payable"}, {"draggable": "Client prepays a contract before work starts", "target": "2500 Deferred Revenue"}, {"draggable": "HLD milestone delivered to Tennessee Corridor", "target": "4000 Engineering Design Revenue"}, {"draggable": "Offshore drafting billed on a project", "target": "5100 COGS — Subcontractor Drafting"}, {"draggable": "Monthly straight-line depreciation of workstations", "target": "6700 Depreciation Expense"}, {"draggable": "Employer FICA on the US payroll run", "target": "6100 Payroll Tax Expense"}, {"draggable": "Interest on the term loan for January", "target": "6800 Interest Expense"}, {"draggable": "10 US Project Managers' gross wages", "target": "6000 Salaries — US Engineering PMs"}]}, {"type": "content", "kicker": "The atomic unit", "title": "Journal entries — the full workflow", "bodyHtml": "<p>A <strong>journal entry</strong> is the atomic unit of accounting. Everything else — the trial balance, the financial statements, the audit — is built on top of them. Every journal entry must contain:</p><ul><li><strong>Date</strong> — the period the entry belongs to (cutoff matters).</li><li><strong>Debit account(s)</strong> and amounts.</li><li><strong>Credit account(s)</strong> and amounts.</li><li><strong>Memo</strong> — what the entry is for, in plain language.</li><li><strong>Supporting document reference</strong> — invoice number, PO number, wire confirmation, timesheet batch. <em>Nobody posts an entry without documentation.</em></li></ul><p>The golden rule, with no exceptions: <strong>debits = credits on every entry, always.</strong> A <em>compound entry</em> uses multiple debits or multiple credits in a single entry (payroll is the classic example — one cash credit, several liability credits, an expense debit, and a tax expense debit). Compound entries are normal and encouraged; just keep the two sides equal.</p>", "callout": {"type": "tip", "html": "<strong>What a memo actually sounds like:</strong> <em>\"Record Jan offshore drafting per GCS-2026-091, 28-day terms, Tennessee Corridor build.\"</em> That memo tells any auditor exactly what happened, why, and where the source document lives. A memo that says \"AP\" is a firing offense at most firms."}}, {"type": "journal_entry_builder", "kicker": "Skarion journal entry builder", "title": "Record an offshore drafting invoice", "railLabel": "JE: offshore invoice", "scenarioHtml": "<p>Global CAD Solutions invoices Skarion Engineering for <strong>$7,200</strong> of LLD (low-level design) drafting on 160 miles of fiber route. No cash has moved yet — the bill has 30-day terms. Record the liability on receipt of the invoice.</p>", "startRows": 2, "accounts": ["1000 - Operating Checking", "1100 - Accounts Receivable", "2000 - Accounts Payable", "5100 - COGS — Subcontractor Drafting", "4000 - Engineering Design Revenue"], "solution": [{"account": "5100 - COGS — Subcontractor Drafting", "side": "debit", "amount": 7200.0}, {"account": "2000 - Accounts Payable", "side": "credit", "amount": 7200.0}]}, {"type": "journal_entry_builder", "kicker": "Skarion journal entry builder", "title": "Capitalize an annual software license", "railLabel": "JE: software prepaid", "scenarioHtml": "<p>Skarion pays <strong>$36,000</strong> up front for a 12-month Vetro FiberMap enterprise license, wired from the operating checking account. Because the benefit covers the whole year, you capitalize it as a Prepaid Asset — <em>not</em> expense it all at once.</p>", "startRows": 2, "accounts": ["1000 - Operating Checking", "1400 - Prepaid Software Licenses", "6500 - Software & Subscriptions", "5200 - COGS — Software Allocated to Projects"], "solution": [{"account": "1400 - Prepaid Software Licenses", "side": "debit", "amount": 36000.0}, {"account": "1000 - Operating Checking", "side": "credit", "amount": 36000.0}]}, {"type": "journal_entry_builder", "kicker": "Skarion journal entry builder", "title": "Record an engineer payroll run", "railLabel": "JE: payroll", "scenarioHtml": "<p>The US engineering payroll run totals <strong>$45,000</strong> in gross wages. Of that, <strong>$9,500</strong> is withheld for employee taxes and remitted to the government later. The remaining <strong>$35,500</strong> net pay is wired out of Operating Checking to the employees. This is a <em>compound entry</em> — three lines, two credits, one debit, balanced.</p>", "startRows": 3, "accounts": ["1000 - Operating Checking", "6000 - Salaries — US Engineering PMs", "2100 - Accrued Wages", "2200 - Payroll Tax Liabilities"], "solution": [{"account": "6000 - Salaries — US Engineering PMs", "side": "debit", "amount": 45000.0}, {"account": "2200 - Payroll Tax Liabilities", "side": "credit", "amount": 9500.0}, {"account": "1000 - Operating Checking", "side": "credit", "amount": 35500.0}]}, {"type": "timeline", "title": "The accounting cycle, end to end", "steps": [{"title": "1. Source document", "desc": "Invoice, timesheet, wire confirmation, PO. Every entry starts with proof — never an assumption."}, {"title": "2. Journal entry", "desc": "Analyze the document, identify the accounts, and record the debit(s) and credit(s) in the journal. Debits must equal credits."}, {"title": "3. Post to the GL", "desc": "The journal entry flows into each account in the general ledger. This is what builds the running balance of every account over time."}, {"title": "4. Trial balance", "desc": "List every account and its balance. Total debits should equal total credits — if not, you made a posting error and you stop here until you find it."}, {"title": "5. Adjusting entries", "desc": "Accruals, prepaids, depreciation, WIP revenue. These entries make the books match economic reality before the statements are produced."}, {"title": "6. Adjusted trial balance", "desc": "Re-run the trial balance after adjustments. Still must balance — and now it reflects accrual-basis reality."}, {"title": "7. Financial statements", "desc": "The adjusted trial balance rolls up into the Income Statement, Balance Sheet, and Cash Flow Statement. This is the deliverable management reads."}, {"title": "8. Close temporary accounts", "desc": "Revenue and expense accounts are closed to Retained Earnings so the new period starts clean. Asset, Liability, and Equity accounts carry forward."}]}, {"type": "quiz", "intro": "Four questions on the cycle you just walked. These come up in interviews — verbatim.", "title": "Accounting cycle & trial balance quiz", "questions": [{"q": "Skarion posts a $7,200 offshore drafting bill (no cash has moved). Which account is debited?", "options": ["2000 Accounts Payable", "1000 Operating Checking", "5100 COGS — Subcontractor Drafting", "1100 Accounts Receivable"], "correct_index": 2, "explanation": "The cost of subcontractor drafting is an expense (COGS) that increases with a debit. The liability to the vendor (AP) is credited. Cash is untouched until you pay the bill."}, {"q": "Skarion records a $36,000 prepaid Vetro license by debiting Prepaid Software and crediting Cash. Which account does NOT change in that entry?", "options": ["1400 Prepaid Software Licenses", "1000 Operating Checking", "6500 Software & Subscriptions", "Both Cash and Prepaid change"], "correct_index": 2, "explanation": "Only Prepaid Software (debit) and Cash (credit) move. Software Expense does not change at purchase — the $3,000/month expense comes later through amortization adjusting entries."}, {"q": "You run the trial balance and total debits equal total credits. What does that actually prove?", "options": ["Every entry was correct and posted to the right account", "The financial statements are ready to publish", "Every entry had equal debits and credits — nothing more", "There are no timing differences left to adjust"], "correct_index": 2, "explanation": "A balanced trial balance proves only that debits equal credits mechanically. It says nothing about whether the right accounts were used or whether accruals are correct. It is a necessary check, not proof of accuracy."}, {"q": "At year-end, which accounts are closed to Retained Earnings?", "options": ["Permanent accounts (Assets, Liabilities, Equity)", "Temporary accounts (Revenue and Expenses)", "All accounts are closed at year-end", "Only the Cash account is closed"], "correct_index": 1, "explanation": "Temporary accounts — Revenue and Expense — are closed to Retained Earnings so the next period starts at zero. Permanent accounts (Asset, Liability, Equity) carry their balances forward to the next period."}]}], "slug": "02-core-accounting-practice"}, {"title": "Accounts Payable & Payroll", "moduleTag": "Module 03", "dayMapping": "Day 3", "subhead": "The two largest cash outflows in any services firm — vendor invoices and payroll — and the controls that stop them from bleeding money through errors and fraud.", "hook": "\"How do you process a vendor invoice?\" Most candidates describe data entry. The right answer describes the three-way match, the hold-for-discrepancy process, and exactly which accounts move and when. This is the module that separates those two answers.", "chunks": [{"type": "review_quiz", "title": "Recall check — Modules 01–02 (spaced repetition)", "railLabel": "Review 1-2", "intro": "Before we start Accounts Payable, let's make sure the last two modules are locked in.", "questions": [{"q": "Under accrual accounting, when is revenue from an HLD delivery recognized?", "options": ["When the contract is signed", "When the client wires payment", "When the HLD is delivered and the obligation is satisfied", "At year-end"], "correct_index": 2, "explanation": "Accrual records revenue when earned — the HLD delivery date. Cash timing is irrelevant."}, {"q": "What is the normal balance of an expense account — debit or credit?", "options": ["Debit", "Credit", "Either, depending on the entry", "Expenses have no balance"], "correct_index": 0, "explanation": "Expenses increase with a debit. That's why Dr Depreciation Expense increases it."}, {"q": "A $36,000 software license paid in January (12-month term) — what is the balance in Prepaid Software on March 31st?", "options": ["$36,000", "$3,000", "$27,000", "$9,000"], "correct_index": 2, "explanation": "3 months amortized × $3,000 = $9,000 expensed. Prepaid remaining = $36,000 − $9,000 = $27,000."}, {"q": "What does the COA number range 2000–2999 represent?", "options": ["Assets", "Liabilities", "Equity", "Revenue"], "correct_index": 1, "explanation": "2000s are Liabilities — AP, accrued wages, payroll tax liabilities, etc."}, {"q": "What does GAAP stand for and who writes it?", "options": ["Generally Accepted Accounting Principles — the IRS", "Generally Accepted Accounting Principles — the FASB", "Government Accounting Audit Procedures — the SEC", "General Accounting Assessment Process — the AICPA"], "correct_index": 1, "explanation": "GAAP = Generally Accepted Accounting Principles, written and maintained by the FASB."}, {"q": "A company records $500K of revenue in December but doesn't receive cash until February. Which basis of accounting is this?", "options": ["Cash basis", "Accrual basis", "Tax basis", "Hybrid basis"], "correct_index": 1, "explanation": "Recording revenue when earned (December) rather than when cash arrives (February) is accrual basis."}, {"q": "What is the accounting equation?", "options": ["Debits = Credits", "Revenue − Expenses = Net Income", "Assets = Liabilities + Equity", "Beginning Retained Earnings + Net Income − Dividends"], "correct_index": 2, "explanation": "Assets = Liabilities + Equity. It governs every entry — Debits = Credits is the mechanical check of it."}]}, {"type": "video", "kicker": "Chunk 34 — Watch first", "title": "The 3-Way Match — Why You Never Pay an Invoice on Faith", "railLabel": "Video: 3-way", "intro": "One of the most powerful internal controls in AP — and one of the most common interview questions. Here is exactly how it works.", "transcript": "<p><strong>0:00 —</strong> The 3-way match is one of the most powerful internal controls in accounts payable. And it is one of the most common interview questions for any entry-level accounting role.</p><p><strong>0:30 —</strong> You need three documents to agree before you can pay a vendor invoice: the Purchase Order (your company authorized the spend), the Receiving Report (the goods/services were actually delivered), and the Vendor Invoice (the amount billed matches what was ordered and delivered). All three numbers have to align on quantity, unit price, and total. Where all three overlap: pay it. Where only two overlap: hold it.</p><p><strong>1:30 —</strong> A real example from Skarion's AP files. Invoice GCS-2026-087 from Global CAD Solutions. The MSA rate was $38.50 per mile. But the invoice billed $42.00 per mile — a $178.75 overage on 50 miles. The right move: hold the invoice and request a credit memo. Do not pay it.</p><p><strong>2:30 —</strong> The 3-way match catches vendor billing errors, pricing changes that slipped through, duplicate invoices, and in worst cases, fraud. It only works if you actually do it on every invoice — not just the big ones.</p><p><strong>3:20 —</strong> In the exercise coming up, you will get a batch of invoices and decide: pay, hold, or escalate. Use the 3-way match. The answer is in the documents.</p>"}, {"type": "content", "kicker": "The cycle", "title": "AP workflow and the 3-way match", "bodyHtml": "<p>Accounts Payable is not typing numbers into a system. It is a <strong>governed cycle</strong> designed to ensure the company only pays for goods and services it actually authorized, received, and was correctly charged for. The cycle is:</p><ol><li><strong>PO issuance</strong> — a purchase order is created and approved <em>before</em> the vendor is engaged.</li><li><strong>Vendor invoice received</strong> — the bill arrives, and is routed to AP.</li><li><strong>3-way match</strong> — AP compares the <em>Purchase Order</em>, the <em>Receiving Report</em> (or delivery confirmation), and the <em>Vendor Invoice</em>. All three must agree on quantity, unit price, and total.</li><li><strong>Approval</strong> — the responsible PM or budget owner signs off.</li><li><strong>Payment</strong> — released on the scheduled payment run according to terms.</li></ol><p><strong>What happens when they don't match:</strong> the invoice is <em>held</em>. You do not pay it. You contact the vendor, document the discrepancy, and request a corrected invoice or credit memo. Paying an invoice that fails the match is the single most common way firms lose money through carelessness, not fraud.</p>", "callout": {"type": "danger", "html": "<strong>Real scenario.</strong> Global CAD Solutions invoice <em>GCS-2026-087</em> billed <strong>$42.00</strong> per drafted mile, but the master services agreement (MSA) states <strong>$38.50</strong> per mile. On 50 miles that is a <strong>$178.75</strong> variance. Do you pay it? <strong>No.</strong> Hold it, raise a dispute, and request a credit memo for the difference. Document everything."}}, {"type": "hotspot", "kicker": "Visual analysis", "title": "Analyze an offshore drafting invoice — what to check before paying", "image": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI3MDAiIGhlaWdodD0iMTAwMCIgdmlld0JveD0iMCAwIDcwMCAxMDAwIiBmb250LWZhbWlseT0iQXJpYWwsIEhlbHZldGljYSwgc2Fucy1zZXJpZiI+CjxyZWN0IHdpZHRoPSI3MDAiIGhlaWdodD0iMTAwMCIgZmlsbD0iI2Y3ZjlmYyIvPgo8cmVjdCB4PSIwIiB5PSIwIiB3aWR0aD0iNzAwIiBoZWlnaHQ9IjE1MCIgZmlsbD0iIzBmMmM0ZiIvPgo8dGV4dCB4PSI0MCIgeT0iNzAiIGZpbGw9IiNmZmZmZmYiIGZvbnQtc2l6ZT0iNDAiIGZvbnQtd2VpZ2h0PSJib2xkIj5HTE9CQUwgQ0FEIFNPTFVUSU9OUzwvdGV4dD4KPHRleHQgeD0iNDAiIHk9IjExNSIgZmlsbD0iIzlkYjdkNiIgZm9udC1zaXplPSIyMiI+T2Zmc2hvcmUgRmliZXIgRGVzaWduIOKAlCBWZW5kb3IgSW52b2ljZTwvdGV4dD4KPGcgZm9udC1zaXplPSIzMCIgZmlsbD0iIzBmMmM0ZiI+Cjx0ZXh0IHg9IjQwIiB5PSIxODAiIGZvbnQtc2l6ZT0iMjAiIGZpbGw9IiM1YTZiODAiPklOVk9JQ0UgTlVNQkVSPC90ZXh0Pgo8dGV4dCB4PSI0MCIgeT0iMjI1IiBmb250LXdlaWdodD0iYm9sZCI+R0NTLTIwMjYtMDkxPC90ZXh0Pgo8cmVjdCB4PSI0MCIgeT0iMjQ1IiB3aWR0aD0iNjIwIiBoZWlnaHQ9IjYiIGZpbGw9IiNlM2U5ZjIiLz4KPHRleHQgeD0iNDAiIHk9IjM0MCIgZm9udC1zaXplPSIyMCIgZmlsbD0iIzVhNmI4MCI+UFJPSkVDVCBDT0RFPC90ZXh0Pgo8dGV4dCB4PSI0MCIgeT0iMzg1IiBmb250LXdlaWdodD0iYm9sZCI+VE4tQ09SUklET1ItRklCRVI8L3RleHQ+CjxyZWN0IHg9IjQwIiB5PSI0MDUiIHdpZHRoPSI2MjAiIGhlaWdodD0iNiIgZmlsbD0iI2UzZTlmMiIvPgo8dGV4dCB4PSI0MCIgeT0iNTQwIiBmb250LXNpemU9IjIwIiBmaWxsPSIjNWE2YjgwIj5VTklUIFBSSUNFIFBFUiBNSUxFPC90ZXh0Pgo8dGV4dCB4PSI0MCIgeT0iNTg1IiBmb250LXNpemU9IjM0IiBmb250LXdlaWdodD0iYm9sZCIgZmlsbD0iI2IwMDAyMCI+JDQyLjAwL21pbGU8L3RleHQ+Cjx0ZXh0IHg9IjQwIiB5PSI2MjUiIGZvbnQtc2l6ZT0iMjAiIGZpbGw9IiM1YTZiODAiPk1TQSByYXRlOiAkMzguNTAvbWlsZSDigJQgRElTQ1JFUEFOQ1k8L3RleHQ+CjxyZWN0IHg9IjQwIiB5PSI2NDUiIHdpZHRoPSI2MjAiIGhlaWdodD0iNiIgZmlsbD0iI2UzZTlmMiIvPgo8dGV4dCB4PSI0MCIgeT0iNzYwIiBmb250LXNpemU9IjIwIiBmaWxsPSIjNWE2YjgwIj5QQVlNRU5UIFRFUk1TPC90ZXh0Pgo8dGV4dCB4PSI0MCIgeT0iODA1IiBmb250LXdlaWdodD0iYm9sZCI+TmV0LTMwPC90ZXh0Pgo8cmVjdCB4PSI0MCIgeT0iODI1IiB3aWR0aD0iNjIwIiBoZWlnaHQ9IjYiIGZpbGw9IiNlM2U5ZjIiLz4KPHRleHQgeD0iNDAiIHk9IjkyMCIgZm9udC1zaXplPSIyMCIgZmlsbD0iIzVhNmI4MCI+VE9UQUwgYW5kIFJFTUlUVEFOQ0U8L3RleHQ+Cjx0ZXh0IHg9IjQwIiB5PSI5NjUiIGZvbnQtd2VpZ2h0PSJib2xkIiBmb250LXNpemU9IjMyIj4kOSw2MjUuMDA8L3RleHQ+Cjx0ZXh0IHg9IjI2MCIgeT0iOTY1IiBmb250LXNpemU9IjIwIiBmaWxsPSIjNWE2YjgwIj5SZW1pdDogd2lyZSB0byBHbG9iYWwgQ0FEIGFjY3Q8L3RleHQ+CjwvZz4KPC9zdmc+", "hotspots": [{"x": 50, "y": 14, "label": "Invoice number", "info": "Enter exactly as printed. Duplicates are rejected by the system to prevent double-payment — a wrong digit here can void the match."}, {"x": 50, "y": 30, "label": "Project code", "info": "Must be tagged to the specific fiber build (e.g. Tennessee Corridor). This tag drives profitability and the COGS allocation per project."}, {"x": 50, "y": 50, "label": "Unit price per mile", "info": "Compare against the MSA rate. GCS MSA is $38.50/mile — anything higher is a hold-for-discrepancy, never auto-pay."}, {"x": 50, "y": 72, "label": "Payment terms", "info": "Net-30, Net-45 — this drives which payment run it lands on and how it ages on the AP report."}, {"x": 50, "y": 88, "label": "Total + remittance", "info": "Recompute quantity × unit price. Confirm it ties to the PO and receiving report before release."}]}, {"type": "content", "kicker": "The method", "title": "When the liability is recorded — and the payment run", "bodyHtml": "<p>Under accrual accounting, the AP liability is recorded <strong>when the invoice is received and the obligation exists</strong>, <em>not</em> when you cut the check. This matters because it changes which period's expenses and liabilities the bill lands in.</p><p><strong>Recording the liability:</strong> Debit the expense (or asset) account, Credit Accounts Payable. The vendor is now owed, and the cost is in the correct period.</p><p><strong>The payment run:</strong> a batch of approved invoices selected for payment by due date and cash availability. Payment <em>clears</em> the AP balance — it is a separate, later event. Recording the liability and paying the bill are two distinct journal entries.</p><p><strong>AP aging report</strong> buckets what you owe by how long it has been sitting:</p><table class='data'><tr><th>Bucket</th><th>What it tells you</th></tr><tr><td>0–30 days</td><td>On terms — normal. The bulk of a healthy AP sits here.</td></tr><tr><td>31–60 days</td><td>Approaching terms limit — review vendor-by-vendor.</td></tr><tr><td>61–90 days</td><td>Late. Vendor relationships and early-pay discounts are at risk.</td></tr><tr><td>90+ days</td><td>Delinquent. Possible late fees, supplier credit holds, and a cash-flow red flag the controller will ask about.</td></tr></table>", "callout": {"type": "tip", "html": "<strong>Early payment discounts — 2/10 Net 30.</strong> \"2/10 Net 30\" means a 2% discount if paid within 10 days, otherwise full amount due in 30. On a $10,000 invoice that is a $200 saving for paying 20 days early — an implied ~36% annual return. Capturing it deliberately is a real cash management decision a controller will ask you to justify."}}, {"type": "journal_entry_builder", "kicker": "Skarion JE builder — receive invoice", "title": "Record a vendor invoice on receipt (no cash yet)", "railLabel": "JE: receive AP", "scenarioHtml": "<p>Global CAD Solutions sends invoice <strong>GCS-2026-091</strong> for <strong>$9,625</strong> of offshore LLD drafting on the Tennessee Corridor build. Terms are Net-30. No cash has moved — record the liability <em>now</em> in the correct period.</p>", "startRows": 2, "accounts": ["1000 - Operating Checking", "1100 - Accounts Receivable", "2000 - Accounts Payable", "5100 - COGS — Subcontractor Drafting", "4000 - Engineering Design Revenue"], "solution": [{"account": "5100 - COGS — Subcontractor Drafting", "side": "debit", "amount": 9625.0}, {"account": "2000 - Accounts Payable", "side": "credit", "amount": 9625.0}]}, {"type": "journal_entry_builder", "kicker": "Skarion JE builder — payment run", "title": "Process the payment, including the wire fee", "railLabel": "JE: pay AP", "scenarioHtml": "<p>28 days later you wire payment of <strong>$9,625</strong> to Global CAD for invoice GCS-2026-091. The bank charges a <strong>$25</strong> outgoing wire fee in addition. Record the payment clearing the AP and the fee hitting expense.</p>", "startRows": 3, "accounts": ["1000 - Operating Checking", "2000 - Accounts Payable", "6900 - Bank Fees Expense", "5100 - COGS — Subcontractor Drafting", "6500 - Software & Subscriptions", "6400 - Travel & Field Expense"], "solution": [{"account": "2000 - Accounts Payable", "side": "debit", "amount": 9625.0}, {"account": "6900 - Bank Fees Expense", "side": "debit", "amount": 25.0}, {"account": "1000 - Operating Checking", "side": "credit", "amount": 9650.0}]}, {"type": "video", "kicker": "Chunk 40 — Watch first", "title": "Payroll — What Actually Gets Withheld and Why", "railLabel": "Video: Payroll", "intro": "Gross pay is what the employee earns. Net pay is what they take home. The difference is your problem.", "transcript": "<p><strong>0:00 —</strong> Gross pay is what the employee earns. Net pay is what they take home. The difference is your problem — you have to withhold it, remit it, and account for it correctly.</p><p><strong>0:15 —</strong> There are four big things withheld from a W2 employee's paycheck. Federal income tax — based on the W-4 the employee filed. FICA, which is Social Security (6.2% up to a wage cap) plus Medicare (1.45%, no cap). State income tax where applicable. And any voluntary deductions like 401(k) or health premiums.</p><p><strong>1:00 —</strong> The employer also pays a matching FICA — another 7.65% — plus FUTA and SUTA unemployment. So on Skarion's $79,167 monthly gross payroll, employee withholdings total $21,056, employer taxes add $6,256, and $58,111 is the net cash wired to employees.</p><p><strong>2:00 —</strong> The full entry: Debit Salaries Expense $79,167 and Payroll Tax Expense $6,256; Credit Payroll Tax Liabilities $27,312 and Credit Cash $58,111. The liabilities get cleared later when the tax deposits are made.</p><p><strong>3:00 —</strong> 1099 contractors are different. No withholding, no employer FICA. You just pay the invoice through Accounts Payable. That's why misclassifying a W2 worker as a 1099 creates real IRS exposure — the company is skipping withholdings it legally owed.</p><p><strong>3:40 —</strong> In the payroll entry lab next, you will post this full compound entry yourself.</p>"}, {"type": "content", "kicker": "The legal line", "title": "W2 employees vs. 1099 contractors — and why accounting cares", "bodyHtml": "<p>The US tax system draws a hard line between two ways a person can do work for your company:</p><table class='data'><tr><th>W2 Employee</th><th>1099 Contractor</th></tr><tr><td>On US payroll; Skarion withholds income tax, Social Security, and Medicare.</td><td>Self-employed; Skarion pays a flat invoice and the contractor handles their own taxes.</td></tr><tr><td>Creates <strong>payroll tax liabilities</strong> — employer FICA, FUTA, SUTA.</td><td>Routed straight through <strong>Accounts Payable</strong> as a vendor invoice.</td></tr><tr><td>Skarion's 10 US Engineering Project Managers.</td><td>Offshore drafting firms like Global CAD Solutions.</td></tr></table><p><strong>Why accounting cares:</strong> a W2 run touches Cash, a Salary Expense account, and multiple payroll tax liability accounts in one compound entry. A 1099 contractor is a single AP entry. Getting that backwards creates IRS exposure for the company. This is the kind of distinction an interviewer probes to see whether you've actually run payroll.</p><p><strong>Skarion's payroll economics:</strong></p><ul><li>US Team (W2): 10 Project Managers, avg $95,000/year ≈ <strong>$79,167/month</strong> gross.</li><li>Employer taxes: FICA 7.65% ≈ $6,056/month, FUTA/SUTA ≈ $200/month.</li><li>Offshore contractors (1099/AP): ≈ <strong>$42,000–$60,000/month</strong> in drafting invoices.</li></ul>"}, {"type": "spreadsheet_lab", "kicker": "Chunk 64 — Live in-browser lab", "title": "Payroll Journal Entry Builder — January (live Excel)", "railLabel": "Live payroll", "scenarioHtml": "<p>Calculate Skarion's January US payroll in the live sheet below. Enter the <strong>gross wages</strong> ($79,167) — it's pre-filled and locked. Then compute each withholding, the employer taxes, total withholdings, and net pay. The lab validates when Total Withholdings = <strong>$21,056</strong>, Net Pay = <strong>$58,111</strong>, and the journal entry you post below the grid balances ($85,423 DR = $85,423 CR).</p><p><em>Rates: Federal income tax 19% of gross; Social Security 6.2%; Medicare 1.45%; State 4%. Employer totals $6,256 (FICA match + FUTA/SUTA).</em></p>", "columns": [{"title": "Payroll component", "type": "text", "width": 280, "readOnly": true}, {"title": "Rate", "type": "text", "width": 110, "readOnly": true}, {"title": "Amount ($)", "type": "numeric", "width": 130, "mask": "#,##0.00", "readOnly": false}], "data": [["Gross wages (W2, 10 US PMs)", "given", 79167.0], ["Employee — Federal income tax", "19.00%", null], ["Employee — Social Security", "6.20%", null], ["Employee — Medicare", "1.45%", null], ["Employee — State income tax", "4.00%", null], ["= Total employee withholdings", "sum", null], ["Employer taxes (FICA + FUTA/SUTA)", "given", 6256.0], ["= Net pay to employees", "given-calc", null], ["Total debits (Salaries + Payroll Tax Exp)", "sum", null], ["Total credits (Liabilities + Cash)", "sum", null]], "lockedCells": ["A1", "A2", "A3", "A4", "A5", "A6", "A7", "A8", "A9", "A10", "B1", "B2", "B3", "B4", "B5", "B6", "B7", "B8", "C1", "C7"], "targetCells": {"C6": 21056.0, "C8": 58111.0, "C9": 85423.0, "C10": 85423.0}, "requireBothSidesEqual": true, "successMessage": "✅ Payroll balances: $85,423 debits = $85,423 credits, net pay $58,111. Payroll entry complete.", "errorMessage": "❌ Not balanced yet. Withholdings should total $21,056; net pay $58,111; debits & credits each $85,423. Check your rate × gross calculations.", "journalSection": {"label": "Post the full payroll journal entry", "rows": 4, "accounts": ["6000 Salaries — US Engineering PMs", "6100 Payroll Tax Expense", "2200 Payroll Tax Liabilities", "1000 Operating Checking", "2100 Accrued Wages", "1100 Accounts Receivable"], "solution": [{"account": "6000 Salaries — US Engineering PMs", "side": "debit", "amount": 79167.0}, {"account": "6100 Payroll Tax Expense", "side": "debit", "amount": 6256.0}, {"account": "2200 Payroll Tax Liabilities", "side": "credit", "amount": 27312.0}, {"account": "1000 Operating Checking", "side": "credit", "amount": 58111.0}]}}, {"type": "journal_entry_builder", "kicker": "Skarion JE builder — full payroll", "title": "Record the full US payroll run", "railLabel": "JE: payroll entry", "scenarioHtml": "<p>Record January's US payroll. <strong>Gross wages: $79,167.</strong> Employee withholdings: federal income tax $15,000, Social Security $4,908, Medicare $1,148 — total <strong>$21,056 withheld</strong>. Employer taxes add <strong>$6,256</strong> (the company's own expense). Net pay of <strong>$58,111</strong> is wired to employees. Record the gross wage expense, the employer tax expense, the cash out, and the liabilities owed to the government.</p>", "startRows": 4, "accounts": ["1000 - Operating Checking", "6000 - Salaries — US Engineering PMs", "6100 - Payroll Tax Expense", "2200 - Payroll Tax Liabilities", "2100 - Accrued Wages", "1100 - Accounts Receivable"], "solution": [{"account": "6000 - Salaries — US Engineering PMs", "side": "debit", "amount": 79167.0}, {"account": "6100 - Payroll Tax Expense", "side": "debit", "amount": 6256.0}, {"account": "2200 - Payroll Tax Liabilities", "side": "credit", "amount": 27312.0}, {"account": "1000 - Operating Checking", "side": "credit", "amount": 58111.0}]}, {"type": "content", "kicker": "Accrual mechanics", "title": "Accruals, prepaids, and reversals", "bodyHtml": "<p>Three of the most common interview questions live here, and they are all consequences of the accrual principle:</p><p><strong>Accruals.</strong> Record an expense before the invoice arrives. Skarion's offshore team completes $12,400 of drafting in January; the invoice does not land until February 5th. The work happened in January, so the expense belongs in January. The January 31st entry: <em>Debit COGS — Subcontractor Drafting $12,400 / Credit Accrued Liabilities $12,400.</em></p><p><strong>Reversals.</strong> On February 1st you <em>reverse</em> the accrual (Debit Accrued Liabilities / Credit COGS), so that when the real invoice is entered on February 5th the net effect is exactly one expense, in one period — not double-counted.</p><p><strong>Prepaids.</strong> Cash paid now, expensed later through an amortization schedule. The $36,000 Vetro license paid July 1st is a <strong>$3,000/month</strong> expense. Each month: <em>Debit Software Expense $3,000 / Credit Prepaid Software $3,000.</em> This is the single most common adjusting entry you will post at month-end.</p>"}, {"type": "flip_cards", "kicker": "Quick check", "title": "AP and payroll vocabulary — know these cold", "railLabel": "Flip cards", "cards": [{"front": "Accrual", "back": "Recording an expense in the period it was incurred, before the invoice arrives. Skarion accrues $12,400 of January offshore work invoiced in February so January's books are complete."}, {"front": "Reversal", "back": "Undoing an accrual entry on the first day of the next period, so the real invoice doesn't double-count the expense. Debit Accrued Liabilities / Credit COGS on Feb 1 cancels the Jan 31 accrual."}, {"front": "Prepaid", "back": "Cash paid now for a benefit that spans future periods — recorded as an asset and amortized to expense over time. The $36,000 Vetro license is prepaid, amortized $3,000/month."}, {"front": "Amortization", "back": "The systematic allocation of a prepaid asset to expense across benefited periods. Straight-line amortization of the 12-month Vetro license = $3,000/month for 12 months."}, {"front": "Accrued Wages", "back": "Wages earned by employees but not yet paid at period-end. A month-end accrual captures the days worked before payday so the salary expense lands in the correct month."}]}, {"type": "quiz", "intro": "Three accrual and prepaid questions that show up almost verbatim in entry-level interviews.", "title": "Accruals, prepaids & AP quiz", "questions": [{"q": "Skarion's offshore team completes $12,400 of drafting in January. The invoice arrives February 3rd. What is the January 31st entry?", "options": ["Wait — only record it when the invoice arrives in February", "Debit COGS — Subcontractor Drafting $12,400 / Credit Accrued Liabilities $12,400", "Debit Accounts Payable $12,400 / Credit Cash $12,400", "Debit Prepaid Software $12,400 / Credit Cash $12,400"], "correct_index": 1, "explanation": "The expense belongs in January because that is when the work was performed. Accrue it: debit the expense, credit an accrued liability. The entry reverses on Feb 1 so the real Feb 3 invoice doesn't double-count it."}, {"q": "Skarion paid $36,000 for a 12-month Vetro license on July 1st, recorded as a prepaid. What is the balance of Prepaid Software Licenses on November 30th?", "options": ["$36,000", "$3,000", "$15,000", "$21,000"], "correct_index": 3, "explanation": "From July 1 to Nov 30 is 5 months of amortization at $3,000/month = $15,000 expensed. Remaining prepaid = $36,000 − $15,000 = $21,000 (7 months of benefit left)."}, {"q": "What is the employer's portion of FICA tax as a percentage of gross wages?", "options": ["7.65% (6.2% Social Security + 1.45% Medicare)", "15.3% — double the employee side", "0% — FICA is only an employee tax", "1.45% — only Medicare"], "correct_index": 0, "explanation": "Employer FICA is 7.65% — matching the employee's 7.65%. Both pay 6.2% Social Security (up to the wage cap) plus 1.45% Medicare (no cap). Skarion's ~$79,167 monthly gross ≈ $6,056/month employer FICA."}]}, {"type": "scenario_lab", "title": "Scenario Lab — The Offshore Invoice Dispute", "railLabel": "Lab: dispute", "time": "60 min", "intro": "A vendor invoice fails the 3-way match on a contract clause that was never agreed. Diagnose, hold, and decide the journal entries for both possible outcomes.", "setup": "<p>Global CAD Solutions sends invoice <strong>GCS-2026-147</strong> for <strong>$18,750</strong>. The PO covers 500 miles of HLD drafting at <strong>$35.00/mile</strong> = $17,500 of agreed work. But the invoice also includes a line item for <strong>\"Rush premium — 15%\" = $2,812.50</strong>. No rush premium was agreed to in the Master Services Agreement.</p><p>The receiving report confirms 500 miles were actually drafted and delivered.</p>", "tasks": ["Run the 3-way match and document each discrepancy (price agreed vs. billed; the disputed rush-premium line).", "Calculate what should be paid ($17,500) vs. what was billed ($18,750) and state the disputed amount ($2,812.50).", "Draft the hold-notice memo to GCS — request removal of the rush-premium line or a formal credit memo.", "Post the correct <em>partial</em> accrual for the undisputed $17,500 portion only (Dr COGS — Subcontractor Drafting $17,500 / Cr Accrued Liabilities $17,500) until the dispute is resolved.", "Explain the journal entry if the dispute is resolved in Skarion's favor (rush premium dropped) vs. in GCS's favor (Skarion accepts the $2,812.50 premium)."], "submissionPrompt": "Paste your 3-way match notes, the hold memo, the partial-acrual journal entry, and the two resolution journal entries. Confirm which supervisor you escalated to.", "solution": "<p><strong>3-way match result:</strong> Quantity (500 miles) matches across PO, receiving, and invoice — OK. Unit price ($35/mile) matches the PO — OK. <em>But</em> the rush-premium line ($2,812.50) is not in the PO or the MSA — it fails the match and the invoice must be held.</p><p><strong>Amounts:</strong> Undisputed $17,500. Disputed $2,812.50. Do not pay the disputed portion.</p><p><strong>Partial accrual (undisputed only):</strong> Dr 5100 COGS — Subcontractor Drafting $17,500 / Cr 2400 Accrued Liabilities $17,500. Book only what is genuinely owed; the disputed amount stays off the books until resolved.</p><p><strong>If resolved in Skarion's favor</strong> (premium dropped): on invoice payment, Dr 2000 Accounts Payable $17,500 / Cr 1000 Operating Checking $17,750 (= $17,500 + ~$25 wire fee) and Cr 6900 Bank Fees $25 — actually wire net via AP. The disputed $2,812.50 is never recorded as an expense.</p><p><strong>If resolved in GCS's favor</strong> (premium accepted): Dr 5100 COGS — Subcontractor Drafting $2,812.50 / Cr 2000 Accounts Payable $2,812.50 to add the now-accepted premium, then pay the full $20,062.50 ($18,750 + fees). Always document the supervisor's written approval before accepting an out-of-contract charge.</p>"}], "slug": "03-ap-and-payroll"}, {"title": "Accounts Receivable & Billing", "moduleTag": "Module 04", "dayMapping": "Day 4", "subhead": "Revenue recognition under ASC 606, the invoicing workflow, the AR aging report, and the allowance method that keeps bad debt honest rather than ignored.", "hook": "\"When do you record revenue on a $2.4 million contract?\" The wrong answer is \"when we get paid\" or \"when the contract is signed.\" The right answer walks through the five-step ASC 606 model and names exactly when each deliverable is satisfied. After this module, that is your answer.", "chunks": [{"type": "video", "kicker": "Chunk 39 — Watch first", "title": "Revenue Recognition in 3 Minutes (ASC 606)", "railLabel": "Video: ASC 606", "intro": "A client signs a $2.4M contract. When do you record the $2.4M? The wrong answer costs companies millions in restatements.", "transcript": "<p><strong>0:00 —</strong> A client signs a $2.4 million contract. When do you record the $2.4M of revenue? The wrong answer costs companies millions in restatements, so listen carefully.</p><p><strong>0:20 —</strong> ASC 606 is a five-step model. Identify the contract. Identify the distinct performance obligations — for a fiber design that's HLD, LLD, and a splice/permit package, three separate obligations. Determine the transaction price. Allocate that price to each obligation. Then recognize revenue when (or as) each obligation is satisfied.</p><p><strong>1:00 —</strong> For Skarion's $2.4M contract over 3,000 miles: the $2.4M is not revenue at signing. It's not revenue when cash arrives. It becomes revenue as each deliverable is accepted — 40% at HLD delivery, 40% at LLD, 20% at the final permit package.</p><p><strong>1:40 —</strong> Two balance-sheet accounts keep this honest. Deferred Revenue is cash received before work is done — a liability, not revenue. Unbilled AR (WIP) is work done but not yet at a billing milestone — an asset, value already created. Both exist precisely because \"when cash moves\" is the wrong question.</p><p><strong>2:20 —</strong> Get this wrong and you overstate revenue. Get it right and your financials match the economics of the contract. That's the entire point of ASC 606.</p>"}, {"type": "content", "kicker": "The standard", "title": "Revenue recognition and ASC 606 — the 5-step model", "bodyHtml": "<p><strong>ASC 606</strong> is the GAAP standard for revenue recognition, and it is built on one principle: <em>recognize revenue when (or as) the entity satisfies a performance obligation</em> — not when cash arrives, and not when the contract is signed. The model has five steps:</p><ol><li><strong>Identify the contract</strong> with the customer.</li><li><strong>Identify the distinct performance obligations</strong> — e.g. HLD delivery, LLD delivery, splice/permit package are <em>three</em> separate obligations.</li><li><strong>Determine the transaction price.</strong></li><li><strong>Allocate the transaction price</strong> to each performance obligation.</li><li><strong>Recognize revenue</strong> when (or as) each obligation is satisfied.</li></ol><p><strong>Why it matters at Skarion:</strong> the firm signs a <strong>$2.4M contract</strong> for a 3,000-mile fiber design. The $2.4M is <em>not</em> revenue when the contract is signed, and it is not revenue when the cash arrives. It becomes revenue only as each deliverable is completed and accepted. Getting this wrong overstates revenue and triggers audit restatements.</p><p>Two accounts keep this honest on the balance sheet:</p><ul><li><strong>Deferred Revenue (a liability)</strong> — client pays <em>before</em> work is done. The cash is in, but it is not yet earned.</li><li><strong>Unbilled AR / WIP (an asset)</strong> — work is done or in progress but the billing milestone has not triggered yet. Value has been created; the invoice just has not been cut.</li></ul>"}, {"type": "timeline", "title": "When the $2.4M becomes revenue — milestone timeline", "steps": [{"title": "Contract signed", "desc": "Skarion signs a $2.4M design contract for 3,000 miles. No revenue yet — only a performance obligation is created."}, {"title": "HLD delivered (40%)", "desc": "High-Level Design package accepted by the client. Recognize $960,000 of revenue. Debit AR / Credit Engineering Design Revenue."}, {"title": "LLD delivered (40%)", "desc": "Low-Level Design completion approved. Recognize a further $960,000 of revenue at the LLD milestone."}, {"title": "Splice/Permit package (20%)", "desc": "Final permitting and splice documentation delivered. Recognize the remaining $480,000. Contract fully earned."}]}, {"type": "content", "kicker": "The workflow", "title": "Creating the AR invoice and recording it", "bodyHtml": "<p>An AR invoice is not generated casually. The workflow is: <em>project milestone triggers the invoice</em> → <em>Project Manager approves</em> → <em>accounting creates the invoice in the billing system</em> → <em>journal entry debits Accounts Receivable and credits Engineering Design Revenue</em>. The invoice then sits open in the AR subledger until cash is applied in Module 05.</p>", "callout": {"type": "tip", "html": "<strong>Internal control signal:</strong> invoice numbers are <em>sequential</em>. A gap in the sequence is a red flag an auditor will chase — it suggests a voided, deleted, or skipped invoice. Always be able to explain every invoice number gap with a documented void or credit memo."}}, {"type": "hotspot", "kicker": "Visual analysis", "title": "Analyze a Skarion AR invoice — what every field controls", "image": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI3MDAiIGhlaWdodD0iMTAwMCIgdmlld0JveD0iMCAwIDcwMCAxMDAwIiBmb250LWZhbWlseT0iQXJpYWwsIEhlbHZldGljYSwgc2Fucy1zZXJpZiI+CjxyZWN0IHdpZHRoPSI3MDAiIGhlaWdodD0iMTAwMCIgZmlsbD0iI2Y3ZjlmYyIvPgo8cmVjdCB4PSIwIiB5PSIwIiB3aWR0aD0iNzAwIiBoZWlnaHQ9IjE1MCIgZmlsbD0iIzBhNGQyYyIvPgo8dGV4dCB4PSI0MCIgeT0iNzAiIGZpbGw9IiNmZmZmZmYiIGZvbnQtc2l6ZT0iNDAiIGZvbnQtd2VpZ2h0PSJib2xkIj5TS0FSSU9OIEVOR0lORUVSSU5HPC90ZXh0Pgo8dGV4dCB4PSI0MCIgeT0iMTE1IiBmaWxsPSIjYTlkOWJmIiBmb250LXNpemU9IjIyIj5DdXN0b21lciBJbnZvaWNlIOKAlCBFbmdpbmVlcmluZyBEZXNpZ248L3RleHQ+CjxnIGZvbnQtc2l6ZT0iMzAiIGZpbGw9IiMwYTRkMmMiPgo8dGV4dCB4PSI0MCIgeT0iMTgwIiBmb250LXNpemU9IjIwIiBmaWxsPSIjNGE2YjVhIj5JTlZPSUNFIE5VTUJFUjwvdGV4dD4KPHRleHQgeD0iNDAiIHk9IjIyNSIgZm9udC13ZWlnaHQ9ImJvbGQiPlNNSS0yMDI2LTAxNDwvdGV4dD4KPHJlY3QgeD0iNDAiIHk9IjI0NSIgd2lkdGg9IjYyMCIgaGVpZ2h0PSI2IiBmaWxsPSIjZDZlOGRlIi8+Cjx0ZXh0IHg9IjQwIiB5PSIzNDAiIGZvbnQtc2l6ZT0iMjAiIGZpbGw9IiM0YTZiNWEiPkNPTlRSQUNUIFJFRkVSRU5DRTwvdGV4dD4KPHRleHQgeD0iNDAiIHk9IjM4NSIgZm9udC13ZWlnaHQ9ImJvbGQiPk1TQS1UTi0yMDI2PC90ZXh0Pgo8cmVjdCB4PSI0MCIgeT0iNDA1IiB3aWR0aD0iNjIwIiBoZWlnaHQ9IjYiIGZpbGw9IiNkNmU4ZGUiLz4KPHRleHQgeD0iNDAiIHk9IjU0MCIgZm9udC1zaXplPSIyMCIgZmlsbD0iIzRhNmI1YSI+TElORSBJVEVNUyBCWSBERUxJVkVSQUJMRTwvdGV4dD4KPHRleHQgeD0iNDAiIHk9IjU4MCIgZm9udC1zaXplPSIyNiI+SExEIFNlY3Rpb24gQSA nvoices the client <strong>$480,000</strong>. No cash yet — record the receivable and the earned revenue.</p>", "startRows": 2, "accounts": ["1000 - Operating Checking", "1100 - Accounts Receivable", "2500 - Deferred Revenue", "1200 - Unbilled AR (WIP)", "4000 - Engineering Design Revenue"], "solution": [{"account": "1100 - Accounts Receivable", "side": "debit", "amount": 480000.0}, {"account": "4000 - Engineering Design Revenue", "side": "credit", "amount": 480000.0}]}, {"type": "journal_entry_builder", "kicker": "Skarion JE builder — deferred revenue", "title": "Client prepays — record the deferred revenue liability", "railLabel": "JE: deferred rev", "scenarioHtml": "<p>A client prepays <strong>$120,000</strong> before any work has begun. Cash is in the bank, but the performance obligation has not been satisfied — so it is a <em>liability</em>, not revenue. Record the cash receipt and the deferred revenue liability.</p>", "startRows": 2, "accounts": ["1000 - Operating Checking", "1100 - Accounts Receivable", "2500 - Deferred Revenue", "4000 - Engineering Design Revenue"], "solution": [{"account": "1000 - Operating Checking", "side": "debit", "amount": 120000.0}, {"account": "2500 - Deferred Revenue", "side": "credit", "amount": 120000.0}]}, {"type": "journal_entry_builder", "kicker": "Skarion JE builder — recognize deferred", "title": "Deliver the work — release the deferred revenue", "railLabel": "JE: recognize rev", "scenarioHtml": "<p>The work the client prepaid for is now delivered and accepted. The performance obligation is satisfied — release the <strong>$120,000</strong> from Deferred Revenue onto the income statement as earned Engineering Design Revenue.</p>", "startRows": 2, "accounts": ["1000 - Operating Checking", "2500 - Deferred Revenue", "1100 - Accounts Receivable", "4000 - Engineering Design Revenue"], "solution": [{"account": "2500 - Deferred Revenue", "side": "debit", "amount": 120000.0}, {"account": "4000 - Engineering Design Revenue", "side": "credit", "amount": 120000.0}]}, {"type": "video", "kicker": "Chunk 41 — Watch first", "title": "What is Accounts Receivable Aging and Why It Matters", "railLabel": "Video: AR aging", "intro": "A business can be profitable and still run out of cash. The AR aging report tells you why.", "transcript": "<p><strong>0:00 —</strong> A business can be profitable and still run out of cash. The AR aging report tells you why.</p><p><strong>0:10 —</strong> The aging report buckets every open invoice by how long it has gone unpaid: 0–30 days (current, on terms), 31–60, 61–90, and 90+ days (delinquent). As invoices age into the older buckets, the risk of non-collection rises and cash is tied up instead of in the bank.</p><p><strong>0:45 —</strong> Here is Skarion's aging snapshot. Atlantic Fiber: $480,000, all current. Southeast Broadband: $405,000, half in the 31–60 bucket — watch it. TeleCom Builders: $112,700, split between 61–90 and 90+ days — this is the problem customer, and they get a dunning letter this week.</p><p><strong>1:30 —</strong> Total AR is $997,700. Against $4.8M annual credit revenue, that's a DSO of about 75.8 days — it takes Skarion 76 days to collect a dollar of billed revenue. Controllers watch DSO month over month as a leading indicator of cash flow trouble.</p><p><strong>2:00 —</strong> The aging report is how you turn AR from a number on a balance sheet into an action list: who to call, who to escalate, and which balances to add to the allowance for doubtful accounts.</p>"}, {"type": "content", "kicker": "The management tool", "title": "AR aging, collections, and bad debt", "bodyHtml": "<p>The <strong>AR Aging Report</strong> is the single most important AR management tool. It buckets every customer's outstanding invoices by how long they have been unpaid. As buckets grow to 90+ days, the firm escalates: dunning letters, account-manager outreach, and eventually collections or write-off.</p><p><strong>Skarion's AR aging snapshot:</strong></p><table class='data'><tr><th>Customer</th><th>0–30 days</th><th>31–60 days</th><th>61–90 days</th><th>90+ days</th><th>Total</th></tr><tr><td>Atlantic Fiber Co.</td><td>$480,000</td><td>—</td><td>—</td><td>—</td><td>$480,000</td></tr><tr><td>Southeast Broadband</td><td>$215,000</td><td>$190,000</td><td>—</td><td>—</td><td>$405,000</td></tr><tr><td>TeleCom Builders</td><td>—</td><td>—</td><td>$78,500</td><td>$34,200</td><td>$112,700</td></tr><tr><td><strong>Total</strong></td><td><strong>$695,000</strong></td><td><strong>$190,000</strong></td><td><strong>$78,500</strong></td><td><strong>$34,200</strong></td><td><strong>$997,700</strong></td></tr></table><p>TeleCom Builders is the problem customer here: $112,700 sitting entirely in the older buckets, $34,200 of it past 90 days. That calls for a dunning letter and an account-manager call this week.</p><p><strong>Allowance for Doubtful Accounts.</strong> GAAP requires you to <em>estimate</em> uncollectible AR as you earn revenue — not wait until a specific invoice goes bad. This is the <em>allowance method</em>, and it matches the bad debt expense to the period that produced the revenue (the matching principle).</p><ul><li><strong>Establish the allowance:</strong> Debit Bad Debt Expense / Credit Allowance for Doubtful Accounts (a contra-asset that reduces net AR).</li><li><strong>Write off a specific invoice:</strong> Debit Allowance for Doubtful Accounts / Credit Accounts Receivable. <em>Expense is NOT affected</em> at write-off — the expense was already recorded when the allowance was established.</li></ul><p><strong>DSO (Days Sales Outstanding):</strong> Average AR ÷ Credit Revenue × Days. Skarion: $997,700 ÷ $4.8M × 365 ≈ <strong>75.8 days</strong> — meaning it takes roughly 76 days to collect a dollar of billed revenue. The lower, the better; controllers watch DSO month-over-month as a leading cash-flow indicator.</p>"}, {"type": "spreadsheet_lab", "kicker": "Chunk 63 — Live in-browser lab", "title": "AR Aging Worksheet — Skarion (live Excel)", "railLabel": "Live aging", "scenarioHtml": "<p>Build Skarion's AR aging analysis directly in the spreadsheet. Fill in the four aging buckets (0–30, 31–60, 61–90, 90+) per customer from the AR subledger snapshot in Module 04. The lab validates when the four bucket columns each total correctly, the grand total equals <strong>$997,700</strong>, and the sum of all bucket totals equals the total AR. The TeleCom Builders 90+ balance is the red flag — note it.</p>", "columns": [{"title": "Customer", "type": "text", "width": 200, "readOnly": true}, {"title": "0–30 ($)", "type": "numeric", "width": 120, "mask": "#,##0.00", "readOnly": false}, {"title": "31–60 ($)", "type": "numeric", "width": 120, "mask": "#,##0.00", "readOnly": false}, {"title": "61–90 ($)", "type": "numeric", "width": 120, "mask": "#,##0.00", "readOnly": false}, {"title": "90+ ($)", "type": "numeric", "width": 120, "mask": "#,##0.00", "readOnly": false}], "data": [["Atlantic Fiber Co.", null, null, null, null], ["Southeast Broadband", null, null, null, null], ["TeleCom Builders", null, null, null, null], ["TOTAL", null, null, null, null]], "lockedCells": ["A1", "A2", "A3", "A4"], "targetCells": {"B4": 695000.0, "C4": 190000.0, "D4": 78500.0, "E4": 34200.0}, "requireBothSidesEqual": false, "successMessage": "✅ Aging balances to $997,700 total. TeleCom Builders' $34,200 in the 90+ bucket is the red flag — dunning letter this week.", "errorMessage": "❌ Bucket totals don't match yet. Totals should be 0–30=$695,000 · 31–60=$190,000 · 61–90=$78,500 · 90+=$34,200 (sum $997,700). Check Atlantic Fiber ($480,000 all current) and TeleCom ($78,500 / $34,200 in the older buckets)."}, {"type": "video", "kicker": "Chunk 42 — Watch first", "title": "Bad Debt — Estimating What You Won't Collect (Allowance Method)", "railLabel": "Video: Bad debt", "intro": "GAAP doesn't let you wait until a customer files bankruptcy to record the loss. You estimate it every month.", "transcript": "<p><strong>0:00 —</strong> GAAP doesn't let you wait until a customer files bankruptcy to record the loss. You estimate it every month, in the period you actually earned the revenue — that's the matching principle.</p><p><strong>0:15 —</strong> The allowance method uses two entries. First, <em>establish the allowance</em>: estimate a percentage of AR you won't collect and post Dr Bad Debt Expense / Cr Allowance for Doubtful Accounts — a contra-asset that reduces net AR. Skarion estimates 1.5% of $997,700 = $14,965.50.</p><p><strong>0:55 —</strong> Second, <em>write off</em> a specific invoice when it's confirmed uncollectible: Dr Allowance for Doubtful Accounts / Cr Accounts Receivable. Notice: <strong>Bad Debt Expense is not touched at write-off</strong> — the expense was already recorded when the allowance was set up.</p><p><strong>1:35 —</strong> The surprise recovery. TeleCom Builders unexpectedly pays $40,000 six months after being written off. You first reverse the write-off (Dr AR $40,000 / Cr Allowance $40,000), then record the cash receipt (Dr Cash $40,000 / Cr AR $40,000). The net effect is Dr Cash $40,000 / Cr Allowance $40,000 — recovery flows back through the allowance, not through revenue.</p><p><strong>2:15 —</strong> Compare this with the <em>direct write-off</em> method, which only records bad debt when a specific invoice fails. It's not GAAP-compliant because it books the expense in the wrong period — but small cash-basis firms sometimes use it. Know the difference; an interview will ask.</p>"}, {"type": "flip_cards", "kicker": "Quick check", "title": "AR vocabulary — five terms interviewers actually test", "railLabel": "Flip cards", "cards": [{"front": "DSO", "back": "Days Sales Outstanding = Average AR ÷ Credit Revenue × Days. Skarion: $997,700 ÷ $4.8M × 365 ≈ 75.8 days. Measures how fast billed revenue converts to cash."}, {"front": "Allowance Method", "back": "Estimate uncollectible AR as a percentage of revenue and record Bad Debt Expense in the period the sale is made. The allowance is a contra-asset reducing net AR. Required by GAAP — matching principle."}, {"front": "Direct Write-Off", "back": "Record bad debt only when a specific invoice is identified as uncollectible. Not GAAP-compliant for accrual filers because it violates the matching principle — expense lands in the wrong period. Used by small cash-basis firms only."}, {"front": "Dunning", "back": "The escalating outreach process for overdue AR — reminder, then formal dunning letter, then account-manager call, then collections or write-off. Skarion's TeleCom Builders $112,700 balance triggers a dunning letter this week."}, {"front": "Factoring", "back": "Selling AR to a third party (a factor) for immediate cash, at a discount. Removes the receivable from the books (if sold without recourse) but is expensive — typically 1–3% of invoice value as the factor's fee."}]}, {"type": "journal_entry_builder", "kicker": "Bad debt — establish allowance", "title": "Record the allowance for doubtful accounts", "railLabel": "JE: allowance", "scenarioHtml": "<p>Based on Skarion's <strong>$997,700</strong> AR balance and historical loss rates, management estimates <strong>1.5%</strong> will be uncollectible. Establish the allowance by recording Bad Debt Expense and the contra-asset Allowance for Doubtful Accounts (1.5% of $997,700 = $14,965.50).</p>", "startRows": 2, "accounts": ["1100 - Accounts Receivable", "1200 - Allowance for Doubtful Accounts", "6720 - Bad Debt Expense", "4000 - Engineering Design Revenue"], "solution": [{"account": "6720 - Bad Debt Expense", "side": "debit", "amount": 14965.5}, {"account": "1200 - Allowance for Doubtful Accounts", "side": "credit", "amount": 14965.5}]}, {"type": "journal_entry_builder", "kicker": "Bad debt — write off", "title": "Write off TeleCom Builders after Chapter 11", "railLabel": "JE: write-off", "scenarioHtml": "<p>TeleCom Builders files Chapter 11 bankruptcy. Their entire <strong>$112,700</strong> balance is deemed uncollectible. Write it off against the existing allowance. Note: Bad Debt Expense is <em>not</em> touched at write-off — the expense was already recorded when the allowance was established.</p>", "startRows": 2, "accounts": ["1100 - Accounts Receivable", "1200 - Allowance for Doubtful Accounts", "6720 - Bad Debt Expense", "4000 - Engineering Design Revenue"], "solution": [{"account": "1200 - Allowance for Doubtful Accounts", "side": "debit", "amount": 112700.0}, {"account": "1100 - Accounts Receivable", "side": "credit", "amount": 112700.0}]}, {"type": "journal_entry_builder", "kicker": "Bad debt — surprise recovery", "title": "TeleCom Builders pays after write-off — reverse and record cash", "railLabel": "JE: recovery", "scenarioHtml": "<p>Six months later, out of the bankruptcy estate, TeleCom Builders unexpectedly pays <strong>$40,000</strong>. Under the allowance method you first <em>reverse the write-off</em> (reinstate the receivable), then record the cash receipt. Post both: Dr AR $40,000 / Cr Allowance $40,000, then Dr Cash $40,000 / Cr AR $40,000. Enter it as the combined net effect.</p>", "startRows": 3, "accounts": ["1000 - Operating Checking", "1100 - Accounts Receivable", "1200 - Allowance for Doubtful Accounts", "6720 - Bad Debt Expense"], "solution": [{"account": "1000 - Operating Checking", "side": "debit", "amount": 40000.0}, {"account": "1200 - Allowance for Doubtful Accounts", "side": "credit", "amount": 40000.0}]}, {"type": "quiz", "intro": "Four AR and revenue-recognition questions that show up in entry-level and senior interviews alike.", "title": "Revenue recognition & AR quiz", "questions": [{"q": "Under ASC 606, when does Skarion recognize revenue on a contract milestone?", "options": ["When the client signs the contract", "When the client wires the payment", "When the specific performance obligation (e.g. HLD delivery) is satisfied", "When the project is 100% complete"], "correct_index": 2, "explanation": "ASC 606 recognizes revenue when (or as) each distinct performance obligation is satisfied — here, when the HLD is delivered and accepted. Not at contract signing, not at cash receipt."}, {"q": "A client pays $200,000 in advance for work that has not yet started. What account is credited?", "options": ["Engineering Design Revenue", "Accounts Receivable", "Deferred Revenue", "Unbilled AR (WIP)"], "correct_index": 2, "explanation": "Cash received before the obligation is satisfied is a liability — Deferred Revenue — not earned revenue. It only becomes revenue when the work is delivered."}, {"q": "What is the journal entry to establish an allowance for doubtful accounts?", "options": ["Debit AR / Credit Allowance", "Debit Bad Debt Expense / Credit Allowance for Doubtful Accounts", "Debit Allowance / Credit Cash", "Debit Bad Debt Expense / Credit AR"], "correct_index": 1, "explanation": "Match the bad-debt estimate to the period of the sale: Debit Bad Debt Expense, Credit Allowance for Doubtful Accounts (a contra-asset). AR itself is untouched at this stage."}, {"q": "Skarion has $997,700 average AR and $4.8M in annual credit revenue. What is the DSO?", "options": ["45.6 days", "60.1 days", "75.8 days", "112.7 days"], "correct_index": 2, "explanation": "DSO = Average AR ÷ Credit Revenue × 365 = $997,700 ÷ $4,800,000 × 365 ≈ 75.8 days. It takes Skarion roughly 76 days to collect a dollar of billed revenue."}]}, {"type": "scenario_lab", "title": "Scenario Lab — The Client Who Pays in Three Pieces", "railLabel": "Lab: 3-wire", "time": "45 min", "intro": "A customer sends three separate wires over six weeks, one without remittance, one with a surprise early-pay discount. Apply each correctly and decide what to do with the remaining short payment.", "setup": "<p>Southeast Broadband owes Skarion <strong>$405,000</strong> on two open invoices: <strong>SE-2026-004 ($215,000)</strong> and <strong>SE-2026-005 ($190,000)</strong>. Their agreed terms are <strong>2/10 Net 30</strong>. They send three separate wires over six weeks:</p><u
