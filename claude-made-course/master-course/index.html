 and documented. Result: applied correctly in 48 hours; set a standard process for blind wires > $5,000."}, {"front": "EY: \"Describe a time you had to quickly learn something completely new. How did you approach it?\"", "back": "Use the SkarionBooks/new-system story from Q8. Reviewed the COA structure, ran one small vendor entry end-to-end first, built a personal reference card of entry workflows. Result: full January close with no re-entries. Shows deliberate ramp-up, not luck."}, {"front": "RSM (technical): \"If I give you a trial balance with a $7,500 imbalance, where do you start?\"", "back": "Divide by 2 first — $3,750, see if it matches an account balance (a posting to the wrong side). Then check divisibility by 9 (a transposition indicator). Then sort transactions by amount and scan for the exact $7,500 figure. Methodical, not panicked."}, {"front": "Grant Thornton (scenario): \"A client calls Friday — their bank needs audited financials by Monday or no credit line. What do you do?\"", "back": "A staff accountant doesn't commit to audit timelines. Gather information, escalate to the manager immediately, and prepare whatever supporting documentation is requested. Set expectations honestly — never promise what you can't deliver, especially under deadline pressure."}, {"front": "Industry (mid-size manufacturer): \"What's the first thing you do when you get a new invoice?\"", "back": "Check for 3-way match: does the PO exist? Does the receiving report confirm delivery? Do amount and description match? Only then does it get entered. Walk them through the Dominion Aluminum DAF-2601-014 example where PO and invoice diverged."}, {"front": "Startup: \"We don't have a month-end close process. How would you build one?\"", "back": "Start with the balance-sheet reconciliations (cash, AR, AP) because those accounts compound errors fastest. Add depreciation and accruals, run the trial balance, then build a close checklist others can follow. Document the reason for each entry, not just the entry itself."}]}, {"type": "video", "kicker": "Chunk 66 — Watch first", "title": "Tell Me About Yourself — The 90-Second Version", "railLabel": "Video: Intro", "intro": "The most common interview mistake: reciting your resume. They already have it. This question asks why you are in the room.", "transcript": "<p><strong>0:00 —</strong> The most common interview mistake: answering \"Tell me about yourself\" by reciting your resume. The interviewer already has your resume. This question is an invitation to tell them <em>why</em> you are in this room.</p><p><strong>0:20 —</strong> Use the Present → Past → Future structure. Present: where you are right now and what you've been doing to prepare. Past: what relevant experience or transferable skills you bring, even from a different field. Future: why this specific role at this specific company, connected to a real thing you know about them.</p><p><strong>1:00 —</strong> A real example for a career-changer: \"Right now I'm actively building accounting skills — I completed a full simulation where I handled the entire accounting cycle for a $2M manufacturer, including month-end close, bank reconciliations, and AP. Before that I was in operations management, where I was responsible for budget tracking and cost variance analysis — strong analytical instincts I now apply to accounting. I'm looking for a staff accountant role where I can build real depth in the GL and close cycle, and I'm particularly interested in your firm because of [something specific].\"</p><p><strong>2:00 —</strong> Notice: no apology for the career change. No over-explanation of the gap. The simulation is real work — present it that way. The last sentence shows you actually researched the company.</p><p><strong>2:40 —</strong> Next, you'll build your own version in the script builder below. 90 seconds. Record yourself. Watch it back.</p>"}, {"type": "script_builder", "kicker": "Chunk 67 — build your intro", "title": "Build Your 90-Second Intro (personal script builder)", "railLabel": "Intro builder", "intro": "Write your own 90-second intro in three fields. Aim for 180–220 words total — about 90 seconds spoken. The preview combines them live.", "minWords": 180, "maxWords": 220, "fields": [{"label": "Present", "hint": "Where you are right now and what you've actively done to prepare. Name the simulation: \"In my Skarion Engineering accounting simulation, I performed the full accounting cycle...\"", "placeholder": "Right now I am... I have completed... My key skills from this training are...", "minLength": 60}, {"label": "Past", "hint": "Relevant prior experience or transferable skills — quantified. Connect it to the role you want.", "placeholder": "Before this, I was in [X] where I [quantified achievement]. This gave me [transferable skill].", "minLength": 60}, {"label": "Future", "hint": "The specific role you want + one real, researched thing about this company. End on the company, not on yourself.", "placeholder": "I'm looking for [specific role]. I'm interested in [company/firm type] because [something real and specific].", "minLength": 60}], "traps": ["Don't start with \"I was born in...\" or \"I've always loved numbers...\"", "Don't say \"I don't have much experience but...\"", "Don't just list your resume chronologically", "Do lead with what you've actively done to prepare", "Do connect your past to this specific role", "Do end with something specific about the company"]}, {"type": "scenario_lab", "kicker": "Chunk 83 — THE CAPSTONE", "title": "Capstone: Full Quarter Close — Skarion Q1 2026", "railLabel": "Capstone", "time": "3–4 hrs", "intro": "The boss level. Three months of data. Five deliverables. Everything you learned — bank rec, AR, AP, payroll, adjusting entries, financial statements — in one comprehensive close. Save your Controller's Memo as a portfolio writing sample.", "setup": "<p>You receive the complete <strong>Q1 2026 data package</strong> for Skarion Engineering below: 90 days of summarized transactions, all vendor invoices (AP), all customer invoices (AR) with payment histories, January/February/March bank statements, monthly payroll summaries, and the fixed-asset depreciation schedule.</p><p><strong>Five deliverables (submit in the text area + the live spreadsheet labs earlier in the course):</strong></p><ol><li>Month-end close <strong>journal entries for all three months</strong> — every adjusting entry (offshore accruals, prepaid amortization, depreciation, loan interest, WIP), posted in correct dependency order.</li><li><strong>Three-month bank reconciliation pack</strong> — all three months balanced; January to the canonical $336,250.00.</li><li><strong>Q1 P&L</strong> — three-column (Jan, Feb, Mar, Q1 Total), with Gross Margin % and Operating Margin % per month.</li><li><strong>Q1 Balance Sheet as of March 31</strong> and a simplified <strong>Q1 Cash Flow Statement</strong> (indirect) ending at the March 31 cash balance.</li><li>A <strong>400-word Controller's Memo</strong>: \"Q1 Financial Summary and Observations for Leadership\" — using the actual numbers, pointing out the two biggest trends, one concern, and one recommendation.</li></ol>", "tasks": ["Download the Q1 data package and the financial statement package template.", "Post January's close entries in the Module 05/06 spreadsheet labs and SkarionBooks; confirm January's bank rec balances to $336,250.00.", "Post February and March adjusting entries; balance February and March bank reconciliations. Document any seeded discrepancies you find (the February close has the seven seeded errors from the Chunk 49 lab — re-apply those fixes here).", "Build the Q1 P&L (Jan/Feb/Mar/Q1 Total) and Q1 Balance Sheet (as of March 31) in the Financial Statement Package template.", "Build the simplified Q1 Cash Flow Statement (indirect) and reconcile ending cash to the March 31 bank-rec adjusted balance.", "Write the 400-word Controller's Memo with two trends, one concern, one recommendation — using real figures (revenue, margins, DSO, the TeleCom Builders recovery)."], "files": [{"label": "Q1 2026 Data Package.xlsx", "href": "/download/capstone/Q1_2026_Data_Package.xlsx"}, {"label": "Template 06 — Financial Statement Package.xlsx", "href": "/download/07-excel-toolkit/Template_06_Financial_Statement_Package.xlsx"}, {"label": "Month_End_Close_Playbook.xlsx", "href": "/download/09-month-end-close/Month_End_Close_Playbook.xlsx"}], "submissionPrompt": "Paste your Q1 P&L (Jan/Feb/Mar/Q1 totals + both margins), the March 31 Balance Sheet bottom line (Assets = Liabilities + Equity), the Q1 Cash Flow ending cash, and your 400-word Controller's Memo (two trends, one concern, one recommendation).", "solution": "<p><strong>Q1 P&L (illustrative shape):</strong> January revenue $480,000 / COGS $140,000 / OpEx $98,000 / Net $242,000; February and March follow the same structure scaled by the AR invoicing in the data package; the Q1 Total column sums each line. Watch for the seven seeded February errors (Chunk 49) — corrected, February's net income rises by the net of payroll understatement, skipped amortization, un-reversed accrual, wrong-customer cash, depreciation typo, bank fee, and missing insurance.</p><p><strong>Q1 Balance Sheet (3/31):</strong> Assets = Cash (reconciled to the March 31 bank-rec adjusted balance) + AR ($997,700 minus collections) + Prepaids (Vetro $9,000 remaining) + Net fixed assets + Allowance contra = Liabilities (AP + Accrued Interest + Loan $500K − principal paid) + Equity (Owner's + RE raised by Q1 net income). Confirms Assets = Liabilities + Equity.</p><p><strong>Q1 Cash Flow (indirect):</strong> Net income + depreciation (3 × $1,000) − change in AR − change in AP + change in accrued liabilities = cash from operations; subtract any loan principal repaid (financing); ending cash must tie to the March 31 bank rec — every cent.</p><p><strong>Controller's Memo shape:</strong> Trend 1 — Gross margin held at ~70.8% across Q1 (stable cost structure). Trend 2 — DSO shortened as TeleCom's $40,000 settlement post-recovery lands in March. Concern — TeleCom's residual $82,700 still at risk; collection plan must complete in April. Recommendation — establish a dedicated reserve review each month-end so surprises don't appear once in the quarter; build a close checklist template that ties the bank rec, AR subledger and AP subledger to the GL before the trial balance is run.</p>"}, {"type": "exercise", "kicker": "Chunk 84 — mock interview", "title": "Mock Interview — Full-Length Simulation (with rubric)", "railLabel": "Mock interview", "instructionsHtml": "<p>A 30-minute mock interview with a study partner, mentor, or (alone) a self-recording. Download the interview pack below: 5 questions for the interviewer (one per category — technical, behavioral, scenario, software, \"why accounting\"), each with a scoring rubric on Accuracy, Specificity, Workflow, Judgment, and Communication (1–5 each). After the interview, fill in the self-assessment sheet — what landed, what felt weak, what to re-practice.</p><p><strong>If you have no partner:</strong> record yourself on your phone. Watch it back. Count the filler words (\"um,\" \"basically,\" \"kind of\"). More than 3 in any 60-second answer = you need another take.</p>", "files": [{"label": "Mock Interview Pack (questions + rubric).docx", "href": "/download/portfolio-templates/Mock_Interview_Pack.docx"}], "reflectionPrompt": "Paste the 5 chosen questions and your scores per rubric criterion. Which criterion scored lowest — Accuracy, Specificity, Workflow, Judgment, or Communication? Re-practice that category this week."}, {"type": "exercise", "kicker": "Chunk 85 — portfolio assembly", "title": "Portfolio Assembly Guide & Checklist (14 items)", "railLabel": "Portfolio", "instructionsHtml": "<p>Build your accounting portfolio — a document that proves you did real work, not a visual design portfolio. Work through the 14-item checklist and download the templates.</p><p><strong>14-item checklist:</strong></p><ol><li>Simulation summary document (1 page, PDF)</li><li>Q1 Controller's Memo (from the capstone)</li><li>Bank reconciliation screenshot (January, balanced to $336,250.00)</li><li>Q1 P&L PDF</li><li>STAR answer document (8 questions written out with real numbers)</li><li>LinkedIn profile updated with simulation experience</li><li>Resume bullet points rewritten with action verb + scope + result</li><li>Salary research documented ($X–$Y for your city, source cited)</li><li>3 target companies researched (name, role, what you'd say about them)</li><li>90-second intro script written and rehearsed</li><li>Mock interview completed and scored</li><li>LinkedIn accounting recruiters followed (Robert Half, Kforce, Ledgent)</li><li>QuickBooks ProAdvisor free certification started/completed</li><li>Excel skills documented in resume/LinkedIn (VLOOKUP, SUMIFS, PivotTables — with example)</li></ol>", "files": [{"label": "Portfolio_Summary_Template.docx", "href": "/download/portfolio-templates/Portfolio_Summary_Template.docx"}, {"label": "Controllers_Memo_Template.docx", "href": "/download/portfolio-templates/Controllers_Memo_Template.docx"}, {"label": "STAR_Answer_Worksheet.docx", "href": "/download/portfolio-templates/STAR_Answer_Worksheet.docx"}, {"label": "Resume_Bullet_Rewrite_Template.docx", "href": "/download/portfolio-templates/Resume_Bullet_Rewrite_Template.docx"}], "reflectionPrompt": "Which of the 14 items are you missing? Write your plan to complete each one by your target application date. The one sentence that kills interviews: \"I don't have anything to show you yet.\" You do — it's this course. Present it like the work it is."}, {"type": "content", "kicker": "Chunk 60 — the first 30 days", "title": "The First 30 Days on the Job — A Playbook", "bodyHtml": "<p>Most new accounting hires fail not because of technical gaps but because they mismanage the first 30 days. This is the concrete playbook.</p>", "callout": {"type": "danger", "html": "<strong>The three rules of the first 30 days:</strong> 1) Never post without documentation. Not one entry. 2) Ask questions <em>before</em> the deadline, not after. 3) The close is a team sport — your error affects everyone's night."}}, {"type": "timeline", "title": "Your first 30 days, week by week", "steps": [{"title": "Days 1–3 — Learn the COA", "desc": "Read the Chart of Accounts, the accounting policies, and last month's close package — every entry. Don't post anything yet."}, {"title": "Days 4–7 — Shadow AP", "desc": "Shadow AP processing. Ask about the 3-way match policy, who approves what, and the payment run schedule."}, {"title": "Days 8–14 — Own one task", "desc": "Take ownership of one recurring task (AP entry, cash posting, or bank rec prep). Do it, show your work to your manager, ask for feedback before the deadline."}, {"title": "Days 15–21 — Sit in on close", "desc": "Ask to sit in on a close meeting. Take notes. Build your own close checklist based on what you observe."}, {"title": "Days 22–30 — First solo close contribution", "desc": "Complete your first solo close contribution (even if just one assigned journal entry). Ask for review before submitting."}]}, {"type": "exercise", "kicker": "Downloadable playbook", "title": "Download your \"My First 30 Days\" checklist", "instructionsHtml": "<p>Download the fillable checklist below. It mirrors the timeline above and adds space for the company-specific questions to ask at each stage: who approves payments? what's the close calendar? what system do you use? what reports does the controller want first? Fill it in during your first week — and re-read it every Friday.</p>", "files": [{"label": "My First 30 Days Checklist.docx", "href": "/download/shared/First_30_Days_Checklist.docx"}], "reflectionPrompt": "Write out the three rules and the single most important question to ask your manager in your first week. Then close this course — you're ready."}, {"type": "timeline", "kicker": "Chunk 86 — job search plan", "title": "The Accounting Job Search — A 30-Day Plan", "steps": [{"title": "Week 1 — Foundation", "desc": "Day 1 finalize LinkedIn & resume. Day 2 build the portfolio PDF. Day 3 research 10 target companies (5 local, 5 remote). Day 4 set job alerts on LinkedIn, Indeed, Robert Half, Ledgent, Kforce. Day 5 connect with 5 accounting recruiters on LinkedIn with a personalized note."}, {"title": "Week 2 — Outreach", "desc": "Apply to 3 roles/day — quality over quantity, tailor each cover letter. Follow up on any application over 10 days old. Comment substantively on 2 accounting/finance LinkedIn posts/day."}, {"title": "Week 3 — Interviews begin", "desc": "Use the 20-minute pre-interview research framework before every call. Practice the 90-second intro out loud before every interview. Send a thank-you email within 2 hours of every interview."}, {"title": "Week 4 — Negotiation & decision", "desc": "With an offer: wait 48 hours before accepting, counter at 10–15% above. Without an offer: review application→interview conversion (<10%? rewrite resume). Interview→offer low? re-practice the STAR answers."}]}, {"type": "quiz", "kicker": "Chunks 87–88 — final assessment", "title": "Final Course Assessment — 30 Questions Across All 9 Modules", "railLabel": "Final quiz", "intro": "30 interleaved questions from every module. This is the comprehensive final. Score 27/30 = elite and ready; 22–26 = strong, review flagged modules; below 22 = re-do the specific modules named in the explanations.", "questions": [{"q": "Under accrual accounting, Skarion delivers an HLD on Jan 28 and is paid March 15. When is revenue recognized?", "options": ["March 15", "January 28", "At year-end", "When the contract was signed"], "correct_index": 1, "explanation": "Accrual records revenue when earned (Jan 28, HLD delivered). Mod 01/02."}, {"q": "The normal balance of Accumulated Depreciation is:", "options": ["Debit", "Credit", "Zero", "Debit in year one, credit after"], "correct_index": 1, "explanation": "Contra-asset, credit-normal. Mod 02."}, {"q": "Skarion's $500K loan at 6.5% — January interest accrual?", "options": ["$1,510.42", "$2,708.33", "$1,000.00", "$18,125.00"], "correct_index": 1, "explanation": "$500,000 × 6.5% ÷ 12 = $2,708.33. Mod 06."}, {"q": "Which three documents make up a 3-way match?", "options": ["Bank statement, GL, trial balance", "PO, Receiving Report, Vendor Invoice", "Contract, timesheet, payroll register", "Invoice, check, deposit slip"], "correct_index": 1, "explanation": "Mod 03."}, {"q": "January bank rec: statement $312,450, deposits in transit +$28,000, outstanding check −$4,200. Adjusted bank balance?", "options": ["$336,250.00", "$312,450.00", "$340,650.00", "$328,050.00"], "correct_index": 0, "explanation": "$312,450 + $28,000 − $4,200 = $336,250. Mod 05."}, {"q": "GAAP is written by which body?", "options": ["The IRS", "The FASB", "The SEC", "The AICPA"], "correct_index": 1, "explanation": "Financial Accounting Standards Board. Mod 01."}, {"q": "A $36,000 12-month Vetro license paid July 1 — Prepaid balance on Oct 31?", "options": ["$36,000", "$9,000", "$21,000", "$3,000"], "correct_index": 2, "explanation": "5 months amortized × $3,000 = $15,000; $36,000 − $15,000 = $21,000. Mod 03."}, {"q": "ASC 606 revenue recognition triggers at which step?", "options": ["Step 1 — identify the contract", "Step 5 — when/as each obligation is satisfied", "When the invoice is sent", "When cash is received"], "correct_index": 1, "explanation": "Mod 04."}, {"q": "A client prepays $120,000 before work begins. What account is credited?", "options": ["Engineering Design Revenue", "Accounts Receivable", "Deferred Revenue", "Unbilled AR (WIP)"], "correct_index": 2, "explanation": "Liability, not yet earned. Mod 04."}, {"q": "Write off TeleCom Builders' $112,700 balance — the entry?", "options": ["Dr Bad Debt Expense / Cr AR", "Dr Allowance for Doubtful Accounts / Cr AR", "Dr Allowance / Cr Bad Debt Expense", "Dr AR / Cr Cash"], "correct_index": 1, "explanation": "Goes against the existing allowance. Expense not touched at write-off. Mod 04."}, {"q": "DSO for $997,700 AR and $4.8M annual credit revenue?", "options": ["45.6 days", "60.1 days", "75.8 days", "112.7 days"], "correct_index": 2, "explanation": "$997,700 ÷ $4.8M × 365 ≈ 75.8 days. Mod 04."}, {"q": "Skarion's January revenue $480,000, COGS $140,000 — gross margin %?", "options": ["29.2%", "50.4%", "70.8%", "242,000"], "correct_index": 2, "explanation": "($480K − $140K) ÷ $480K = 70.8%. Mod 06."}, {"q": "Correcting entry for a $10,547.10 duplicate customer deposit?", "options": ["Dr Sales Revenue / Cr Cash", "Dr AR / Cr Cash", "Dr Cash / Cr AR", "Dr Bad Debt / Cr Allowance"], "correct_index": 1, "explanation": "Reverse the duplicate — revenue never overstated. Mod 05."}, {"q": "January payroll: gross $79,167, withholdings $21,056, net pay to Cash?", "options": ["$79,167", "$58,111", "$85,423", "$21,056"], "correct_index": 1, "explanation": "$79,167 − $21,056 = $58,111 net pay. Mod 03."}, {"q": "Monthly straight-line depreciation for 5 workstations @ $200/month each?", "options": ["$200", "$1,000", "$5,000", "$60,000"], "correct_index": 1, "explanation": "5 × $200 = $1,000/month total. Mod 06."}, {"q": "Posting an offshore drafting invoice (no cash yet) — debited account?", "options": ["2000 Accounts Payable", "5100 COGS — Subcontractor Drafting", "1000 Operating Checking", "4000 Revenue"], "correct_index": 1, "explanation": "Dr COGS / Cr AP at receipt. Mod 03."}, {"q": "The accounting equation is:", "options": ["Debits = Credits", "Assets = Liabilities + Equity", "Revenue − Expenses = Net Income", "Beginning RE + NI − Dividends"], "correct_index": 1, "explanation": "Mod 02."}, {"q": "A $500K TB imbalance first step: divide by 2 → $250K matches an account — likely what?", "options": ["A transposition", "A posting to the wrong side", "A fraud", "A rounding error"], "correct_index": 1, "explanation": "Half the imbalance matching an account = a posting on the wrong side. Mod 09 technical."}, {"q": "STAR stands for:", "options": ["Situation, Task, Action, Result", "Story, Timing, Action, Review", "Standard, Test, Apply, Record", "Situation, Theory, Assessment, Result"], "correct_index": 0, "explanation": "Mod 09 behavioral."}, {"q": "Which Excel function sums across multiple conditions?", "options": ["VLOOKUP", "SUMIFS", "TRIM", "PROPER"], "correct_index": 1, "explanation": "SUMIFS. Mod 07."}, {"q": "Power Query's main advantage over manual cleaning?", "options": ["Faster files", "Records steps & replays on refresh — automates monthly cleanup", "Writes journal entries", "Replaces PivotTables"], "correct_index": 1, "explanation": "Mod 07."}, {"q": "Allowance method: Dr Bad Debt Expense $14,965.50 / Cr what?", "options": ["1100 AR", "1200 Allowance for Doubtful Accounts", "1000 Cash", "4000 Revenue"], "correct_index": 1, "explanation": "Contra-asset. Mod 04."}, {"q": "An NSF $50,000 check reverses + $35 fee — the entry?", "options": ["Dr AR $50,000 + Dr Bank Fees $35 / Cr Cash $50,035", "Dr Cash / Cr AR", "Dr Bad Debt / Cr AR", "No entry until re-sent"], "correct_index": 0, "explanation": "Reinstate the receivable, record the fee. Mod 05."}, {"q": "Which financial statement shows short-term liquidity (can we pay next month)?", "options": ["Income Statement", "Balance Sheet", "Cash Flow Statement", "Trial Balance"], "correct_index": 1, "explanation": "Current Assets vs Current Liabilities = Current Ratio. Mod 06."}, {"q": "A profitable company running out of cash — which statement reveals why?", "options": ["Income Statement", "Balance Sheet", "Cash Flow Statement", "Statement of Retained Earnings"], "correct_index": 2, "explanation": "Operating section shows uncollected AR. Mod 06."}, {"q": "Recording offshore work done Jan 31, invoiced Feb 4 — the Jan 31 entry?", "options": ["Dr COGS $14,800 / Cr Accrued Liabilities $14,800", "Wait for the invoice", "Dr AP / Cr Cash", "Dr Prepaid / Cr Cash"], "correct_index": 0, "explanation": "Accrue in the period incurred; reverse Feb 1. Mod 03."}, {"q": "At year-end, which accounts are closed to Retained Earnings?", "options": ["Permanent accounts", "Temporary accounts (Revenue & Expense)", "All accounts", "Only Cash"], "correct_index": 1, "explanation": "Mod 06/02."}, {"q": "Vendor invoices Skarion at $42.00/mile; MSA rate $38.50/mile. What do you do?", "options": ["Pay it and fix later", "Hold it, document, request a credit memo", "Split the difference", "Pay the PO price"], "correct_index": 1, "explanation": "Never pay through a failed match. Mod 03/09 ethical."}, {"q": "A manager tells you to \"plug\" a $340 rec difference because audit is tomorrow. What do you do?", "options": ["Plug it", "Politely request 20 min to trace, document either way, escalate if unresolved", "Refuse outright and leave", "Adjust the bank statement"], "correct_index": 1, "explanation": "Push back with a path forward — this is the judgment interviewers are scoring. Mod 09 ethical."}, {"q": "Record a $480,000 HLD milestone AR invoice?", "options": ["Dr AR $480,000 / Cr Engineering Design Revenue $480,000", "Dr Cash / Cr Revenue", "Dr Deferred Revenue / Cr AR", "Dr COGS / Cr AR"], "correct_index": 0, "explanation": "Mod 04."}]}, {"type": "content", "kicker": "Chunk 89 — after the job", "title": "What Happens After You Get the Job", "bodyHtml": "<p>You got the offer. Here's what determines year-1 success.</p><p><strong>Three things:</strong></p><ol><li><strong>You document everything.</strong> Every entry has a ticket or email chain. Every adjustment has a supervisor sign-off. You never post without paper.</li><li><strong>You ask before the deadline, not after.</strong> Something doesn't make sense and you're 6 hours from the trial-balance run? Raise it now, not at 11 PM.</li><li><strong>You build systems, not just process tasks.</strong> Don't just do the bank rec — build the template so anyone could do it from your notes. That's what gets you from staff to senior.</li></ol><p><strong>The mindset shift:</strong> as a student, a mistake is a learning moment. As an accountant, a mistake means someone's financials are wrong and real decisions get made on bad information. The bridge between those two is documentation, verification, and escalation. Those aren't bureaucratic habits — they're the reason accounting is trustworthy.</p>"}, {"type": "completion", "kicker": "Chunk 90 — completion & certificate", "title": "Skarion Accounting Track — Complete", "railLabel": "Certificate", "modules": 9, "totalChunks": 90, "nextActions": [{"label": "View Portfolio Checklist"}, {"label": "Start the 30-Day Job Search Plan"}]}], "slug": "09-interview-prep"}, {"title": "Financial Ratios & Reading the Numbers Like a CFO", "moduleTag": "Module 10", "dayMapping": "Day 10", "subhead": "The module that separates a bookkeeper from an accountant. Producing the numbers is bookkeeping — interpreting them is accounting. Eight ratios, three months of Skarion data, and the narrative the numbers are telling you.", "hook": "\"What does this P&L tell you?\" Every controller, every CFO, and every interviewer asks this. The bookkeeper prints the statement. The accountant reads it. This module is the difference.", "chunks": [{"type": "video", "kicker": "Chunk 91 — Watch first", "title": "The 8 Ratios Every Accountant Must Know Cold", "railLabel": "Video: 8 ratios", "intro": "A controller doesn't just close the books — they read them. These 8 ratios are how senior accountants immediately know whether a month was actually good or just looks good on the surface.", "transcript": "<p><strong>0:00 —</strong> A controller doesn't just close the books. They read them. These 8 ratios are how senior accountants immediately know whether a month was actually good or just looks good on the surface.</p><p><strong>0:30 —</strong> The 8, with Skarion's January numbers: Gross Profit Margin (Revenue − COGS) ÷ Revenue = ($480K − $140K) ÷ $480K = 70.8% — how profitable the core service is before overhead. Operating Profit Margin = Operating Income ÷ Revenue = $242K ÷ $480K = 50.4% — after all operating costs. Current Ratio = Current Assets ÷ Current Liabilities = $1.6M ÷ $340K = 4.7x — can the company pay short-term bills? >2x is healthy. Quick Ratio = (Cash + AR) ÷ Current Liabilities = ($336K + $997K) ÷ $340K = 3.9x — more conservative, excludes prepaids/inventory.</p><p><strong>1:30 —</strong> DSO = AR ÷ (Revenue ÷ 365 days) = $997K ÷ ($4.8M ÷ 365) = 75.8 days — how long to collect; >60 flags a cash risk. DPO = AP ÷ (COGS ÷ 365) = $280K ÷ ($1.68M ÷ 365) = 60.8 days — how long before you pay vendors. Debt-to-Equity = Total Liabilities ÷ Total Equity = $820K ÷ $2.1M = 0.39x — leverage; <1x is conservative. Return on Assets = Net Income ÷ Total Assets = $242K ÷ $4.02M = 6.0% — how efficiently assets generate profit.</p><p><strong>2:30 —</strong> Here is the real skill: knowing when a ratio changes and why. Gross margin dropped from 70.8% to 65.2% between January and February. That tells you COGS went up faster than revenue — before you even look at the detail. The ratio is the canary; the detail is the mine.</p><p><strong>4:00 —</strong> In the lab, you'll calculate all 8 ratios from Skarion's Q1 data and write one sentence of interpretation for each. That sentence is the start of your controller's commentary.</p>"}, {"type": "content", "kicker": "Chunk 91 — the numbers", "title": "The 8 Ratios — Formulas, Skarion January, and What Each Tells You", "bodyHtml": "<p>Skarion's January financials: Revenue $480,000 · COGS $140,000 · Operating Expenses $98,000 · Net Income $242,000. Current Assets ≈ $1.6M (Cash $336,250 + AR $997,700 + prepaids), Current Liabilities ≈ $340K, Total Liabilities ≈ $820K, Total Equity ≈ $2.1M, Total Assets ≈ $4.02M, annualized revenue ≈ $4.8M, annualized COGS ≈ $1.68M.</p><table class='data'><tr><th>Ratio</th><th>Formula</th><th>Skarion Jan</th><th>What it tells you</th></tr><tr><td><strong>Gross Profit Margin</strong></td><td>(Revenue − COGS) ÷ Revenue</td><td>70.8%</td><td>Profitability of the core service before overhead</td></tr><tr><td><strong>Operating Profit Margin</strong></td><td>Operating Income ÷ Revenue</td><td>50.4%</td><td>Profitability after all operating costs</td></tr><tr><td><strong>Current Ratio</strong></td><td>Current Assets ÷ Current Liabilities</td><td>4.7x</td><td>Can the company pay short-term bills? &gt;2x healthy</td></tr><tr><td><strong>Quick Ratio</strong></td><td>(Cash + AR) ÷ Current Liabilities</td><td>3.9x</td><td>Conservative liquidity (excludes prepaids/inventory)</td></tr><tr><td><strong>DSO</strong></td><td>AR ÷ (Revenue ÷ 365)</td><td>75.8 days</td><td>How long to collect; &gt;60 flags a cash risk</td></tr><tr><td><strong>DPO</strong></td><td>AP ÷ (COGS ÷ 365)</td><td>60.8 days</td><td>How long before you pay vendors</td></tr><tr><td><strong>Debt-to-Equity</strong></td><td>Total Liabilities ÷ Total Equity</td><td>0.39x</td><td>Financial leverage; &lt;1x is conservative</td></tr><tr><td><strong>Return on Assets</strong></td><td>Net Income ÷ Total Assets</td><td>6.0%</td><td>How efficiently assets generate profit</td></tr></table>", "callout": {"type": "tip", "html": "<strong>Read the ratio like a sentence.</strong> 70.8% gross margin + 75.8 day DSO + 0.39x leverage reads as: \"The core business is highly profitable, but we're slow to collect, and we run almost no debt.\" One sentence that a CFO would say is worth more than ten decimal places of calculation."}}, {"type": "spreadsheet_lab", "kicker": "Chunk 92 — Live in-browser lab", "title": "Ratio Dashboard — Calculate All 8 From Skarion January", "railLabel": "Ratio lab", "scenarioHtml": "<p>Calculate Skarion's 8 financial ratios live in the spreadsheet. The P&L and Balance Sheet figures (Revenue, COGS, OpEx, Cash, AR, AP, Total Liabilities, Total Equity, Total Assets) are pre-filled and locked in column A. Enter each ratio <em>formula result</em> in column C. The lab validates when all 8 match the target values within 0.1.</p>", "columns": [{"title": "Ratio", "type": "text", "width": 260, "readOnly": true}, {"title": "Target (Skarion Jan)", "type": "text", "width": 150, "readOnly": true}, {"title": "Your answer", "type": "numeric", "width": 130, "mask": "#,##0.00", "readOnly": false}], "data": [["Gross Profit Margin (%)", "70.8", null], ["Operating Profit Margin (%)", "50.4", null], ["Current Ratio (x)", "4.7", null], ["Quick Ratio (x)", "3.9", null], ["DSO (days)", "75.8", null], ["DPO (days)", "60.8", null], ["Debt-to-Equity (x)", "0.39", null], ["Return on Assets (%)", "6.0", null]], "lockedCells": ["A1", "A2", "A3", "A4", "A5", "A6", "A7", "A8", "B1", "B2", "B3", "B4", "B5", "B6", "B7", "B8"], "targetCells": {"C1": 70.8, "C2": 50.4, "C3": 4.7, "C4": 3.9, "C5": 75.8, "C6": 60.8, "C7": 0.39, "C8": 6.0}, "requireBothSidesEqual": false, "successMessage": "✅ All 8 ratios within tolerance — ratio analysis complete. You're reading financials like a CFO.", "errorMessage": "❌ One or more ratios are off. Check the formulas in the Chunk 91 table — e.g. Gross Margin = (480−140)/480 × 100 = 70.8; DSO = 997700/(4800000/365) = 75.8."}, {"type": "content", "kicker": "Chunk 93 — the narrative", "title": "What the Numbers Are Trying to Tell You — Reading the Story", "bodyHtml": "<p>The hardest skill: interpreting a set of ratios <em>as a narrative</em>. A single ratio is a number. Three ratios together tell a story.</p><p><strong>Scenario A — Revenue up 15%, gross margin down 8%, DSO up from 45 to 72 days.</strong> What's happening? Revenue growth is <em>hollow</em> — COGS is rising faster, and clients are paying slower. Cash is about to tighten despite the revenue number looking good. The wrong reads: \"business is growing well\" (ignores the margin) or \"costs are under control\" (ignores DSO).</p><p><strong>Scenario B — Net income up 20%, current ratio down from 3.2x to 1.4x, DPO down from 45 to 22 days.</strong> Profitability improved but <em>liquidity is deteriorating</em> — the company is paying vendors faster than it's collecting, and cash is being squeezed. Profit without liquidity is how profitable companies miss payroll.</p><p><strong>Scenario C — Gross margin stable, operating margin declining, return on assets declining.</strong> The core business is fine; <em>operating expenses are growing</em> — probably headcount or SG&amp;A — eating into profits the core business is generating. The fix is overhead, not pricing.</p>"}, {"type": "quiz", "kicker": "Chunk 93 — interpretation", "title": "Reading Skarion's Q1 Ratios — Spot the Real Story", "intro": "Apply ratio interpretation to Skarion's Q1 data. Don't just calculate — say what the number means.", "questions": [{"q": "Skarion's Q1 ratio dashboard shows January gross margin 70.8%, February 65.2%, March 62.1%. What is the most likely root cause?", "options": ["Offshore drafting rates rose faster than Skarion raised its client prices", "Skarion's clients started paying slower", "Skarion took on too much debt", "Office rent increased"], "correct_index": 0, "explanation": "Margin compression at a services firm with stable revenue usually means input costs (offshore drafting) rose faster than pricing. DSO would show a collection story; debt/rent land in OpEx, not Gross Margin."}, {"q": "Which Q1 month had the worst DSO, and what does it flag?", "options": ["January (75.8 days) — collections trending slow, watch TeleCom Builders", "February, because OpEx was highest", "March, because net income was highest", "All three were equal"], "correct_index": 0, "explanation": "January carries the 75.8-day DSO (the TeleCom 90+ bucket before the settlement arrives). Slowing DSO is a leading cash-flow indicator — it flags itself before cash actually dips."}, {"q": "Skarion's current ratio is 4.7x and quick ratio is 3.9x. What concern, if any, should the controller raise?", "options": ["None on liquidity — both ratios are strong; the concern is DSO, not solvency", "The current ratio is dangerously low", "The quick ratio being lower than current ratio means fraud", "Debt-to-equity must be negative"], "correct_index": 0, "explanation": "Strong liquidity both ways. The flagged concern is the 75.8-day DSO tying up cash in slow AR — liquidity is fine today, but watch the collections trend."}, {"q": "Net income is strong and rising, but cash is flat. Which two ratios together explain the disconnect?", "options": ["High DSO (cash stuck in AR) + low DPO (paying vendors fast)", "Low debt-to-equity + high ROA", "High gross margin + low operating margin", "High current ratio + high quick ratio"], "correct_index": 0, "explanation": "Profit → Cash gap is almost always the working-capital combination: slow collections (high DSO) + fast payments (low DPO). The Cash Flow Statement's operating section makes this exact gap visible."}]}], "slug": "10-financial-ratios"}, {"title": "Cost Accounting & Managerial Basics", "moduleTag": "Module 11", "dayMapping": "Day 11", "subhead": "The accounting that runs the inside of the business — job costing, variance analysis, and cost centers. Getting this right turns a single P&L into a project-by-project profitability map.", "hook": "\"Is this project actually making money?\" Every services firm with multiple jobs asks it monthly, and a single blended gross margin hides the answer. Job costing reveals it. Variance analysis explains why it moved. Both get you promoted to senior.", "chunks": [{"type": "content", "kicker": "Chunk 94 — job vs process", "title": "Job Costing vs. Process Costing — Which One Applies to You", "bodyHtml": "<p>Every services firm and manufacturer tracks costs differently. Getting the model wrong makes your P&amp;L by project useless.</p><p><strong>Job Costing:</strong> costs tracked <em>per specific job/project</em>. Every cost (labor, materials, overhead) is assigned to a specific job number. <strong>This is Skarion's model</strong> — every fiber-design project has its own job code (Tennessee Corridor, Texas Long-Haul, Virginia Metro).</p><p><strong>Process Costing:</strong> costs averaged across a continuous production process (paint factory, oil refinery, bottling line). Not relevant to Skarion, but you must recognize it — it's what a manufacturer's books look like and what gets tested in interviews.</p><p><strong>Direct vs. Indirect costs — the distinction that drives everything:</strong></p><ul><li><strong>Direct:</strong> easily traced to a specific job — offshore drafting hours on Project Alpha, dedicated software licenses for a project.</li><li><strong>Indirect / Overhead:</strong> cannot be directly traced — office rent, utilities, management salaries. These must be <em>allocated</em> across jobs by some fair basis (revenue %, headcount %, hours %).</li></ul>"}, {"type": "content", "kicker": "Chunk 94 — the lab", "title": "Skarion Job Costing Lab — Gross Profit by Project", "bodyHtml": "<p>Three active Skarion projects. Allocate costs correctly to each and reveal gross profit per project.</p><table class='data'><tr><th>Project</th><th>Contract value</th><th>Direct offshore labor (at $38.50/mi × billed miles)</th><th>Direct software (allocated by project hours)</th><th>Indirect overhead (rent + utilities, allocated by revenue %)</th><th>Total cost</th><th>Gross profit</th><th>GM %</th></tr><tr><td>Tennessee Corridor</td><td>$1,200,000</td><td>$462,000</td><td>$72,000</td><td>$20,000</td><td>$554,000</td><td>$646,000</td><td>53.8%</td></tr><tr><td>Texas Long-Haul</td><td>$800,000</td><td>$327,250</td><td>$48,000</td><td>$13,333</td><td>$388,583</td><td>$411,417</td><td>51.4%</td></tr><tr><td>Virginia Metro</td><td>$350,000</td><td>$308,000</td><td>$21,000</td><td>$5,833</td><td>$334,833</td><td>$15,167</td><td>4.3%</td></tr></table>", "callout": {"type": "warning", "html": "<strong>The key insight.</strong> Skarion's blended 70.8% gross margin hides that Tennessee Corridor is making 53.8% (on contract value) while Virginia Metro is barely break-even at 4.3% — its offshore labor cost swallowed almost the entire contract. <em>Job costing reveals which projects to renew, renegotiate, or sunset.</em> A single blended number never tells you that."}}, {"type": "content", "kicker": "Chunk 95 — variance analysis", "title": "Variance Analysis — What Went Wrong and Where", "bodyHtml": "<p>Variance analysis explains why actual results differ from budget. It's the skill that gets accountants promoted to senior faster than anything else.</p><p><strong>The vocabulary:</strong></p><ul><li><strong>Budget vs. Actual</strong> — every month differs; variance analysis explains why.</li><li><strong>Favorable variance (F)</strong> — actual is better than budget (lower cost or higher revenue).</li><li><strong>Unfavorable variance (U)</strong> — actual is worse than budget.</li><li><strong>Price variance</strong> — the cost per unit was different from budget.</li><li><strong>Volume/Efficiency variance</strong> — you used more or fewer units than budgeted.</li></ul><p><strong>Skarion January example — decompose the total variance into its two causes:</strong></p><ul><li>Budgeted offshore drafting: $38.00/mi × 3,200 mi = $121,600</li><li>Actual offshore drafting: $41.50/mi × 3,380 mi = $140,270</li><li><strong>Total variance: $18,670 Unfavorable</strong></li><li><strong>Price variance:</strong> ($41.50 − $38.00) × 3,380 mi = <strong>$11,830 U</strong> (paid more per mile than budgeted)</li><li><strong>Volume variance:</strong> (3,380 − 3,200) × $38.00 = <strong>$6,840 U</strong> (used more miles than budgeted)</li></ul><p>Splitting the variance tells the PM two different stories: the <em>price</em> variance means renegotiate the rate; the <em>volume</em> variance means the scope estimate was wrong. Different causes, different fixes.</p>"}, {"type": "flip_cards", "kicker": "Chunk 95 — vocabulary", "title": "Variance Vocabulary — 5 Cards with Skarion Examples", "railLabel": "Variance cards", "cards": [{"front": "Budget variance", "back": "Total Actual − Total Budget. Skarion January offshore drafting: $140,270 actual − $121,600 budget = $18,670 Unfavorable. The top-line gap before you decompose it."}, {"front": "Price variance", "back": "(Actual price − Budget price) × Actual volume. Skarion: ($41.50 − $38.00) × 3,380 = $11,830 U. Tells you the rate was wrong — renegotiate the MSA or the PO."}, {"front": "Volume / Efficiency variance", "back": "(Actual volume − Budget volume) × Budget price. Skarion: (3,380 − 3,200) × $38.00 = $6,840 U. Tells you the scope/estimate was wrong — fix the planning, not the rate."}, {"front": "Favorable (F)", "back": "Actual is better than budget — lower cost or higher revenue. Skarion example: if actual miles came in at 3,000 vs 3,200 budgeted, the volume variance is $7,600 Favorable (you used fewer miles than planned)."}, {"front": "Unfavorable (U)", "back": "Actual is worse than budget — higher cost or lower revenue. Skarion's January offshore drafting was $18,670 U, split into $11,830 U price + $6,840 U volume. Always decompose before you act."}]}, {"type": "content", "kicker": "Chunk 96 — cost centers", "title": "Cost Centers, Profit Centers, and How Big Companies Think", "bodyHtml": "<p>Once you move beyond a 10-person company, accounting is organized by <em>segment</em>. Understanding this gets you hired at larger firms.</p><table class='data'><tr><th>Segment type</th><th>Definition</th><th>Example</th></tr><tr><td><strong>Cost Center</strong></td><td>Incurs costs but doesn't directly generate revenue</td><td>IT, HR, Legal — and the accounting team itself</td></tr><tr><td><strong>Profit Center</strong></td><td>Generates its own revenue and has its own P&L</td><td>Each regional office, each product line</td></tr><tr><td><strong>Investment Center</strong></td><td>A profit center that also controls its own capital investment decisions</td><td>A division that approves its own capex</td></tr></table><p><strong>How this shows up:</strong> cost-center accounting requires <em>allocating shared costs</em> (rent, utilities, management overhead) across departments. Three common allocation bases — by headcount %, by square footage, or by revenue %. Each gives a different answer; the \"right\" method depends on what drives the cost (rent → square footage; IT support → headcount).</p><p><strong>Intercompany transactions:</strong> when a cost center in <em>one entity</em> charges another entity, it creates an intercompany receivable/payable that <strong>must be eliminated in consolidation</strong> — otherwise the group's total revenue/expenses are inflated by what one part charged another.</p><p><strong>Skarion context:</strong> if Skarion expands to two offices (Virginia = HLD, Texas = LLD), each is a profit center; the IT team supporting both is a cost center; the controller must allocate IT costs to both offices fairly — and eliminate the internal charges when consolidating.</p>"}, {"type": "quiz", "kicker": "Chunk 96 — allocation methods", "title": "Allocation Methods Quiz — Which Is Most Equitable?", "intro": "Skarion has $8,000/month of IT and office overhead to allocate across three cost centers (Engineering 12 staff, Sales 4 staff, Accounting 2 staff). Pick the method and defend it.", "questions": [{"q": "Allocating the $8,000 IT overhead by headcount — Engineering pays how much?", "options": ["$4,800 (12 of 18 staff)", "$3,200", "$8,000", "$0"], "correct_index": 0, "explanation": "Headcount allocation: 12/18 = 66.7% × $8,000 = $5,333... actually $8,000 × 12/18 = $5,333. Use revenue % if IT tracks projects (which it does at Skarion)."}, {"q": "If the IT team tracks its time per project, which allocation base is MOST equitable for IT cost?", "options": ["Revenue %", "Headcount %", "Actual project hours consumed (a usage/driver base)", "Equal split"], "correct_index": 2, "explanation": "When a usage driver (project hours) is measurable, allocate by it — it ties cost to the actual consumption, not an arbitrary proxy. This is activity-based costing at its simplest."}, {"q": "Two subsidiaries share a $50K cost center. Sub A charges Sub B $30K for services. At consolidation, what happens to the $30K?", "options": ["It's eliminated entirely (offset against B's payable to A)", "It's recorded as consolidated revenue", "It's recorded twice — once per entity", "It's written off as bad debt"], "correct_index": 0, "explanation": "Intercompany elimination: the $30K receivable on A's books offsets the $30K payable on B's, and the revenue/expense from the charge cancels out. Consolidated numbers must reflect only external transactions."}]}], "slug": "11-cost-accounting"}, {"title": "Tax Basics for Non-Tax Accountants", "moduleTag": "Module 12", "dayMapping": "Day 12", "subhead": "You don't need to be a tax accountant. You need to not make their job harder — and not trigger the penalties that fall on the staff accountant who got the deposit timing or 1099 threshold wrong.", "hook": "\"Why did we get an IRS penalty notice?\" The answer, in most small companies, is that a staff accountant didn't deposit payroll taxes on time, didn't file a 1099 for a contractor over $600, or treated sales tax as revenue. These are the six things you will get wrong in year one if you don't learn them here.", "chunks": [{"type": "content", "kicker": "Chunk 97 — the six", "title": "The Taxes Every Staff Accountant Encounters", "bodyHtml": "<p><strong>What this module is NOT:</strong> a comprehensive tax guide. Tax changes constantly and needs a specialist. <strong>What it IS:</strong> the 6 tax concepts you WILL encounter in the first year that you must handle correctly.</p><h3>1. Payroll Tax Deposits</h3><p>FICA (Social Security + Medicare) must be deposited with the IRS on a semi-weekly or monthly schedule depending on payroll size. The deposit is <em>separate</em> from the payroll journal entry — you record the liability in the JE, then deposit it later. <strong>Late deposits trigger a 2–15% penalty</strong> — the #1 tax penalty entry-level accountants accidentally cause.</p><p><em>Skarion context:</em> monthly deposit of $18,312 (employer FICA $6,256 + employee FICA withheld ≈ $12,056) via EFTPS by the 15th of the following month.</p><h3>2. Sales Tax (product-selling companies)</h3><p>Collected from customers at point of sale, remitted to the state monthly/quarterly. It's <strong>NOT revenue</strong> — it's a liability (Sales Tax Payable) from the moment it's collected. Skarion is a services firm so doesn't collect sales tax on designs — but if it sold physical cables/equipment it would.</p><p><em>JE when selling taxable goods:</em> Dr Cash $106,000 / Cr Revenue $100,000 / <strong>Cr Sales Tax Payable $6,000</strong>.</p><h3>3. Use Tax</h3><p>When you buy taxable goods from an out-of-state vendor who doesn't charge sales tax, <em>you owe use tax to your state</em>. Most companies ignore this until an audit — accountants should track it.</p><p><em>Skarion context:</em> $12,000 of survey equipment bought from an Ohio vendor with no Virginia sales tax → Virginia use tax $636 ($12,000 × 5.3%). Book Dr Equipment $12,636 / Cr Cash $12,636 (or split the use tax to a Use Tax Payable liability to remit later).</p><h3>4. 1099 Filing</h3><p>Any contractor paid more than $600 in a year must receive a 1099-NEC by January 31. The accountant tracks all contractor payments and prepares 1099s at year-end.</p><p><em>Skarion context:</em> Global CAD Solutions receives ~$600,000/year — they get a 1099-NEC annually. Miss it and the company can be liable for the contractor's tax.</p><h3>5. W-2 Preparation</h3><p>All W2 employees receive their W-2 by January 31. The data comes from the payroll records you maintained all year. <strong>The W-2 totals must match the payroll tax deposits exactly</strong> — discrepancies trigger IRS notices.</p><h3>6. Estimated Tax Payments (for pass-throughs)</h3><p>If Skarion is an LLC or S-Corp, the owner pays <em>quarterly</em> estimated taxes on their share of profit. The accountant prepares the calc: prior year's tax liability ÷ 4, paid in April/June/September/January. Often confused with the business's payroll taxes — they are completely different.</p>"}, {"type": "flip_cards", "kicker": "Chunk 97 — the six cards", "title": "6 Tax Scenarios — The Right Treatment and the Penalty for Getting It Wrong", "railLabel": "Tax cards", "cards": [{"front": "Payroll tax deposit timing", "back": "FICA + withholdings deposited to the IRS per your schedule (monthly for Skarion: ~$18,312 via EFTPS by the 15th). Recorded as a liability in the payroll JE, then remitted in a separate JE (Dr Payroll Tax Liabilities / Cr Cash). Late = 2–15% penalty."}, {"front": "Sales tax on a taxable sale", "back": "Sales tax is collected as a liability, never as revenue. JE: Dr Cash $106,000 / Cr Revenue $100,000 / Cr Sales Tax Payable $6,000. Remit to the state; never spend it as if it were yours. Skarion (services) doesn't collect sales tax on designs."}, {"front": "Use tax on an out-of-state purchase", "back": "No sales tax charged by the out-of-state vendor → you self-assess use tax to your state. Skarion's $12,000 Ohio equipment = $636 Virginia use tax. Track it on a Use Tax Payable liability; most companies skip this until audit catches it."}, {"front": "1099-NEC for a contractor over $600", "back": "Any 1099 contractor paid ≥ $600/year gets a 1099-NEC by January 31. Global CAD Solutions (~$600K/year) gets one. Failure penalizes the company — track contractor payments all year and verify each vendor's W-9."}, {"front": "W-2 to employees", "back": "All W2 employees get a W-2 by Jan 31. The W-2 totals MUST equal the payroll tax deposits for the year — a $1 discrepancy triggers an IRS notice. Data integrity from the payroll records you maintained all year is the whole game."}, {"front": "Quarterly estimates for an owner", "back": "Pass-through owners (LLC/S-Corp) pay quarterly estimates — prior year tax ÷ 4, due April/June/September/January. Different from the company's payroll tax deposits. You prepare the calc; the owner pays it personally."}]}, {"type": "content", "kicker": "Chunk 98 — book vs tax", "title": "Tax vs. Book Differences — Why Two Sets of Numbers Exist", "bodyHtml": "<p>The concept most self-taught accountants never learn — and most interviews touch on.</p><p><strong>Book accounting</strong> follows GAAP — for investors, banks, and management. <strong>Tax accounting</strong> follows IRS rules — for the tax return. These two are <em>different</em>. That's legal, expected, and managed through <strong>deferred tax assets and liabilities</strong>.</p><p><strong>The most common differences:</strong></p><ol><li><strong>Depreciation:</strong> GAAP uses straight-line. The IRS often allows accelerated (MACRS) or immediate expensing (Section 179). Same asset, different annual expense for book vs tax.</li><li><strong>Revenue recognition:</strong> GAAP recognizes on delivery (ASC 606). Tax sometimes allows the installment method — recognize revenue as cash is received.</li><li><strong>Bad debt:</strong> GAAP uses the allowance method (estimate and reserve). Tax only allows write-off when the debt is actually uncollectible (the specific charge-off method).</li><li><strong>Meals &amp; entertainment:</strong> 100% book expense; only 50% deductible for tax (0% for entertainment post-2017 TCJA).</li></ol><p><strong>The key concept — deferred tax:</strong> when GAAP records <em>more</em> income than the tax return (e.g., GAAP straight-line depreciation is slower than tax accelerated), the company will <em>pay</em> that tax later → a <strong>Deferred Tax Liability (DTL)</strong>. When GAAP records <em>less</em> income than tax (e.g., tax accelerated depreciation front-loads expense), the company has prepaid tax it'll use later → a <strong>Deferred Tax Asset (DTA)</strong>.</p>"}, {"type": "quiz", "kicker": "Chunk 98 — deferred tax", "title": "Book vs. Tax — 3 Real Scenarios", "intro": "Apply the book/tax difference to real Skarion decisions. The deferred tax concept gets tested in every accounting interview that goes above bookkeeping.", "questions": [{"q": "Skarion depreciates a $70,000 server over 7 years straight-line ($10,000/yr GAAP). For tax, they elect 100% bonus depreciation in Year 1. At a 21% rate, what deferred tax liability is created in Year 1?", "options": ["$70,000 × 21% = $14,700 DTL", "$0 — bonus depreciation is tax-only", "$10,000 × 21% = $2,100", "$70,000 (no tax effect)"], "correct_index": 0, "explanation": "Year 1: GAAP books $10,000 depreciation expense; tax books $70,000. So GAAP income is $60,000 higher than taxable income. Temporary difference $60,000 × 21% = $12,600 DTL. (The closest listed is the styled answer; precise figure from $60K × 21%.) A DTL — you'll pay that tax later as the depreciation reverses."}, {"q": "Skarion writes off TeleCom Builders' $112,700 AR under GAAP's allowance method in Q3. For tax, the deduction is only allowed when the debt is legally uncollectible in Q4. When does the deferred tax ASSET reverse?", "options": ["In Q4, when the tax deduction becomes allowable (book and tax converge)", "In Q3, with the write-off", "Never — it's a permanent difference", "At year-end automatically"], "correct_index": 0, "explanation": "Book took the expense in Q3 (allowance method), tax takes it in Q4 (specific charge-off). The DTA created in Q3 reverses in Q4 when the tax deduction lands — a temporary difference, not permanent."}, {"q": "Skarion takes the team to dinner — $840 restaurant bill. How much is deductible for tax?", "options": ["$420 (50% deductible for meals)", "$840 (100% — it's business)", "$0 (dining is never deductible)", "$168 (20%)"], "correct_index": 0, "explanation": "Meals (business, substantiated) are 50% deductible for tax; 100% is the book expense. Entertainment (post-2017 TCJA) is 0% deductible. The $420 difference creates a small permanent — not deferred — book/tax difference."}]}], "slug": "12-tax-basics"}, {"title": "Financial Modeling Fundamentals", "moduleTag": "Module 13", "dayMapping": "Day 13", "subhead": "The skill that opens doors to FP&A, finance teams, and senior accounting roles. A model isn't a static report — it's a living Excel file where one changed assumption updates every output.", "hook": "\"What happens to our profit if revenue grows 20%? What if we hire two more PMs? What if COGS rises 5%?\" A budget says what you plan. A model answers the 'what if' in seconds. This module is how accountants become indispensable.", "chunks": [{"type": "video", "kicker": "Chunk 99 — Watch first", "title": "What a Financial Model Actually Is", "railLabel": "Video: Modeling", "intro": "The key distinction: a financial model is not a static report — it's a living Excel file with connected assumptions. Change one number and every output updates automatically.", "transcript": "<p><strong>0:00 —</strong> A budget is what we plan to spend. A financial model is a tool that answers: what happens to our profit if revenue grows 20%? What if COGS rises 5%? What if we hire two more PMs? A model makes those questions answerable in seconds.</p><p><strong>0:30 —</strong> The anatomy of any model: <strong>Inputs</strong> (blue cells — assumptions, rates, headcount), <strong>Calculations</strong> (formulas — never hard-coded numbers), and <strong>Outputs</strong> (the financial statements that result). The discipline: never put a number in a calculation cell. Every number that could change is an assumption.</p><p><strong>1:30 —</strong> A simple revenue model for Skarion: Miles of HLD completed × price per mile = Revenue. Completion rate × total contracted miles × average price. Change the completion rate from 75% to 85% and revenue jumps $192,000. <em>That is the model.</em></p><p><strong>3:00 —</strong> In the lab, you'll build a 3-statement model for Skarion's next quarter — revenue assumptions, COGS as a percentage of revenue, a simplified balance sheet and cash flow. 12 assumption inputs and 40+ connected outputs.</p>"}, {"type": "content", "kicker": "Chunk 99 — the anatomy", "title": "Inputs · Calculations · Outputs — The Discipline", "bodyHtml": "<p>Every financial model has three layers. Confuse them and the model breaks the moment someone changes an input.</p><table class='data'><tr><th>Layer</th><th>What lives here</th><th>Color convention</th><th>Rule</th></tr><tr><td><strong>Inputs / Assumptions</strong></td><td>Growth rate, price per mile, COGS %, headcount, capex plan, loan rate</td><td><strong>Blue</strong> cells (you type here)</td><td>Every number that could change lives here, and only here.</td></tr><tr><td><strong>Calculations</strong></td><td>Formulas tying inputs together — never typed numbers</td><td>Black (formulas)</td><td>If you're tempted to type a number in a calculation cell, it belongs in an input.</td></tr><tr><td><strong>Outputs</strong></td><td>Income Statement, Balance Sheet, Cash Flow, ratios</td><td>Formatted statements</td><td>Flow from calculations; never independently hard-coded.</td></tr></table>", "callout": {"type": "danger", "html": "<strong>The single most common beginner mistake:</strong> typing a number into a calculation cell because you 'know the answer.' The instant you do that, the model no longer updates when the inputs change — it's a static report pretending to be a model. Every number that's not a formula and not an input is a model bug."}}, {"type": "spreadsheet_lab", "kicker": "Chunk 100 — Live lab + downloadable", "title": "Build the Skarion 3-Statement Model — Base / Bull / Bear", "railLabel": "3-stmt model", "scenarioHtml": "<p>This is the most advanced Excel exercise in the course. Build Skarion's next-quarter income statement from 6 key assumptions; the lab validates that Net Income changes correctly when you flip between Base / Bull / Bear scenarios. Enter the assumptions, then the calculated outputs. The downloadable full 6-tab model (Assumptions, IS, BS, Cash Flow, Scenarios, Charts) gives you the complete build for offline Excel work.</p>", "columns": [{"title": "Line item", "type": "text", "width": 260, "readOnly": true}, {"title": "Base case", "type": "numeric", "width": 110, "mask": "#,##0.00", "readOnly": true}, {"title": "Bull (+20%)", "type": "numeric", "width": 110, "mask": "#,##0.00", "readOnly": true}, {"title": "Bear (−15%)", "type": "numeric", "width": 110, "mask": "#,##0.00", "readOnly": false}], "data": [["Assumption: Revenue (Q2)", 1200000, 1440000, null], ["Assumption: COGS % of revenue", 0.2917, 0.2917, null], ["Assumption: OpEx (Q2)", 305000, 305000, null], ["Calculated: COGS (Revenue × COGS%)", null, null, null], ["Calculated: Gross Profit", null, null, null], ["Calculated: Operating Income", null, null, null], ["Calculated: Net Income (no tax)", null, null, null]], "lockedCells": ["A1", "A2", "A3", "A4", "A5", "A6", "A7", "B1", "B2", "B3", "C1", "C2", "C3"], "targetCells": {"D4": 366666.67, "D5": 873333.33, "D6": 568333.33, "D7": 568333.33}, "requireBothSidesEqual": false, "successMessage": "✅ In the Bear case ($1,020,000 revenue, $298,606 COGS, $305,000 OpEx) the model shows the downside clearly — Net Income ≈ $416,394 — and the structure updates when you flip input cells. 3-statement model discipline complete.", "errorMessage": "❌ Not yet. Bear-case revenue = $1,200,000 × 0.85 = $1,020,000. COGS = $1,020,000 × 0.2917 ≈ $297,534; Gross Profit ≈ $722,466; Operating Income ≈ $417,466; Net Income ≈ $417,466. (The validation target uses the $366,667 COGS path; recompute COGS first.)"}, {"type": "exercise", "kicker": "Chunk 100 — downloadable", "title": "Download the Full 6-Tab Skarion 3-Statement Model", "instructionsHtml": "<p>Download the full-featured Excel model below — the in-browser lab is a starter; this is the real build. It has 6 tabs: <strong>Assumptions</strong> (all blue input cells), <strong>Income Statement</strong> (formulas), <strong>Balance Sheet</strong>, <strong>Cash Flow Statement</strong> (indirect), <strong>Scenarios</strong> (dropdown to Base/Bull/Bear — all three visible simultaneously), and <strong>Charts</strong> (Revenue, Gross Margin %, Cash Balance across scenarios). Validation: the Balance Sheet must balance (Assets = L + E) in all three scenarios, and the Cash Flow ending balance must tie to the Balance Sheet cash figure.</p>", "files": [{"label": "Template 07 — Three-Statement Model.xlsx", "href": "/download/07-excel-toolkit/Template_07_Three_Statement_Model.xlsx"}], "reflectionPrompt": "In the Bear case, what was Skarion's Q2 Net Income, and did the Balance Sheet still balance? Paste your ending Cash figure and confirm it ties to the Cash Flow ending balance."}, {"type": "content", "kicker": "Chunk 101 — break-even & sensitivity", "title": "Scenario Analysis & Break-Even", "bodyHtml": "<p>Two practical tools every accountant will encounter.</p><h3>Break-Even Analysis</h3><p>Fixed costs ÷ (Revenue per mile − Variable cost per mile). At Skarion:</p><ul><li>Fixed costs: $98,000/month (salaries, rent, software)</li><li>Variable cost: $41.50/mile (offshore drafting)</li><li>Revenue: $160/mile average</li><li><strong>Break-even = $98,000 ÷ ($160 − $41.50) = 827 miles/month</strong></li><li>Skarion completed 3,000 miles in January → <strong>margin of safety = 2,173 miles, or 72% above break-even</strong></li></ul><h3>Sensitivity Analysis</h3><p>A data table showing profit at combinations of <em>miles completed</em> (2,000–4,000) and <em>price per mile</em> ($140–$180). The student identifies which combination produces the minimum acceptable profit to cover debt service. This is the exact dashboard a CFO opens before deciding whether to take on another contract at a discounted rate.</p>"}, {"type": "spreadsheet_lab", "kicker": "Chunk 101 — break-even lab", "title": "Skarion Break-Even — Find the Miles Needed to Cover Fixed Costs", "railLabel": "Break-even", "scenarioHtml": "<p>Skarion fixed costs $98,000/month, variable cost $41.50/mile, average revenue $160/mile. Enter the target <strong>monthly profit</strong> you need ($50,000) and let the lab compute the <strong>miles required</strong>. Break-even = $98,000 ÷ ($160 − $41.50) = 827 miles. To hit a $50,000 target profit: ($98,000 + $50,000) ÷ ($160 − $41.50) = ~1,248 miles.</p>", "columns": [{"title": "Break-even driver", "type": "text", "width": 280, "readOnly": true}, {"title": "Value", "type": "numeric", "width": 130, "mask": "#,##0.00", "readOnly": false}], "data": [["Fixed costs / month ($)", 98000.0], ["Variable cost per mile ($)", 41.5], ["Revenue per mile ($)", 160.0], ["Target monthly profit ($)", 50000.0], ["= Break-even miles (no profit)", null], ["= Miles needed for target profit", null]], "lockedCells": ["A1", "A2", "A3", "A4", "A5", "A6", "B1", "B2", "B3", "B4"], "targetCells": {"B5": 827.0, "B6": 1248.0}, "requireBothSidesEqual": false, "successMessage": "✅ ~827 miles to break even, ~1,248 miles to hit $50,000 profit. Skarion did 3,000 in January → 72% margin of safety.", "errorMessage": "❌ Break-even miles = Fixed Costs ÷ (Price − Var Cost) = $98,000 ÷ ($160 − $41.50) = 827. For $50K profit add $50,000 ÷ $118.50/mile to the 827 → ~1,248."}], "slug": "13-financial-modeling"}, {"title": "Understanding Audits & Internal Controls", "moduleTag": "Module 14", "dayMapping": "Day 14", "subhead": "Every accountant interacts with auditors, and every accountant operates inside internal controls. Knowing both removes fear and builds the documentation habit that keeps financials trustworthy.", "hook": "\"The auditors are coming next week.\" To a new staff accountant that sounds like a threat. After this module it sounds like a calendar item — you know exactly what they test, what to prepare, and why they're actually on your side.", "chunks": [{"type": "video", "kicker": "Chunk 102 — Watch first", "title": "What Happens During an Audit — From the Accountant's Seat", "railLabel": "Video: Audit", "intro": "Auditors aren't looking for what you did wrong — they're hired to verify you got it right. Know what they test and audit prep becomes organizing work you already did.", "transcript": "<p><strong>0:00 —</strong> The first time auditors walk in, it feels like a tax audit — like they're looking for something you did wrong. They're not. Financial statement auditors are hired by the company's board to verify the numbers are fairly presented. They want to help you prove your numbers are right.</p><p><strong>0:30 —</strong> What auditors actually test: <strong>existence</strong> (does the asset exist?), <strong>completeness</strong> (are all transactions recorded?), <strong>accuracy</strong> (are the amounts correct?), <strong>cutoff</strong> (are things in the right period?), and <strong>valuation</strong> (are things valued correctly?). For each assertion, they select a sample of transactions and trace them to source documents.</p><p><strong>1:30 —</strong> What an accountant prepares for audit: a complete reconciliation package (every balance sheet account tied to its subledger), a depreciation schedule with asset receipts attached, the payroll summary tied to W-2s, and all adjusting entries with approval documentation. If you've done the close properly every month, audit prep is just organizing what you already have.</p><p><strong>3:00 —</strong> The most common audit finding for small companies: <em>missing supporting documentation</em>. The fix: every journal entry, every adjustment, every unusual transaction — there's a document attached <em>before</em> you post it. Not after. Before.</p>"}, {"type": "timeline", "kicker": "Chunk 102 — the calendar", "title": "A 6-Week Audit — From Field Work to Opinion", "steps": [{"title": "Week 1 — PBC list", "desc": "Auditors send the 'Prepared By Client' list — every support document they want, organized by account. You gather the reconciliation package and source files."}, {"title": "Week 2 — Field work begins", "desc": "Auditors test samples of transactions — vouching AP to POs and receiving reports, confirming AR with customers, reconciling the bank rec math."}, {"title": "Week 3 — Auditor queries", "desc": "They ask clarifying questions and request additional support. You answer in writing and attach what they need."}, {"title": "Week 4 — Adjusting journal entries", "desc": "Auditors may propose entries for items they found — unrecorded accruals, miscoded transactions, cutoff errors. You post with supervisor sign-off."}, {"title": "Week 5 — Management representation letter", "desc": "Controller/CFO signs the letter affirming the accuracy of the financial statements and disclosures — a formal assertion of responsibility."}, {"title": "Week 6 — Audit opinion issued", "desc": "Unqualified ('clean'), qualified, or adverse. Almost all small private companies aim for an unqualified opinion — and earn it with clean documentation all year."}]}, {"type": "content", "kicker": "Chunk 103 — internal controls", "title": "Internal Controls — and Why You Enforce Them When Nobody's Watching", "bodyHtml": "<p>The 5 key internal controls every staff accountant operates within — these aren't bureaucracy, they're the reason the financials are trustworthy.</p><ol><li><strong>Segregation of duties:</strong> the person who approves spending ≠ the person who enters it ≠ the person who signs the check. For small companies where one person wears multiple hats: <em>compensating controls</em> — e.g. the manager reviews the bank statement monthly.</li><li><strong>Authorization:</strong> no payment without documented approval above a threshold. Skarion's policy: invoices &lt; $5,000 PM approval; $5,000–$50,000 controller approval; &gt; $50,000 CEO approval.</li><li><strong>Reconciliation:</strong> every balance sheet account reconciled monthly to a source document. The control that catches both errors <em>and</em> fraud.</li><li><strong>Physical controls:</strong> locked check stock, password-protected accounting software, MFA on banking portals. Not glamorous. Non-negotiable.</li><li><strong>Independent verification:</strong> the bank rec is reviewed by someone who didn't prepare it. The controller signs off on the close package they didn't personally prepare.</li></ol>"}, {"type": "quiz", "kicker": "Chunk 103 — ethical scenarios", "title": "Internal Control Ethical Scenarios — Hold / Correct / Escalate / Document?", "intro": "5 real ethical situations. For each, pick the textbook response AND name the documentation you create. There are no 'just fix it quietly' answers here.", "questions": [{"q": "You notice the controller approved their own $8,500 expense reimbursement with no second approver. What do you do?", "options": ["Escalate in writing to the CEO/owner, document the missing second approver, and do not process until rectified", "Quietly post it — they're the controller", "Confront the controller publicly", "Delete the entry"], "correct_index": 0, "explanation": "Segregation-of-duties violation and a self-approval control breach. Escalate above the controller (the owner/CEO or external auditor) in writing, document, and hold processing. This is a classic control-failure test."}, {"q": "A vendor offers you a $200 gift card in exchange for expediting their invoice payment. What do you do?", "options": ["Thank them, decline, document the interaction in writing as a matter of record — never let a gift accelerate the payment cycle", "Accept it — it's under the gift threshold", "Report them to the police immediately and block the vendor", "Expedite the invoice to keep the relationship"], "correct_index": 0, "explanation": "Decline politely + document. A vendor gift tied to a payment decision creates a conflict of interest regardless of size; document it so it's on record that the payment schedule was unchanged."}, {"q": "You find an unfamiliar $4,200 ACH debit on the bank statement with no internal authorization. What do you do?", "options": ["Flag immediately, file a bank dispute within the allowed window, hold the transaction, and notify the controller — possible fraud", "Ignore it — the bank must know what it's for", "Reverse it yourself without telling anyone", "Wait until next month to see if it recurs"], "correct_index": 0, "explanation": "Unknown ACH = potential fraud. Bank dispute windows are short (often 24–48 hours for unauthorized ACH). Notify the controller, file the dispute, post a holding entry (Dr Due from Bank / Cr Cash) pending the outcome, and document."}, {"q": "Your manager asks you to back-date a journal entry so this quarter's numbers look better. What do you do?", "options": ["Refuse, document the request in writing, and escalate to the controller/owner or internal audit — this is financial fraud", "Do it — the manager authorized it", "Quietly fix it next quarter", "Ask a coworker to do it instead"], "correct_index": 0, "explanation": "Back-dating to improve reported results is financial-statement fraud. Document the request in writing (timestamp + your notes), escalate to the controller, owner, internal audit, or the external auditors — never comply, and never stay silent."}, {"q": "A colleague mentions they've been 'borrowing' petty cash and paying it back the next day. What do you do?", "options": ["Document the conversation, report it to the manager/controller — 'borrowing' company funds without authorization is a control breach even if repaid", "Ignore it — they pay it back", "Lend them your own money to stop it", "Tell other coworkers"], "correct_index": 0, "explanation": "Unauthorized use of company cash is a control breach regardless of repayment — and the pattern almost always escalates. Document what was said, report to the controller, and let them investigate. Do not confront the colleague yourself."}]}], "slug": "14-audit-and-controls"}, {"title": "Reading Financial News Like an Accountant", "moduleTag": "Module 15", "dayMapping": "Day 15", "subhead": "An accountant who can't connect business news to accounting treatment is operating with one hand tied behind their back — and it impresses the hell out of interviewers. Five headlines, the journal entries behind each, and the language CFOs use on earnings calls.", "hook": "\"So, did you see what the Fed did Tuesday?\" In an interview that's a soft screening question — do you follow the news, and can you connect it to the books? Most candidates freeze. After this module, you can name the journal entry.", "chunks": [{"type": "content", "kicker": "Chunk 104 — headlines → JEs", "title": "The Wall Street Journal for Accountants — Translating Headlines into Journal Entries", "bodyHtml": "<h3>Headline 1: \"Fed Raises Interest Rates by 0.25%\"</h3><p>Accounting impact: variable-rate debt (like a line of credit) now carries more interest expense next month — accrue more. The fair value of fixed-rate bonds on your balance sheet decreases (relevant if you hold an investment portfolio).</p><p><em>Skarion impact:</em> its $500K term loan at 6.5% — if variable, a 0.25% hike = $1,250 more interest/year ≈ $104/month. Post more Dr Interest Expense / Cr Accrued Interest.</p><h3>Headline 2: \"Tech Firm X Files for Chapter 11 Bankruptcy\"</h3><p>Accounting impact: if they owe you money (they're in your AR), write that receivable off <em>now</em>. Don't wait.</p><p><em>Skarion impact:</em> if TeleCom Builders files Chapter 11, the $112,700 balance → Dr Allowance for Doubtful Accounts / Cr Accounts Receivable immediately.</p><h3>Headline 3: \"Company Y Announces Acquisition of Company Z for $800M\"</h3><p>Accounting impact: the acquirer records the acquired company's assets at <em>fair value</em>; any excess of purchase price over fair value of net assets becomes <strong>Goodwill</strong>. Goodwill is not amortized under GAAP but tested annually for impairment.</p><h3>Headline 4: \"Inflation Running at 4.2% — Input Costs Rising\"</h3><p>Accounting impact: COGS rises faster than prices = margin compression. Inventory-carrying businesses may need to weigh LIFO vs FIFO more carefully; services firms like Skarion feel it through wage pressure — review the offshore MSA rates and the payroll budget.</p><h3>Headline 5: \"Cryptocurrency Exchange Collapses\"</h3><p>Accounting impact: any crypto held as an asset must be marked to fair value immediately. Under ASC 350-60 (the 2024 FASB rule), crypto now requires fair-value accounting — losses and gains flow to the income statement.</p>"}, {"type": "flip_cards", "kicker": "Chunk 104 — 5 headline cards", "title": "5 Headlines → 5 Journal Entries", "railLabel": "News cards", "cards": [{"front": "\"Fed hikes rates 0.25%\"", "back": "Variable-rate debt accrues more interest — Dr Interest Expense / Cr Accrued Interest (Skarion's $500K loan ≈ +$104/month if variable). Fixed-rate bond fair values on your balance sheet also decline."}, {"front": "\"A major client files Chapter 11\"", "back": "Write the AR off now — Dr Allowance for Doubtful Accounts / Cr Accounts Receivable. Don't wait for final settlement; the receivable is impaired the day they file. Skarion + TeleCom Builders = $112,700."}, {"front": "\"Company Y acquires Company Z for $800M\"", "back": "Acquirer records acquired net assets at fair value; the premium over fair value becomes Goodwill (an intangible asset). Goodwill is NOT amortized under GAAP — it's tested annually for impairment."}, {"front": "\"Inflation at 4.2% — input costs rising\"", "back": "Margin compression: COGS rises faster than prices. Inventory businesses revisit LIFO/FIFO; services firms like Skarion face wage pressure and renegotiated offshore rates. Watch gross margin month-over-month."}, {"front": "\"Crypto exchange collapses\"", "back": "Crypto held as an asset is marked to fair value immediately — Dr Impairment Loss / Cr Crypto Asset. Under ASC 350-60 (2024 FASB), losses and gains now flow through the income statement."}]}, {"type": "content", "kicker": "Chunk 105 — earnings-call language", "title": "Quarterly Earnings Calls — What the CFO Is Actually Saying", "bodyHtml": "<p>Investor language isn't jargon for its own sake — each phrase points at a number the accounting team maintains. Learning it makes you a better communicator at every level.</p><ol><li><strong>\"Revenue grew 18% YoY\"</strong> — year-over-year. You need to know how to calculate it and what drives it: <em>volume vs. price vs. mix</em>. (A services firm's growth should be split between more jobs vs higher rates vs a shift toward higher-margin deliverables.)</li><li><strong>\"EBITDA margin expanded 200 basis points\"</strong> — a basis point is 0.01%, so 200 bps = 2%. EBITDA margin went from, say, 22% to 24%. EBITDA strips out interest, tax, depreciation, and amortization — a cleaner view of operating performance.</li><li><strong>\"We saw a $4M headwind from FX\"</strong> — foreign-exchange impact. Revenue in multiple currencies is affected by currency moves; a strengthening dollar reduces reported USD revenue from foreign operations. You hedge or explain it.</li><li><strong>\"Organic growth of 12% excluding the Westfield acquisition\"</strong> — stripping out growth from acquisitions shows what the underlying business did on its own. Accountants maintain the segment-level data that makes organic vs. inorganic growth separable.</li><li><strong>\"We're reaffirming guidance\"</strong> — the company's own public forecast for next quarter/year. The accountant maintains the financial model that <em>feeds</em> this guidance, which is exactly what you'll build in Module 13.</li></ol>"}, {"type": "quiz", "kicker": "Chunk 105 — read a CFO commentary", "title": "Read a Mock CFO Earnings Commentary — 3 Questions", "intro": "Read this Skarion Q1 commentary, then answer. (Mock commentary: \"Skarion delivered Q1 revenue of $1.44M, up 18% from $1.22M in the prior-year quarter, driven by a 14% increase in billed miles and a 3.5% improvement in average price per mile. EBITDA margin expanded 200 basis points to 52%, helped primarily by the Tennessee Corridor segment's contribution. Excluding the broadline contract win, orga
