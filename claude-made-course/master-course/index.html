or Doubtful Accounts", "4000 - Engineering Design Revenue"], "solution": [{"account": "1000 - Operating Checking", "side": "debit", "amount": 190000.0}, {"account": "1100 - Accounts Receivable", "side": "credit", "amount": 190000.0}]}, {"type": "journal_entry_builder", "kicker": "Skarion JE builder — NSF check", "title": "A customer check bounces — reinstate the receivable", "railLabel": "JE: NSF", "scenarioHtml": "<p>TeleCom Builders sends a <strong>$50,000</strong> check, which is recorded in the books. The check bounces. The bank reverses the $50,000 deposit and charges a <strong>$35</strong> NSF fee. Reinstate the receivable (the customer owes us again) and record the fee the bank charged us.</p>", "startRows": 3, "accounts": ["1000 - Operating Checking", "1100 - Accounts Receivable", "6900 - Bank Fees Expense", "2500 - Deferred Revenue"], "solution": [{"account": "1100 - Accounts Receivable", "side": "debit", "amount": 50000.0}, {"account": "6900 - Bank Fees Expense", "side": "debit", "amount": 35.0}, {"account": "1000 - Operating Checking", "side": "credit", "amount": 50035.0}]}, {"type": "flip_cards", "kicker": "Know them cold", "title": "The six most common reconciliation problems", "railLabel": "Flip cards", "cards": [{"front": "Duplicate deposit", "back": "The same customer payment is entered in the GL twice. Fix: Debit Accounts Receivable / Credit Cash to reverse the duplicate and reinstate the receivable. Skarion found DEP-0091 ($10,547.10) duplicated."}, {"front": "Outstanding check", "back": "A check written and recorded in the books that the vendor hasn't cashed yet. Subtract it from the bank side — it simply hasn't cleared. Skarion: check #2847 to Global CAD for $4,200."}, {"front": "Amount transposition", "back": "The book entry doesn't match what cleared. Rent recorded as $12,750 but the check cleared at $12,800 — a $50 correcting entry is required on the book side."}, {"front": "Bank fee not recorded", "back": "A monthly service charge, wire fee, or NSF fee hit the bank but was never entered in the books. Book it on the book side: Debit Bank Fees / Credit Cash."}, {"front": "Deposit in transit", "back": "A last-day deposit recorded in the books that has not posted to the bank statement yet. Add it to the bank side — it will appear next month."}, {"front": "Fraudulent transaction", "back": "An unauthorized ACH debit. Flag immediately, file a bank dispute within the allowed window, and post Debit Due from Bank (or AR) / Credit Cash while the investigation runs."}]}, {"type": "content", "kicker": "The worked example", "title": "Skarion January reconciliation — finding the real error", "bodyHtml": "<p>Here is the actual January reconciliation, worked both directions. This is the example you'll reference in interviews.</p><p><strong>Bank side:</strong></p><table class='data'><tr><th>Bank side</th><th>Amount</th></tr><tr><td>Bank statement ending balance</td><td>$312,450.00</td></tr><tr><td>+ Deposits in transit (Dec 31 receipt)</td><td>+$28,000.00</td></tr><tr><td>− Outstanding check #2847 (Global CAD)</td><td>−$4,200.00</td></tr><tr><td>= Adjusted bank balance</td><td><strong>$336,250.00</strong></td></tr></table><p><strong>Book side:</strong></p><table class='data'><tr><th>Book side</th><th>Amount</th></tr><tr><td>GL balance</td><td>$346,823.60</td></tr><tr><td>− Unrecorded bank fee</td><td>−$45.00</td></tr><tr><td>+ Unrecorded interest</td><td>+$18.50</td></tr><tr><td>− Duplicate deposit (DEP-0091, Southeast Broadband)</td><td>−$10,547.10</td></tr><tr><td>= Adjusted book balance</td><td><strong>$336,250.00</strong> ✓</td></tr></table><p>Both sides meet at <strong>$336,250.00</strong> — exactly. The duplicate deposit was the real error hiding inside the timing differences. Now post three correcting entries on the book side.</p>"}, {"type": "journal_entry_builder", "kicker": "Correcting entry — duplicate", "title": "Correct the DEP-0091 duplicate deposit", "railLabel": "JE: dup deposit", "scenarioHtml": "<p>Customer deposit <strong>DEP-0091</strong> ($10,547.10 from Southeast Broadband) was entered twice in the GL. Reverse the duplicate and reinstate the receivable — revenue was never overstated, only cash and AR were.</p>", "startRows": 2, "accounts": ["1000 - Operating Checking", "1100 - Accounts Receivable", "4000 - Engineering Design Revenue", "6900 - Bank Fees Expense"], "solution": [{"account": "1100 - Accounts Receivable", "side": "debit", "amount": 10547.1}, {"account": "1000 - Operating Checking", "side": "credit", "amount": 10547.1}]}, {"type": "journal_entry_builder", "kicker": "Correcting entry — bank fee", "title": "Book the unrecorded monthly bank fee", "railLabel": "JE: bank fee", "scenarioHtml": "<p>The bank charged a <strong>$45.00</strong> monthly service fee that was never entered in the books. Record the expense and the corresponding reduction in cash.</p>", "startRows": 2, "accounts": ["1000 - Operating Checking", "6900 - Bank Fees Expense", "6800 - Interest Expense", "1100 - Accounts Receivable"], "solution": [{"account": "6900 - Bank Fees Expense", "side": "debit", "amount": 45.0}, {"account": "1000 - Operating Checking", "side": "credit", "amount": 45.0}]}, {"type": "journal_entry_builder", "kicker": "Correcting entry — interest", "title": "Book the unrecorded interest credit", "railLabel": "JE: interest", "scenarioHtml": "<p>The bank credited <strong>$18.50</strong> of interest income on the operating account that was never recorded in the books. Cash increases and Interest Income is recognized.</p>", "startRows": 2, "accounts": ["1000 - Operating Checking", "6900 - Bank Fees Expense", "4300 - Interest Income", "1100 - Accounts Receivable"], "solution": [{"account": "1000 - Operating Checking", "side": "debit", "amount": 18.5}, {"account": "4300 - Interest Income", "side": "credit", "amount": 18.5}]}, {"type": "quiz", "intro": "Four bank-rec questions, the kind that come up in interviews and in the real first month of the job.", "title": "Bank reconciliation quiz", "questions": [{"q": "A client wires $240,000. Your bank charges a $35 incoming wire fee. What is the net debit to Cash (the amount that actually lands in the operating account)?", "options": ["$240,000", "$239,965", "$240,035", "$35"], "correct_index": 1, "explanation": "Net cash landing is $240,000 − $35 = $239,965. The full entry: Debit Cash $239,965, Debit Bank Fees $35, Credit AR $240,000. The gross receivable is cleared; the fee is booked to its own expense line."}, {"q": "A check written to an offshore contractor on January 28th has not cleared by January 31st. Which side of the reconciliation is it on?", "options": ["Add it to the book side", "Subtract it from the bank side as an outstanding check", "Add it to the bank side as a deposit in transit", "Ignore it — it cleared the books already"], "correct_index": 1, "explanation": "It is in your books but not yet on the bank statement — a classic outstanding check. Subtract it from the bank statement balance when computing the adjusted bank balance."}, {"q": "The adjusted bank balance is $336,250 and the adjusted book balance is $336,290. What is true?", "options": ["Reconciliation is complete — close enough", "There is still a $40 unexplained error to find before touching the books", "Post a $40 plug entry to make them equal", "The bank owes you $40"], "correct_index": 1, "explanation": "After all timing adjustments they must be exactly equal. A $40 remaining gap means a real error is still undiscovered — keep tracing source transactions until the gap is fully explained."}, {"q": "Skarion finds a $10,547.10 duplicate deposit in the GL. What is the correcting entry?", "options": ["Debit Cash / Credit AR", "Debit AR / Credit Cash", "Debit Revenue / Credit Cash", "No entry — reverse next month"], "correct_index": 1, "explanation": "The duplicate over-credited Cash and over-credited AR. Reverse it: Debit AR (reinstate the receivable), Credit Cash (remove the duplicate). Revenue was never affected."}]}, {"type": "exercise", "kicker": "Hands-on lab", "title": "Excel bank reconciliation lab — three months", "instructionsHtml": "<p>Download the bank statement workbooks below and the Excel reconciliation template (Template 01). Each statement has a Bank Statement tab, a GL Cash register, and a Reconciliation Worksheet. For each month:</p><ol><li>Match every transaction between the bank statement and the register.</li><li>Identify the seeded problems (duplicates, wrong amounts, outstanding checks, unrecorded fees — January has 4 items to find and 2 correcting entries).</li><li>Complete the two-sided worksheet until the adjusted balances are <strong>exactly $336,250.00</strong> for January.</li></ol><p>Watch the labels — the March worksheet has one duplicate that is a duplicated <em>debit</em>, unlike January's duplicated credit.</p>", "files": [{"label": "January Bank Statement.xlsx", "href": "/download/05-bank-reconciliation-lab/Bank_Statement_2026-01_January.xlsx"}, {"label": "February Bank Statement.xlsx", "href": "/download/05-bank-reconciliation-lab/Bank_Statement_2026-02_February.xlsx"}, {"label": "March Bank Statement.xlsx", "href": "/download/05-bank-reconciliation-lab/Bank_Statement_2026-03_March.xlsx"}, {"label": "Template 01 — Bank Rec Worksheet.xlsx", "href": "/download/07-excel-toolkit/Template_01_Bank_Rec.xlsx"}], "reflectionPrompt": "Write your January reconciliation memo: what were the four items, how did you find the duplicate, and what were your two correcting entries?"}], "slug": "05-bank-reconciliation-lab"}, {"title": "Month-End Close & Financial Statements", "moduleTag": "Module 06", "dayMapping": "Day 6", "subhead": "The five-day close calendar that turns a month of transactions into auditable financial statements, the adjusting entries that make accruals honest, and the three statements that roll up the result.", "hook": "\"Walk me through a month-end close.\" The interview answer is the five-day timeline, the four types of adjusting entries, and the $242,000 January net income that comes out the other side. This module is that entire walkthrough.", "chunks": [{"type": "content", "kicker": "Why it exists", "title": "The month-end close process", "bodyHtml": "<p>Month-end close exists because financial statements are produced <em>once per period</em>, and they must be accurate, complete, and timely. Incomplete or wrong statements lead to bad decisions, missed covenants, and audit findings. The close is governed by a <strong>close checklist</strong> in which every task has an owner, a due date, a status, and supporting documentation.</p><p>The discipline that makes a close work: lock the prior period once it is closed so late entries can't silently change history, and tie every subledger (AR, AP, payroll) back to the GL control account before you declare the period done.</p>", "callout": {"type": "tip", "html": "<strong>Hard close vs. soft close.</strong> A <em>hard close</em> locks the period permanently — no further entries except through a formal adjustment in the next period. A <em>soft close</em> leaves the period open for corrections up to the audit, usually for recurring accrual estimates. Public companies essentially always hard-close; private mid-size firms like Skarion typically soft-close then hard-close at year-end."}}, {"type": "content", "kicker": "The calendar", "title": "Skarion's 5-day close timeline", "bodyHtml": "<p>This is the actual five-day calendar Skarion runs to close January. Memorize the rhythm — it is what most mid-size services firms look like:</p><table class='data'><tr><th>Day</th><th>Date</th><th>Focus</th></tr><tr><td>Day 1</td><td>Feb 1</td><td>Lock timesheets, lock AP, generate AP aging, post all outstanding invoices.</td></tr><tr><td>Day 2</td><td>Feb 2</td><td>Post payroll entry and employer taxes, book all offshore contractor accruals, amortize prepaids.</td></tr><tr><td>Day 3</td><td>Feb 3</td><td>Calculate WIP, post depreciation, post loan interest accrual, run trial balance.</td></tr><tr><td>Day 4</td><td>Feb 4</td><td>Bank reconciliation, tie AR subledger to GL, tie AP subledger to GL.</td></tr><tr><td>Day 5</td><td>Feb 5</td><td>Review P&amp;L vs. prior month and budget, produce financial statement package, controller sign-off.</td></tr></table><p>Notice the order: cut off the inputs (timesheets, AP, invoices) first, post the accruals and adjustments second, prove the balances tie third, then produce and review statements. You cannot build statements on a trial balance that hasn't been tied.</p>"}, {"type": "timeline", "title": "The 5-day close, step by step", "steps": [{"title": "Day 1 — Lock & post", "desc": "Lock timesheets and AP. Generate the AP aging. Post every outstanding invoice so the period's revenue and liabilities are complete."}, {"title": "Day 2 — People cost", "desc": "Post the payroll entry and employer taxes. Accrue offshore contractor work done but not yet invoiced. Amortize prepaids for the month."}, {"title": "Day 3 — Adjustments", "desc": "Calculate WIP revenue. Post depreciation. Accrue loan interest. Run the unadjusted trial balance."}, {"title": "Day 4 — Tie & reconcile", "desc": "Bank reconciliation. Tie AR subledger total to GL account 1100. Tie AP subledger total to GL account 2000."}, {"title": "Day 5 — Report & sign-off", "desc": "Review P&L vs prior month and budget. Produce the financial statement package. Controller signs off and the period is closed."}]}, {"type": "content", "kicker": "The heart of close", "title": "Adjusting entries — and the four types", "bodyHtml": "<p>Adjusting entries exist because the accrual principle requires recording things that have happened but generated no paperwork yet. They are why the close takes five days instead of one. There are exactly four types:</p><table class='data'><tr><th>Type</th><th>Skarion example</th></tr><tr><td><strong>Accrued Revenues</strong></td><td>Engineers spent 400 hours on an HLD that is 60% complete and not yet billable — book Unbilled AR (WIP) and revenue.</td></tr><tr><td><strong>Accrued Expenses</strong></td><td>Offshore drafting done Jan 31, invoice not arriving until Feb 4 — accrue COGS now.</td></tr><tr><td><strong>Deferred Revenues</strong></td><td>Client prepaid $120,000; deliver the work and release it from Deferred Revenue to earned revenue.</td></tr><tr><td><strong>Deferred Expenses</strong></td><td>$36,000 prepaid Vetro license amortized $3,000/month to Software Expense.</td></tr></table>"}, {"type": "journal_entry_builder", "kicker": "Adjusting entry 1 — accrued expense", "title": "Accrue offshore drafting done but not yet invoiced", "railLabel": "JE: accrue GCS", "scenarioHtml": "<p>Global CAD Solutions finished <strong>$14,800</strong> of drafting on January 31st. The invoice arrives February 4th. Under accrual accounting the expense belongs in January. Accrue it now (reverse it on Feb 1 before the real invoice is entered).</p>", "startRows": 2, "accounts": ["2000 - Accounts Payable", "2400 - Accrued Liabilities", "5100 - COGS — Subcontractor Drafting", "1000 - Operating Checking"], "solution": [{"account": "5100 - COGS — Subcontractor Drafting", "side": "debit", "amount": 14800.0}, {"account": "2400 - Accrued Liabilities", "side": "credit", "amount": 14800.0}]}, {"type": "journal_entry_builder", "kicker": "Adjusting entry 2 — prepaid amortization", "title": "Amortize the Vetro license for January", "railLabel": "JE: amortize", "scenarioHtml": "<p>The <strong>$36,000</strong> Vetro FiberMap license was paid July 1st and recorded as Prepaid Software. 12-month straight-line amortization = <strong>$3,000/month</strong>. Record January's amortization: move $3,000 from the Prepaid asset into Software Expense.</p>", "startRows": 2, "accounts": ["1400 - Prepaid Software Licenses", "6500 - Software & Subscriptions", "5200 - COGS — Software Allocated to Projects", "1000 - Operating Checking"], "solution": [{"account": "6500 - Software & Subscriptions", "side": "debit", "amount": 3000.0}, {"account": "1400 - Prepaid Software Licenses", "side": "credit", "amount": 3000.0}]}, {"type": "journal_entry_builder", "kicker": "Adjusting entry 3 — depreciation", "title": "Post monthly straight-line depreciation", "railLabel": "JE: depreciation", "scenarioHtml": "<p>Skarion capitalizes 5 GIS workstations at <strong>$12,000 each</strong> ($60,000 total), 5-year useful life, $0 salvage. Straight-line depreciation = <strong>$1,000/month total</strong> ($200/month each). Record January's depreciation.</p>", "startRows": 2, "accounts": ["1500 - GIS Servers & Workstations", "1590 - Accumulated Depreciation", "6700 - Depreciation Expense", "1400 - Prepaid Software Licenses"], "solution": [{"account": "6700 - Depreciation Expense", "side": "debit", "amount": 1000.0}, {"account": "1590 - Accumulated Depreciation", "side": "credit", "amount": 1000.0}]}, {"type": "journal_entry_builder", "kicker": "Adjusting entry 4 — loan interest", "title": "Accrue January loan interest", "railLabel": "JE: interest", "scenarioHtml": "<p>Skarion carries a <strong>$500,000</strong> term loan at <strong>6.5%</strong> annual interest. January's accrued interest = $500,000 × 6.5% ÷ 12 = <strong>$2,708.33</strong>. Accrue the interest (it has been incurred even though the cash payment is later).</p>", "startRows": 2, "accounts": ["6800 - Interest Expense", "2300 - Accrued Interest", "1000 - Operating Checking", "2000 - Accounts Payable"], "solution": [{"account": "6800 - Interest Expense", "side": "debit", "amount": 2708.33}, {"account": "2300 - Accrued Interest", "side": "credit", "amount": 2708.33}]}, {"type": "journal_entry_builder", "kicker": "Adjusting entry 5 — WIP revenue", "title": "Recognize unbilled WIP revenue", "railLabel": "JE: WIP", "scenarioHtml": "<p>Engineers spent <strong>400 hours</strong> on an HLD in January at a blended rate of <strong>$85/hr</strong> = $34,000 of work. The HLD is <strong>60% complete</strong> and not yet billable. Under the percentage-of-completion method, recognize the earned-but-unbilled portion: Dr Unbilled AR (WIP) $34,000 / Cr Engineering Design Revenue $34,000.</p>", "startRows": 2, "accounts": ["1200 - Unbilled AR (WIP)", "1100 - Accounts Receivable", "4000 - Engineering Design Revenue", "2500 - Deferred Revenue"], "solution": [{"account": "1200 - Unbilled AR (WIP)", "side": "debit", "amount": 34000.0}, {"account": "4000 - Engineering Design Revenue", "side": "credit", "amount": 34000.0}]}, {"type": "content", "kicker": "The deliverable", "title": "The three core financial statements", "bodyHtml": "<p>Once adjustments are posted and the adjusted trial balance balances, it rolls up into the three statements management actually reads:</p><p><strong>1. Income Statement</strong> — Revenue − COGS − Operating Expenses = Net Income. Skarion January: <strong>$480,000 revenue − $140,000 COGS − $98,000 OpEx = $242,000 Net Income.</strong> This is performance over a period.</p><p><strong>2. Balance Sheet</strong> — Assets = Liabilities + Equity. A snapshot of financial position at a point in time (e.g. January 31). Every adjusting entry from the close flows here: prepaid amortization, depreciation, accruals, WIP.</p><p><strong>3. Cash Flow Statement</strong> — three sections: <em>Operating</em> (cash from running the business), <em>Investing</em> (capex, asset purchases), and <em>Financing</em> (loans, equity, distributions). Critically: <strong>a profitable business can run out of cash</strong> if AR isn't collected. The cash flow statement is where that gap becomes visible.</p><p><strong>Key ratios at month-end:</strong></p><table class='data'><tr><th>Ratio</th><th>Formula</th><th>Skarion Jan</th></tr><tr><td>Gross margin %</td><td>(Revenue − COGS) ÷ Revenue</td><td>($480K − $140K) ÷ $480K = <strong>70.8%</strong></td></tr><tr><td>Operating margin %</td><td>(Revenue − COGS − OpEx) ÷ Revenue</td><td>$242K ÷ $480K = <strong>50.4%</strong></td></tr><tr><td>Current ratio</td><td>Current Assets ÷ Current Liabilities</td><td>cash &amp; AR heavy — liquidity check</td></tr><tr><td>DSO</td><td>Average AR ÷ Credit Revenue × 365</td><td>$997,700 ÷ $4.8M × 365 = <strong>75.8 days</strong></td></tr></table>"}, {"type": "quiz", "intro": "Four close and financial-statement questions, the exact ones that come up in entry-level interviews.", "title": "Month-end close & financial statements quiz", "questions": [{"q": "What is the purpose of a closing entry at year-end?", "options": ["To zero out permanent (Asset/Liability/Equity) accounts", "To close temporary (Revenue/Expense) accounts to Retained Earnings so the new year starts clean", "To delete all transactions from the period", "To prepare tax returns only"], "correct_index": 1, "explanation": "Closing entries reset temporary accounts (Revenue and Expense) to zero by transferring their balances to Retained Earnings. Permanent accounts carry forward; the next period starts with empty revenue/expense accounts."}, {"q": "Skarion's January revenue is $480,000. COGS is $140,000. What is the gross profit margin?", "options": ["29.2%", "50.4%", "70.8%", "242,000"], "correct_index": 2, "explanation": "Gross profit = $480,000 − $140,000 = $340,000. Margin = $340,000 ÷ $480,000 = 70.8%. (50.4% would be operating margin after also subtracting $98,000 OpEx.)"}, {"q": "Which financial statement shows whether the company can pay its bills next month (liquidity)?", "options": ["Income Statement", "Balance Sheet", "Cash Flow Statement", "Trial Balance"], "correct_index": 1, "explanation": "Liquidity is a snapshot question — answered by the Balance Sheet, specifically the Current Assets vs Current Liabilities comparison (the Current Ratio). The income statement is performance over time; the cash flow statement is cash movement."}, {"q": "Skarion is profitable but running low on cash. Which statement reveals why?", "options": ["Income Statement", "Balance Sheet", "Cash Flow Statement", "Statement of Retained Earnings"], "correct_index": 2, "explanation": "The Cash Flow Statement reconciles profit to cash. If cash is falling despite profit, the answer is almost always in Operations — usually uncollected AR (or growing inventory/prepaids). The Cash Flow Statement makes the gap visible."}]}], "slug": "06-month-end-close"}, {"title": "Advanced Excel Toolkit", "moduleTag": "Module 07", "dayMapping": "Day 7", "subhead": "The Excel skills that separate accountants who survive month-end from accountants who drown in it — data cleaning, lookups, conditional summing, PivotTables, and Power Query.", "hook": "\"What's the first thing you do with a 5,000-row payroll export?\" The wrong answer is \"start vouching.\" The right answer is \"clean it.\" Raw exports from payroll, bank feeds, and offshore timesheet apps are always messy, and cleaning is an accounting skill, not an IT one.", "chunks": [{"type": "content", "kicker": "Chunk 24 — data cleaning & lookups", "title": "Data cleaning, VLOOKUP/XLOOKUP, and SUMIFS", "bodyHtml": "<p>Clean data is the accountant's first problem. Raw exports arrive with combined date-description fields, inconsistent vendor names, trailing spaces, and stray characters. Before any analysis you standardize the data.</p><p><strong>The skill set, with Skarion data:</strong></p><table class='data'><tr><th>Tool</th><th>What it does</th><th>Skarion use</th></tr><tr><td><strong>Text-to-Columns</strong></td><td>Splits a combined field (e.g. \"2026-01-14 Atlantic Fiber wire\") on a delimiter into separate columns.</td><td>Cleaning bank-export CSVs where date and description share one cell.</td></tr><tr><td><strong>TRIM / PROPER / CLEAN</strong></td><td>Removes extra spaces, fixes capitalization, strips non-printable characters.</td><td>Standardizing \"GLOBAL CAD SOLUTIONS LTD.\" vs \"Global Cad Solutions\" so SUMIFS actually matches.</td></tr><tr><td><strong>VLOOKUP / XLOOKUP</strong></td><td>Pull a matching value from a master table.</td><td>Matching 3,000 rows of offshore labor hours to project codes in a master table.</td></tr><tr><td><strong>SUMIFS</strong></td><td>Sum a range across multiple conditions (project + date + vendor).</td><td>Totaling COGS for the Tennessee Corridor for January across all vendors.</td></tr><tr><td><strong>IF / IFS</strong></td><td>Flag rows that meet a rule.</td><td>Flagging offshore invoices where the unit price exceeds the MSA rate of $38.50/mile.</td></tr><tr><td><strong>Conditional Formatting</strong></td><td>Color cells that meet a rule, automatically.</td><td>Highlighting 90+ day AR balances ($34,200 of TeleCom Builders) in red.</td></tr></table>"}, {"type": "exercise", "kicker": "Lab 1", "title": "The messy offshore timesheet export", "instructionsHtml": "<p>Download the raw export below — a <strong>1,200-row CSV</strong> of individual CAD and GIS drafting tasks from 3 offshore firms across 8 projects, including the Tennessee Corridor build.</p><ol><li><strong>Text-to-Columns</strong> to split the combined date/description field.</li><li><strong>TRIM/PROPER/CLEAN</strong> to standardize vendor names so they match the master project table.</li><li><strong>XLOOKUP or VLOOKUP</strong> to attach the correct Project Code to every row from the project mapping table.</li><li><strong>SUMIFS</strong> to compute total drafting labor cost per project.</li><li>Deliverable: report the <strong>total Tennessee Corridor drafting cost</strong> for the month.</li></ol>", "files": [{"label": "Raw_Drafting_Labor.csv", "href": "Raw_Expense_Export.csv"}, {"label": "Project_Mapping_Table.csv", "href": "GL_Mapping_Table.csv"}], "reflectionPrompt": "What was the total drafting cost for the Tennessee Corridor project? Which vendor had the largest share, and did any invoices exceed the $38.50/mile MSA rate?"}, {"type": "content", "kicker": "Chunk 25 — PivotTables & Power Query", "title": "PivotTables, Power Query, and Excel interview questions", "bodyHtml": "<p><strong>PivotTables</strong> are the fastest way to summarize 10,000 rows. Drag-and-drop grouping, summing, and filtering by date/project/vendor — no formulas required. For month-end, a PivotTable turns a raw transaction export into an AP aging view in minutes.</p><p><strong>Power Query (Get &amp; Transform)</strong> automates the monthly cleanup so you are not manually running Text-to-Columns every close. You build the transformation once; each month you refresh and the cleaned dataset lands in your model. This is how real close cycles stop being manual.</p><p><strong>Lab 2 — AP Aging PivotTable:</strong> a raw AP transaction export with <strong>800 rows, 6 vendors, 4 months of invoices</strong>. Build a PivotTable showing outstanding AP by vendor Aging bucket (0–30, 31–60, 61–90, 90+), then identify which vendor carries the most overdue balance and assess the risk.</p>"}, {"type": "exercise", "kicker": "Lab 2", "title": "AP Aging PivotTable lab", "instructionsHtml": "<p>Download the raw AP transaction export below and build an AP aging PivotTable.</p><ol><li>Load the export into a PivotTable with <strong>Vendor</strong> on rows and an <strong>aging bucket</strong> (0–30, 31–60, 61–90, 90+) on columns, summing the outstanding invoice balance.</li><li>Add <strong>conditional formatting</strong> so the 90+ day buckets highlight in red.</li><li>Identify the vendor with the largest 90+ day balance and write a one-line risk assessment for the controller.</li></ol>", "files": [{"label": "Template 03 — AP Aging.xlsx", "href": "/download/07-excel-toolkit/Template_03_AP_Aging.xlsx"}], "reflectionPrompt": "Which vendor carried the most overdue (90+ day) balance, and what is the dollar amount and the collection risk you'd flag to the controller?"}, {"type": "flip_cards", "kicker": "Quick check", "title": "8 Excel interview questions — and real answers", "railLabel": "Flip cards", "cards": [{"front": "VLOOKUP vs. XLOOKUP?", "back": "XLOOKUP defaults to an exact match (no trailing FALSE), can look left of the lookup column, and can return arrays. VLOOKUP is older, can only look right, and silently returns approximate matches if you forget the FALSE."}, {"front": "How do you handle #N/A in VLOOKUP?", "back": "Wrap with IFERROR or IFNA: =IFERROR(VLOOKUP(...), 0) or =IFNA(VLOOKUP(...), \"no match\"). Decide whether a missing match should be zero (sum-safe) or flagged."}, {"front": "When use SUMIFS over a PivotTable?", "back": "When the result needs to feed another formula live, or land in a fixed template cell a controller reads. PivotTables are great for exploration; SUMIFS is great for repeatable, formula-driven reports."}, {"front": "How do you lock a cell reference?", "back": "$A$1 locks both column and row (absolute); A1 locks neither (relative); $A1 locks column only, A$1 locks row only (mixed). Toggle with F4."}, {"front": "What is a named range and when is it useful?", "back": "A readable alias for a cell or range, e.g. MSA_Rate for a single cell. Useful in formulas that many people read =IF(UnitPrice>MSA_Rate,\"HOLD\"). Self-documenting and survives row insertions if defined dynamically."}, {"front": "How do you compare two lists to find missing values?", "back": "XLOOKUP for each item in list A against list B — #N/A means missing. Or COUNTIF(range, value) = 0. Filter the #N/As to see exactly what's in one list but not the other."}, {"front": "What does Power Query do that manual cleaning doesn't?", "back": "It records the transformation steps and replays them on refresh — so a monthly Text-to-Columns + TRIM + lookup pipeline runs every month with one click, not a manual rebuild. It is the difference between cleaning data and automating the cleaning."}, {"front": "How do you prevent someone editing your formula columns?", "back": "Lock the cells (Format Cells > Protection > Locked), then protect the sheet (Review > Protect Sheet). Locking alone does nothing until sheet protection is turned on."}]}, {"type": "quiz", "intro": "A quick check on the Excel skills you'll be tested on in interviews and on day one.", "title": "Excel knowledge check", "questions": [{"q": "Why is XLOOKUP generally preferred over VLOOKUP in modern accounting?", "options": ["It looks cooler", "It defaults to an exact match and can return values to the left of the lookup column", "It uses less memory than VLOOKUP", "It automatically builds PivotTables"], "correct_index": 1, "explanation": "XLOOKUP defaults to exact match (no trailing FALSE argument) and can return arrays to the left of the lookup value. VLOOKUP can only look right and silently returns approximate matches if you omit FALSE."}, {"q": "You need the total COGS for the Tennessee Corridor project across all vendors for January. Which function do you reach for?", "options": ["VLOOKUP", "SUMIFS", "TRIM", "PROPER"], "correct_index": 1, "explanation": "SUMIFS sums a range across multiple conditions — here project = Tennessee Corridor AND month = January AND category = COGS. That multi-condition summing is exactly what SUMIFS is for."}, {"q": "Which cell reference locks the column but lets the row change as you fill down?", "options": ["$A$1", "A1", "$A1", "A$1"], "correct_index": 2, "explanation": "$A1 locks the column (the $ before A) but lets the row adjust as the formula is filled down. Toggle reference types with F4."}, {"q": "What is the single biggest advantage of Power Query over manual data cleaning?", "options": ["It runs faster on large files", "It records transformation steps and replays them on refresh, so monthly cleanup is one click", "It writes the journal entries for you", "It replaces the need for PivotTables"], "correct_index": 1, "explanation": "Power Query captures your cleanup steps and replays them every month on refresh — turning a manual Text-to-Columns + TRIM + lookup routine into a repeatable, automated pipeline. That automation is the whole point."}]}], "slug": "07-advanced-excel"}, {"title": "SkarionBooks Lab — QuickBooks Simulator", "moduleTag": "Module 08", "dayMapping": "Day 8", "subhead": "SkarionBooks is our custom QuickBooks simulator — a full SPA with a chart of accounts, journal entry posting, AR invoicing, cash receipts, bank reconciliation, and financial reports. No paid QBO trial required.", "hook": "\"Do you actually know your way around a GL system, or only the textbook?\" SkarionBooks lets you prove it: open the simulator, post the entries you learned in Modules 02–06, and produce real reports off real Skarion Engineering numbers.", "chunks": [{"type": "content", "kicker": "Before you start", "title": "What SkarionBooks is — and what it isn't", "bodyHtml": "<p>SkarionBooks is a self-contained ledger simulator built for this course. It comes <strong>pre-loaded with Skarion Engineering's</strong> full chart of accounts and opening balances, so you can post journal entries, create AR invoices, apply cash receipts, run a bank reconciliation, and generate a P&amp;L and Balance Sheet — without needing a $600/year QuickBooks Online subscription.</p><p><strong>Pre-loaded trial balance (opening):</strong> 47 accounts, ~$1.2M in opening Accounts Receivable, $340,000 in Operating Checking, $280,000 in Accounts Payable, a $500,000 term loan at 6.5%, and ~$2.1M in equity. Total debits equal total credits by construction — your job is to keep them that way as you post.</p><p>You do not configure the COA from scratch here; you did that work in Module 02. Here you <em>use</em> it: process invoices, post entries, reconcile, and report.</p>", "callout": {"type": "tip", "html": "Open <strong>SkarionBooks</strong> using the link in the lab below (it runs as a single-page app inside the course package). Keep it open in a second tab while you work through each task — post each entry in SkarionBooks, then come back here to check off the next step."}}, {"type": "content", "kicker": "Chunk 26 — setup lab", "title": "Chart of accounts review & first transactions", "bodyHtml": "<p><strong>Lab task 1 — Review the COA.</strong> Open SkarionBooks and confirm every account is in the correct category: 1000s Assets, 2000s Liabilities, 3000s Equity, 4000s Revenue, 5000s COGS, 6000s Expenses. Flag and note any account that looks mis-categorized (there shouldn't be any — but verifying is the job).</p><p><strong>Lab task 2 — Opening trial balance check.</strong> Total debits must equal total credits. Run the trial balance report and confirm it balances to the cent before you post a single new entry. This is the mechanical floor every close starts from.</p><p><strong>Lab task 3 — Process three recent vendor invoices:</strong></p><table class='data'><tr><th>Vendor</th><th>Invoice</th><th>Amount</th><th>Coding</th></tr><tr><td>Global CAD Solutions</td><td>GCS-2026-091</td><td>$9,625.00</td><td>Dr 5100 COGS — Subcontractor Drafting / Cr 2000 AP</td></tr><tr><td>ArcGIS Pro (annual renewal)</td><td>ESRI-2026-RN</td><td>$36,000.00</td><td>Dr 1400 Prepaid Software / Cr 1000 Operating Checking</td></tr><tr><td>Office landlord (monthly rent)</td><td>LEASE-2026-01</td><td>$12,800.00</td><td>Dr 6500 Software &amp; Subscriptions → reclassify to Rent* / Cr 1000 Operating Checking</td></tr></table><p><em>*If a dedicated Rent account exists in SkarionBooks, post monthly rent there; otherwise use the operating expense account indicated and note the classification. The point is to tie the coded account to the economic reality of the spend.</em></p><p><strong>Lab task 4 — January payroll run.</strong> Post the full US payroll entry from Module 03: <strong>Dr 6000 Salaries — US Engineering PMs $79,167, Dr 6100 Payroll Tax Expense $6,256, Cr 2200 Payroll Tax Liabilities $27,312, Cr 1000 Operating Checking $58,111.</strong> Confirm debits equal credits ($85,423) and the trial balance still balances after posting.</p>"}, {"type": "exercise", "kicker": "Chunk 26 — lab", "title": "Open SkarionBooks and complete the setup lab", "instructionsHtml": "<p>Open SkarionBooks and complete all four setup-lab tasks above: COA review, opening trial-balance check, processing the three vendor invoices, and posting the January payroll run. After each entry, run the trial balance and confirm it still balances. Capture a screenshot of your completed trial balance.</p>", "files": [{"label": "Open SkarionBooks simulator", "href": "../skarionbooks/index.html"}], "reflectionPrompt": "After posting all four tasks, what was your total Operating Checking balance, and did the trial balance still balance to the cent? Note any accounts you questioned during the COA review."}, {"type": "content", "kicker": "Chunk 27 — AR & bank rec lab", "title": "AR invoice, cash receipt, and bank reconciliation", "bodyHtml": "<p>Now run the full revenue and cash cycle in SkarionBooks:</p><ol><li><strong>Create the AR invoice</strong> for the Tennessee Corridor HLD milestone: invoice Atlantic Fiber Co. for <strong>$480,000</strong> (40% of the $1.2M contract). Coding: <strong>Dr 1100 Accounts Receivable $480,000 / Cr 4000 Engineering Design Revenue $480,000.</strong></li><li><strong>Record the incoming wire</strong> from Atlantic Fiber Co. — $480,000 gross, less the $25 incoming wire fee, netting <strong>$479,975</strong> to Operating Checking. Coding: Dr 1000 $479,975, Dr 6900 Bank Fees Expense $25, Cr 1100 AR $480,000.</li><li><strong>Apply the payment</strong> to the open invoice in the AR subledger and confirm the invoice is cleared and no longer aging.</li><li><strong>Post the bank fee correcting entry</strong> and confirm the fee is isolated in 6900.</li><li><strong>Run the bank reconciliation</strong> for January — match every transaction to the provided bank statement until the adjusted balances both equal <strong>$336,250.00</strong>, including the DEP-0091 duplicate deposit correction (Dr 1100 AR $10,547.10 / Cr 1000 Cash $10,547.10).</li><li><strong>Generate January P&amp;L and Balance Sheet</strong> — screenshot both. The P&amp;L should show $480,000 revenue, ~$140,000 COGS, and converge on ~$242,000 net income (per Module 06).</li></ol>"}, {"type": "exercise", "kicker": "Chunk 27 — lab", "title": "Complete the AR, cash, and bank rec lab in SkarionBooks", "instructionsHtml": "<p>Work through all six tasks in the chunk above. The key proof points: the Atlantic Fiber invoice clears to zero after the wire is applied, the bank reconciliation converges on $336,250.00, and the January P&amp;L lands near $242,000 net income. Capture screenshots of (1) the cleared AR subledger, (2) the completed bank reconciliation, and (3) the P&amp;L.</p>", "files": [{"label": "Open SkarionBooks simulator", "href": "../skarionbooks/index.html"}, {"label": "January Bank Statement.xlsx", "href": "/download/05-bank-reconciliation-lab/Bank_Statement_2026-01_January.xlsx"}], "reflectionPrompt": "Did your bank reconciliation converge to exactly $336,250.00? If not, what was the remaining unexplained item, and how did you finally trace it? Paste your final P&L net income figure."}], "slug": "08-quickbooks-lab"}, {"title": "Interview Preparation", "moduleTag": "Module 09", "dayMapping": "Day 9", "subhead": "You've closed the books, reconciled the bank, and run AR through SkarionBooks. Now you have to talk about it out loud, under pressure — and make it sound like real experience.", "hook": "\"Tell me about a time you found an error in the books.\" Every candidate has an answer. The question is whether yours is specific enough to believe. This module gives you the structure and the numbers to make yours unfakeable.", "chunks": [{"type": "content", "kicker": "The framework", "title": "Context → Action → Result, and the 126-question bank", "bodyHtml": "<p>One structure works for almost every behavioral and scenario question: <strong>Context → Action → Result</strong>.</p><table class='data'><tr><th>Step</th><th>What it means</th></tr><tr><td><strong>1. Context</strong></td><td>Company, month, transaction, or report — name it specifically.</td></tr><tr><td><strong>2. Action</strong></td><td>What you checked, posted, reconciled, or escalated — and what you did <em>not</em> do.</td></tr><tr><td><strong>3. Result</strong></td><td>The correction made, the report finished, and the lesson learned.</td></tr></table><p>The Question Bank splits 126 questions across four categories. Know what each is scored on before you walk in:</p><table class='data'><tr><th>Category</th><th>Covers</th><th>Interviewers listen for</th></tr><tr><td><strong>Technical (56)</strong></td><td>GAAP, GL, AP/AR, close, payroll, fixed assets, journal entries</td><td>Correct treatment + a real Skarion number attached.</td></tr><tr><td><strong>Behavioral (30)</strong></td><td>STAR judgment, communication, ethics</td><td>A specific situation (not a hypothetical), the steps, the outcome.</td></tr><tr><td><strong>Software (20)</strong></td><td>Excel and SkarionBooks / QBO workflows</td><td>Practical use — not \"I know Excel,\" but \"I used SUMIFS to total unpaid invoices by vendor.\"</td></tr><tr><td><strong>Scenario (20)</strong></td><td>Workplace judgment calls</td><td>Whether you hold, correct, document, or escalate — and knowing the difference.</td></tr></table><p>Be honest about the format: describe this as <em>\"in my Skarion Engineering accounting simulation / portfolio project\"</em>. You're describing real work you actually did on real (simulated) numbers — not pretending you held a paid job.</p>", "callout": {"type": "warning", "html": "<strong>Strong answers are specific.</strong> Anyone can say \"I'm detail-oriented and I catch errors.\" Almost nobody outside this simulation can say \"I traced a $10,547.10 duplicate Southeast Broadband deposit (DEP-0091) entered twice, and corrected it by debiting AR and crediting Cash — not touching revenue, since revenue was never overstated.\" The second answer is unfakeable."}}, {"type": "flip_cards", "kicker": "Chunk 28 — memorize", "title": "10 must-know technical answers (with real Skarion numbers)", "intro": "Flip each card, then say the answer out loud in your own words — but keep the real numbers.", "railLabel": "Flip cards", "cards": [{"front": "Walk me through a month-end close.", "back": "Followed a 5-day checklist: Day 1 lock timesheets/AP and post outstanding invoices; Day 2 post payroll and offshore accruals, amortize prepaids; Day 3 WIP, depreciation, interest accrual, trial balance; Day 4 bank rec and tie AR/AP subledgers to GL; Day 5 review P&L vs budget and controller sign-off. January net income came out at $242,000 on $480,000 revenue."}, {"front": "What is a 3-way match?", "back": "Purchase Order + Receiving Report + Vendor Invoice must all agree before payment. On invoice GCS-2026-087 from Global CAD Solutions, the MSA rate was $38.50/mile but the invoice billed $42.00/mile — a $178.75 variance on 50 miles. I held it and requested a credit memo instead of paying."}, {"front": "How do you record depreciation?", "back": "Straight-line: (cost − salvage) ÷ useful life. Skarion's 5 GIS workstations at $12,000 each, 5-year life, $0 salvage = $200/month each = $1,000/month total. Monthly entry: Dr 6700 Depreciation Expense $1,000 / Cr 1590 Accumulated Depreciation $1,000."}, {"front": "How do you accrue interest on a loan?", "back": "Balance × rate ÷ time. Skarion's $500,000 term loan at 6.5% annual: $500,000 × 6.5% ÷ 12 = $2,708.33/month. Entry: Dr 6800 Interest Expense $2,708 / Cr 2300 Accrued Interest $2,708."}, {"front": "Accrual vs. cash accounting?", "back": "Record when earned/incurred, not when cash moves. Skarion delivers an HLD on Jan 28 — revenue is recognized in January even though the client pays in March. Cash basis would wait for the wire and misstate the period."}, {"front": "What accounts do you reconcile at month-end?", "back": "Cash/bank, AR and AP subledgers to the GL, fixed assets and accumulated depreciation, payroll liabilities, loans, prepaids, and accruals. January: tied the bank to an adjusted balance of $336,250.00, posted $1,000 depreciation, accrued $2,708 interest, and amortized $3,000 of the prepaid Vetro license."}, {"front": "How do you calculate DSO?", "back": "Average AR ÷ credit revenue × days. Skarion: $997,700 ÷ $4,800,000 × 365 ≈ 75.8 days — it takes roughly 76 days to collect a dollar of billed revenue. The lower, the better; controllers watch it month-over-month."}, {"front": "What is a bank reconciliation?", "back": "A two-sided proof: bank statement + deposits in transit − outstanding checks = adjusted bank balance; GL + credits not recorded − debits not recorded = adjusted book balance. The two must meet exactly. January: both sides converged on $336,250.00 after finding a $10,547.10 duplicate deposit."}, {"front": "How do you handle a short payment from a customer?", "back": "Apply the cash to the oldest invoice and document the dispute on the remainder — do not write it off. Southeast Broadband paid $190,000 of their $405,000 balance with a note that the rest was in dispute. Entry: Dr Cash $190,000 / Cr AR $190,000; the remaining $215,000 stays open in the subledger with a dispute flag."}, {"front": "What is an allowance for doubtful accounts and why is it needed?", "back": "GAAP requires estimating uncollectible AR in the period the sale is made (matching principle), not waiting for a specific invoice to fail. Skarion estimates 1.5% of $997,700 = $14,965.50. Entry: Dr Bad Debt Expense $14,965.50 / Cr Allowance for Doubtful Accounts $14,965.50. Write-offs later go against the allowance, not expense."}]}, {"type": "content", "kicker": "Chunk 29 — before and after", "title": "Red flags vs. green flags: the same question, two ways", "bodyHtml": "<p>Here is the side-by-side on six topics — the generic answer most candidates give, versus the specific Skarion-grounded answer that scores on the rubric.</p><table class='data'><tr><th>Topic</th><th>Red flag (generic)</th><th>Green flag (Skarion-specific)</th></tr><tr><td>Bank reconciliation</td><td>\"I adjust the difference.\"</td><td>\"The bank showed $312,450 and the GL showed $346,823.60. After adding $28,000 in deposits in transit, removing a $4,200 outstanding check, a $45 unrecorded bank fee, $18.50 in unrecorded interest, and a $10,547.10 duplicate deposit, both sides met at $336,250.00. I never force the difference — I document the cause.\"</td></tr><tr><td>AP invoice</td><td>\"I enter whatever the vendor sends.\"</td><td>\"On GCS-2026-087 the MSA rate was $38.50/mile but the invoice billed $42.00/mile — a $178.75 variance on 50 miles — so I held it and requested a credit memo.\"</td></tr><tr><td>Internal controls</td><td>\"Controls are someone else's job.\"</td><td>\"The 3-way match caught the $178.75 GCS-2026-087 price discrepancy and held it instead of paying through.\"</td></tr><tr><td>Revenue recognition</td><td>\"I record it when we get paid.\"</td><td>\"Under ASC 606, the $1.2M Tennessee Corridor contract recognizes revenue as each performance obligation is satisfied — 40% at HLD delivery, so $480,000 books when the HLD is accepted, not when the wire lands.\"</td></tr><tr><td>Error handling</td><td>\"I corrected it.\"</td><td>\"DEP-0091, a $10,547.10 Southeast Broadband deposit, was entered twice in the GL. I confirmed the bank received it once and posted Dr AR $10,547.10 / Cr Cash $10,547.10 — revenue was never affected.\"</td></tr><tr><td>Judgment</td><td>\"I figured it out myself.\"</td><td>\"I documented the discrepancy, escalated to my supervisor, and posted the correction only after sign-off — with the supporting ticket attached.\"</td></tr></table>", "callout": {"type": "tip", "html": "Notice the pattern: the green-flag answers never say \"I'm accurate\" or \"I'm detail-oriented.\" They describe exactly what happened — with a dollar figure and a document number — and let the interviewer draw the conclusion themselves."}}, {"type": "quiz", "intro": "Four questions — spot the strong answer across technical, behavioral, scenario, and software categories.", "title": "Spot the specific answer", "questions": [{"q": "Technical — \"How do you handle a bank reconciliation discrepancy?\" Which is the strong answer?", "options": ["\"I find the difference and adjust the books to match the bank.\"", "\"I compare the bank statement to the GL by date, amount, and type — outstanding checks, deposits in transit, duplicates, fees — then correct and document. I never force the reconciliation; January's two sides met at $336,250.00.\"", "\"I ask my manager to fix it since reconciliations are complicated.\"", "\"I wait until next month and see if it corrects itself.\""], "correct_index": 1, "explanation": "It names the specific checks, the rule against plugging, and a real adjusted balance. The other three are either a plug, an abdication, or a hope — all red flags."}, {"q": "Behavioral — \"Tell me about a time you found an error in the books.\" Which is the weak version?", "options": ["\"I traced a $10,547.10 duplicate Southeast Broadband deposit (DEP-0091) and corrected it with Dr AR / Cr Cash, without touching revenue.\"", "\"I found a customer deposit entered twice, confirmed the bank received it once, reversed the duplicate, and documented it.\"", "\"I'm very thorough, so I usually catch errors before they become a problem.\"", "\"During the bank rec, GL showed more cash than the bank — I found the duplicate ACH and reversed it.\""], "correct_index": 2, "explanation": "The third option is the motivational-poster answer the cheat sheet warns against — no numbers, no transaction, no method. The others are all real, specific answers."}, {"q": "Scenario — an invoice fails the 3-way match. What do you do?", "options": ["Pay it anyway and sort it out later so the vendor isn't upset", "Hold it, contact the vendor, document the discrepancy, and request a corrected invoice or credit memo", "Delete the invoice from the system", "Quietly adjust the invoice total to match the PO"], "correct_index": 1, "explanation": "Hold, document, and resolve — never pay through a failed match. GCS-2026-087's $178.75 variance gets held and a credit memo requested, not auto-paid. This is the judgment the rubric is scoring."}, {"q": "Software — \"How do you use Excel in accounting?\" Which demonstrates practical use?", "options": ["\"I know Excel pretty well.\"", "\"I used SUMIFS to total unpaid AP invoices by vendor and aging bucket, and a PivotTable to flag the 90+ day balances in red with conditional formatting.\"", "\"I've watched some YouTube tutorials.\"", "\"Excel is mainly for typing numbers.\""], "correct_index": 1, "explanation": "It names a real function (SUMIFS), a real shape of analysis (by vendor and aging bucket), and a real output (90+ day flags) — exactly the Software-criterion specificity the rubric scores."}]}, {"type": "exercise", "kicker": "Chunk 30 — mock interview", "title": "Mock interview exercise & course completion", "instructionsHtml": "<p>Download the 20-question Cheat Sheet and the 126-question Question Bank below.</p><ol><li>Select <strong>5 questions</strong> — at least one from each of the four categories (technical, behavioral, software, scenario).</li><li>Write full <strong>Context → Action → Result</strong> answers using real numbers from your Skarion Engineering work: the $336,250.00 bank rec, the $10,547.10 duplicate, the $1,000 monthly depreciation, the $2,708 interest accrual, the 75.8-day DSO, the $178.75 GCS-2026-087 variance, or the $480,000 HLD milestone.</li><li>If you have a study partner, practice cold — no notes, 60–90 seconds per answer.</li><li>If alone, record yourself, then watch it back and count how many times you say \"basically,\" \"kind of,\" or \"I think.\" Reduce them.</li></ol>", "files": [{"label": "Interview Cheat Sheet — 20 Questions.docx", "href": "/download/06-interview-preparation/Interview_Cheat_Sheet_20_Questions.docx"}, {"label": "Interview Question Bank — 126 Questions.docx", "href": "/download/06-interview-preparation/Interview_Question_Bank_126Q.docx"}], "reflectionPrompt": "Which module's content was hardest to explain out loud without your notes? That is the one to re-do. Write your 5 answers below, in your own words, with real simulation numbers."}], "slug": "09-interview-prep"}];</script>
<script>/* Minimal SCORM 1.2 wrapper. Finds the LMS API in a parent/opener window (standard SCORM
   discovery algorithm); no-ops safely when run standalone outside an LMS (e.g. local preview). */
(function (global) {
  "use strict";

  function findAPI(win) {
    var attempts = 0;
    while (win && !win.API && win.parent && win.parent !== win && attempts < 10) {
      win = win.parent;
      attempts++;
    }
    return win && win.API ? win.API : null;
  }

  function locateAPI() {
    var api = findAPI(window);
    if (!api && window.opener) api = findAPI(window.opener);
    return api;
  }

  var SCORM = {
    api: null,
    initialized: false,
    standalone: true,

    init: function () {
      this.api = locateAPI();
      if (this.api) {
        var ok = this.api.LMSInitialize("");
        this.initialized = ok === "true" || ok === true;
        this.standalone = !this.initialized;
      } else {
        this.standalone = true;
      }
      return this.initialized;
    },

    setValue: function (key, value) {
      if (this.initialized && this.api) this.api.LMSSetValue(key, String(value));
    },

    getValue: function (key) {
      if (this.initialized && this.api) return this.api.LMSGetValue(key);
      return "";
    },

    commit: function () {
      if (this.initialized && this.api) this.api.LMSCommit("");
    },

    setProgress: function (fraction) {
      // SCORM 1.2 has no native progress-measure field; store it as a suspend_data breadcrumb.
      this.setValue("cmi.core.lesson_location", String(Math.round(fraction * 100)));
      this.commit();
    },

    recordScore: function (raw, max) {
      max = max || 100;
      this.setValue("cmi.core.score.raw", raw);
      this.setValue("cmi.core.score.min", 0);
      this.setValue("cmi.core.score.max", max);
      this.commit();
    },

    complete: function (passed) {
      this.setValue("cmi.core.lesson_status", passed === false ? "failed" : "completed");
      this.commit();
    },

    finish: function () {
      if (this.initialized && this.api) {
        this.commit();
        this.api.LMSFinish("");
      }
    },
  };

  global.SkarionSCORM = SCORM;
})(window);
</script>
<script>/* Skarion Course Engine — master lesson player.
   Expects a global COURSE_CATALOG object (injected by the build script). */
(function () {
  "use strict";

  var state = { mod: 0, current: 0, quizScores: {}, jeSolved: {} };
  var chunks = []; // {id, el, dotEl, kind, requiresAction}
  var CATALOG = window.COURSE_CATALOG || [];
  var LESSON = null;

  function $(sel, root) { return (root || document).querySelector(sel); }
  function $all(sel, root) { return Array.from((root || document).querySelectorAll(sel)); }

  function init() {
    window.SkarionSCORM.init();
    buildSidebar();
    loadModule(0);
    window.addEventListener("keydown", function (e) {
      if (e.target.tagName === "TEXTAREA" || e.target.tagName === "SELECT" || e.target.tagName === "INPUT") return;
      if (e.key === "ArrowRight") next();
      if (e.key === "ArrowLeft") prev();
    });
  }

  function buildSidebar() {
    var nav = $("#sidebar-nav");
    nav.innerHTML = "";
    CATALOG.forEach(function(mod, modIdx) {
      var modEl = document.createElement("div");
      modEl.className = "sb-mod";
      modEl.dataset.idx = modIdx;
      
      var title = document.createElement("div");
      title.className = "sb-mod-title";
      title.innerHTML = "<span>" + esc(mod.title) + "</span>";
      title.addEventListener("click", function() { loadModule(modIdx); });
      modEl.appendChild(title);
      
      var chunkList = document.createElement("ul");
      chunkList.className = "sb-chunks";
      
      var introLi = document.createElement("li");
      introLi.className = "sb-chunk";
      introLi.textContent = "Start";
      introLi.addEventListener("click", function() { if (state.mod !== modIdx) loadModule(modIdx); goTo(0); });
      chunkList.appendChild(introLi);
      
      mod.chunks.forEach(function(c, cIdx) {
        var li = document.createElement("li");
        li.className = "sb-chunk";
        li.textContent = shortLabel(c.title, cIdx + 1);
        li.addEventListener("click", function() { if (state.mod !== modIdx) loadModule(modIdx); goTo(cIdx + 1); });
        chunkList.appendChild(li);
      });
      
      modEl.appendChild(chunkList);
      nav.appendChild(modEl);
    });
  }

  function updateSidebarUI() {
    $all(".sb-mod").forEach(function(el, i) {
      el.classList.toggle("active", i === state.mod);
      var cEls = $all(".sb-chunk", el);
      cEls.forEach(function(cEl, ci) {
        cEl.classList.toggle("active", i === state.mod && ci === state.current);
      });
    });
  }

  function loadModule(modIdx) {
    if (modIdx < 0 || modIdx >= CATALOG.length) return;
    state.mod = modIdx;
    state.current = 0;
    LESSON = CATALOG[modIdx];
    
    // reset module-level tracking
    chunks = [];
    $("#stage-inner").innerHTML = "";
    $("#chunk-rail").innerHTML = "";
    
    $("#module-tag").textContent = LESSON.moduleTag || "Module " + (modIdx + 1);
    $("#module-title").textContent = LESSON.title;

    var rail = $("#chunk-rail");
    var stage = $("#stage-inner");

    chunks.push(makeScreen("intro", "Start", renderIntro(), false));
    LESSON.chunks.forEach(function (c, i) {
      var requiresAction = c.type === "quiz" || c.type === "journal_entry_builder";
      chunks.push(makeScreen("c" + i, c.railLabel || shortLabel(c.title, i + 1), renderChunk(c, i), requiresAction));
    });
    chunks.push(makeScreen("done", "Done", renderComplete(), false));

    chunks.forEach(function (ch) {
      stage.appendChild(ch.el);
      rail.appendChild(ch.dotEl);
    });

    goTo(0);
  }

  function shortLabel(title, n) {
    if (!title) return "Step " + n;
    return title.length > 18 ? title.slice(0, 16) + "…" : title;
  }

  function makeScreen(id, railLabel, innerHtml, requiresAction) {
    var el = document.createElement("div");
    el.className = "screen";
    el.dataset.id = id;
    el.innerHTML = innerHtml;

    var dot = document.createElement("button");
    dot.className = "chunk-dot";
    dot.textContent = railLabel;
    dot.addEventListener("click", function () { goTo(chunks.findIndex(function (c) { return c.id === id; })); });

    return { id: id, el: el, dotEl: dot, requiresAction: requiresAction, satisfied: !requiresAction };
  }

  function renderIntro() {
    var L = LESSON;
    return (
      '<div class="hero-eyebrow">' + esc(L.moduleTag || "") + " · " + esc(L.dayMapping || "") + '</div>' +
      '<h1 class="hero-title">' + esc(L.title) + "</h1>" +
      '<p class="hero-sub">' + esc(L.subhead) + "</p>" +
      (L.hook ? '<div class="hero-hook">' + esc(L.hook) + "</div>" : "")
    );
  }

  function renderComplete() {
    return (
      '<div class="center-screen">' +
      '<div class="complete-badge">✓</div>' +
      '<h1 class="hero-title" style="text-align:center;">Module complete</h1>' +
      '<p class="hero-sub" style="text-align:center;">' + esc(LESSON.title) + " is done. You can move to the next module.</p>" +
      '<button class="nav-btn primary" style="margin-top:20px;" onclick="SkarionPlayer.nextModule()">Go to next module →</button>' +
      "</div>"
    );
  }

  function renderChunk(c, idx) {
    switch (c.type) {
      case "content": return renderContent(c);
      case "flip_cards": return renderFlipCards(c, idx);
      case "quiz": return renderQuiz(c, idx);
      case "journal_entry_builder": return renderJE(c, idx);
      case "exercise": return renderExercise(c);
      case "timeline": return renderTimeline(c);
      case "drag_and_drop": return renderDragAndDrop(c, idx);
      case "hotspot": return renderHotspot(c, idx);
      default: return "<p>Unknown chunk type: " + esc(c.type) + "</p>";
    }
  }

  function renderTimeline(c) {
    var html = '<div class="chunk-kicker">Process Flow</div><h2 class="chunk-title">' + esc(c.title) + "</h2>";
    html += '<div class="timeline">';
    c.steps.forEach(function(step, i) {
      html += '<div class="timeline-step" style="animation-delay: ' + (i * 0.2) + 's">';
      html += '<div class="timeline-dot"></div>';
      html += '<div class="timeline-content"><h3>' + esc(step.title) + '</h3><p>' + esc(step.desc) + '</p></div>';
      html += '</div>';
    });
    html += '</div>';
    return html;
  }

  function renderDragAndDrop(c, idx) {
    var html = '<div class="chunk-kicker">Interactive Exercise</div><h2 class="chunk-title">' + esc(c.title) + "</h2>";
    html += '<p class="prose">' + esc(c.instruction) + '</p>';
    html += '<div class="dnd-container">';
    html += '<div class="dnd-items">';
    c.items.forEach(function(item, i) {
      html += '<div class="dnd-item" draggable="true" id="drag-' + idx + '-' + i + '" data-target="' + esc(item.target) + '">' + esc(item.draggable) + '</div>';
    });
    html += '</div>';
    html += '<div class="dnd-targets">';
    var uniqueTargets = [];
    c.items.forEach(function(item) { if(uniqueTargets.indexOf(item.target) === -1) uniqueTargets.push(item.target); });
    uniqueTargets.forEach(function(tgt) {
      html += '<div class="dnd-target" data-accept="' + esc(tgt) + '"><h3>' + esc(tgt) + '</h3><div class="dnd-zone"></div></div>';
    });
    html += '</div></div>';
    
    // Add initialization script for this specific DOM node after render
    setTimeout(function() { initDragAndDrop(idx); }, 100);
    return html;
  }

  function initDragAndDrop(idx) {
    var items = $all('.dnd-item[id^="drag-' + idx + '-"]');
    var zones = $all('.dnd-container .dnd-zone');
    items.forEach(function(item) {
      item.addEventListener('dragstart', function(e) {
        e.dataTransfer.setData('text/plain', item.id);
        item.classList.add('dragging');
      });
      item.addEventListener('dragend', function() { item.classList.remove('dragging'); });
    });
    zones.forEach(function(zone) {
      zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.parentElement.classList.add('drag-over'); });
      zone.addEventListener('dragleave', function(e) { zone.parentElement.classList.remove('drag-over'); });
      zone.addEventListener('drop', function(e) {
        e.preventDefault();
        zone.parentElement.classList.remove('drag-over');
        var id = e.dataTransfer.getData('text/plain');
        var dragged = document.getElementById(id);
        if(dragged && dragged.dataset.target === zone.parentElement.dataset.accept) {
          zone.appendChild(dragged);
          dragged.draggable = false;
          dragged.style.background = 'var(--success-color, #059669)';
          dragged.style.color = 'white';
        } else {
          alert('Incorrect! Try again.');
        }
      });
    });
  }

  function renderHotspot(c, idx) {
    var html = '<div class="chunk-kicker">Visual Analysis</div><h2 class="chunk-title">' + esc(c.title) + "</h2>";
    html += '<div class="hotspot-container" style="position:relative; display:inline-block; max-width:100%; border:1px solid #333; border-radius:8px; overflow:hidden;">';
    html += '<img src="' + esc(c.image) + '" style="display:block; max-width:100%; height:auto;" />';
    c.hotspots.forEach(function(hs, i) {
      html += '<div class="hotspot-dot" style="left:' + hs.x + '%; top:' + hs.y + '%;" onclick="this.querySelector(\'.hotspot-tooltip\').classList.toggle(\'show\')">';
      html += '<div class="hotspot-tooltip"><strong>' + esc(hs.label) + '</strong><br>' + esc(hs.info) + '</div>';
      html += '</div>';
    });
    html += '</div>';
    return html;
  }

  function renderContent(c) {
    var html = '<div class="chunk-kicker">' + esc(c.kicker || "Learn") + "</div>";
    html += '<h2 class="chunk-title">' + esc(c.title) + "</h2>";
    html += '<div class="prose">' + c.bodyHtml + "</div>";
    if (c.callout) {
      var icons = { tip: "💡", warning: "⚠️", story: "📎", danger: "🚫" };
      html += '<div class="callout ' + c.callout.type + '"><span class="icon">' + (icons[c.callout.type] || "•") + '</span><div>' + c.callout.html + "</div></div>";
    }
    return html;
  }

  function renderFlipCards(c, idx) {
    var html = '<div class="chunk-kicker">Quick check</div><h2 class="chunk-title">' + esc(c.title) + "</h2>";
    if (c.intro) html += '<p class="prose">' + esc(c.intro) + "</p>";
    html += '<div class="flip-grid">';
    c.cards.forEach(function (card, i) {
      html += '<div class="flip-card" onclick="this.classList.toggle(\'flipped\')">' +
        '<div class="flip-inner">' +
        '<div class="flip-face flip-front">' + esc(card.front) + "</div>" +
        '<div class="flip-face flip-back">' + esc(card.back) + "</div>" +
        "</div></div>";
    });
    html += "</div>";
    return html;
  }

  function renderQuiz(c, idx) {
    var html = '<div class="chunk-kicker">Gamified Challenge 🏆</div><h2 class="chunk-title">' + esc(c.title) + "</h2>";
    if(c.intro) html += '<p class="prose" style="margin-bottom:24px;">' + esc(c.intro) + '</p>';
    c.questions.forEach(function (q, qi) {
      html += '<div class="quiz-q gamified" data-qi="' + qi + '">';
      html += '<div class="quiz-q-text"><strong>Q' + (qi + 1) + ':</strong> ' + esc(q.q) + "</div>";
      html += '<div class="quiz-opts cards">';
      q.options.forEach(function (opt, oi) {
        html += '<button type="button" class="quiz-opt-card" onclick="SkarionPlayer.answerQuiz(' + idx + "," + qi + "," + oi + ')">' + esc(opt) + "</button>";
      });
      html += "</div>";
      html += '<div class="quiz-explain playful" id="explain-' + idx + "-" + qi + '"></div>';
      html += "</div>";
    });
    html += '<div class="quiz-score-banner gamified-banner" id="score-' + idx + '"></div>';
    return html;
  }

  function renderJE(c, idx) {
    var html = '<div class="chunk-kicker">Practice: journal entry</div><h2 class="chunk-title">' + esc(c.title) + "</h2>";
    html += '<div class="je-scenario">' + c.scenarioHtml + "</div>";
    html += '<table class="je-table" id="je-table-' + idx + '"><thead><tr><th style="width:45%">Account</th><th style="width:25%">Debit</th><th style="width:25%">Credit</th><th></th></tr></thead><tbody>';
    var startRows = c.startRows || 2;
    for (var r = 0; r < startRows; r++) html += jeRowHtml(c, idx);
    html += "</tbody></table>";
    html += '<button type="button" class="je-add-row" onclick="SkarionPlayer.addJERow(' + idx + ')">+ Add line</button><br>';
    html += '<button type="button" class="je-check-btn" onclick="SkarionPlayer.checkJE(' + idx + ',' + JSON.stringify(c.solution).replace(/"/g, "&quot;") + ')">Check my entry</button>';
    html += '<div class="je-feedback" id="je-feedback-' + idx + '"></div>';
    return html;
  }

  function jeRowHtml(c, idx) {
    var opts = c.accounts.map(function (a) { return "<option>" + esc(a) + "</option>"; }).join("");
    return '<tr class="je-row"><td><select><option value="">— choose account —</option>' + opts + "</select></td>" +
      '<td><input type="number" step="0.01" placeholder="0.00"></td>' +
      '<td><input type="number" step="0.01" placeholder="0.00"></td>' +
      '<td></td></tr>';
  }

  function renderExercise(c) {
    var html = '<div class="chunk-kicker">Hands-on exercise</div><h2 class="chunk-title">' + esc(c.title) + "</h2>";
    html += '<div class="exercise-card">';
    html += '<div class="prose">' + c.instructionsHtml + "</div>";
    if (c.files && c.files.length) {
      html += '<div class="exercise-files">';
      c.files.forEach(function (f) {
        html += '<a class="file-chip" href="' + esc(f.href) + '" target="_blank" rel="noopener">📄 ' + esc(f.label) + "</a>";
      });
      html += "</div>";
    }
    if (c.reflectionPrompt) {
      html += '<div class="reflection-box"><label class="chunk-kicker" style="margin-top:14px;">' + esc(c.reflectionPrompt) + '</label><textarea placeholder="Type your notes here (saved locally in this browser only)"></textarea></div>';
    }
    html += "</div>";
    return html;
  }

  function esc(s) {
    if (s == null) return "";
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  // ---------- Interaction handlers ----------
  window.SkarionPlayer = {
    answerQuiz: function (chunkIdx, qi, oi) {
      var qDef = LESSON.chunks[chunkIdx].questions[qi];
      var qEl = $('.quiz-q[data-qi="' + qi + '"]', chunks[chunkIdx + 1].el);
      var buttons = $all(".quiz-opt-card", qEl);
      var isCorrect = (oi === qDef.correct_index);
      
      buttons.forEach(function (b, i) {
        b.disabled = true;
        if (i === qDef.correct_index) b.classList.add("correct");
        else if (i === oi) b.classList.add("incorrect");
      });
      
      var explainBox = $("#explain-" + chunkIdx + "-" + qi);
      if (isCorrect) {
        qEl.classList.add("animate-burst");
        explainBox.innerHTML = "🎉 <strong>Nailed it!</strong> " + esc(qDef.explanation || "");
        explainBox.classList.add("success-text");
      } else {
        qEl.classList.add("animate-shake");
        explainBox.innerHTML = "💥 <strong>Not quite!</strong> " + esc(qDef.explanation || "");
        explainBox.classList.add("error-text");
      }
      explainBox.classList.add("show");

      state.quizScores[chunkIdx] = state.quizScores[chunkIdx] || {};
      state.quizScores[chunkIdx][qi] = isCorrect;

      var total = LESSON.chunks[chunkIdx].questions.length;
      var answered = Object.keys(state.quizScores[chunkIdx]).length;
      if (answered === total) {
        var correct = Object.values(state.quizScores[chunkIdx]).filter(Boolean).length;
        var banner = $("#score-" + chunkIdx);
        if (correct === total) {
          banner.innerHTML = "🏆 <strong>Flawless Victory!</strong> " + correct + "/" + total + " points.";
          banner.classList.add("perfect");
        } else {
          banner.innerHTML = "⭐ <strong>Good effort!</strong> You scored " + correct + "/" + total + ". Check the explanations above to master this.";
        }
        banner.classList.add("show");
        chunks[chunkIdx + 1].satisfied = true;
        updateNav();
      }
    },

    addJERow: function (chunkIdx) {
      var c = LESSON.chunks[chunkIdx];
      var tbody = $("#je-table-" + chunkIdx + " tbody");
      var tmp = document.createElement("tbody");
      tmp.innerHTML = jeRowHtml(c, chunkIdx);
      tbody.appendChild(tmp.firstElementChild);
    },

    checkJE: function (chunkIdx, solution) {
      var rows = $all("#je-table-" + chunkIdx + " tbody tr");
      var entries = [];
      rows.forEach(function (r) {
        var sel = r.querySelector("select").value;
        var debit = parseFloat(r.querySelector("td:nth-child(2) input").value) || 0;
        var credit = parseFloat(r.querySelector("td:nth-child(3) input").value) || 0;
        if (sel && (debit || credit)) entries.push({ account: sel, debit: debit, credit: credit });
      });

      var totalDebit = entries.reduce(function (s, e) { return s + e.debit; }, 0);
      var totalCredit = entries.reduce(function (s, e) { return s + e.credit; }, 0);
      var balanced = Math.abs(totalDebit - totalCredit) < 0.01 && totalDebit > 0;

      function matches(sol) {
        return sol.every(function (line) {
          return entries.some(function (e) {
            return e.account === line.account &&
              ((line.side === "debit" && Math.abs(e.debit - line.amount) < 0.01 && e.credit === 0) ||
               (line.side === "credit" && Math.abs(e.credit - line.amount) < 0.01 && e.debit === 0));
          });
        }) && entries.length === sol.length;
      }

      var correct = balanced && matches(solution);
      var fb = $("#je-feedback-" + chunkIdx);
      fb.className = "je-feedback show " + (correct ? "correct" : "incorrect");
      if (correct) {
        fb.innerHTML = "✅ <strong>Correct.</strong> Debits and credits balance ($" + totalDebit.toFixed(2) + ") and the accounts match the expected entry.";
      } else if (!balanced) {
        fb.innerHTML = "⚠️ Debits ($" + totalDebit.toFixed(2) + ") and credits ($" + totalCredit.toFixed(2) + ") don't balance yet. Every journal entry needs total debits = total credits.";
      } else {
        fb.innerHTML = "❌ Debits and credits balance, but the accounts or amounts don't match the expected entry. Re-read the scenario and try again.";
      }
      if (correct) {
        state.jeSolved[chunkIdx] = true;
        chunks[chunkIdx + 1].satisfied = true;
        updateNav();
      }
    },

    nextModule: function() {
      if (state.mod < CATALOG.length - 1) {
        loadModule(state.mod + 1);
      }
    }
  };

  // ---------- Navigation ----------
  function goTo(i) {
    if (i < 0 || i >= chunks.length) return;
    state.current = i;
    chunks.forEach(function (c, idx) { c.el.classList.toggle("active", idx === i); });
    updateRail();
    updateProgress();
    updateNav();
    updateSidebarUI();
    $("#stage").scrollTop = 0;
    
    // Overall progress approximation across modules
    var globalPct = ((state.mod + (i / chunks.length)) / CATALOG.length);
    window.SkarionSCORM.setProgress(globalPct);
    if (state.mod === CATALOG.length - 1 && i === chunks.length - 1) {
      window.SkarionSCORM.complete(true);
    }
  }

  function updateRail() {
    chunks.forEach(function (c, idx) {
      c.dotEl.classList.toggle("active", idx === state.current);
      c.dotEl.classList.toggle("done", idx < state.current);
    });
  }

  function updateProgress() {
    var pct = Math.round((state.current / (chunks.length - 1)) * 100);
    $("#progress-fill").style.width = pct + "%";
    $("#progress-label").textContent = pct + "%";
  }

  function updateNav() {
    var atEnd = state.current === chunks.length - 1;
    var atStart = state.current === 0;
    var cur = chunks[state.current];
    $("#nav-prev").disabled = atStart;
    $("#nav-next").disabled = atEnd || !cur.satisfied;
    if (atEnd) {
      $("#nav-next").textContent = (state.mod === CATALOG.length - 1) ? "Finished Course" : "Done with module";
      $("#nav-next").disabled = (state.mod === CATALOG.length - 1);
    } else {
      $("#nav-next").textContent = (cur.satisfied === false ? "Complete this step to continue" : (state.current === chunks.length - 2 ? "Finish module →" : "Continue →"));
    }
  }

  function next() { if (!$("#nav-next").disabled) { if (state.current === chunks.length - 1) { window.SkarionPlayer.nextModule(); } else { goTo(state.current + 1); } } }
  function prev() { if (!$("#nav-prev").disabled) goTo(state.current - 1); }

  document.addEventListener("DOMContentLoaded", function () {
    init();
    $("#nav-next").addEventListener("click", next);
    $("#nav-prev").addEventListener("click", prev);
  });
})();
</script>
</body>
</html>
