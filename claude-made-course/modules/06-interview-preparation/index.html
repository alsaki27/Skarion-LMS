<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Interview Preparation — Skarion Accounting Track</title>
<style>/* Skarion Course Engine — shared design system
   Modern, chunked micro-learning UI. Self-contained (no external fonts/CDNs) for SCORM portability. */

:root {
  --bg: #0b0d12;
  --bg-elev-1: #12151c;
  --bg-elev-2: #191d26;
  --bg-elev-3: #212633;
  --border: #262c3a;
  --border-soft: #1a1f2b;
  --text: #eef1f6;
  --text-dim: #9aa4b8;
  --text-faint: #6b7488;
  --accent: #5b8cff;
  --accent-2: #7c5cff;
  --accent-grad: linear-gradient(135deg, #5b8cff 0%, #7c5cff 100%);
  --good: #2fbf82;
  --good-bg: #10241c;
  --warn: #e8a84c;
  --warn-bg: #2a230f;
  --bad: #ef5b6f;
  --bad-bg: #2a1418;
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 22px;
  --shadow-1: 0 1px 2px rgba(0,0,0,.4), 0 8px 24px -8px rgba(0,0,0,.5);
  --shadow-2: 0 2px 8px rgba(0,0,0,.5), 0 16px 40px -12px rgba(91,140,255,.15);
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --serif-display: Georgia, "Times New Roman", serif;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg: #f5f6f9;
    --bg-elev-1: #ffffff;
    --bg-elev-2: #ffffff;
    --bg-elev-3: #eef0f5;
    --border: #e2e5ed;
    --border-soft: #edeff4;
    --text: #171a21;
    --text-dim: #565f74;
    --text-faint: #8891a3;
    --good-bg: #e7f8f0;
    --warn-bg: #fdf3e3;
    --bad-bg: #fdeaec;
    --shadow-1: 0 1px 2px rgba(20,20,40,.06), 0 8px 24px -12px rgba(20,20,40,.12);
    --shadow-2: 0 2px 10px rgba(20,20,40,.08), 0 20px 40px -20px rgba(91,140,255,.25);
  }
}

* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ---------- Top bar ---------- */
.topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 22px;
  border-bottom: 1px solid var(--border-soft);
  background: var(--bg-elev-1);
  flex-shrink: 0;
}
.topbar .module-tag {
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--text-faint);
  white-space: nowrap;
}
.topbar .module-title {
  font-weight: 650;
  font-size: .95rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.progress-track {
  flex: 1;
  height: 6px;
  background: var(--bg-elev-3);
  border-radius: 99px;
  overflow: hidden;
  min-width: 60px;
}
.progress-fill {
  height: 100%;
  background: var(--accent-grad);
  border-radius: 99px;
  transition: width .4s cubic-bezier(.4,0,.2,1);
  width: 0%;
}
.progress-label { font-size: .78rem; color: var(--text-dim); white-space: nowrap; font-variant-numeric: tabular-nums; }

/* ---------- Chunk rail (dots) ---------- */
.chunk-rail {
  display: flex;
  gap: 6px;
  padding: 10px 22px;
  overflow-x: auto;
  flex-shrink: 0;
  background: var(--bg-elev-1);
  border-bottom: 1px solid var(--border-soft);
}
.chunk-dot {
  flex-shrink: 0;
  padding: 6px 12px;
  border-radius: 99px;
  font-size: .74rem;
  font-weight: 600;
  color: var(--text-faint);
  background: var(--bg-elev-3);
  border: 1px solid transparent;
  cursor: pointer;
  transition: all .15s ease;
  white-space: nowrap;
}
.chunk-dot:hover { color: var(--text); }
.chunk-dot.active { background: var(--accent-grad); color: #fff; }
.chunk-dot.done { color: var(--good); border-color: var(--good); }
.chunk-dot.done.active { color: #fff; border-color: transparent; }

/* ---------- Stage ---------- */
.stage {
  flex: 1;
  overflow-y: auto;
  padding: 40px 22px 120px;
  display: flex;
  justify-content: center;
}
.stage-inner { width: 100%; max-width: 760px; }

.screen { display: none; animation: rise .35s cubic-bezier(.16,1,.3,1); }
.screen.active { display: block; }
@keyframes rise { from { opacity:0; transform: translateY(14px);} to {opacity:1; transform:none;} }

/* ---------- Intro / hero screen ---------- */
.hero-eyebrow { font-size: .78rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
.hero-title { font-size: 2.1rem; font-weight: 750; line-height: 1.15; margin: 0 0 14px; letter-spacing: -.01em; }
.hero-sub { font-size: 1.08rem; color: var(--text-dim); line-height: 1.6; margin: 0 0 22px; }
.hero-hook {
  padding: 18px 22px;
  border-radius: var(--radius-md);
  background: var(--bg-elev-2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  font-size: .96rem;
  color: var(--text-dim);
  font-style: italic;
}

/* ---------- Content chunk ---------- */
.chunk-title { font-size: 1.5rem; font-weight: 700; margin: 0 0 6px; letter-spacing: -.01em; }
.chunk-kicker { font-size: .8rem; font-weight: 700; color: var(--text-faint); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
.prose { font-size: 1rem; line-height: 1.75; color: var(--text); }
.prose p { margin: 0 0 14px; }
.prose strong { color: var(--text); }
.prose ul, .prose ol { padding-left: 22px; margin: 0 0 14px; }
.prose li { margin-bottom: 6px; }
.prose code { background: var(--bg-elev-3); padding: 1px 6px; border-radius: 5px; font-size: .9em; }

.callout {
  margin: 18px 0;
  padding: 16px 18px;
  border-radius: var(--radius-md);
  font-size: .92rem;
  line-height: 1.6;
  display: flex;
  gap: 12px;
}
.callout .icon { flex-shrink: 0; font-size: 1.2rem; line-height: 1.4; }
.callout.tip { background: var(--good-bg); color: var(--text); border: 1px solid rgba(47,191,130,.25); }
.callout.warning { background: var(--warn-bg); color: var(--text); border: 1px solid rgba(232,168,76,.3); }
.callout.story { background: var(--bg-elev-2); border: 1px solid var(--border); border-left: 3px solid var(--accent-2); }
.callout.danger { background: var(--bad-bg); color: var(--text); border: 1px solid rgba(239,91,111,.3); }

table.data { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: .88rem; }
table.data th, table.data td { padding: 8px 12px; border: 1px solid var(--border); text-align: left; }
table.data th { background: var(--bg-elev-2); font-weight: 650; }
table.data tr:nth-child(even) td { background: var(--bg-elev-1); }

/* ---------- Flip cards ---------- */
.flip-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; margin-top: 16px; }
.flip-card { perspective: 1000px; height: 150px; cursor: pointer; }
.flip-inner { position: relative; width: 100%; height: 100%; transition: transform .5s cubic-bezier(.4,0,.2,1); transform-style: preserve-3d; }
.flip-card.flipped .flip-inner { transform: rotateY(180deg); }
.flip-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: var(--radius-md); padding: 16px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: .92rem; border: 1px solid var(--border); box-shadow: var(--shadow-1); }
.flip-front { background: var(--bg-elev-2); font-weight: 650; }
.flip-front::after { content: "tap to flip"; position:absolute; bottom:8px; font-size:.65rem; color:var(--text-faint); font-weight:400; }
.flip-back { background: var(--accent-grad); color: #fff; transform: rotateY(180deg); line-height: 1.4; }

/* ---------- Quiz ---------- */
.quiz-q { margin-bottom: 26px; }
.quiz-q-text { font-weight: 650; font-size: 1.02rem; margin-bottom: 12px; }
.quiz-opts { display: flex; flex-direction: column; gap: 8px; }
.quiz-opt {
  text-align: left;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-elev-2);
  color: var(--text);
  font-size: .92rem;
  cursor: pointer;
  transition: all .15s ease;
}
.quiz-opt:hover:not(:disabled) { border-color: var(--accent); }
.quiz-opt.correct { background: var(--good-bg); border-color: var(--good); }
.quiz-opt.incorrect { background: var(--bad-bg); border-color: var(--bad); }
.quiz-opt:disabled { cursor: default; opacity: .85; }
.quiz-explain { margin-top: 10px; padding: 12px 14px; border-radius: var(--radius-sm); background: var(--bg-elev-2); font-size: .88rem; color: var(--text-dim); display: none; }
.quiz-explain.show { display: block; }
.quiz-score-banner { padding: 16px 18px; border-radius: var(--radius-md); background: var(--bg-elev-2); border: 1px solid var(--border); text-align: center; font-weight: 650; margin-top: 10px; display:none; }
.quiz-score-banner.show { display: block; }

/* ---------- Journal entry builder ---------- */
.je-scenario { background: var(--bg-elev-2); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px 18px; margin-bottom: 18px; font-size: .94rem; line-height: 1.6; }
.je-table { width: 100%; border-collapse: collapse; margin-bottom: 14px; }
.je-table th { text-align: left; font-size: .74rem; text-transform: uppercase; letter-spacing: .05em; color: var(--text-faint); padding: 4px 8px; }
.je-row td { padding: 5px 8px; }
.je-row select, .je-row input {
  width: 100%; padding: 8px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--bg-elev-1); color: var(--text); font-family: var(--font); font-size: .88rem;
}
.je-row select:focus, .je-row input:focus { outline: none; border-color: var(--accent); }
.je-add-row { background: transparent; border: 1px dashed var(--border); color: var(--text-dim); padding: 8px 14px; border-radius: var(--radius-sm); cursor: pointer; font-size: .85rem; margin-bottom: 14px; }
.je-add-row:hover { border-color: var(--accent); color: var(--text); }
.je-check-btn { background: var(--accent-grad); color: #fff; border: none; padding: 10px 20px; border-radius: var(--radius-sm); font-weight: 650; cursor: pointer; font-size: .9rem; }
.je-feedback { margin-top: 14px; padding: 14px 16px; border-radius: var(--radius-md); font-size: .9rem; display: none; }
.je-feedback.show { display: block; }
.je-feedback.correct { background: var(--good-bg); border: 1px solid rgba(47,191,130,.3); }
.je-feedback.incorrect { background: var(--bad-bg); border: 1px solid rgba(239,91,111,.3); }

/* ---------- Exercise ---------- */
.exercise-card { background: var(--bg-elev-2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 22px; margin-top: 14px; }
.exercise-files { display: flex; flex-wrap: wrap; gap: 10px; margin: 16px 0; }
.file-chip { display: flex; align-items: center; gap: 8px; padding: 9px 14px; border-radius: 99px; background: var(--bg-elev-3); border: 1px solid var(--border); font-size: .85rem; text-decoration: none; color: var(--text); transition: all .15s; }
.file-chip:hover { border-color: var(--accent); }
.reflection-box textarea {
  width: 100%; min-height: 90px; margin-top: 10px; padding: 12px 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--bg-elev-1); color: var(--text); font-family: var(--font); font-size: .9rem; resize: vertical;
}

/* ---------- Nav bar ---------- */
.navbar {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; justify-content: center;
  padding: 16px 22px calc(16px + env(safe-area-inset-bottom));
  background: linear-gradient(0deg, var(--bg) 55%, transparent);
  pointer-events: none;
}
.navbar-inner { pointer-events: auto; display: flex; gap: 10px; width: 100%; max-width: 760px; }
.nav-btn {
  flex: 1; padding: 13px 20px; border-radius: var(--radius-md); border: 1px solid var(--border);
  font-weight: 650; font-size: .92rem; cursor: pointer; transition: all .15s ease;
  background: var(--bg-elev-2); color: var(--text);
}
.nav-btn.primary { background: var(--accent-grad); color: #fff; border: none; box-shadow: var(--shadow-2); }
.nav-btn.primary:hover { filter: brightness(1.08); }
.nav-btn:disabled { opacity: .35; cursor: not-allowed; }
.nav-btn.secondary { flex: 0 0 auto; padding: 13px 18px; }

/* ---------- Completion screen ---------- */
.complete-badge { width: 74px; height: 74px; border-radius: 50%; background: var(--accent-grad); display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 20px; box-shadow: var(--shadow-2); }
.center-screen { text-align: center; padding-top: 40px; }

@media (max-width: 640px) {
  .stage { padding: 24px 16px 120px; }
  .hero-title { font-size: 1.6rem; }
  .topbar { padding: 12px 16px; }
  .topbar .module-title { display: none; }
}
</style>

</div>
<script>window.LESSON = {"title": "Interview Preparation", "moduleTag": "Module 06 · Skarion Manufacturing LLC", "moduleTitle": "Interview Preparation", "dayMapping": "Day 6 of the 10-day path", "subhead": "You've closed the books, reconciled the bank, and processed a batch of invoices at Skarion Manufacturing LLC. Now you have to talk about it out loud, in a room, under pressure — and make it sound like real experience.", "hook": "\"Tell me about a time you found an error in the books.\" Every candidate in this interview has an answer. The only question is whether it's specific enough to believe.", "chunks": [{"type": "content", "kicker": "The framework", "title": "Context → Action → Result: the only structure you need", "bodyHtml": "<p>The Skarion Interview Cheat Sheet gives you one formula and tells you to use it for almost every question:</p><table class='data'><tr><th>Step</th><th>What it means</th></tr><tr><td><strong>1. Context</strong></td><td>Company/file, month, transaction, or report</td></tr><tr><td><strong>2. Action</strong></td><td>What you checked, posted, reconciled, or escalated</td></tr><tr><td><strong>3. Result</strong></td><td>Correction made, report finished, lesson learned</td></tr></table><p>Here's the cheat sheet's own instruction on wording: use honest phrasing like <em>\"in my Skarion Manufacturing accounting simulation / portfolio project\"</em> when describing practice-based experience. You're not pretending you worked a real job — you're describing real work you actually did, on a real (simulated) company's real numbers.</p><p>And the final reminder from the sheet is blunt: <strong>\"Strong interview answers are specific. Use numbers, dates, reports, tools, and the correction you made. Vague answers sound like motivational posters, and nobody should hire a poster.\"</strong></p>", "callout": {"type": "tip", "html": "<strong>Why specificity wins:</strong> Anyone can say \"I'm detail-oriented and I catch errors.\" Almost nobody outside this simulation can say \"I traced a $9,503.60 duplicate Coastal Electric &amp; Controls deposit that had been entered twice in QuickBooks, and corrected it by debiting AR and crediting Cash — not touching Sales Revenue, since the sale was never overstated.\" The second answer is unfakeable. That's the whole point."}}, {"type": "flip_cards", "title": "10 real Skarion answers — memorize the structure, not the words", "intro": "These are pulled directly from the Interview Cheat Sheet and Question Bank. Flip each card, then say the answer out loud in your own words — but keep the real numbers.", "railLabel": "Flip cards", "cards": [{"front": "Walk me through a month-end close you have done.", "back": "Followed a close checklist: finished AP/AR entry, reconciled the operating bank account, reviewed AR/AP aging, posted payroll, depreciation, prepaid, and interest accruals, then reviewed the trial balance and ran the P&L, balance sheet, and close summary. The bank rec converged on an adjusted balance of $217,334.09 — but only after tracing a $9,503.60 duplicate Coastal Electric & Controls deposit entered twice in QuickBooks. Fixed it with debit AR / credit Cash for $9,503.60."}, {"front": "What is a 3-way match?", "back": "Compares the purchase order, receiving report, and vendor invoice. On invoice DAF-2601-014 from Dominion Aluminum & Fasteners, the PO price was $38.00/unit but the invoice billed $39.50/unit — a $126.36 variance — so the invoice was held instead of paid."}, {"front": "What accounts do you reconcile during month-end?", "back": "Cash/bank, credit cards, AR and AP subledgers to the GL, inventory, fixed assets and accumulated depreciation, payroll liabilities, sales tax payable, loans, prepaids, and accruals. In January's close that meant tying the bank to $217,334.09, AR to $176,918.00, AP to $42,265.00, accumulated depreciation to a $5,208.10 monthly add, and accrued loan interest to $1,510.42."}, {"front": "How do you record depreciation?", "back": "Straight-line: asset cost minus salvage value, divided by useful life. Skarion's 10 fixed assets — from the $82,000.00 CNC Brake Press to the $12,400.00 label printer — depreciate for a combined $5,208.10/month. Monthly entry: debit 6700 Depreciation Expense, credit 1590 Accumulated Depreciation."}, {"front": "How do you calculate days sales outstanding (DSO)?", "back": "Average AR divided by credit sales, times days in the period. Using January's numbers — roughly $176,918.00 ending AR against $165,264.00 net sales — a rough one-month DSO lands around 32 days, which flags that the $60,300.00 of aged balances in the 31–60 day bucket needs collection attention."}, {"front": "Tell me about a time you found an error in the books.", "back": "During a bank reconciliation, QuickBooks showed more cash than the bank statement. Reviewed deposits and found one customer ACH receipt entered twice. Confirmed the bank only received it once, reversed the duplicate, updated the reconciliation notes. Lesson: check transaction IDs and deposit dates, not just customer names."}, {"front": "What internal controls have you worked with?", "back": "3-way match, invoice approval before payment, duplicate invoice review, bank reconciliation, separation of invoice entry and payment approval, supporting documentation, and review of unusual transactions during close. The 3-way match caught the $126.36 DAF-2601-014 price discrepancy and a missing PO on NOVA Packaging invoice NPC-2601-011 — both held instead of paid."}, {"front": "What is variance analysis?", "back": "Compares actual results to budget, forecast, or prior period. On invoice DAF-2601-014, the unit price billed was $39.50 versus the $38.00 PO price — a $126.36 price variance — exactly the kind of thing you'd flag and explain rather than pay through."}, {"front": "How do you stay organized during month-end?", "back": "A close checklist with owner, due date, status, and notes, plus support files for reconciliations, accruals, depreciation, payroll, and bank activity. In January, that meant tracking the $217,334.09 bank rec, the $5,208.10 depreciation entry across 10 fixed assets, and the $375.00 water/sewer accrual — always knowing what was posted versus still pending support."}, {"front": "How do you accrue interest on a loan?", "back": "Calculate from the loan balance, rate, and time period. Skarion's $250,000.00 term loan at 7.25% annual interest: $250,000.00 × 7.25% / 12 = $1,510.42 for January. Month-end entry: debit 6800 Interest Expense, credit 2300 Accrued Interest Payable for $1,510.42."}]}, {"type": "content", "kicker": "Question types", "title": "Four categories, four different things interviewers listen for", "bodyHtml": "<p>The Question Bank breaks 126 questions into four sections. Each one is scored on something different — know the difference before you walk in.</p><table class='data'><tr><th>Category</th><th>What it covers</th><th>What interviewers listen for</th></tr><tr><td><strong>Technical (56 Qs)</strong></td><td>GAAP, GL, AP/AR, reconciliations, close, payroll, fixed assets, journal entries</td><td>Correct accounting treatment, no debit/credit or cash/accrual confusion, and a real Skarion number attached to the answer.</td></tr><tr><td><strong>Behavioral (30 Qs)</strong></td><td>STAR-style judgment, communication, ownership, ethics, organization</td><td>A specific situation (not a hypothetical), the steps taken, the outcome, and the lesson learned.</td></tr><tr><td><strong>Software (20 Qs)</strong></td><td>Excel (pivot tables, XLOOKUP, SUMIFS, conditional formatting), QuickBooks Online workflows</td><td>Practical accounting use of the tool — not \"I know Excel,\" but \"I used SUMIFS to total unpaid invoices by customer.\"</td></tr><tr><td><strong>Scenario (20 Qs)</strong></td><td>Workplace judgment calls — mismatched invoices, short payments, missing documents, ethical pressure</td><td>Whether you hold, correct, document, or escalate — and whether you know the difference between those four responses.</td></tr></table><p>The Question Bank's own scoring rubric names five things every strong answer needs: <strong>Accuracy, Specificity, Workflow, Judgment,</strong> and <strong>Communication</strong> — and it warns that weak answers \"sound memorized and generic\" while strong ones \"use a clear Skarion simulation example with numbers or documents.\"</p>", "callout": {"type": "warning", "html": "The rubric's coach note on Judgment: a weak answer \"posts adjustments without support or says they would guess.\" A strong answer knows when to hold, correct, document, or escalate — and never forces a number to make a reconciliation balance."}}, {"type": "content", "kicker": "Before and after", "title": "Red flags vs. green flags: the same question, two ways", "bodyHtml": "<p>The cheat sheet includes a \"say this / not this\" table. Here it is expanded with the real Skarion-grounded version pulled from the question bank, side by side with the generic version most candidates give.</p><table class='data'><tr><th>Topic</th><th>Red flag (generic)</th><th>Green flag (Skarion-specific)</th></tr><tr><td>Bank reconciliation</td><td>\"I adjust the difference.\"</td><td>\"The book balance started at $226,594.19; after removing a $9,503.60 duplicate deposit, adding back a $270.00 Valley Freight correction, removing a $45.00 bank fee, and adding $18.50 in interest, the adjusted balance was $217,334.09. I don't force the difference — I document the cause.\"</td></tr><tr><td>AP invoices</td><td>\"I enter whatever the vendor sends.\"</td><td>\"On invoice DAF-2601-014, the PO price was $38.00/unit but the invoice billed $39.50/unit — a $126.36 variance — so I held it instead of paying it.\"</td></tr><tr><td>Internal controls</td><td>\"Controls are someone else's job.\"</td><td>\"The 3-way match caught the $126.36 DAF-2601-014 price discrepancy and a missing PO on NOVA Packaging invoice NPC-2601-011 — both were held instead of paid.\"</td></tr></table>", "callout": {"type": "story", "html": "Notice the pattern: the green-flag answers never say \"I'm accurate\" or \"I'm detail-oriented.\" They just describe exactly what happened, with a dollar figure and a document number, and let the interviewer draw that conclusion themselves."}}, {"type": "quiz", "title": "Spot the specific answer", "questions": [{"q": "Question: \"How do you handle a bank reconciliation discrepancy?\" Which answer is the strong one?", "options": ["\"I just find the difference and adjust the books to match the bank.\"", "\"I compare the bank statement to the GL by date, amount, and type, look for outstanding checks, deposits in transit, duplicates, and fees, then correct the entry if needed, attach support, and document the adjustment. I don't force the reconciliation.\"", "\"I ask my manager to fix it since reconciliations are complicated.\"", "\"I wait until next month and see if it corrects itself.\""], "correct_index": 1, "explanation": "This is the cheat sheet's actual answer to Question 2. It names the specific things checked (outstanding checks, deposits in transit, duplicates, fees) and explicitly says it never plugs or forces the number."}, {"q": "Question: \"What is a 3-way match?\" Which answer would score higher on the rubric's 'Specificity' criterion?", "options": ["\"It's when you match three documents together before paying an invoice.\"", "\"On invoice DAF-2601-014 from Dominion Aluminum & Fasteners, the PO price was $38.00/unit but the invoice billed $39.50/unit — a $126.36 variance — so I held the invoice instead of paying it.\"", "\"It means being careful with vendor invoices.\"", "\"I've heard of it but haven't used it myself.\""], "correct_index": 1, "explanation": "This is the real answer from the Question Bank. It names the PO, the receiving report, and the invoice, then attaches a real transaction (DAF-2601-014) with the exact variance amount."}, {"q": "Question: \"Tell me about a time you found an error in the books.\" Which is the weak version?", "options": ["\"I found a customer deposit entered twice in QuickBooks. The bank reconciliation didn't balance, so I compared the bank statement to the cash receipts register by date and amount, found the duplicate, reversed it, and noted the correction.\"", "\"I'm very thorough, so I usually catch errors before they become a problem.\"", "\"During a bank reconciliation exercise, QuickBooks showed more cash than the bank statement. I found a duplicate ACH receipt, confirmed the bank only received it once, and reversed it.\"", "\"I traced a $9,503.60 duplicate Coastal Electric & Controls deposit entered twice in QuickBooks and corrected it with debit AR / credit Cash, without touching Sales Revenue.\""], "correct_index": 1, "explanation": "Option B is the motivational-poster answer the cheat sheet warns against — no numbers, no transaction, no method. The other three options are all real, specific Skarion answers from the source documents."}, {"q": "Question: \"What accounts do you reconcile during month-end?\" Which answer demonstrates the 'Workflow' criterion best?", "options": ["\"All the balance sheet accounts, basically.\"", "\"Cash, AR/AP subledgers to the GL, inventory, fixed assets, payroll liabilities, sales tax payable, loans, prepaids, and accruals — in January that meant tying the bank to $217,334.09, AR to $176,918.00, AP to $42,265.00, accumulated depreciation to the $5,208.10 monthly add, and accrued interest to $1,510.42.\"", "\"Whatever my manager tells me to check.\"", "\"I run the reports and see if anything looks off.\""], "correct_index": 1, "explanation": "This lists the full set of balance-sheet accounts AND ties each one to a real January figure — exactly what the rubric's Workflow and Specificity criteria are scoring for."}]}, {"type": "exercise", "title": "Run your own mock interview", "instructionsHtml": "<p>Download both source files below. Read through the 20 must-know questions in the Cheat Sheet and skim the 126-question bank for a few more from each category (technical, behavioral, software, scenario).</p><ol><li>Pick <strong>3 of the 20 must-know questions</strong> from the Cheat Sheet.</li><li>Answer each one <strong>in your own words</strong> — do not copy the sample answer verbatim.</li><li>Use the Context → Action → Result structure, and pull <strong>real numbers</strong> from the Skarion Manufacturing simulation files you've already worked with (the $217,334.09 bank balance, the $126.36 DAF-2601-014 variance, the $5,208.10 depreciation, or any figure from your own exercise work in earlier modules).</li><li>If you have a study partner, have them ask you the questions cold and time your answers — the rubric recommends 60–90 seconds per answer.</li></ol>", "files": [{"label": "Interview Cheat Sheet — 20 Questions.docx", "href": "/download/06-interview-preparation/Interview_Cheat_Sheet_20_Questions.docx"}, {"label": "Interview Question Bank — 126 Questions.docx", "href": "/download/06-interview-preparation/Interview_Question_Bank_126Q.docx"}], "reflectionPrompt": "Write out your 3 chosen questions and your Context → Action → Result answers, in your own words, using real simulation numbers. Which one felt hardest to make specific, and why?"}]};</script>
<script>/* Minimal SCORM 1.2 wrapper. Finds the LMS API in a parent/opener window (standard SCORM
   discovery algorithm); no-ops safely when run standalone outside an LMS (e.g. local preview). */
(function (global) {
  "use strict";

  function findAPI(win) {
    var attempts = 0;
    while (win && !win.API && win.parent && win.parent !== win && attempts < 10) {
      win = win.parent;
      attempts++;
    }
    return win && win.API ? win.API : null;
  }

  function locateAPI() {
    var api = findAPI(window);
    if (!api && window.opener) api = findAPI(window.opener);
    return api;
  }

  var SCORM = {
    api: null,
    initialized: false,
    standalone: true,

    init: function () {
      this.api = locateAPI();
      if (this.api) {
        var ok = this.api.LMSInitialize("");
        this.initialized = ok === "true" || ok === true;
        this.standalone = !this.initialized;
      } else {
        this.standalone = true;
      }
      return this.initialized;
    },

    setValue: function (key, value) {
      if (this.initialized && this.api) this.api.LMSSetValue(key, String(value));
    },

    getValue: function (key) {
      if (this.initialized && this.api) return this.api.LMSGetValue(key);
      return "";
    },

    commit: function () {
      if (this.initialized && this.api) this.api.LMSCommit("");
    },

    setProgress: function (fraction) {
      // SCORM 1.2 has no native progress-measure field; store it as a suspend_data breadcrumb.
      this.setValue("cmi.core.lesson_location", String(Math.round(fraction * 100)));
      this.commit();
    },

    recordScore: function (raw, max) {
      max = max || 100;
      this.setValue("cmi.core.score.raw", raw);
      this.setValue("cmi.core.score.min", 0);
      this.setValue("cmi.core.score.max", max);
      this.commit();
    },

    complete: function (passed) {
      this.setValue("cmi.core.lesson_status", passed === false ? "failed" : "completed");
      this.commit();
    },

    finish: function () {
      if (this.initialized && this.api) {
        this.commit();
        this.api.LMSFinish("");
      }
    },
  };

  global.SkarionSCORM = SCORM;
})(window);
</script>
<script>/* Skarion Course Engine — lesson player.
   Expects a global LESSON object (injected by the build script) describing intro + chunks. */
(function () {
  "use strict";

  var state = { current: 0, quizScores: {}, jeSolved: {} };
  var chunks = []; // {id, el, dotEl, kind, requiresAction}

  function $(sel, root) { return (root || document).querySelector(sel); }
  function $all(sel, root) { return Array.from((root || document).querySelectorAll(sel)); }

  function init() {
    window.SkarionSCORM.init();
    buildDom();
    goTo(0);
    window.addEventListener("keydown", function (e) {
      if (e.target.tagName === "TEXTAREA" || e.target.tagName === "SELECT" || e.target.tagName === "INPUT") return;
      if (e.key === "ArrowRight") next();
      if (e.key === "ArrowLeft") prev();
    });
  }

  function buildDom() {
    $("#module-tag").textContent = LESSON.moduleTag;
    $("#module-title").textContent = LESSON.moduleTitle;

    var rail = $("#chunk-rail");
    var stage = $("#stage-inner");

    // Screen 0: intro/hero
    chunks.push(makeScreen("intro", "Start", renderIntro(), false));
    // Screens for each content chunk
    LESSON.chunks.forEach(function (c, i) {
      var requiresAction = c.type === "quiz" || c.type === "journal_entry_builder";
      chunks.push(makeScreen("c" + i, c.railLabel || shortLabel(c.title, i + 1), renderChunk(c, i), requiresAction));
    });
    // Final screen
    chunks.push(makeScreen("done", "Done", renderComplete(), false));

    chunks.forEach(function (ch) {
      stage.appendChild(ch.el);
      rail.appendChild(ch.dotEl);
    });

    updateRail();
    updateProgress();
  }

  function shortLabel(title, n) {
    if (!title) return "Step " + n;
    return title.length > 18 ? title.slice(0, 16) + "…" : title;
  }

  function makeScreen(id, railLabel, innerHtml, requiresAction) {
    var el = document.createElement("div");
    el.className = "screen";
    el.dataset.id = id;
    el.innerHTML = innerHtml;

    var dot = document.createElement("button");
    dot.className = "chunk-dot";
    dot.textContent = railLabel;
    dot.addEventListener("click", function () { goTo(chunks.findIndex(function (c) { return c.id === id; })); });

    return { id: id, el: el, dotEl: dot, requiresAction: requiresAction, satisfied: !requiresAction };
  }

  function renderIntro() {
    var L = LESSON;
    return (
      '<div class="hero-eyebrow">' + esc(L.moduleTag) + " · " + esc(L.dayMapping || "") + '</div>' +
      '<h1 class="hero-title">' + esc(L.title) + "</h1>" +
      '<p class="hero-sub">' + esc(L.subhead) + "</p>" +
      (L.hook ? '<div class="hero-hook">' + esc(L.hook) + "</div>" : "")
    );
  }

  function renderComplete() {
    return (
      '<div class="center-screen">' +
      '<div class="complete-badge">✓</div>' +
      '<h1 class="hero-title" style="text-align:center;">Module complete</h1>' +
      '<p class="hero-sub" style="text-align:center;">' + esc(LESSON.title) + " is done. Progress has been recorded." +
      "</p></div>"
    );
  }

  function renderChunk(c, idx) {
    switch (c.type) {
      case "content": return renderContent(c);
      case "flip_cards": return renderFlipCards(c, idx);
      case "quiz": return renderQuiz(c, idx);
      case "journal_entry_builder": return renderJE(c, idx);
      case "exercise": return renderExercise(c);
      default: return "<p>Unknown chunk type.</p>";
    }
  }

  function renderContent(c) {
    var html = '<div class="chunk-kicker">' + esc(c.kicker || "Learn") + "</div>";
    html += '<h2 class="chunk-title">' + esc(c.title) + "</h2>";
    html += '<div class="prose">' + c.bodyHtml + "</div>";
    if (c.callout) {
      var icons = { tip: "💡", warning: "⚠️", story: "📎", danger: "🚫" };
      html += '<div class="callout ' + c.callout.type + '"><span class="icon">' + (icons[c.callout.type] || "•") + '</span><div>' + c.callout.html + "</div></div>";
    }
    return html;
  }

  function renderFlipCards(c, idx) {
    var html = '<div class="chunk-kicker">Quick check</div><h2 class="chunk-title">' + esc(c.title) + "</h2>";
    if (c.intro) html += '<p class="prose">' + esc(c.intro) + "</p>";
    html += '<div class="flip-grid">';
    c.cards.forEach(function (card, i) {
      html += '<div class="flip-card" onclick="this.classList.toggle(\'flipped\')">' +
        '<div class="flip-inner">' +
        '<div class="flip-face flip-front">' + esc(card.front) + "</div>" +
        '<div class="flip-face flip-back">' + esc(card.back) + "</div>" +
        "</div></div>";
    });
    html += "</div>";
    return html;
  }

  function renderQuiz(c, idx) {
    var html = '<div class="chunk-kicker">Knowledge check</div><h2 class="chunk-title">' + esc(c.title) + "</h2>";
    c.questions.forEach(function (q, qi) {
      html += '<div class="quiz-q" data-qi="' + qi + '">';
      html += '<div class="quiz-q-text">' + (qi + 1) + ". " + esc(q.q) + "</div>";
      html += '<div class="quiz-opts">';
      q.options.forEach(function (opt, oi) {
        html += '<button type="button" class="quiz-opt" onclick="SkarionPlayer.answerQuiz(' + idx + "," + qi + "," + oi + ')">' + esc(opt) + "</button>";
      });
      html += "</div>";
      html += '<div class="quiz-explain" id="explain-' + idx + "-" + qi + '">' + esc(q.explanation || "") + "</div>";
      html += "</div>";
    });
    html += '<div class="quiz-score-banner" id="score-' + idx + '"></div>';
    return html;
  }

  function renderJE(c, idx) {
    var html = '<div class="chunk-kicker">Practice: journal entry</div><h2 class="chunk-title">' + esc(c.title) + "</h2>";
    html += '<div class="je-scenario">' + c.scenarioHtml + "</div>";
    html += '<table class="je-table" id="je-table-' + idx + '"><thead><tr><th style="width:45%">Account</th><th style="width:25%">Debit</th><th style="width:25%">Credit</th><th></th></tr></thead><tbody>';
    var startRows = c.startRows || 2;
    for (var r = 0; r < startRows; r++) html += jeRowHtml(c, idx);
    html += "</tbody></table>";
    html += '<button type="button" class="je-add-row" onclick="SkarionPlayer.addJERow(' + idx + ')">+ Add line</button><br>';
    html += '<button type="button" class="je-check-btn" onclick="SkarionPlayer.checkJE(' + idx + ',' + JSON.stringify(c.solution).replace(/"/g, "&quot;") + ')">Check my entry</button>';
    html += '<div class="je-feedback" id="je-feedback-' + idx + '"></div>';
    return html;
  }

  function jeRowHtml(c, idx) {
    var opts = c.accounts.map(function (a) { return "<option>" + esc(a) + "</option>"; }).join("");
    return '<tr class="je-row"><td><select><option value="">— choose account —</option>' + opts + "</select></td>" +
      '<td><input type="number" step="0.01" placeholder="0.00"></td>' +
      '<td><input type="number" step="0.01" placeholder="0.00"></td>' +
      '<td></td></tr>';
  }

  function renderExercise(c) {
    var html = '<div class="chunk-kicker">Hands-on exercise</div><h2 class="chunk-title">' + esc(c.title) + "</h2>";
    html += '<div class="exercise-card">';
    html += '<div class="prose">' + c.instructionsHtml + "</div>";
    if (c.files && c.files.length) {
      html += '<div class="exercise-files">';
      c.files.forEach(function (f) {
        html += '<a class="file-chip" href="' + esc(f.href) + '" target="_blank" rel="noopener">📄 ' + esc(f.label) + "</a>";
      });
      html += "</div>";
    }
    if (c.reflectionPrompt) {
      html += '<div class="reflection-box"><label class="chunk-kicker" style="margin-top:14px;">' + esc(c.reflectionPrompt) + '</label><textarea placeholder="Type your notes here (saved locally in this browser only)"></textarea></div>';
    }
    html += "</div>";
    return html;
  }

  function esc(s) {
    if (s == null) return "";
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  // ---------- Interaction handlers ----------
  window.SkarionPlayer = {
    answerQuiz: function (chunkIdx, qi, oi) {
      var qDef = LESSON.chunks[chunkIdx].questions[qi];
      var qEl = $('.quiz-q[data-qi="' + qi + '"]', chunks[chunkIdx + 1].el);
      var buttons = $all(".quiz-opt", qEl);
      buttons.forEach(function (b, i) {
        b.disabled = true;
        if (i === qDef.correct_index) b.classList.add("correct");
        else if (i === oi) b.classList.add("incorrect");
      });
      $("#explain-" + chunkIdx + "-" + qi).classList.add("show");

      state.quizScores[chunkIdx] = state.quizScores[chunkIdx] || {};
      state.quizScores[chunkIdx][qi] = oi === qDef.correct_index;

      var total = LESSON.chunks[chunkIdx].questions.length;
      var answered = Object.keys(state.quizScores[chunkIdx]).length;
      if (answered === total) {
        var correct = Object.values(state.quizScores[chunkIdx]).filter(Boolean).length;
        var banner = $("#score-" + chunkIdx);
        banner.textContent = "Score: " + correct + " / " + total + (correct === total ? " — nice work." : " — review the explanations above.");
        banner.classList.add("show");
        chunks[chunkIdx + 1].satisfied = true;
        window.SkarionSCORM.recordScore(Math.round((correct / total) * 100));
        updateNav();
      }
    },

    addJERow: function (chunkIdx) {
      var c = LESSON.chunks[chunkIdx];
      var tbody = $("#je-table-" + chunkIdx + " tbody");
      var tmp = document.createElement("tbody");
      tmp.innerHTML = jeRowHtml(c, chunkIdx);
      tbody.appendChild(tmp.firstElementChild);
    },

    checkJE: function (chunkIdx, solution) {
      var rows = $all("#je-table-" + chunkIdx + " tbody tr");
      var entries = [];
      rows.forEach(function (r) {
        var sel = r.querySelector("select").value;
        var debit = parseFloat(r.querySelector("td:nth-child(2) input").value) || 0;
        var credit = parseFloat(r.querySelector("td:nth-child(3) input").value) || 0;
        if (sel && (debit || credit)) entries.push({ account: sel, debit: debit, credit: credit });
      });

      var totalDebit = entries.reduce(function (s, e) { return s + e.debit; }, 0);
      var totalCredit = entries.reduce(function (s, e) { return s + e.credit; }, 0);
      var balanced = Math.abs(totalDebit - totalCredit) < 0.01 && totalDebit > 0;

      function matches(sol) {
        return sol.every(function (line) {
          return entries.some(function (e) {
            return e.account === line.account &&
              ((line.side === "debit" && Math.abs(e.debit - line.amount) < 0.01 && e.credit === 0) ||
               (line.side === "credit" && Math.abs(e.credit - line.amount) < 0.01 && e.debit === 0));
          });
        }) && entries.length === sol.length;
      }

      var correct = balanced && matches(solution);
      var fb = $("#je-feedback-" + chunkIdx);
      fb.className = "je-feedback show " + (correct ? "correct" : "incorrect");
      if (correct) {
        fb.innerHTML = "✅ <strong>Correct.</strong> Debits and credits balance ($" + totalDebit.toFixed(2) + ") and the accounts match the expected entry.";
      } else if (!balanced) {
        fb.innerHTML = "⚠️ Debits ($" + totalDebit.toFixed(2) + ") and credits ($" + totalCredit.toFixed(2) + ") don't balance yet. Every journal entry needs total debits = total credits.";
      } else {
        fb.innerHTML = "❌ Debits and credits balance, but the accounts or amounts don't match the expected entry. Re-read the scenario and try again.";
      }
      if (correct) {
        state.jeSolved[chunkIdx] = true;
        chunks[chunkIdx + 1].satisfied = true;
        updateNav();
      }
    },
  };

  // ---------- Navigation ----------
  function goTo(i) {
    if (i < 0 || i >= chunks.length) return;
    state.current = i;
    chunks.forEach(function (c, idx) { c.el.classList.toggle("active", idx === i); });
    updateRail();
    updateProgress();
    updateNav();
    $("#stage").scrollTop = 0;
    window.SkarionSCORM.setProgress(i / (chunks.length - 1));
    if (i === chunks.length - 1) {
      window.SkarionSCORM.complete(true);
    }
  }

  function updateRail() {
    chunks.forEach(function (c, idx) {
      c.dotEl.classList.toggle("active", idx === state.current);
      c.dotEl.classList.toggle("done", idx < state.current);
    });
  }

  function updateProgress() {
    var pct = Math.round((state.current / (chunks.length - 1)) * 100);
    $("#progress-fill").style.width = pct + "%";
    $("#progress-label").textContent = pct + "%";
  }

  function updateNav() {
    var atEnd = state.current === chunks.length - 1;
    var atStart = state.current === 0;
    var cur = chunks[state.current];
    $("#nav-prev").disabled = atStart;
    $("#nav-next").disabled = atEnd || !cur.satisfied;
    $("#nav-next").textContent = atEnd ? "Done" : (cur.satisfied === false ? "Complete this step to continue" : (state.current === chunks.length - 2 ? "Finish module →" : "Continue →"));
  }

  function next() { if (!$("#nav-next").disabled) goTo(state.current + 1); }
  function prev() { if (!$("#nav-prev").disabled) goTo(state.current - 1); }

  document.addEventListener("DOMContentLoaded", function () {
    init();
    $("#nav-next").addEventListener("click", next);
    $("#nav-prev").addEventListener("click", prev);
  });
})();
</script>
