<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>The Excel Toolkit — Skarion Accounting Track</title>
<style>/* Skarion Course Engine — shared design system
   Modern, chunked micro-learning UI. Self-contained (no external fonts/CDNs) for SCORM portability. */

:root {
  --bg: #0b0d12;
  --bg-elev-1: #12151c;
  --bg-elev-2: #191d26;
  --bg-elev-3: #212633;
  --border: #262c3a;
  --border-soft: #1a1f2b;
  --text: #eef1f6;
  --text-dim: #9aa4b8;
  --text-faint: #6b7488;
  --accent: #5b8cff;
  --accent-2: #7c5cff;
  --accent-grad: linear-gradient(135deg, #5b8cff 0%, #7c5cff 100%);
  --good: #2fbf82;
  --good-bg: #10241c;
  --warn: #e8a84c;
  --warn-bg: #2a230f;
  --bad: #ef5b6f;
  --bad-bg: #2a1418;
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 22px;
  --shadow-1: 0 1px 2px rgba(0,0,0,.4), 0 8px 24px -8px rgba(0,0,0,.5);
  --shadow-2: 0 2px 8px rgba(0,0,0,.5), 0 16px 40px -12px rgba(91,140,255,.15);
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --serif-display: Georgia, "Times New Roman", serif;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg: #f5f6f9;
    --bg-elev-1: #ffffff;
    --bg-elev-2: #ffffff;
    --bg-elev-3: #eef0f5;
    --border: #e2e5ed;
    --border-soft: #edeff4;
    --text: #171a21;
    --text-dim: #565f74;
    --text-faint: #8891a3;
    --good-bg: #e7f8f0;
    --warn-bg: #fdf3e3;
    --bad-bg: #fdeaec;
    --shadow-1: 0 1px 2px rgba(20,20,40,.06), 0 8px 24px -12px rgba(20,20,40,.12);
    --shadow-2: 0 2px 10px rgba(20,20,40,.08), 0 20px 40px -20px rgba(91,140,255,.25);
  }
}

* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ---------- Top bar ---------- */
.topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 22px;
  border-bottom: 1px solid var(--border-soft);
  background: var(--bg-elev-1);
  flex-shrink: 0;
}
.topbar .module-tag {
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--text-faint);
  white-space: nowrap;
}
.topbar .module-title {
  font-weight: 650;
  font-size: .95rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.progress-track {
  flex: 1;
  height: 6px;
  background: var(--bg-elev-3);
  border-radius: 99px;
  overflow: hidden;
  min-width: 60px;
}
.progress-fill {
  height: 100%;
  background: var(--accent-grad);
  border-radius: 99px;
  transition: width .4s cubic-bezier(.4,0,.2,1);
  width: 0%;
}
.progress-label { font-size: .78rem; color: var(--text-dim); white-space: nowrap; font-variant-numeric: tabular-nums; }

/* ---------- Chunk rail (dots) ---------- */
.chunk-rail {
  display: flex;
  gap: 6px;
  padding: 10px 22px;
  overflow-x: auto;
  flex-shrink: 0;
  background: var(--bg-elev-1);
  border-bottom: 1px solid var(--border-soft);
}
.chunk-dot {
  flex-shrink: 0;
  padding: 6px 12px;
  border-radius: 99px;
  font-size: .74rem;
  font-weight: 600;
  color: var(--text-faint);
  background: var(--bg-elev-3);
  border: 1px solid transparent;
  cursor: pointer;
  transition: all .15s ease;
  white-space: nowrap;
}
.chunk-dot:hover { color: var(--text); }
.chunk-dot.active { background: var(--accent-grad); color: #fff; }
.chunk-dot.done { color: var(--good); border-color: var(--good); }
.chunk-dot.done.active { color: #fff; border-color: transparent; }

/* ---------- Stage ---------- */
.stage {
  flex: 1;
  overflow-y: auto;
  padding: 40px 22px 120px;
  display: flex;
  justify-content: center;
}
.stage-inner { width: 100%; max-width: 760px; }

.screen { display: none; animation: rise .35s cubic-bezier(.16,1,.3,1); }
.screen.active { display: block; }
@keyframes rise { from { opacity:0; transform: translateY(14px);} to {opacity:1; transform:none;} }

/* ---------- Intro / hero screen ---------- */
.hero-eyebrow { font-size: .78rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
.hero-title { font-size: 2.1rem; font-weight: 750; line-height: 1.15; margin: 0 0 14px; letter-spacing: -.01em; }
.hero-sub { font-size: 1.08rem; color: var(--text-dim); line-height: 1.6; margin: 0 0 22px; }
.hero-hook {
  padding: 18px 22px;
  border-radius: var(--radius-md);
  background: var(--bg-elev-2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  font-size: .96rem;
  color: var(--text-dim);
  font-style: italic;
}

/* ---------- Content chunk ---------- */
.chunk-title { font-size: 1.5rem; font-weight: 700; margin: 0 0 6px; letter-spacing: -.01em; }
.chunk-kicker { font-size: .8rem; font-weight: 700; color: var(--text-faint); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
.prose { font-size: 1rem; line-height: 1.75; color: var(--text); }
.prose p { margin: 0 0 14px; }
.prose strong { color: var(--text); }
.prose ul, .prose ol { padding-left: 22px; margin: 0 0 14px; }
.prose li { margin-bottom: 6px; }
.prose code { background: var(--bg-elev-3); padding: 1px 6px; border-radius: 5px; font-size: .9em; }

.callout {
  margin: 18px 0;
  padding: 16px 18px;
  border-radius: var(--radius-md);
  font-size: .92rem;
  line-height: 1.6;
  display: flex;
  gap: 12px;
}
.callout .icon { flex-shrink: 0; font-size: 1.2rem; line-height: 1.4; }
.callout.tip { background: var(--good-bg); color: var(--text); border: 1px solid rgba(47,191,130,.25); }
.callout.warning { background: var(--warn-bg); color: var(--text); border: 1px solid rgba(232,168,76,.3); }
.callout.story { background: var(--bg-elev-2); border: 1px solid var(--border); border-left: 3px solid var(--accent-2); }
.callout.danger { background: var(--bad-bg); color: var(--text); border: 1px solid rgba(239,91,111,.3); }

table.data { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: .88rem; }
table.data th, table.data td { padding: 8px 12px; border: 1px solid var(--border); text-align: left; }
table.data th { background: var(--bg-elev-2); font-weight: 650; }
table.data tr:nth-child(even) td { background: var(--bg-elev-1); }

/* ---------- Flip cards ---------- */
.flip-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; margin-top: 16px; }
.flip-card { perspective: 1000px; height: 150px; cursor: pointer; }
.flip-inner { position: relative; width: 100%; height: 100%; transition: transform .5s cubic-bezier(.4,0,.2,1); transform-style: preserve-3d; }
.flip-card.flipped .flip-inner { transform: rotateY(180deg); }
.flip-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: var(--radius-md); padding: 16px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: .92rem; border: 1px solid var(--border); box-shadow: var(--shadow-1); }
.flip-front { background: var(--bg-elev-2); font-weight: 650; }
.flip-front::after { content: "tap to flip"; position:absolute; bottom:8px; font-size:.65rem; color:var(--text-faint); font-weight:400; }
.flip-back { background: var(--accent-grad); color: #fff; transform: rotateY(180deg); line-height: 1.4; }

/* ---------- Quiz ---------- */
.quiz-q { margin-bottom: 26px; }
.quiz-q-text { font-weight: 650; font-size: 1.02rem; margin-bottom: 12px; }
.quiz-opts { display: flex; flex-direction: column; gap: 8px; }
.quiz-opt {
  text-align: left;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-elev-2);
  color: var(--text);
  font-size: .92rem;
  cursor: pointer;
  transition: all .15s ease;
}
.quiz-opt:hover:not(:disabled) { border-color: var(--accent); }
.quiz-opt.correct { background: var(--good-bg); border-color: var(--good); }
.quiz-opt.incorrect { background: var(--bad-bg); border-color: var(--bad); }
.quiz-opt:disabled { cursor: default; opacity: .85; }
.quiz-explain { margin-top: 10px; padding: 12px 14px; border-radius: var(--radius-sm); background: var(--bg-elev-2); font-size: .88rem; color: var(--text-dim); display: none; }
.quiz-explain.show { display: block; }
.quiz-score-banner { padding: 16px 18px; border-radius: var(--radius-md); background: var(--bg-elev-2); border: 1px solid var(--border); text-align: center; font-weight: 650; margin-top: 10px; display:none; }
.quiz-score-banner.show { display: block; }

/* ---------- Journal entry builder ---------- */
.je-scenario { background: var(--bg-elev-2); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px 18px; margin-bottom: 18px; font-size: .94rem; line-height: 1.6; }
.je-table { width: 100%; border-collapse: collapse; margin-bottom: 14px; }
.je-table th { text-align: left; font-size: .74rem; text-transform: uppercase; letter-spacing: .05em; color: var(--text-faint); padding: 4px 8px; }
.je-row td { padding: 5px 8px; }
.je-row select, .je-row input {
  width: 100%; padding: 8px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--bg-elev-1); color: var(--text); font-family: var(--font); font-size: .88rem;
}
.je-row select:focus, .je-row input:focus { outline: none; border-color: var(--accent); }
.je-add-row { background: transparent; border: 1px dashed var(--border); color: var(--text-dim); padding: 8px 14px; border-radius: var(--radius-sm); cursor: pointer; font-size: .85rem; margin-bottom: 14px; }
.je-add-row:hover { border-color: var(--accent); color: var(--text); }
.je-check-btn { background: var(--accent-grad); color: #fff; border: none; padding: 10px 20px; border-radius: var(--radius-sm); font-weight: 650; cursor: pointer; font-size: .9rem; }
.je-feedback { margin-top: 14px; padding: 14px 16px; border-radius: var(--radius-md); font-size: .9rem; display: none; }
.je-feedback.show { display: block; }
.je-feedback.correct { background: var(--good-bg); border: 1px solid rgba(47,191,130,.3); }
.je-feedback.incorrect { background: var(--bad-bg); border: 1px solid rgba(239,91,111,.3); }

/* ---------- Exercise ---------- */
.exercise-card { background: var(--bg-elev-2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 22px; margin-top: 14px; }
.exercise-files { display: flex; flex-wrap: wrap; gap: 10px; margin: 16px 0; }
.file-chip { display: flex; align-items: center; gap: 8px; padding: 9px 14px; border-radius: 99px; background: var(--bg-elev-3); border: 1px solid var(--border); font-size: .85rem; text-decoration: none; color: var(--text); transition: all .15s; }
.file-chip:hover { border-color: var(--accent); }
.reflection-box textarea {
  width: 100%; min-height: 90px; margin-top: 10px; padding: 12px 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--bg-elev-1); color: var(--text); font-family: var(--font); font-size: .9rem; resize: vertical;
}

/* ---------- Nav bar ---------- */
.navbar {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; justify-content: center;
  padding: 16px 22px calc(16px + env(safe-area-inset-bottom));
  background: linear-gradient(0deg, var(--bg) 55%, transparent);
  pointer-events: none;
}
.navbar-inner { pointer-events: auto; display: flex; gap: 10px; width: 100%; max-width: 760px; }
.nav-btn {
  flex: 1; padding: 13px 20px; border-radius: var(--radius-md); border: 1px solid var(--border);
  font-weight: 650; font-size: .92rem; cursor: pointer; transition: all .15s ease;
  background: var(--bg-elev-2); color: var(--text);
}
.nav-btn.primary { background: var(--accent-grad); color: #fff; border: none; box-shadow: var(--shadow-2); }
.nav-btn.primary:hover { filter: brightness(1.08); }
.nav-btn:disabled { opacity: .35; cursor: not-allowed; }
.nav-btn.secondary { flex: 0 0 auto; padding: 13px 18px; }

/* ---------- Completion screen ---------- */
.complete-badge { width: 74px; height: 74px; border-radius: 50%; background: var(--accent-grad); display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 20px; box-shadow: var(--shadow-2); }
.center-screen { text-align: center; padding-top: 40px; }

@media (max-width: 640px) {
  .stage { padding: 24px 16px 120px; }
  .hero-title { font-size: 1.6rem; }
  .topbar { padding: 12px 16px; }
  .topbar .module-title { display: none; }
}
</style>

</div>
<script>window.LESSON = {"title": "The Excel Toolkit", "moduleTag": "Module 07 · Skarion Manufacturing LLC", "moduleTitle": "The Excel Toolkit", "dayMapping": "Day 7 of the 10-day path", "subhead": "QuickBooks does the posting. Excel does the thinking. Every reconciliation, aging report, and dashboard you've built so far ran on five formulas repeated with discipline.", "hook": "\"What's your Excel level?\" is asked in nearly every accounting interview, and it isn't small talk — it's a filter. This module opens the hood on the templates you've already been using and shows you exactly why they work.", "chunks": [{"type": "content", "kicker": "Why it matters", "title": "QuickBooks runs the books. Excel runs the job search.", "bodyHtml": "<p>It would be easy to assume that once a company is on QuickBooks, Excel becomes optional. The market research behind this course says otherwise: <strong>roughly 90% of entry-level accounting and bookkeeping job postings analyzed for this course explicitly name Excel</strong> as a required or strongly preferred skill — more often than any specific accounting software, including QuickBooks itself.</p><p>The reason is structural, not nostalgic. QuickBooks is excellent at recording transactions and holding the single source of truth. It is clumsy at the analysis layer — aging buckets, multi-way variance tables, reconciliation workpapers, dashboards you can hand to a controller mid-meeting. That analysis layer is built in Excel, exported from QuickBooks or built alongside it, in nearly every small-to-midsize company's monthly close.</p><p>Every template in Modules 03 through 05 — the bank reconciliation, the AR and AP aging, the expense dashboard, the close checklist — is exactly that analysis layer. This module doesn't teach new tasks. It teaches you to read the formulas already doing the work, so you can explain them fluently in an interview and rebuild them from scratch on day one of a real job.</p>", "callout": {"type": "tip", "html": "<strong>Interview framing:</strong> when asked about your Excel level, don't say \"intermediate.\" Say what you can actually do: \"I've built SUMIFS-based aging reports, COUNTIFS-based reconciliation matching, and nested-IF bucket logic for a manufacturing company's monthly close.\" Specificity beats a self-rating every time."}}, {"type": "flip_cards", "title": "The 8 functions that run this entire course", "railLabel": "Flip cards", "cards": [{"front": "SUMIFS()", "back": "Adds up a range of numbers, but only the rows that match one or more conditions — e.g. every open invoice for one customer that also falls in the \"31-60\" bucket. It's the workhorse behind the aging reports and the expense dashboard's category-by-month tables."}, {"front": "COUNTIFS()", "back": "Counts rows that match one or more conditions, instead of summing them. The bank reconciliation template uses it to count how many times a transaction's match-key appears on the other sheet — zero means unmatched, one means matched, more than one flags a possible duplicate."}, {"front": "Nested IF()", "back": "Chains multiple true/false tests so a value falls into exactly one category. The AR and AP aging reports nest four IFs deep to sort each invoice into Current, 1-30, 31-60, 61-90, or 90+ days past due, based on a single days-past-due number."}, {"front": "VLOOKUP() / XLOOKUP()", "back": "Pulls a value from one table into another by matching on a shared key (like a customer name or invoice number). VLOOKUP is the classic, widely-supported version; XLOOKUP is the newer, more flexible successor increasingly requested in 2026 job postings."}, {"front": "TEXT() match-keys", "back": "Converts a date and amount into a single comparable text string, like \"20260102|4200.00\". Two systems that store dates or numbers slightly differently can't be matched directly — but their TEXT() versions can. This is the trick behind the bank reconciliation's auto-flagging."}, {"front": "MAX(0, ...)", "back": "Floors a calculation at zero so it never goes negative. Used to make sure an open invoice balance (Original Amount − Payments Received) never shows as a negative number if a customer overpays."}, {"front": "Conditional formatting", "back": "Automatically colors or highlights cells based on their value — red for \"Unmatched,\" yellow for \"Possible Duplicate,\" green for \"Matched.\" It turns a wall of numbers into something you can scan in three seconds, which is exactly what a controller needs during a close."}, {"front": "SUM() with ranges", "back": "The simplest function on this list, but the one that ties every reconciliation together — adding a full column or row of activity, like all of a month's bank transactions, to roll forward a beginning balance into an ending balance."}]}, {"type": "content", "kicker": "How it actually works", "title": "The bank reconciliation's auto-flagging trick, unpacked", "bodyHtml": "<p>Open <code>Template_01_Bank_Reconciliation_Worksheet.xlsx</code> and look at column G on both the <code>Bank_Import</code> and <code>GL_Import</code> sheets. Every row builds a <strong>match key</strong> with this formula:</p><p><code>=TEXT(A5,\"yyyymmdd\")&\"|\"&TEXT(ROUND(ABS(F5),2),\"0.00\")</code></p><p>In plain English: take the transaction date, format it as a plain 8-digit string like <code>20260102</code>, glue on a pipe character, then glue on the transaction's absolute dollar amount rounded to two decimals, like <code>4200.00</code>. The result is a single text string — <code>20260102|4200.00</code> — that represents \"this date, this amount,\" with no ambiguity about date formats, positive/negative signs, or floating-point rounding.</p><p>Once every row on both sheets has a match key, column H counts how many times that exact key shows up on the <em>other</em> sheet: <code>=COUNTIFS(GL_Import!$G$5:$G$45,G5)</code>. Column I then turns that count into a plain-English status: <code>=IF(H5=0,\"Unmatched\",IF(H5&gt;1,\"Possible Duplicate\",\"Matched\"))</code>. Zero hits means nothing on the other side matches — an outstanding check or a deposit in transit. More than one hit means the same date-and-amount combination appears more than once, which is exactly how the template catches the accidental duplicate GL entry <code>DEP-1001-DUP</code> in the sample data.</p><p>This is why the <code>Reconciliation</code> sheet needed a new line: <strong>\"Less: Duplicate Book Entries.\"</strong> The COUNTIFS logic correctly flagged the $4,200 duplicate receipt as \"Possible Duplicate,\" but flagging isn't correcting — a human still has to confirm it's a real duplicate (not a coincidence) and back it out of the adjusted book balance. Once that $4,200 duplicate is subtracted on row 16, the reconciliation difference on row 19 correctly lands at $0.00. The formulas find the problem; the accountant decides what to do about it.</p>", "callout": {"type": "story", "html": "<strong>Why not just match on amount alone?</strong> Because plenty of unrelated transactions share a dollar amount by coincidence — two different $2,190 payments to two different vendors, for instance. Combining date AND amount into one key makes false-positive matches far less likely, which is exactly the kind of design decision that separates a template someone can trust from one that just looks automated."}}, {"type": "content", "kicker": "How it actually works", "title": "The AR/AP aging bucket logic", "bodyHtml": "<p><code>Template_02_AR_Aging_Report.xlsx</code> and <code>Template_03_AP_Aging_Report.xlsx</code> share the same two-step logic. Step one, on the invoice detail sheet, calculates days past due: <code>=IF(H5=0,0,MAX(0,AR_Aging_Report!$B$4-E5))</code>. Read it right to left: take the report's \"As Of Date\" (cell B4) and subtract the invoice's due date (E5) — that's how many days overdue it is. Wrap it in <code>MAX(0, ...)</code> so an invoice that isn't due yet never shows a negative number of days past due. Wrap that in an outer <code>IF</code> so a fully-paid invoice (open balance H5 = 0) always shows 0 days, regardless of its due date.</p><p>Step two sorts that days-past-due number into a bucket with a nested IF chain: <code>=IF(H5=0,\"Paid\",IF(I5=0,\"Current\",IF(I5&lt;=30,\"1-30\",IF(I5&lt;=60,\"31-60\",IF(I5&lt;=90,\"61-90\",\"90+\")))))</code>. Each IF only fires if every test before it failed — so an invoice 45 days past due skips \"Paid,\" skips \"Current,\" skips \"1-30\" (45 is not ≤ 30), and lands on \"31-60\" (45 ≤ 60). Order matters here: the tests have to run from smallest to largest, or a 90-day-overdue invoice would incorrectly get caught by an earlier, looser test.</p><p>Once every invoice has a bucket label, the summary tables use SUMIFS twice: once to total each bucket across all customers (<code>=SUMIFS(Customer_Invoices!$H$5:$H$34,Customer_Invoices!$J$5:$J$34,A9)</code>), and once to build a customer-by-bucket grid that adds a second condition for the customer name. That's the same nested-IF-then-SUMIFS pattern doing double duty — sort first, then total by group.</p>"}, {"type": "quiz", "title": "Check your understanding", "questions": [{"q": "In the bank reconciliation's match key formula, =TEXT(A5,\"yyyymmdd\")&\"|\"&TEXT(ROUND(ABS(F5),2),\"0.00\"), why combine date AND amount instead of just matching on amount alone?", "options": ["Matching on amount alone is not technically possible in Excel", "Combining both makes coincidental matches between unrelated transactions far less likely", "TEXT() only works when two arguments are joined with an ampersand", "Dates must always be converted to text before they can be used in any formula"], "correct_index": 1, "explanation": "Two unrelated transactions can easily share a dollar amount by coincidence. Requiring the same date AND the same amount to match dramatically reduces false-positive matches."}, {"q": "In GL_Import, COUNTIFS(Bank_Import!$G$5:$G$45,G5) returns 2 for a transaction. What does that mean, and what should happen next?", "options": ["The transaction cleared twice as fast as normal — no action needed", "The match key appears twice on the Bank_Import sheet, so the row is flagged \"Possible Duplicate\" for a human to investigate", "There is a formula error and the sheet needs to be rebuilt", "The transaction should automatically be deleted from GL_Import"], "correct_index": 1, "explanation": "A count greater than 1 means the same date-and-amount match key shows up more than once on the other sheet. The formula flags it as a possible duplicate; it does not decide or correct anything — that judgment call, and the resulting adjustment, is the accountant's job."}, {"q": "An invoice is 61 days past its due date. Walking through =IF(H5=0,\"Paid\",IF(I5=0,\"Current\",IF(I5<=30,\"1-30\",IF(I5<=60,\"31-60\",IF(I5<=90,\"61-90\",\"90+\"))))), which bucket does it land in, and why?", "options": ["\"31-60\", because 61 is close enough to round down", "\"90+\", because the formula always defaults to the largest bucket", "\"61-90\", because it fails every earlier test (not paid, not current, not ≤30, not ≤60) until it reaches a test it passes (≤90)", "\"Current\", because the invoice was originally due on time"], "correct_index": 2, "explanation": "Nested IFs evaluate in order and stop at the first TRUE test. 61 fails the ≤30 and ≤60 checks but passes ≤90, so it lands in \"61-90\". The bucket order has to run smallest-to-largest for this logic to work correctly."}]}, {"type": "exercise", "title": "Run a full month's close on Skarion's own numbers", "instructionsHtml": "<p>You've already worked with pieces of Skarion Manufacturing LLC's data in earlier modules. Now put the full toolkit to work in one pass:</p><ol><li>Open the <strong>Bank Reconciliation Worksheet</strong> and confirm the adjusted bank and book balances tie out to $0.00 once the duplicate book entry is backed out on the \"Less: Duplicate Book Entries\" line.</li><li>Open the <strong>AR Aging</strong> and <strong>AP Aging</strong> reports and identify which customers and vendors have anything sitting in the 61-90 or 90+ buckets — these are the ones you'd flag to a controller first.</li><li>Open the <strong>Expense Analysis Dashboard</strong> and review the KPIs, the category-by-month and vendor-by-total SUMIFS tables, and all three embedded charts, including the newly added vendor chart.</li><li>Open the <strong>Month-End Close Checklist</strong> and walk all 30 tasks across the 15 functional areas, confirming the formula-driven status summary reflects a complete close.</li><li>Write a one-paragraph summary, as if handing it to a controller, of Skarion's month-end financial position: cash reconciliation status, AR/AP risk, and the top expense drivers.</li></ol>", "files": [{"label": "Bank Reconciliation Worksheet", "href": "/download/07-excel-toolkit/Template_01_Bank_Reconciliation_Worksheet.xlsx"}, {"label": "AR Aging Report", "href": "/download/07-excel-toolkit/Template_02_AR_Aging_Report.xlsx"}, {"label": "AP Aging Report", "href": "/download/07-excel-toolkit/Template_03_AP_Aging_Report.xlsx"}, {"label": "Expense Analysis Dashboard", "href": "/download/07-excel-toolkit/Template_04_Expense_Analysis_Dashboard.xlsx"}, {"label": "Month-End Close Checklist", "href": "/download/07-excel-toolkit/Template_05_Month_End_Close_Checklist.xlsx"}], "reflectionPrompt": "Which single formula pattern from this module — the TEXT() match-key, the nested-IF aging bucket, or the SUMIFS summary table — do you feel most confident explaining out loud in an interview, and which one needs more practice?"}, {"type": "content", "kicker": "Looking ahead", "title": "What these templates don't teach — and why that's your next move", "bodyHtml": "<p>Every table in this module's templates is built with SUMIFS, COUNTIFS, and nested IFs — functions that produce a \"pivot-style\" summary by writing out the logic explicitly, row by row and condition by condition. That's deliberate: it's the version of Excel every hiring manager can open and understand immediately, on any version of Excel, with zero setup.</p><p>But it's not the only way professionals summarize data. Native Excel <strong>PivotTables</strong> — and functions like <strong>XLOOKUP</strong> — do a lot of the same work with less manual formula-writing, and job postings are increasingly naming them by 2026, especially at larger companies with heavier reporting volume. XLOOKUP in particular is quickly replacing VLOOKUP as the expected lookup function in job descriptions, since it can search in either direction and handles missing matches more gracefully.</p>", "callout": {"type": "tip", "html": "<strong>Extension skill, not required for this course:</strong> once you're comfortable with the SUMIFS-based tables in these templates, it's worth practicing PivotTables and XLOOKUP on your own using this same Skarion data. They're not covered in these templates on purpose — but naming them specifically in an interview (\"I also build PivotTables and use XLOOKUP for lookups\") signals you're current with where Excel is headed, not just where it's been."}}]};</script>
<script>/* Minimal SCORM 1.2 wrapper. Finds the LMS API in a parent/opener window (standard SCORM
   discovery algorithm); no-ops safely when run standalone outside an LMS (e.g. local preview). */
(function (global) {
  "use strict";

  function findAPI(win) {
    var attempts = 0;
    while (win && !win.API && win.parent && win.parent !== win && attempts < 10) {
      win = win.parent;
      attempts++;
    }
    return win && win.API ? win.API : null;
  }

  function locateAPI() {
    var api = findAPI(window);
    if (!api && window.opener) api = findAPI(window.opener);
    return api;
  }

  var SCORM = {
    api: null,
    initialized: false,
    standalone: true,

    init: function () {
      this.api = locateAPI();
      if (this.api) {
        var ok = this.api.LMSInitialize("");
        this.initialized = ok === "true" || ok === true;
        this.standalone = !this.initialized;
      } else {
        this.standalone = true;
      }
      return this.initialized;
    },

    setValue: function (key, value) {
      if (this.initialized && this.api) this.api.LMSSetValue(key, String(value));
    },

    getValue: function (key) {
      if (this.initialized && this.api) return this.api.LMSGetValue(key);
      return "";
    },

    commit: function () {
      if (this.initialized && this.api) this.api.LMSCommit("");
    },

    setProgress: function (fraction) {
      // SCORM 1.2 has no native progress-measure field; store it as a suspend_data breadcrumb.
      this.setValue("cmi.core.lesson_location", String(Math.round(fraction * 100)));
      this.commit();
    },

    recordScore: function (raw, max) {
      max = max || 100;
      this.setValue("cmi.core.score.raw", raw);
      this.setValue("cmi.core.score.min", 0);
      this.setValue("cmi.core.score.max", max);
      this.commit();
    },

    complete: function (passed) {
      this.setValue("cmi.core.lesson_status", passed === false ? "failed" : "completed");
      this.commit();
    },

    finish: function () {
      if (this.initialized && this.api) {
        this.commit();
        this.api.LMSFinish("");
      }
    },
  };

  global.SkarionSCORM = SCORM;
})(window);
</script>
<script>/* Skarion Course Engine — lesson player.
   Expects a global LESSON object (injected by the build script) describing intro + chunks. */
(function () {
  "use strict";

  var state = { current: 0, quizScores: {}, jeSolved: {} };
  var chunks = []; // {id, el, dotEl, kind, requiresAction}

  function $(sel, root) { return (root || document).querySelector(sel); }
  function $all(sel, root) { return Array.from((root || document).querySelectorAll(sel)); }

  function init() {
    window.SkarionSCORM.init();
    buildDom();
    goTo(0);
    window.addEventListener("keydown", function (e) {
      if (e.target.tagName === "TEXTAREA" || e.target.tagName === "SELECT" || e.target.tagName === "INPUT") return;
      if (e.key === "ArrowRight") next();
      if (e.key === "ArrowLeft") prev();
    });
  }

  function buildDom() {
    $("#module-tag").textContent = LESSON.moduleTag;
    $("#module-title").textContent = LESSON.moduleTitle;

    var rail = $("#chunk-rail");
    var stage = $("#stage-inner");

    // Screen 0: intro/hero
    chunks.push(makeScreen("intro", "Start", renderIntro(), false));
    // Screens for each content chunk
    LESSON.chunks.forEach(function (c, i) {
      var requiresAction = c.type === "quiz" || c.type === "journal_entry_builder";
      chunks.push(makeScreen("c" + i, c.railLabel || shortLabel(c.title, i + 1), renderChunk(c, i), requiresAction));
    });
    // Final screen
    chunks.push(makeScreen("done", "Done", renderComplete(), false));

    chunks.forEach(function (ch) {
      stage.appendChild(ch.el);
      rail.appendChild(ch.dotEl);
    });

    updateRail();
    updateProgress();
  }

  function shortLabel(title, n) {
    if (!title) return "Step " + n;
    return title.length > 18 ? title.slice(0, 16) + "…" : title;
  }

  function makeScreen(id, railLabel, innerHtml, requiresAction) {
    var el = document.createElement("div");
    el.className = "screen";
    el.dataset.id = id;
    el.innerHTML = innerHtml;

    var dot = document.createElement("button");
    dot.className = "chunk-dot";
    dot.textContent = railLabel;
    dot.addEventListener("click", function () { goTo(chunks.findIndex(function (c) { return c.id === id; })); });

    return { id: id, el: el, dotEl: dot, requiresAction: requiresAction, satisfied: !requiresAction };
  }

  function renderIntro() {
    var L = LESSON;
    return (
      '<div class="hero-eyebrow">' + esc(L.moduleTag) + " · " + esc(L.dayMapping || "") + '</div>' +
      '<h1 class="hero-title">' + esc(L.title) + "</h1>" +
      '<p class="hero-sub">' + esc(L.subhead) + "</p>" +
      (L.hook ? '<div class="hero-hook">' + esc(L.hook) + "</div>" : "")
    );
  }

  function renderComplete() {
    return (
      '<div class="center-screen">' +
      '<div class="complete-badge">✓</div>' +
      '<h1 class="hero-title" style="text-align:center;">Module complete</h1>' +
      '<p class="hero-sub" style="text-align:center;">' + esc(LESSON.title) + " is done. Progress has been recorded." +
      "</p></div>"
    );
  }

  function renderChunk(c, idx) {
    switch (c.type) {
      case "content": return renderContent(c);
      case "flip_cards": return renderFlipCards(c, idx);
      case "quiz": return renderQuiz(c, idx);
      case "journal_entry_builder": return renderJE(c, idx);
      case "exercise": return renderExercise(c);
      default: return "<p>Unknown chunk type.</p>";
    }
  }

  function renderContent(c) {
    var html = '<div class="chunk-kicker">' + esc(c.kicker || "Learn") + "</div>";
    html += '<h2 class="chunk-title">' + esc(c.title) + "</h2>";
    html += '<div class="prose">' + c.bodyHtml + "</div>";
    if (c.callout) {
      var icons = { tip: "💡", warning: "⚠️", story: "📎", danger: "🚫" };
      html += '<div class="callout ' + c.callout.type + '"><span class="icon">' + (icons[c.callout.type] || "•") + '</span><div>' + c.callout.html + "</div></div>";
    }
    return html;
  }

  function renderFlipCards(c, idx) {
    var html = '<div class="chunk-kicker">Quick check</div><h2 class="chunk-title">' + esc(c.title) + "</h2>";
    if (c.intro) html += '<p class="prose">' + esc(c.intro) + "</p>";
    html += '<div class="flip-grid">';
    c.cards.forEach(function (card, i) {
      html += '<div class="flip-card" onclick="this.classList.toggle(\'flipped\')">' +
        '<div class="flip-inner">' +
        '<div class="flip-face flip-front">' + esc(card.front) + "</div>" +
        '<div class="flip-face flip-back">' + esc(card.back) + "</div>" +
        "</div></div>";
    });
    html += "</div>";
    return html;
  }

  function renderQuiz(c, idx) {
    var html = '<div class="chunk-kicker">Knowledge check</div><h2 class="chunk-title">' + esc(c.title) + "</h2>";
    c.questions.forEach(function (q, qi) {
      html += '<div class="quiz-q" data-qi="' + qi + '">';
      html += '<div class="quiz-q-text">' + (qi + 1) + ". " + esc(q.q) + "</div>";
      html += '<div class="quiz-opts">';
      q.options.forEach(function (opt, oi) {
        html += '<button type="button" class="quiz-opt" onclick="SkarionPlayer.answerQuiz(' + idx + "," + qi + "," + oi + ')">' + esc(opt) + "</button>";
      });
      html += "</div>";
      html += '<div class="quiz-explain" id="explain-' + idx + "-" + qi + '">' + esc(q.explanation || "") + "</div>";
      html += "</div>";
    });
    html += '<div class="quiz-score-banner" id="score-' + idx + '"></div>';
    return html;
  }

  function renderJE(c, idx) {
    var html = '<div class="chunk-kicker">Practice: journal entry</div><h2 class="chunk-title">' + esc(c.title) + "</h2>";
    html += '<div class="je-scenario">' + c.scenarioHtml + "</div>";
    html += '<table class="je-table" id="je-table-' + idx + '"><thead><tr><th style="width:45%">Account</th><th style="width:25%">Debit</th><th style="width:25%">Credit</th><th></th></tr></thead><tbody>';
    var startRows = c.startRows || 2;
    for (var r = 0; r < startRows; r++) html += jeRowHtml(c, idx);
    html += "</tbody></table>";
    html += '<button type="button" class="je-add-row" onclick="SkarionPlayer.addJERow(' + idx + ')">+ Add line</button><br>';
    html += '<button type="button" class="je-check-btn" onclick="SkarionPlayer.checkJE(' + idx + ',' + JSON.stringify(c.solution).replace(/"/g, "&quot;") + ')">Check my entry</button>';
    html += '<div class="je-feedback" id="je-feedback-' + idx + '"></div>';
    return html;
  }

  function jeRowHtml(c, idx) {
    var opts = c.accounts.map(function (a) { return "<option>" + esc(a) + "</option>"; }).join("");
    return '<tr class="je-row"><td><select><option value="">— choose account —</option>' + opts + "</select></td>" +
      '<td><input type="number" step="0.01" placeholder="0.00"></td>' +
      '<td><input type="number" step="0.01" placeholder="0.00"></td>' +
      '<td></td></tr>';
  }

  function renderExercise(c) {
    var html = '<div class="chunk-kicker">Hands-on exercise</div><h2 class="chunk-title">' + esc(c.title) + "</h2>";
    html += '<div class="exercise-card">';
    html += '<div class="prose">' + c.instructionsHtml + "</div>";
    if (c.files && c.files.length) {
      html += '<div class="exercise-files">';
      c.files.forEach(function (f) {
        html += '<a class="file-chip" href="' + esc(f.href) + '" target="_blank" rel="noopener">📄 ' + esc(f.label) + "</a>";
      });
      html += "</div>";
    }
    if (c.reflectionPrompt) {
      html += '<div class="reflection-box"><label class="chunk-kicker" style="margin-top:14px;">' + esc(c.reflectionPrompt) + '</label><textarea placeholder="Type your notes here (saved locally in this browser only)"></textarea></div>';
    }
    html += "</div>";
    return html;
  }

  function esc(s) {
    if (s == null) return "";
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  // ---------- Interaction handlers ----------
  window.SkarionPlayer = {
    answerQuiz: function (chunkIdx, qi, oi) {
      var qDef = LESSON.chunks[chunkIdx].questions[qi];
      var qEl = $('.quiz-q[data-qi="' + qi + '"]', chunks[chunkIdx + 1].el);
      var buttons = $all(".quiz-opt", qEl);
      buttons.forEach(function (b, i) {
        b.disabled = true;
        if (i === qDef.correct_index) b.classList.add("correct");
        else if (i === oi) b.classList.add("incorrect");
      });
      $("#explain-" + chunkIdx + "-" + qi).classList.add("show");

      state.quizScores[chunkIdx] = state.quizScores[chunkIdx] || {};
      state.quizScores[chunkIdx][qi] = oi === qDef.correct_index;

      var total = LESSON.chunks[chunkIdx].questions.length;
      var answered = Object.keys(state.quizScores[chunkIdx]).length;
      if (answered === total) {
        var correct = Object.values(state.quizScores[chunkIdx]).filter(Boolean).length;
        var banner = $("#score-" + chunkIdx);
        banner.textContent = "Score: " + correct + " / " + total + (correct === total ? " — nice work." : " — review the explanations above.");
        banner.classList.add("show");
        chunks[chunkIdx + 1].satisfied = true;
        window.SkarionSCORM.recordScore(Math.round((correct / total) * 100));
        updateNav();
      }
    },

    addJERow: function (chunkIdx) {
      var c = LESSON.chunks[chunkIdx];
      var tbody = $("#je-table-" + chunkIdx + " tbody");
      var tmp = document.createElement("tbody");
      tmp.innerHTML = jeRowHtml(c, chunkIdx);
      tbody.appendChild(tmp.firstElementChild);
    },

    checkJE: function (chunkIdx, solution) {
      var rows = $all("#je-table-" + chunkIdx + " tbody tr");
      var entries = [];
      rows.forEach(function (r) {
        var sel = r.querySelector("select").value;
        var debit = parseFloat(r.querySelector("td:nth-child(2) input").value) || 0;
        var credit = parseFloat(r.querySelector("td:nth-child(3) input").value) || 0;
        if (sel && (debit || credit)) entries.push({ account: sel, debit: debit, credit: credit });
      });

      var totalDebit = entries.reduce(function (s, e) { return s + e.debit; }, 0);
      var totalCredit = entries.reduce(function (s, e) { return s + e.credit; }, 0);
      var balanced = Math.abs(totalDebit - totalCredit) < 0.01 && totalDebit > 0;

      function matches(sol) {
        return sol.every(function (line) {
          return entries.some(function (e) {
            return e.account === line.account &&
              ((line.side === "debit" && Math.abs(e.debit - line.amount) < 0.01 && e.credit === 0) ||
               (line.side === "credit" && Math.abs(e.credit - line.amount) < 0.01 && e.debit === 0));
          });
        }) && entries.length === sol.length;
      }

      var correct = balanced && matches(solution);
      var fb = $("#je-feedback-" + chunkIdx);
      fb.className = "je-feedback show " + (correct ? "correct" : "incorrect");
      if (correct) {
        fb.innerHTML = "✅ <strong>Correct.</strong> Debits and credits balance ($" + totalDebit.toFixed(2) + ") and the accounts match the expected entry.";
      } else if (!balanced) {
        fb.innerHTML = "⚠️ Debits ($" + totalDebit.toFixed(2) + ") and credits ($" + totalCredit.toFixed(2) + ") don't balance yet. Every journal entry needs total debits = total credits.";
      } else {
        fb.innerHTML = "❌ Debits and credits balance, but the accounts or amounts don't match the expected entry. Re-read the scenario and try again.";
      }
      if (correct) {
        state.jeSolved[chunkIdx] = true;
        chunks[chunkIdx + 1].satisfied = true;
        updateNav();
      }
    },
  };

  // ---------- Navigation ----------
  function goTo(i) {
    if (i < 0 || i >= chunks.length) return;
    state.current = i;
    chunks.forEach(function (c, idx) { c.el.classList.toggle("active", idx === i); });
    updateRail();
    updateProgress();
    updateNav();
    $("#stage").scrollTop = 0;
    window.SkarionSCORM.setProgress(i / (chunks.length - 1));
    if (i === chunks.length - 1) {
      window.SkarionSCORM.complete(true);
    }
  }

  function updateRail() {
    chunks.forEach(function (c, idx) {
      c.dotEl.classList.toggle("active", idx === state.current);
      c.dotEl.classList.toggle("done", idx < state.current);
    });
  }

  function updateProgress() {
    var pct = Math.round((state.current / (chunks.length - 1)) * 100);
    $("#progress-fill").style.width = pct + "%";
    $("#progress-label").textContent = pct + "%";
  }

  function updateNav() {
    var atEnd = state.current === chunks.length - 1;
    var atStart = state.current === 0;
    var cur = chunks[state.current];
    $("#nav-prev").disabled = atStart;
    $("#nav-next").disabled = atEnd || !cur.satisfied;
    $("#nav-next").textContent = atEnd ? "Done" : (cur.satisfied === false ? "Complete this step to continue" : (state.current === chunks.length - 2 ? "Finish module →" : "Continue →"));
  }

  function next() { if (!$("#nav-next").disabled) goTo(state.current + 1); }
  function prev() { if (!$("#nav-prev").disabled) goTo(state.current - 1); }

  document.addEventListener("DOMContentLoaded", function () {
    init();
    $("#nav-next").addEventListener("click", next);
    $("#nav-prev").addEventListener("click", prev);
  });
})();
</script>
</body>
